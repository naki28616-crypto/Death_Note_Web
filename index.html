<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>《The Backrooms》</title>
    <style>
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #0d0d0b; 
            touch-action: none; -webkit-touch-callout: none;
            user-select: none; -webkit-user-select: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas { display: block; width: 100% !important; height: 100% !important; position: absolute; top:0; left:0; z-index: 1; }
        
        /* 영화 같은 연출을 위한 비네트 및 색수차 왜곡 효과 */
        #vhs-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 25%, rgba(0,0,0,0.85) 100%);
            pointer-events: none; z-index: 2;
            backdrop-filter: contrast(115%) brightness(95%) saturate(85%);
        }
        
        #cctv-ui {
            position: absolute; top: 25px; left: 25px; color: rgba(220, 40, 40, 0.9); font-weight: bold;
            font-size: 15px; z-index: 210; letter-spacing: 1.5px; pointer-events: none; font-family: monospace; display: none;
            text-shadow: 0 0 6px rgba(220,40,40,0.6);
        }

        #top-controls { 
            position: absolute; top: 16px; right: 16px; z-index: 220; display: none; 
            flex-direction: column; align-items: flex-end; gap: 6px;
        }
        .control-row { display: flex; gap: 6px; }

        #ui-container {
            color: #d4cfb4; background: rgba(10, 10, 8, 0.96); padding: 12px; border-radius: 6px; 
            border: 1px solid #3a382e; width: 200px; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            max-height: 200px; opacity: 1; overflow: hidden; transform-origin: top right;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }
        #ui-container.collapsed {
            max-height: 0px; padding: 0px 12px; opacity: 0; border: 0px solid transparent; pointer-events: none;
        }
        
        .btn {
            background: #1c1b17; color: #bfae6f; border: 1px solid #3a382e; padding: 8px 14px; 
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; white-space: nowrap;
            transition: all 0.2s;
        }
        .btn:hover { background: #2b2922; color: #dfd29e; }
        .btn.active { background: #661e1e; color: #fff; border-color: #8c2b2b; text-shadow: 0 0 4px #fff; }

        .setting-row { display: flex; flex-direction: column; gap: 5px; font-size: 12px; margin-top: 5px; }
        .setting-row input { width: 100%; accent-color: #bfae6f; }

        #mobile-controls-right {
            position: absolute; bottom: 30px; right: 30px; display: none; flex-direction: column; gap: 15px; z-index: 20;
        }
        .circle-btn {
            width: 64px; height: 64px; background: rgba(22, 21, 18, 0.92); border: 2px solid #4a4537; 
            border-radius: 50%; color: #d4cfb4; font-size: 24px; display: flex; justify-content: center; 
            align-items: center; cursor: pointer; touch-action: none; box-shadow: 0 6px 14px rgba(0,0,0,0.7);
            transition: transform 0.1s;
        }
        .circle-btn:active { transform: scale(0.92); }
        .circle-btn.active { background: #bfae6f; color: #111; border-color: #fff; box-shadow: 0 0 15px rgba(191,174,111,0.6); }

        #stamina-container {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 160px; background: rgba(10, 10, 8, 0.9); border: 1px solid #3a382e; padding: 5px; border-radius: 4px; z-index: 10; display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .stamina-bg { background: rgba(0,0,0,0.7); height: 5px; overflow: hidden; border-radius: 2px; }
        #stamina-bar { width: 100%; height: 100%; background: #bfae6f; transition: width 0.05s linear; }

        #glitch-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0); opacity: 0; pointer-events: none; z-index: 3;
            transition: background-color 0.4s ease, opacity 0.4s ease;
        }

        #heartbeat-ui {
            position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%) scale(0);
            font-size: 46px; color: #b81414; text-shadow: 0 0 20px rgba(184, 20, 20, 0.9);
            pointer-events: none; z-index: 15; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #c5ba85; z-index: 200; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #161511; text-align: center;
        }
        .title-main { font-size: 26px; font-weight: 600; letter-spacing: 6px; margin: 0; opacity: 0.8; }
        .title-sub { font-size: 48px; font-weight: 900; letter-spacing: 7px; margin: 5px 0 0 0; text-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .title-level { font-size: 16px; font-weight: 500; letter-spacing: 3px; margin: 8px 0 35px 0; color: #3a382e; }
        
        .platform-select-box { display: flex; gap: 15px; margin-bottom: 35px; z-index: 210; }
        .platform-choice-btn {
            background: #1c1b17; color: #dfd59e; border: 1px solid #4a4537;
            padding: 12px 24px; font-size: 13px; font-weight: bold; border-radius: 4px; cursor: pointer; letter-spacing: 1.5px;
            transition: all 0.25s;
        }
        .platform-choice-btn.selected {
            background: #dfd59e; color: #1c1b17; border-color: #fff; box-shadow: 0 6px 20px rgba(223,213,158,0.4);
        }

        .start-btn-container {
            position: relative; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; cursor: pointer; opacity: 0.3; pointer-events: none; transition: all 0.4s;
        }
        .start-btn-container.ready { opacity: 1; pointer-events: auto; }
        .start-btn-container.ready:hover { transform: scale(1.05); }
        .circle-ring { position: absolute; border: 2px solid rgba(22,21,17,0.5); border-radius: 50%; pointer-events: none; }
        .ring-1 { width: 110px; height: 110px; }
        .ring-2 { width: 96px; height: 96px; }
        .ring-3 { width: 82px; height: 82px; border-style: dashed; }
        .start-label { font-size: 19px; font-weight: 900; letter-spacing: 2px; color: #161511; z-index: 5; }

        #gameover-screen, #pause-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4,4,3,0.96); z-index: 150; display: none; flex-direction: column;
            justify-content: center; align-items: center; color: #b82323;
        }
        .go-btn-box { display: flex; gap: 15px; margin-top: 30px; }
        .go-btn {
            background: #240e0e; color: #ff7777; border: 1px solid #5c1d1d; padding: 14px 28px;
            font-size: 13px; font-weight: bold; border-radius: 4px; cursor: pointer; letter-spacing: 1px;
            transition: all 0.2s;
        }
        .go-btn:hover { background: #421616; color: #fff; box-shadow: 0 0 15px rgba(235,50,50,0.3); }

        #joystick-zone {
            position: absolute; bottom: 35px; left: 35px; width: 120px; height: 120px; 
            background: rgba(255,255,255,0.02); border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; z-index: 10; touch-action: none; display: none;
        }
        #joystick-stick { position: absolute; top: 37px; left: 37px; width: 46px; height: 46px; background: rgba(255,255,255,0.25); border-radius: 50%; box-shadow: inset 0 0 8px rgba(255,255,255,0.5); }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 50%; pointer-events: none; z-index: 5; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="vhs-overlay"></div>
    <div id="glitch-overlay"></div>
    <div id="crosshair"></div>
    <div id="cctv-ui">🔴 REC <span id="cctv-time">00:00</span></div>
    
    <div id="heartbeat-ui">❤️</div>

    <div id="start-screen">
        <h2 class="title-main">THE BACKROOMS</h2>
        <h1 class="title-sub">EXPLORATION</h1>
        <div class="title-level">LEVEL 0 - CINEMATIC</div>
        
        <div class="platform-select-box">
            <button id="pc-select-btn" class="platform-choice-btn" onclick="setPlatformType('pc')">💻 PC CONTROL</button>
            <button id="mobile-select-btn" class="platform-choice-btn" onclick="setPlatformType('mobile')">📱 MOBILE TOUCH</button>
        </div>

        <div id="main-start-trigger" class="start-btn-container" onclick="launchGameCore()">
            <div class="circle-ring ring-1"></div>
            <div class="circle-ring ring-2"></div>
            <div class="circle-ring ring-3"></div>
            <span class="start-label">ENTER</span>
        </div>
    </div>

    <div id="top-controls">
        <div class="control-row">
            <button id="btn-view" class="btn" onclick="toggleViewMode()">🎥 1인칭 시점</button>
            <button class="btn" style="background:#111; color:#fff;" onclick="triggerPause(true)">⏸️ PAUSE</button>
            <button id="btn-toggle-panel" class="btn" style="background:#222; color:#bfae6f;" onclick="toggleSettingsPanel()">◢</button>
        </div>
        
        <div id="ui-container">
            <div id="settings-panel">
                <div class="setting-row">
                   <span>마우스 / 터치 감도</span>
                   <input type="range" id="cfg-sensitivity" min="0.1" max="2.5" step="0.1" value="1.0">
                </div>
            </div>
        </div>
    </div>

    <div id="mobile-controls-right">
        <div id="btn-mobile-flash" class="circle-btn active" ontouchstart="handleMobileFlash(event)">🔦</div>
        <div id="btn-mobile-jump" class="circle-btn" style="font-size:20px; font-weight:bold;" ontouchstart="handleMobileJump(event)">▲</div>
    </div>
    <div id="stamina-container"><div class="stamina-bg"><div id="stamina-bar"></div></div></div>
    <div id="joystick-zone"><div id="joystick-stick"></div></div>

    <div id="pause-screen">
        <h1 style="font-size: 26px; color:#bfae6f; margin-bottom:20px; letter-spacing: 2px;">PAUSED</h1>
        <button class="btn" style="color:#fff; border-color:#bfae6f; padding:10px 24px; font-size:14px;" onclick="triggerPause(false)">RESUME</button>
    </div>

    <div id="gameover-screen">
        <h1 style="font-size: 32px; margin-bottom: 5px; letter-spacing: 3px;">CONNECTION LOST</h1>
        <p style="color:#555; font-size:13px; margin-bottom:25px;">물체가 생명 신호를 차단했습니다.</p>
        <div class="go-btn-box">
            <button class="go-btn" onclick="backToMainMenu()">↩️ MAIN MENU</button>
            <button class="go-btn" style="background:#0e2411; color:#77ff77; border-color:#1d5c28;" onclick="rollback30SecondsSafe()">🛡️ RESPAWN (SAFE)</button>
        </div>
    </div>

    <script>
        let platform = null, viewMode = '3rd', isGameOver = false, isPaused = false, gameActive = false, isFlashlightOn = true, globalSensitivity = 1.0;
        
        const blackoutTriggerTime = 90; 
        let actualRecordTime = 0; 
        let isSpeedBoosted = false;
        let isPanelExpanded = true;

        let playerVelocityY = 0, isGrounded = true;
        const gravity = -0.014, jumpStrength = 0.165; 
        let lastHeartbeatSoundTime = 0;
        let landingImpactImpact = 0; // 착지 시 화면이 출렁이는 효과용 변수

        const basePlayerSpeed = 0.12;
        const sprintPlayerSpeed = 0.18;
        const exhaustedPlayerSpeed = 0.06;

        let safeSpawnPosition = new THREE.Vector3();

        // 시네마틱 톤 매핑 기능이 적용된 WebGL 고품질 렌더러 구성
        const scene = new THREE.Scene();
        const backroomsYellow = 0xbaa761; // 살짝 더 탁하고 무거운 컬러로 변경
        scene.background = new THREE.Color(backroomsYellow); 
        scene.fog = new THREE.FogExp2(backroomsYellow, 0.042); 

        const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.01, 1000);
        
        // 시각 깊이감 극대화를 위한 하이엔드 옵션 활성화
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 부드러운 하이엔드 그림자 효과
        renderer.toneMapping = THREE.ReinhardToneMapping; // 실시간 컬러 그레이딩 효과 지원
        renderer.toneMappingExposure = 1.25;
        document.body.appendChild(renderer.domElement);

        // 입체감을 살리기 위해 메인 환경광 낮추고 간접광 레이어 최적화
        const ambientLight = new THREE.AmbientLight(0xfffdb8, 0.35); 
        scene.add(ambientLight);

        const mapRows = 39, mapCols = 39, unitSize = 5, wallHeight = 6.8;
        let mapData = [], instancedWalls = null, lamps = [];

        // 🧱 [비주얼 상향] 조명을 받았을 때 홈과 요철이 생기는 범프 맵 텍스처 실시간 제작
        function generateHighQualityWallTextures() {
            const size = 512;
            const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // 베이스 디퓨즈(색상) 맵
            ctx.fillStyle = '#dfd5a0'; ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#d0c68f';
            // 종이 질감의 불규칙한 노이즈 삽입
            for(let i=0; i<8000; i++) {
                ctx.fillRect(Math.random()*size, Math.random()*size, 2, 2);
            }
            // 세로 스트라이프 벽지 문양
            ctx.strokeStyle = '#c2b77e'; ctx.lineWidth = 5;
            for (let x = 0; x < size; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, size); ctx.stroke();
            }
            const diffuseTex = new THREE.CanvasTexture(canvas);
            diffuseTex.wrapS = THREE.RepeatWrapping; diffuseTex.wrapT = THREE.RepeatWrapping;

            // 범프(입체감) 맵 생성
            const bumpCanvas = document.createElement('canvas'); bumpCanvas.width = size; bumpCanvas.height = size;
            const bCtx = bumpCanvas.getContext('2d');
            bCtx.fillStyle = '#808080'; bCtx.fillRect(0, 0, size, size);
            bCtx.fillStyle = '#000000';
            // 세로 홈 부분에 음영 깊이 주입
            for (let x = 0; x < size; x += 40) {
                bCtx.fillRect(x-2, 0, 4, size);
            }
            // 미세 크랙 스크래치 주입
            bCtx.strokeStyle = '#222222'; bCtx.lineWidth = 1;
            for(let i=0; i<15; i++) {
                bCtx.beginPath();
                bCtx.moveTo(Math.random()*size, Math.random()*size);
                bCtx.lineTo(Math.random()*size, Math.random()*size);
                bCtx.stroke();
            }
            const bumpTex = new THREE.CanvasTexture(bumpCanvas);
            bumpTex.wrapS = THREE.RepeatWrapping; bumpTex.wrapT = THREE.RepeatWrapping;

            return { diffuse: diffuseTex, bump: bumpTex };
        }

        const wallTextures = generateHighQualityWallTextures();
        const wallMat = new THREE.MeshStandardMaterial({ 
            map: wallTextures.diffuse, 
            bumpMap: wallTextures.bump,
            bumpScale: 0.04, // 미세 굴곡 계수
            roughness: 0.72, 
            metalness: 0.02 
        });
        
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x9e925c, roughness: 0.9, metalness: 0.05 }); 
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xd9cfab, roughness: 0.8 });

        function generateRandomMaze() {
            mapData = Array(mapRows).fill().map(() => Array(mapCols).fill(1));
            let visited = Array(mapRows).fill().map(() => Array(mapCols).fill(false));
            function carve(r, c) {
                visited[r][c] = true; mapData[r][c] = 0;
                const dirs = [[-2,0], [2,0], [0,-2], [0,2]].sort(() => Math.random() - 0.5);
                for(let [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    if(nr > 0 && nr < mapRows-1 && nc > 0 && nc < mapCols-1 && !visited[nr][nc]) {
                        mapData[r + dr/2][c + dc/2] = 0; carve(nr, nc);
                    }
                }
            }
            carve(1, 1);
            
            for(let k=0; k<10; k++) {
                let centerR = Math.floor(Math.random()*(mapRows-6))+3;
                let centerC = Math.floor(Math.random()*(mapCols-6))+3;
                let size = Math.floor(Math.random()*2)+3; 
                for(let r = centerR-size; r<=centerR+size; r++) {
                    for(let c = centerC-size; c<=centerC+size; c++) {
                        if(r>0 && r<mapRows-1 && c>0 && c<mapCols-1) mapData[r][c] = 0; 
                    }
                }
            }
        }

        function buildMazeGraphics() {
            if(instancedWalls) scene.remove(instancedWalls);
            lamps.forEach(l => scene.remove(l)); lamps = [];
            let wallCount = 0;
            for(let r=0; r<mapRows; r++) { for(let c=0; c<mapCols; c++) { if(mapData[r][c] === 1) wallCount++; } }

            const wallGeo = new THREE.BoxGeometry(unitSize, wallHeight, unitSize);
            instancedWalls = new THREE.InstancedMesh(wallGeo, wallMat, wallCount);
            instancedWalls.castShadow = true; instancedWalls.receiveShadow = true;
            let dummy = new THREE.Object3D(), idx = 0;

            for(let r=0; r<mapData.length; r++) {
                for(let c=0; c<mapData[r].length; c++) {
                    const x = (c - mapCols/2) * unitSize + unitSize/2;
                    const z = (r - mapRows/2) * unitSize + unitSize/2;
                    if(mapData[r][c] === 1) {
                        dummy.position.set(x, wallHeight/2, z); dummy.updateMatrix();
                        instancedWalls.setMatrixAt(idx++, dummy.matrix);
                    } else if(Math.random() < 0.08) {
                        const lamp = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.02, 0.6), new THREE.MeshBasicMaterial({ color: 0xffffee }));
                        lamp.position.set(x, wallHeight - 0.01, z); scene.add(lamp); lamps.push(lamp);
                        
                        const pl = new THREE.PointLight(0xfff5cc, 0.85, 16); 
                        pl.position.set(x, wallHeight - 0.2, z);
                        pl.castShadow = true; pl.shadow.bias = -0.002;
                        lamp.add(pl);
                    }
                }
            }
            scene.add(instancedWalls);
            const mW = mapCols*unitSize, mH = mapRows*unitSize;
            const f = new THREE.Mesh(new THREE.PlaneGeometry(mW, mH), floorMat); f.rotation.x = -Math.PI/2; f.receiveShadow = true; scene.add(f);
            const cl = new THREE.Mesh(new THREE.PlaneGeometry(mW, mH), ceilMat); cl.rotation.x = Math.PI/2; cl.position.y = wallHeight; scene.add(cl);
        }

        function getSafeSpawn(avoidPlayerPos = null) {
            while(true) {
                let r = Math.floor(Math.random()*mapRows);
                let c = Math.floor(Math.random()*mapCols);
                if(mapData[r][c] === 0) {
                    let spawnX = (c - mapCols/2)*unitSize + unitSize/2;
                    let spawnZ = (r - mapRows/2)*unitSize + unitSize/2;
                    if(avoidPlayerPos) {
                        let dist = Math.sqrt(Math.pow(spawnX - avoidPlayerPos.x, 2) + Math.pow(spawnZ - avoidPlayerPos.z, 2));
                        if(dist < 18) continue;
                    }
                    return { x: spawnX, z: spawnZ };
                }
            }
        }

        generateRandomMaze(); buildMazeGraphics();

        let player = new THREE.Group(); scene.add(player);
        let playerParts = []; const hazmatColor = 0xcc9a14;
        const pMat = new THREE.MeshStandardMaterial({ color: hazmatColor, roughness: 0.5, metalness: 0.1 });

        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.18, 0.8, 12), pMat); torso.position.y = 0.85; torso.castShadow = true; player.add(torso); playerParts.push(torso);
        const headGroup = new THREE.Group(); headGroup.position.set(0, 1.4, 0); player.add(headGroup); playerParts.push(headGroup);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.19, 16, 16), pMat); head.castShadow = true; headGroup.add(head);
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.08, 0.1), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.05, metalness: 0.95 })); visor.position.set(0, 0.02, 0.14); headGroup.add(visor);

        let leftArm3rd = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.5), pMat); leftArm3rd.position.set(-0.32, 0.8, 0); leftArm3rd.castShadow = true; player.add(leftArm3rd); playerParts.push(leftArm3rd);
        let rightArm3rd = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.5), pMat); rightArm3rd.position.set(0.32, 0.8, 0); rightArm3rd.castShadow = true; player.add(rightArm3rd); playerParts.push(rightArm3rd);
        let leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.55), pMat); leftLeg.position.set(-0.12, 0.28, 0); leftLeg.castShadow = true; player.add(leftLeg); playerParts.push(leftLeg);
        let rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.55), pMat); rightLeg.position.set(0.12, 0.28, 0); rightLeg.castShadow = true; player.add(rightLeg); playerParts.push(rightLeg);

        let firstPersonRig = new THREE.Group(); scene.add(firstPersonRig);
        const armMat = new THREE.MeshStandardMaterial({ color: hazmatColor, roughness: 0.6 });
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.45), armMat); leftArm.rotation.x = Math.PI / 2; leftArm.position.set(-0.22, -0.22, -0.3); firstPersonRig.add(leftArm);
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.45), armMat); rightArm.rotation.x = Math.PI / 2; rightArm.position.set(0.22, -0.22, -0.3); firstPersonRig.add(rightArm);

        window.addEventListener('mousemove', (e) => {

            if (document.pointerLockElement === document.body) {
                const multi = 0.002 * globalSensitivity; cameraAngleX -= e.movementX * multi; cameraAngleY -= e.movementY * multi;

        let joystickInput = { x: 0, y: 0 }, joystickDistanceRatio = 0, joystickTouchId = null, rotationTouchId = null, prevX = 0, prevY = 0, joystickStartPos = { x: 0, y: 0 };
        const joystickZone = document.getElementById('joystick-zone'), joystickStick = document.getElementById('joystick-stick');

        function calculateJoystick(cX, cY) {
            let dX = cX - joystickStartPos.x, dY = cY - joystickStartPos.y;
            const dist = Math.sqrt(dX*dX + dY*dY), maxR = 40;
            if (dist > maxR) { dX = (dX / dist) * maxR; dY = (dY / dist) * maxR; }
            joystickStick.style.transform = `translate(${dX}px, ${dY}px)`;
            joystickInput.x = dX / maxR; joystickInput.y = dY / maxR; joystickDistanceRatio = dist / maxR;
        }

        window.addEventListener('touchstart', (e) => {
            if(!gameActive || isGameOver || isPaused || platform !== 'mobile') return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.target.closest('#top-controls') || t.target.closest('#mobile-controls-right')) continue;
                if (t.clientX < window.innerWidth / 2 && joystickTouchId === null) {
                    joystickTouchId = t.identifier; joystickZone.style.left = `${t.clientX - 55}px`; joystickZone.style.bottom = `${window.innerHeight - t.clientY - 55}px`;
                    joystickStartPos = { x: t.clientX, y: t.clientY }; calculateJoystick(t.clientX, t.clientY);
                } else if (t.clientX >= window.innerWidth / 2 && rotationTouchId === null) {
                    rotationTouchId = t.identifier; prevX = t.clientX; prevY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if(platform !== 'mobile') return;
            for (let i = 0; i < e.touches.length; i++) {
                const t = e.touches[i];
                if (t.identifier === joystickTouchId) calculateJoystick(t.clientX, t.clientY);
                if (t.identifier === rotationTouchId) {
                    const multi = 0.0045 * globalSensitivity; cameraAngleX -= (t.clientX - prevX) * multi; cameraAngleY -= (t.clientY - prevY) * multi;
                    prevX = t.clientX; prevY = t.clientY; cameraAngleY = Math.max(-Math.PI/2.4, Math.min(Math.PI/2.4, cameraAngleY));
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === joystickTouchId) {
                    joystickTouchId = null; joystickStick.style.transform = 'translate(0px, 0px)';
                    joystickInput = { x: 0, y: 0 }; joystickDistanceRatio = 0;
                    joystickZone.style.left = '30px'; joystickZone.style.bottom = '30px';
                }
                if (t.identifier === rotationTouchId) rotationTouchId = null;
            }
        });

        function checkGridCollision(oldPos, tentativePos, radius = 0.6) {
            let res = { x: tentativePos.x, z: tentativePos.z };
            const pCol = Math.floor((oldPos.x - unitSize/2 + (mapCols * unitSize)/2) / unitSize);
            const pRow = Math.floor((oldPos.z - unitSize/2 + (mapRows * unitSize)/2) / unitSize);
            for (let r = pRow - 1; r <= pRow + 1; r++) {
                for (let c = pCol - 1; c <= pCol + 1; c++) {
                    if (r < 0 || r >= mapRows || c < 0 || c >= mapCols) continue;
                    if (mapData[r][c] === 1) {
                        const wX = (c - mapCols/2) * unitSize + unitSize/2;
                        const wZ = (r - mapRows/2) * unitSize + unitSize/2;
                        const minX = wX - unitSize/2 - radius, maxX = wX + unitSize/2 + radius;
                        const minZ = wZ - unitSize/2 - radius, maxZ = wZ + unitSize/2 + radius;
                        if (res.x > minX && res.x < maxX && res.z > minZ && res.z < maxZ) {
                            if (oldPos.x <= minX || oldPos.x >= maxX) res.x = oldPos.x;
                            if (oldPos.z <= minZ || oldPos.z >= maxZ) res.z = oldPos.z;
                        }
                    }
                }
            }
            return res;
        }

        function processEntityAI(e, playerPos) {
            const ePos = e.mesh.position; const dist = ePos.distanceTo(playerPos);
            e.stuckCheckTimer += 1;
            if(e.stuckCheckTimer > 45) {
                if(ePos.distanceTo(e.lastPos) < 0.15) { 
                    const escapeSp = getSafeSpawn(playerPos); ePos.set(escapeSp.x, 0, escapeSp.z); e.patrolTarget = getSafeSpawn(playerPos);
                }
                e.lastPos.copy(ePos); e.stuckCheckTimer = 0;
            }
            
            if (dist < 32 && !isGameOver) { e.state = 'chase'; } 
            else if (e.state === 'chase' && dist > 38) { e.state = 'patrol'; e.patrolTarget = getSafeSpawn(playerPos); }
            
            let dest = (e.state === 'chase') ? playerPos : e.patrolTarget;
            if(e.state === 'patrol' && Math.abs(ePos.x - dest.x) < 1.2 && Math.abs(ePos.z - dest.z) < 1.2) { e.patrolTarget = getSafeSpawn(playerPos); }
            const dX = dest.x - ePos.x, dZ = dest.z - ePos.z; const len = Math.sqrt(dX*dX + dZ*dZ);
            if (len > 0.1) {
                const sp = e.state === 'chase' ? e.speed * 1.38 : e.speed;
                const tenE = { x: ePos.x + (dX / len) * sp, z: ePos.z + (dZ / len) * sp };
                const safeE = checkGridCollision({x:ePos.x, z:ePos.z}, tenE, 0.5);
                ePos.x = safeE.x; ePos.z = safeE.z; 
                
                // 👾 [움직임 상향] 목표를 자연스럽고 기괴하게 바라보는 쿼터니언 회전 처리
                const targetRot = Math.atan2(dX, dZ);
                const currentRot = e.mesh.rotation.y;
                // 회전 각도 차이 보간
                let diff = targetRot - currentRot;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                e.mesh.rotation.y += diff * 0.08;
            }
        }

        let audioCtx = null, mainGain = null, buzzOsc = null, buzzFilter = null;
        let lastFootstepTime = 0;

        function initBackroomsAudio() {
            try {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mainGain = audioCtx.createGain(); mainGain.gain.setValueAtTime(0.02, audioCtx.currentTime); 
                buzzOsc = audioCtx.createOscillator(); buzzOsc.type = 'sawtooth'; buzzOsc.frequency.setValueAtTime(60, audioCtx.currentTime); 
                buzzFilter = audioCtx.createBiquadFilter(); buzzFilter.type = 'lowpass'; buzzFilter.frequency.setValueAtTime(140, audioCtx.currentTime);
                buzzOsc.connect(buzzFilter); buzzFilter.connect(mainGain); mainGain.connect(audioCtx.destination); buzzOsc.start();
            } catch(e){}
        }

        function playFootstepSound(volume) {
            if (!audioCtx || isPaused || isGameOver) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(70, audioCtx.currentTime); 
            gain.gain.setValueAtTime(volume * 0.16, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.13);
        }

        function playHeartbeatSound(volume, isDouble) {
            if (!audioCtx || isPaused || isGameOver) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(50, audioCtx.currentTime); 
            gain.gain.setValueAtTime(volume * 0.85, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.14);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);

            if (isDouble) {
                setTimeout(() => {
                    if (isPaused || isGameOver) return;
                    let osc2 = audioCtx.createOscillator(); let gain2 = audioCtx.createGain();
                    osc2.type = 'sine'; osc2.frequency.setValueAtTime(45, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(volume * 0.45, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.start(); osc2.stop(audioCtx.currentTime + 0.13);
                }, 130);
            }
        }

        function triggerBlackoutPhase() {
            const glitchOverlay = document.getElementById('glitch-overlay');
            glitchOverlay.style.background = 'rgba(3, 1, 1, 0.94)'; glitchOverlay.style.opacity = 1;
            scene.fog.density = 0.22; ambientLight.intensity = 0.005;

            if (buzzOsc) { try { buzzOsc.frequency.setValueAtTime(0, audioCtx.currentTime); } catch(e){} }
            
            entities.forEach(e => {
                e.speed = e.baseSpeed * 1.8; 
                // 👁️ 정전 후 엔티티의 눈을 섬뜩한 핏빛으로 강제 각성 연출

        // 🔄 메인 프레임 렌더링 엔진 (물리 애니메이션 핵심 탑재)
        function animate() {
            requestAnimationFrame(animate);

            if (!gameActive) {
                const timer = Date.now() * 0.0002;
                camera.position.set(Math.sin(timer)*8, 3.6, Math.cos(timer)*8);
                camera.lookAt(0, 2.2, 0);
                renderer.render(scene, camera);
                return;
            }

            if (isGameOver || isPaused) return;

            actualRecordTime += 1 / 60; 
            const displayMin = Math.floor(actualRecordTime / 60);
            const displaySec = Math.floor(actualRecordTime % 60);
            document.getElementById('cctv-time').textContent = `${displayMin.toString().padStart(2, '0')}:${displaySec.toString().padStart(2, '0')}`;

            if (actualRecordTime >= blackoutTriggerTime && !isSpeedBoosted) {
                isSpeedBoosted = true; triggerBlackoutPhase();
            }

            // 🎥 시점 버그 전면 해결: 카메라 각도 보간(LERP)을 주어 부드러운 고품질 고해상도 시선 회전 구현
            smoothCamAngleX += (cameraAngleX - smoothCamAngleX) * 0.22;
            smoothCamAngleY += (cameraAngleY - smoothCamAngleY) * 0.22;
            const viewDir = new THREE.Vector3(
                Math.sin(smoothCamAngleX) * Math.cos(smoothCamAngleY), 
                Math.sin(smoothCamAngleY), 
                -Math.cos(smoothCamAngleX) * Math.cos(smoothCamAngleY)
            );

            let finalFlashlightIntensity = actualRecordTime >= blackoutTriggerTime ? 0.4 : 2.2;
            flashlight.intensity = isFlashlightOn ? finalFlashlightIntensity : 0;

            let moveX = 0, moveZ = 0;
            if (platform === 'pc') {
                if (keys.w) moveZ -= 1; if (keys.s) moveZ += 1; if (keys.a) moveX -= 1; if (keys.d) moveX += 1;
                isMoving = (moveX !== 0 || moveZ !== 0); isSprinting = (isMoving && keys.shift && !isExhausted);
            } else {
                if (Math.abs(joystickInput.x) > 0.05 || Math.abs(joystickInput.y) > 0.05) { moveX = joystickInput.x; moveZ = joystickInput.y; }
                isMoving = (moveX !== 0 || moveZ !== 0); isSprinting = (isMoving && joystickDistanceRatio > 0.76 && !isExhausted);
            }

            if (isSprinting) { 
                stamina -= 0.35; if (stamina <= 0) { stamina = 0; isExhausted = true; } 
            } else { 
                stamina += isMoving ? 0.35 : 1.45; if (stamina >= 100) { stamina = 100; isExhausted = false; } 
            }

            const sBar = document.getElementById('stamina-bar');
            if(sBar) { sBar.style.width = `${stamina}%`; sBar.style.background = isExhausted ? '#d62828' : '#bfae6f'; }

            const runtime = Date.now() * 0.0045;
            let bobX = 0, bobY = 0, runShake = 0;
            
            // 🏃 점프 및 이동 관성 물리 매커니즘
            let currentMoveSpeed = isExhausted ? exhaustedPlayerSpeed : (isSprinting ? sprintPlayerSpeed : basePlayerSpeed);
            const sinX = Math.sin(smoothCamAngleX), cosX = Math.cos(smoothCamAngleX);
            const fX = (moveX * cosX + moveZ * sinX) * currentMoveSpeed;
            const fZ = (-moveX * sinX + moveZ * cosX) * currentMoveSpeed;

            if (isMoving) {
                const oldP = { x: player.position.x, z: player.position.z };
                const tenP = { x: player.position.x + fX, z: player.position.z + fZ };
                const safeP = checkGridCollision(oldP, tenP, 0.58);
                player.position.x = safeP.x; player.position.z = safeP.z;
                if (viewMode === '3rd') targetRotationY = smoothCamAngleX + Math.atan2(-moveX, -moveZ);
            }

            // 중력 및 착지 시 충격 보정 로직
            playerVelocityY += gravity; player.position.y += playerVelocityY;
            if (player.position.y <= 0) { 
                player.position.y = 0; 
                if(playerVelocityY < -0.05) { // 착지 시 쿵 하는 카메라 충격 물리 주입
                    landingImpactImpact = Math.min(0.22, Math.abs(playerVelocityY) * 1.2);
                }
                playerVelocityY = 0; isGrounded = true; 
            }

            // 서서히 복구되는 착지 충격 연산
            landingImpactImpact *= 0.88;

            // 🎥 1인칭 헤드 밥 애니메이션 고급 고도화
            if (isMoving && isGrounded) {
                let waveFreq = isSprinting ? 2.4 : 1.5;
                let ampMultiplier = isSprinting ? 1.8 : 1.0;
                bobX = Math.sin(runtime * waveFreq) * 0.035 * ampMultiplier;
                bobY = Math.cos(runtime * waveFreq * 2) * 0.028 * ampMultiplier;
                
                // 달릴 때 마우스를 흔드는 듯한 고주파 핸드 셰이크 추가
                if(isSprinting) runShake = (Math.random() - 0.5) * 0.008;

                const swing = Math.sin(runtime * waveFreq * 3.5) * 0.45;
                leftArm3rd.rotation.x = swing; rightArm3rd.rotation.x = -swing;
                leftLeg.rotation.x = -swing * 1.1; rightLeg.rotation.x = swing * 1.1;

                let footstepInterval = isSprinting ? 220 : 370;
                let now = Date.now();
                if(now - lastFootstepTime > footstepInterval) {
                    playFootstepSound(isSprinting ? 0.9 : 0.5); lastFootstepTime = now;
                }
            } else if (!isMoving) {
                leftArm3rd.rotation.x = 0; rightArm3rd.rotation.x = 0;
                leftLeg.rotation.x = 0; rightLeg.rotation.x = 0;
            }

            if (viewMode === '3rd') {
                player.quaternion.slerp(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), targetRotationY), 0.16);
            } else {
                player.rotation.y = smoothCamAngleX;
            }

            let closestDist = 999;
            entities.forEach(e => {
                processEntityAI(e, player.position);
                const d = player.position.distanceTo(e.mesh.position);
                if (d < closestDist) closestDist = d;

                // 👾 [애니메이션 상향] 엔티티 척추 마디 유기적 웨이브 연출 및 다리 관절 모션 유동화
                const wave = Math.sin(Date.now() * 0.008 + e.animOffset);
                e.spine.forEach((node, idx) => {
                    node.position.x = Math.sin(wave + idx * 0.8) * 0.06 * (idx === 0 ? 0.3 : idx * 0.5);
                    node.position.z = Math.cos(wave + idx * 0.8) * 0.04 * (idx === 0 ? 0.3 : idx * 0.5);
                });

                e.legs.forEach((leg, idx) => {
                    let legSpeed = e.state === 'chase' ? 0.025 : 0.015;
                    leg.rotation.x = Math.sin(Date.now() * legSpeed + idx * 1.5) * 0.55;
                    leg.position.y = 0.9 + Math.max(0, Math.cos(Date.now() * legSpeed + idx * 1.5) * 0.12);
                });
            });

            const heartUI = document.getElementById('heartbeat-ui');
            if (closestDist < 16) {
                let proximityFactor = (16 - closestDist) / 16; 
                let heartbeatInterval = 850 - (proximityFactor * 580); 
                let now = Date.now();
                if (now - lastHeartbeatSoundTime > heartbeatInterval) {
                    playHeartbeatSound(0.35 + (proximityFactor * 0.65), true); lastHeartbeatSoundTime = now;
                    heartUI.style.transform = `translateX(-50%) scale(${1.25 + proximityFactor * 0.65})`;
                    setTimeout(() => { heartUI.style.transform = `translateX(-50%) scale(${0.9 + proximityFactor * 0.3})`; }, 130);
                }
                const glitchOverlay = document.getElementById('glitch-overlay');
                if (actualRecordTime < blackoutTriggerTime) {
                    glitchOverlay.style.background = `rgba(110, 12, 12, ${proximityFactor * 0.5})`;
                    glitchOverlay.style.opacity = (Math.sin(Date.now() * 0.1) * 0.12) + proximityFactor;
                }
            } else {
                heartUI.style.transform = 'translateX(-50%) scale(0)';
                if (actualRecordTime < blackoutTriggerTime) document.getElementById('glitch-overlay').style.opacity = 0;
            }

            if (closestDist < 1.25) {
                isGameOver = true; document.getElementById('gameover-screen').style.display = 'flex';
                if(platform === 'pc') document.exitPointerLock(); return;
            }

            // 🎥 카메라 물리 시점 및 헤드 밥, 하강 댐핑 마운트 최종 연산
            if (viewMode === '3rd') {
                const r = 5.4;
                const tX = player.position.x + Math.sin(smoothCamAngleX)*Math.cos(smoothCamAngleY)*r;
                const tY = player.position.y + 1.8 + Math.sin(smoothCamAngleY)*r + 1.1 - landingImpactImpact;
                const tZ = player.position.z + Math.cos(smoothCamAngleX)*Math.cos(smoothCamAngleY)*r;
                camera.position.x += (tX - camera.position.x) * 0.16;
                camera.position.y += (tY - camera.position.y) * 0.16;
                camera.position.z += (tZ - camera.position.z) * 0.16;
                camera.lookAt(player.position.x, player.position.y + 1.25, player.position.z);
            } else {
                camera.position.x = player.position.x + bobX; 
                camera.position.y = player.position.y + 1.66 + bobY - landingImpactImpact; 
                camera.position.z = player.position.z;

                camera.lookAt(new THREE.Vector3().copy(camera.position).add(viewDir));

                firstPersonRig.position.copy(camera.position);
                firstPersonRig.rotation.set(camera.rotation.x + runShake, camera.rotation.y, camera.rotation.z);
                
                leftArm.position.x = -0.22 + bobX * 0.4; rightArm.position.x = 0.22 + bobX * 0.4;
                flashlightMesh.position.x = 0.22 + bobX * 0.4; flashlight.position.x = 0.22 + bobX * 0.4;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
