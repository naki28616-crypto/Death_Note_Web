<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《£ack rooms》</title>
    <style>
        html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:#080806;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
        canvas{display:block;width:100%!important;height:100%!important;position:absolute;top:0;left:0;z-index:1;}
        #vhs-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle,rgba(0,0,0,0) 40%,rgba(0,0,0,0.85) 100%);pointer-events:none;z-index:2;}
        #glitch-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0);opacity:0;pointer-events:none;z-index:3;transition:background-color .6s,opacity .6s;}
        #crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:rgba(255,255,255,.5);border-radius:50%;pointer-events:none;z-index:5;display:none;}
        #cctv-ui{position:absolute;top:25px;left:25px;color:#ff3333;font-weight:bold;font-size:16px;z-index:210;letter-spacing:1.5px;pointer-events:none;font-family:monospace;display:none;text-shadow:0 0 8px rgba(255,51,51,0.7);}
        #quest-ui{position:absolute;top:60px;left:25px;color:#ffea9f;font-weight:bold;font-size:14px;z-index:210;letter-spacing:1px;pointer-events:none;background:rgba(12,11,9,.9);padding:10px 16px;border-left:3px solid #d1bd71;border-radius:0 4px 4px 0;display:none;text-shadow:0 1px 4px rgba(0,0,0,1);box-shadow:0 4px 12px rgba(0,0,0,.6);}
        #interact-prompt{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);color:#fff;background:rgba(0,0,0,.85);border:1px solid #d1bd71;padding:10px 20px;border-radius:4px;font-weight:bold;font-size:14px;z-index:100;display:none;pointer-events:none;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.5);}
        
        #top-controls{position:absolute;top:16px;right:16px;z-index:220;display:none;}
        
        .btn{background:#1a1914;color:#d1bd71;border:1px solid #474436;padding:9px 14px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;white-space:nowrap;transition:all .2s;text-align:center;box-sizing:border-box;}
        .btn:hover{background:#2e2b21;color:#ffea9f;border-color:#615d4a;}
        
        .setting-row{display:flex;flex-direction:column;gap:3px;font-size:12px;color:#9e9573;font-weight:bold;font-family:monospace;width:100%;}
        .setting-row div{display:flex;justify-content:space-between;align-items:center;color:#e8e4cf;font-weight:normal;font-size:14px;}
        .setting-row input[type="range"]{width:100%;accent-color:#d1bd71;margin-top:4px;cursor:pointer;height:8px;}
        
        #mobile-controls-right{position:absolute;bottom:30px;right:30px;display:none;flex-direction:column;gap:15px;z-index:220;}
        .circle-btn{width:64px;height:64px;background:rgba(20,19,16,.95);border:2px solid #544e3e;border-radius:50%;color:#e8e4cf;font-size:24px;display:flex;justify-content:center;align-items:center;cursor:pointer;touch-action:none;box-shadow:0 6px 14px rgba(0,0,0,.8);}
        .circle-btn.active{background:#d1bd71;color:#111;border-color:#fff;}
        #btn-mobile-interact{background:#ffea9f!important;color:#111!important;border-color:#fff!important;display:none;font-size:28px;animation:pulse 1.2s infinite;z-index:230;}
        @keyframes pulse{0%{transform:scale(1);box-shadow:0 0 0 rgba(255,234,159,.5);}50%{transform:scale(1.15);box-shadow:0 0 20px rgba(255,234,159,.8);}100%{transform:scale(1);box-shadow:0 0 0 rgba(255,234,159,.5);}}
        #stamina-container{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);width:160px;background:rgba(8,8,6,.95);border:1px solid #474436;padding:5px;border-radius:4px;z-index:10;display:none;}
        .stamina-bg{background:rgba(0,0,0,.7);height:5px;overflow:hidden;border-radius:2px;}
        #stamina-bar{width:100%;height:100%;background:#d1bd71;}
        #heartbeat-ui{position:absolute;bottom:45px;left:50%;transform:translateX(-50%) scale(0);font-size:46px;color:#cc1818;text-shadow:0 0 25px rgba(204,24,24,.9);pointer-events:none;z-index:15;transition:transform .1s cubic-bezier(.175,.885,.32,1.275);}
        #game-toast{position:absolute;top:20%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.92);color:#ffcc00;padding:12px 24px;border:1px solid #d1bd71;border-radius:4px;font-weight:bold;font-size:15px;z-index:300;display:none;pointer-events:none;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.8);}
        #ladder-hud{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#66ff66;padding:6px 18px;border:1px solid #339933;border-radius:4px;font-weight:bold;font-size:13px;z-index:210;display:none;pointer-events:none;}
        #joystick-zone{position:absolute;bottom:35px;left:35px;width:120px;height:120px;background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.15);border-radius:50%;z-index:10;touch-action:none;display:none;}
        #joystick-stick{position:absolute;top:37px;left:37px;width:46px;height:46px;background:rgba(255,255,255,.3);border-radius:50%;}

        /* ─── START SCREEN ─── */
        #start-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;color:#ebdfa7;overflow:hidden;padding-left:8%;box-sizing:border-box;}
        #preview-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;}
        #scanline-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);pointer-events:none;z-index:2;animation:scanlines 8s linear infinite;}
        #vignette-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(0,0,0,0) 20%,rgba(0,0,0,.85) 100%);pointer-events:none;z-index:3;}
        #noise-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;opacity:.06;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:staticAnim .08s steps(1) infinite;}
        @keyframes scanlines{0%{background-position:0 0;}100%{background-position:0 100px;}}
        @keyframes staticAnim{0%,100%{opacity:.05;}50%{opacity:.07;}}
        
        #start-content{position:relative;z-index:5;display:flex;flex-direction:column;align-items:flex-start;text-align:left;max-width:550px;transition:opacity 0.3s ease;}
        #cctv-badge{font-family:monospace;font-size:14px;color:#ff3333;letter-spacing:3px;margin-bottom:12px;font-weight:bold;text-shadow:0 0 10px rgba(255,51,51,0.6);animation:blink 1.2s step-end infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
        
        .title-main{font-size:24px;font-weight:600;letter-spacing:10px;margin:0;color:#d1bd71;opacity:.85;font-family:monospace;text-shadow:0 2px 4px rgba(0,0,0,0.8);}
        .title-sub{font-size:52px;font-weight:900;letter-spacing:6px;margin:4px 0 0;color:#ffffff;text-shadow:0 0 25px rgba(209,189,113,.7), 0 4px 10px rgba(0,0,0,0.9);}
        .title-level{font-size:15px;font-weight:600;letter-spacing:3px;margin:6px 0 30px;color:#9e9573;font-family:monospace;text-shadow:0 1px 3px rgba(0,0,0,0.8);}
        
        .menu-group{display:flex;flex-direction:column;gap:14px;align-items:flex-start;}
        
        .start-btn-container{position:relative;width:180px;height:54px;display:flex;justify-content:center;align-items:center;cursor:pointer;background:rgba(20,19,16,.85);border:2px solid #d1bd71;border-radius:4px;box-shadow:0 4px 15px rgba(0,0,0,0.6);transition:all 0.25s ease;}
        .start-btn-container:hover{background:#d1bd71;box-shadow:0 0 25px rgba(209,189,113,0.5);}
        .start-btn-container:hover .start-label{color:#111;text-shadow:none;}
        .start-label{font-size:18px;font-weight:900;letter-spacing:4px;color:#ebdfa7;font-family:monospace;text-shadow:0 2px 4px rgba(0,0,0,0.8);transition:color 0.2s;}
        
        .setting-toggle-btn{background:rgba(12,11,9,0.6);color:#9e9573;border:1px solid #474436;padding:8px 18px;font-size:13px;font-weight:bold;border-radius:4px;cursor:pointer;letter-spacing:1.5px;transition:all 0.2s;font-family:monospace;}
        .setting-toggle-btn:hover{color:#fff;border-color:#9e9573;background:rgba(30,28,23,0.8);}
        
        /* ─── 업그레이드된 세팅 패널 (PC / 모바일 분기 및 터치 스크롤 탑재) ─── */
        .inline-settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 6, 0.96);
            z-index: 210;
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* 상단부터 채워지도록 설정 */
            align-items: flex-start;
            box-sizing: border-box;
            overflow-y: auto;           /* 내부 세로 스크롤 허용 */
            -webkit-overflow-scrolling: touch; /* 모바일 부드러운 스크롤 */
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* PC 환경 세팅 (가로 화면) */
        @media (min-width: 769px) {
            .inline-settings-panel {
                padding: 60px 0 60px 8%; 
            }
            .settings-content-wrapper {
                width: 360px; /* PC 가로폭 살짝 여유있게 변경 */
            }
        }

        /* 모바일 환경 세팅 (세로 화면) */
        @media (max-width: 768px) {
            .inline-settings-panel {
                padding: 40px 24px; /* 사방 여백을 주어 터치 영역 확보 */
                align-items: center; /* 가운데로 정렬해 가독성 확보 */
                touch-action: pan-y; /* 모바일 창에서 세로 스크롤 허용 */
            }
            .settings-content-wrapper {
                width: 100%;
                max-width: 320px; /* 너무 뚱뚱해지지 않게 캡 가이드 */
            }
        }
        
        .inline-settings-panel.open {
            opacity: 1;
            pointer-events: auto;
        }
        
        .settings-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px; /* 행간 간격 확대 */
            padding-bottom: 40px; /* 마지막 뒤로가기 버튼 아래 여백 확보 */
        }
        
        .platform-mini-box{display:flex;gap:10px;width:100%;}
        .platform-choice-btn{background:#1c1b17;color:#9e9573;border:1px solid #4a4537;flex:1;padding:11px 0;font-size:12px;font-weight:bold;border-radius:3px;cursor:pointer;transition:all 0.2s;font-family:monospace;}
        .platform-choice-btn.selected{background:#d1bd71;color:#1c1b17;border-color:#fff;box-shadow:0 4px 12px rgba(209,189,113,.3);font-weight:900;}

        #gameover-screen,#pause-screen,#clear-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(3,3,2,.98);z-index:150;display:none;flex-direction:column;justify-content:center;align-items:center;}
        #gameover-screen{color:#cc2424;}
        #clear-screen{color:#ffcc00;background:rgba(12,11,9,.99);}
        .go-btn{background:#260f0f;color:#ff8888;border:1px solid #662222;padding:14px 28px;font-size:13px;font-weight:bold;border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all 0.2s;}
        .go-btn:hover{background:#471919;color:#fff;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="vhs-overlay"></div>
<div id="glitch-overlay"></div>
<div id="crosshair"></div>
<div id="cctv-ui">🔴 REC <span id="cctv-time">00:00</span></div>
<div id="quest-ui"></div>
<div id="interact-prompt"></div>
<div id="game-toast"></div>
<div id="heartbeat-ui">♡</div>
<div id="ladder-hud">🪜 Ladder x1</div>

<div id="start-screen">
    <canvas id="preview-canvas"></canvas>
    <div id="scanline-overlay"></div>
    <div id="vignette-overlay"></div>
    <div id="noise-overlay"></div>
    
    <div id="start-content">
        <div id="cctv-badge">🔴 REC — LIVE</div>
        <h2 class="title-main">LEVE 0 test</h2>
        <h1 class="title-sub">THE BACKROOMS</h1>
        <div class="title-level">Demo</div>
        
        <div class="menu-group">
            <div id="start-trigger" class="start-btn-container" onclick="launchGame()">
                <span class="start-label">START</span>
            </div>
            
            <button class="setting-toggle-btn" onclick="toggleStartSettings(true)">⚙️ SETTINGS</button>
        </div>
    </div>

    <div id="start-settings-panel" class="inline-settings-panel">
        <div class="settings-content-wrapper">
            <h1 style="font-size:28px; font-weight:900; letter-spacing:3px; margin:0 0 10px 0; color:#ffffff; font-family:monospace; text-shadow:0 0 15px rgba(255,255,255,0.2);">SETTINGS</h1>
            
            <div style="font-size:12px; color:#9e9573; font-weight:bold; font-family:monospace; margin-bottom:-6px;">SELECT TOOL</div>
            <div class="platform-mini-box">
                <button id="pc-btn" class="platform-choice-btn" onclick="setPlatform('pc')">DESKTOP</button>
                <button id="mobile-btn" class="platform-choice-btn" onclick="setPlatform('mobile')">MOBILE</button>
            </div>
            
            <hr style="border:0; border-top:1px solid #3d3a2e; margin:6px 0; width:100%;">
            
            <div class="setting-row">
                <div><span>Sensitivity</span><span id="txt-sens">1.0</span></div>
                <input type="range" id="cfg-sens" min="0.1" max="2.5" step="0.1" value="1.0" oninput="updateSens(this.value)">
            </div>
            <div class="setting-row">
                <div><span>BGM Volume</span><span id="txt-bgm">40%</span></div>
                <input type="range" id="cfg-bgm" min="0" max="100" step="5" value="40" oninput="updateBgm(this.value)">
            </div>
            <div class="setting-row">
                <div><span>SFX Volume</span><span id="txt-sfx">70%</span></div>
                <input type="range" id="cfg-sfx" min="0" max="100" step="5" value="70" oninput="updateSfx(this.value)">
            </div>
            
            <button class="platform-choice-btn" style="width:100%; margin-top:4px; padding:10px 0; border-color:#595443;" onclick="toggleFS()">📺 TOGGLE FULLSCREEN</button>
            
            <hr style="border:0; border-top:1px solid #3d3a2e; margin:6px 0; width:100%;">
            
            <button class="platform-choice-btn" style="width:100%; background:#21201c; color:#ffea9f; border-color:#d1bd71; font-weight:900; font-size:13px; letter-spacing:2px;" onclick="toggleStartSettings(false)">↩ BACK</button>
        </div>
    </div>
</div>

<div id="top-controls">
    <button class="btn" style="background:#5e1919; color:#fff; border-color:#822525; padding: 8px 16px; font-size:12px;" onclick="triggerPause(true)">⏸ PAUSE</button>
</div>

<div id="mobile-controls-right">
    <div id="btn-mobile-interact" class="circle-btn">🚪</div>
    <div id="btn-mobile-flash" class="circle-btn active" ontouchstart="handleFlash(event)">🔦</div>
    <div id="btn-mobile-jump" class="circle-btn" style="font-size:20px;font-weight:bold;" ontouchstart="handleJump(event)">▲</div>
</div>
<div id="stamina-container"><div class="stamina-bg"><div id="stamina-bar"></div></div></div>
<div id="joystick-zone"><div id="joystick-stick"></div></div>

<div id="pause-screen">
    <h1 style="font-size:26px;color:#d1bd71;margin-bottom:20px;letter-spacing:2px;font-family:monospace;">PAUSED</h1>
    <div style="display:flex;gap:12px;">
        <button class="btn" style="color:#fff;border-color:#d1bd71;padding:10px 24px;font-size:14px;width:auto;" onclick="triggerPause(false)">RESUME</button>
        <button class="btn" style="background:#1a1914;color:#ff6666;border-color:#474436;padding:10px 24px;font-size:14px;width:auto;" onclick="goMainMenu()">↩ MENU</button>
    </div>
</div>
<div id="gameover-screen">
    <h1 style="font-size:30px;margin-bottom:5px;letter-spacing:3px;font-family:monospace;font-weight:900;">SIGNAL LOST</h1>
    <p id="go-cause" style="color:#666;font-size:13px;margin-bottom:25px;font-family:monospace;"></p>
    <div style="display:flex;gap:15px;">
        <button class="go-btn" onclick="goMainMenu()">↩ MAIN MENU</button>
        <button class="go-btn" style="background:#0f2613;color:#77ff77;border-color:#1d5724;" onclick="respawn()">🛡 RECOVER</button>
    </div>
</div>
<div id="clear-screen">
    <h1 style="font-size:34px;margin-bottom:5px;letter-spacing:5px;color:#ffcc00;text-shadow:0 0 15px rgba(255,204,0,.4);font-family:monospace;font-weight:900;">NOCLIP DETECTED</h1>
    <p id="clear-time" style="color:#ffcc00;font-size:18px;font-weight:bold;margin:0 0 15px;letter-spacing:1px;font-family:monospace;"></p>
    <p style="color:#bbb;font-size:14px;margin-bottom:30px;">Successfully phased into safe reality bounds.</p>
    <button class="go-btn" style="background:#d1bd71;color:#111;border-color:#fff;" onclick="goMainMenu()">↩ RETURN</button>
</div>

<script>
// ════════════════════════════════════════════
//  CONSTANTS & MAP SCALE EXTENSION (EXPANDED)
// ════════════════════════════════════════════
const ROWS=32, COLS=32, UNIT=9, WH=7.0; 

let mapData=[], reserved=[];
let iWalls=null, lamps=[], floorM=null, ceilM=null, floorGroup=null;

const UG_R=12, UG_C=12, UG_U=8.0, UG_WH=6.5;
const UG_Y=-35; 

let platform=null, gameActive=false, isGameOver=false, isPaused=false;
let isFlashOn=true, sensitivity=1.0, volBgm=0.4, volSfx=0.7;
let recTime=0, speedBoosted=false;

let velY=0, grounded=true;
const GRAVITY=-0.016, JUMP=0.18;
let lastHB=0;
const SPD_BASE=0.14, SPD_SPRINT=0.24, SPD_TIRED=0.08;
let stamina=100, exhausted=false, moving=false, sprinting=false;

let hasKey=false, doorOpened=false;
let keyMesh=null, doorGroup=null, doorPivot=null;
let escapeSensor=new THREE.Vector3();
let escapeDoorPos = {x:0, z:0, ang:0};

let pitCX=0, pitCZ=0;
let pitBounds={minX:0,maxX:0,minZ:0,maxZ:0,active:false};
let pitMeshes=[], pitVoid=null;

const B_GRID_DIV = 3;    
const B_PATH_W = 1.8;    
const B_HOLE_W = 6.0;    
let PIT_TOTAL = 15; 

let underground=false;
let ugMap=[], ugWalls=null, ugFloor=null, ugCeil=null, ugObjs=[];
let ugOX=0, ugOZ=0; 
let hasLadder=false, ladderItem=null, ladderMesh=null, ladderPlaced=false;
let holeGroup=null, holePosX=0, holePosZ=0, holeWallNX=0, holeWallNZ=0;
let climbing=false, climbT=0;

const BG_COL=0xa39458;
const scene=new THREE.Scene();
scene.background=new THREE.Color(BG_COL);
scene.fog=new THREE.FogExp2(BG_COL,0.035); 

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,180);
const renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance',precision:'mediump'});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.shadowMap.enabled=false;
document.body.appendChild(renderer.domElement);

const ambient=new THREE.AmbientLight(0xeee9b5,0.85);
scene.add(ambient);

const fpsRig=new THREE.Group(); scene.add(fpsRig);
const flash=new THREE.SpotLight(0xfffbe6,1.8,45,Math.PI/4.5,0.5,0.6);
const flashTgt=new THREE.Object3D(); flashTgt.position.set(0,0,-10);
fpsRig.add(flash,flashTgt); flash.target=flashTgt;

const fbGeo=new THREE.CylinderGeometry(.035,.025,.22,6); fbGeo.rotateX(Math.PI/2);
const fhGeo=new THREE.CylinderGeometry(.05,.035,.07,6); fhGeo.rotateX(Math.PI/2); fhGeo.translate(0,0,-.11);
const fMat=new THREE.MeshStandardMaterial({color:0x1f1f1f,metalness:.5,roughness:.5});
const flashMesh=new THREE.Group();
flashMesh.add(new THREE.Mesh(fbGeo,fMat),new THREE.Mesh(fhGeo,fMat));
const lensMesh=new THREE.Mesh(new THREE.CircleGeometry(.045,6),new THREE.MeshBasicMaterial({color:0xffffee}));
lensMesh.position.set(0,0,-.14); lensMesh.rotation.y=Math.PI; flashMesh.add(lensMesh);
flashMesh.position.set(.24,-.20,-.35); fpsRig.add(flashMesh);

const armMat=new THREE.MeshStandardMaterial({color:0x111111,roughness:.7});
const sharedArmGeo=new THREE.CylinderGeometry(.03,.022,.45,6);
const lArm=new THREE.Mesh(sharedArmGeo,armMat); lArm.rotateX(Math.PI/2.3); lArm.position.set(-.22,-.22,-.3); fpsRig.add(lArm);
const rArm=new THREE.Mesh(sharedArmGeo,armMat); rArm.rotateX(Math.PI/2.3); rArm.position.set(.22,-.22,-.3); fpsRig.add(rArm);

// ════════════════════════════════════════════

function mkWallTex(){
    const c=document.createElement('canvas'); c.width=c.height=128;
    const x=c.getContext('2d');
    x.fillStyle='#d6cb94'; x.fillRect(0,0,128,128);
    const d=x.getImageData(0,0,128,128);
    for(let i=0;i<d.data.length;i+=4){if(Math.random()<.15){const n=(Math.random()-.5)*12;d.data[i]=Math.max(0,Math.min(255,d.data[i]+n));d.data[i+1]=Math.max(0,Math.min(255,d.data[i+1]+n));d.data[i+2]=Math.max(0,Math.min(255,d.data[i+2]+n-2));}}
    x.putImageData(d,0,0);
    x.strokeStyle='rgba(179,167,112,.35)'; x.lineWidth=1;
    for(let i=0;i<128;i+=32){x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.stroke();}
    const t=new THREE.CanvasTexture(c); return t;
}
function mkFloorTex(){
    const c=document.createElement('canvas'); c.width=c.height=256;
    const x=c.getContext('2d');
    x.fillStyle='#786b3c'; x.fillRect(0,0,256,256);
    const d=x.getImageData(0,0,256,256);
    for(let i=0;i<d.data.length;i+=4){const g=(Math.random()-.5)*18;d.data[i]=Math.max(0,Math.min(255,d.data[i]+g));d.data[i+1]=Math.max(0,Math.min(255,d.data[i+1]+g));d.data[i+2]=Math.max(0,Math.min(255,d.data[i+2]+g));}
    x.putImageData(d,0,0);
    const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(24,24); return t;
}
function mkCeilTex(){
    const c=document.createElement('canvas'); c.width=c.height=128;
    const x=c.getContext('2d');
    x.fillStyle='#c7bc91'; x.fillRect(0,0,128,128);
    const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(28,28); return t;
}

//  MAZE LOGIC (6개 랜덤 대형 평지 격실 추가 버전)
// ════════════════════════════════════════════
function genMaze(){
    mapData = Array(ROWS).fill().map(()=>Array(COLS).fill(1));
    reserved = Array(ROWS).fill().map(()=>Array(COLS).fill(false));

    const br_r = Math.floor(ROWS / 2) - 2;
    const br_c = Math.floor(COLS / 2) - 2;
    const br_w = 4, br_h = 4;

    for(let r=br_r-1; r<=br_r+br_h; r++) {
        for(let c=br_c-1; c<=br_c+br_w; c++) {
            if(r>=0 && r<ROWS && c>=0 && c<COLS) reserved[r][c] = true;
        }
    }
    for(let r=br_r; r<br_r+br_h; r++) {
        for(let c=br_c; c<br_c+br_w; c++) {
            mapData[r][c] = 0;
        }
    }

    pitCX = (br_c + 2 - COLS/2) * UNIT;
    pitCZ = (br_r + 2 - ROWS/2) * UNIT;

    let flatRoomsPlaced = 0;
    let attempts = 0;
    while(flatRoomsPlaced < 6 && attempts < 200) {
        attempts++;
        const fr = Math.floor(Math.random() * (ROWS - 5)) + 1;
        const fc = Math.floor(Math.random() * (COLS - 5)) + 1;
        
        let overlap = false;
        for(let r = fr - 1; r <= fr + 3; r++) {
            for(let c = fc - 1; c <= fc + 3; c++) {
                if(r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                    if(reserved[r][c]) { overlap = true; break; }
                }
            }
            if(overlap) break;
        }
        
        if(!overlap) {
            for(let r = fr; r < fr + 3; r++) {
                for(let c = fc; c < fc + 3; c++) {
                    mapData[r][c] = 0;
                    reserved[r][c] = true; 
                }
            }
            flatRoomsPlaced++;
        }
    }

    let exitDir = Math.random() < 0.5 ? -1 : 1;
    if (exitDir === -1) {
        for(let c=br_c-4; c<br_c; c++) {
            if(c>=0){
                mapData[br_r+2][c] = 0;
                reserved[br_r+1][c]=true; reserved[br_r+2][c]=true;
            }
        }
        if(br_c-5>=0) reserved[br_r+2][br_c-5] = true; 
        escapeDoorPos.x = (br_c - 4 - COLS/2)*UNIT + UNIT/2;
        escapeDoorPos.z = (br_r + 2 - ROWS/2)*UNIT + UNIT/2;
        escapeDoorPos.ang = Math.PI/2;
    } else {
        for(let c=br_c+br_w; c<br_c+br_w+4; c++) {
            if(c<COLS){
                mapData[br_r+2][c] = 0;
                reserved[br_r+1][c]=true; reserved[br_r+2][c]=true;
            }
        }
        if(br_c+br_w+4<COLS) reserved[br_r+2][br_c+br_w+4] = true;
        escapeDoorPos.x = (br_c + br_w + 3 - COLS/2)*UNIT + UNIT/2;
        escapeDoorPos.z = (br_r + 2 - ROWS/2)*UNIT + UNIT/2;
        escapeDoorPos.ang = -Math.PI/2;
    }

    mapData[br_r+br_h][br_c+1] = 0;
    reserved[br_r+br_h][br_c+1] = true;

    let startR = br_r + br_h + 1, startC = br_c + 1;
    if(startR >= ROWS-1) startR = ROWS-2;
    mapData[startR][startC] = 0; 
    
    function carve(r,c){
        const dirs=[[-2,0],[2,0],[0,-2],[0,2]].sort(()=>Math.random()-.5);
        for(const[dr,dc]of dirs){
            const nr=r+dr,nc=c+dc;
            if(nr>0&&nr<ROWS-1&&nc>0&&nc<COLS-1 && mapData[nr][nc]===1 && !reserved[nr][nc]){
                if(!reserved[r+dr/2][c+dc/2]){
                    mapData[r+dr/2][c+dc/2]=0; mapData[nr][nc]=0;
                    carve(nr,nc);
                }
            }
        }
    }
    carve(startR, startC);
    carve(1, 1);

    for(let r=0;r<ROWS;r++){mapData[r][0]=1;mapData[r][COLS-1]=1;}
    for(let c=0;c<COLS;c++){mapData[0][c]=1;mapData[ROWS-1][c]=1;}
}

function buildGraphics(){
    if(iWalls){scene.remove(iWalls);iWalls.geometry.dispose();}
    lamps.forEach(l=>scene.remove(l)); lamps=[];
    if(floorM){scene.remove(floorM);floorM=null;}
    if(ceilM){scene.remove(ceilM);ceilM=null;}
    if(floorGroup){scene.remove(floorGroup);floorGroup=null;}

    let wc=0;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(mapData[r][c]===1)wc++;
    const wGeo=new THREE.BoxGeometry(UNIT,WH,UNIT);
    iWalls=new THREE.InstancedMesh(wGeo,wallMat,wc);
    
    const dum=new THREE.Object3D(); let idx=0;
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            const wx=(c-COLS/2)*UNIT+UNIT/2, wz=(r-ROWS/2)*UNIT+UNIT/2;
            if(mapData[r][c]===1){
                dum.position.set(wx,WH/2,wz); dum.updateMatrix();
                iWalls.setMatrixAt(idx++,dum.matrix);
            } else if(Math.random()<.06){
                const lg=new THREE.Group();
                const fr=new THREE.Mesh(new THREE.BoxGeometry(3.0,.04,1.5),new THREE.MeshStandardMaterial({color:0x222222}));
                const pn=new THREE.Mesh(new THREE.BoxGeometry(2.7,.05,1.2),new THREE.MeshBasicMaterial({color:0xfffbc4}));
                pn.position.y=-.01; lg.add(fr,pn);
                lg.position.set(wx,WH-.02,wz);
                scene.add(lg); lamps.push(lg);
                const pl=new THREE.PointLight(0xfff2b3,.6,15,1.2);
                pl.position.set(wx,WH-.2,wz); scene.add(pl); lamps.push(pl);
            }
        }
    }
    iWalls.instanceMatrix.needsUpdate=true;
    scene.add(iWalls);

    const mW=COLS*UNIT, mH=ROWS*UNIT;
    floorM=new THREE.Mesh(new THREE.PlaneGeometry(mW,mH),floorMat);
    floorM.rotation.x=-Math.PI/2; scene.add(floorM);
    ceilM=new THREE.Mesh(new THREE.PlaneGeometry(mW,mH),ceilMat);
    ceilM.rotation.x=Math.PI/2; ceilM.position.y=WH; scene.add(ceilM);
}

function worldXZ(r,c){return{x:(c-COLS/2)*UNIT+UNIT/2,z:(r-ROWS/2)*UNIT+UNIT/2};}

function safeSpawn(avoid,minD,excludeReserved=false){
    for(let i=0;i<500;i++){
        const r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);
        if(mapData[r][c]===0 && (!excludeReserved || !reserved[r][c])){
            const p=worldXZ(r,c);
            if(avoid&&minD&&Math.sqrt((p.x-avoid.x)**2+(p.z-avoid.z)**2)<minD)continue;
            return{x:p.x,z:p.z,r,c};
        }
    }
    return{x:UNIT,z:UNIT,r:1,c:1};
}

function buildBingoPit(){
    pitMeshes.forEach(m=>{if(m&&m.parent)scene.remove(m);}); pitMeshes=[];
    if(pitVoid){scene.remove(pitVoid);pitVoid=null;}
    
    PIT_TOTAL = B_GRID_DIV * B_HOLE_W + (B_GRID_DIV + 1) * B_PATH_W;
    const hf = PIT_TOTAL / 2;
    pitBounds.minX=pitCX-hf; pitBounds.maxX=pitCX+hf;
    pitBounds.minZ=pitCZ-hf; pitBounds.maxZ=pitCZ+hf;
    pitBounds.active=true;

    if(floorM) floorM.visible = false;
    floorGroup = new THREE.Group();
    const mW = COLS*UNIT, mH = ROWS*UNIT;

    const nL = pitBounds.minZ - (-mH/2);
    if(nL>0){
        const fN = new THREE.Mesh(new THREE.PlaneGeometry(mW, nL), floorMat);
        fN.rotation.x = -Math.PI/2; fN.position.set(0,0,-mH/2+nL/2); floorGroup.add(fN);
    }
    const sL = mH/2 - pitBounds.maxZ;
    if(sL>0){
        const fS = new THREE.Mesh(new THREE.PlaneGeometry(mW, sL), floorMat);
        fS.rotation.x = -Math.PI/2; fS.position.set(0,0,pitBounds.maxZ+sL/2); floorGroup.add(fS);
    }
    const wL = pitBounds.minX - (-mW/2);
    const pZLen = pitBounds.maxZ - pitBounds.minZ;
    if(wL>0){
        const fW = new THREE.Mesh(new THREE.PlaneGeometry(wL, pZLen), floorMat);
        fW.rotation.x = -Math.PI/2; fW.position.set(-mW/2+wL/2,0,pitCZ); floorGroup.add(fW);
    }
    const eL = mW/2 - pitBounds.maxX;
    if(eL>0){
        const fE = new THREE.Mesh(new THREE.PlaneGeometry(eL, pZLen), floorMat);
        fE.rotation.x = -Math.PI/2; fE.position.set(pitBounds.maxX+eL/2,0,pitCZ); floorGroup.add(fE);
    }
    scene.add(floorGroup);

    const pathMat = new THREE.MeshStandardMaterial({map:floorTex, roughness:0.95});
    const downWallMat = new THREE.MeshStandardMaterial({map:wallTex, roughness:0.9});
    const voidMat = new THREE.MeshBasicMaterial({color:0x010101});
    const holeDepth = 18;

    const hGeo = new THREE.BoxGeometry(PIT_TOTAL + 0.1, 0.1, B_PATH_W + 0.1);
    for(let i=0; i<=B_GRID_DIV; i++) {
        const z = pitBounds.minZ + B_PATH_W/2 + i*(B_HOLE_W+B_PATH_W);
        const p = new THREE.Mesh(hGeo, pathMat);
        p.position.set(pitCX, -0.05, z);
        scene.add(p); pitMeshes.push(p);
    }
    const vGeo = new THREE.BoxGeometry(B_PATH_W + 0.1, 0.1, PIT_TOTAL + 0.1);
    for(let i=0; i<=B_GRID_DIV; i++) {
        const x = pitBounds.minX + B_PATH_W/2 + i*(B_HOLE_W+B_PATH_W);
        const p = new THREE.Mesh(vGeo, pathMat);
        p.position.set(x, -0.05, pitCZ);
        scene.add(p); pitMeshes.push(p);
    }

    const wGeoX = new THREE.BoxGeometry(B_HOLE_W, holeDepth, 0.05);
    const wGeoZ = new THREE.BoxGeometry(0.05, holeDepth, B_HOLE_W);
    for(let r=0; r<B_GRID_DIV; r++) {
        for(let c=0; c<B_GRID_DIV; c++) {
            const hx = pitBounds.minX + B_PATH_W + B_HOLE_W/2 + c*(B_HOLE_W+B_PATH_W);
            const hz = pitBounds.minZ + B_PATH_W + B_HOLE_W/2 + r*(B_HOLE_W+B_PATH_W);

            const wN = new THREE.Mesh(wGeoX, downWallMat); wN.position.set(hx, -holeDepth/2, hz-B_HOLE_W/2);
            const wS = new THREE.Mesh(wGeoX, downWallMat); wS.position.set(hx, -holeDepth/2, hz+B_HOLE_W/2);
            const wW = new THREE.Mesh(wGeoZ, downWallMat); wW.position.set(hx-B_HOLE_W/2, -holeDepth/2, hz);
            const wE = new THREE.Mesh(wGeoZ, downWallMat); wE.position.set(hx+B_HOLE_W/2, -holeDepth/2, hz);

            scene.add(wN, wS, wW, wE);
            pitMeshes.push(wN, wS, wW, wE);
        }
    }

    pitVoid = new THREE.Mesh(new THREE.PlaneGeometry(PIT_TOTAL, PIT_TOTAL), voidMat);
    pitVoid.rotation.x = -Math.PI/2;
    pitVoid.position.set(pitCX, -holeDepth + 0.05, pitCZ);
    scene.add(pitVoid);

    const deepLight = new THREE.PointLight(0x0a33cc, 1.6, 35, 2);
    deepLight.position.set(pitCX, -10, pitCZ);
    scene.add(deepLight); pitMeshes.push(deepLight);
}

function spawnDoor(){
    if(doorGroup)scene.remove(doorGroup);
    doorGroup=new THREE.Group();
    doorGroup.position.set(escapeDoorPos.x, 0, escapeDoorPos.z);
    doorGroup.rotation.y = escapeDoorPos.ang;

    const fMat2=new THREE.MeshStandardMaterial({color:0x1b130e,roughness:.9});
    const lp=new THREE.Mesh(new THREE.BoxGeometry(.15,3.2,.2),fMat2); lp.position.set(-1.1,1.6,0);
    const rp=new THREE.Mesh(new THREE.BoxGeometry(.15,3.2,.2),fMat2); rp.position.set(1.1,1.6,0);
    const tp=new THREE.Mesh(new THREE.BoxGeometry(2.3,.15,.2),fMat2); tp.position.set(0,3.2,0);
    
    const blockL=new THREE.Mesh(new THREE.BoxGeometry(3.0,WH,1.2),fMat2); blockL.position.set(-2.6,WH/2,0);
    const blockR=new THREE.Mesh(new THREE.BoxGeometry(3.0,WH,1.2),fMat2); blockR.position.set(2.6,WH/2,0);
    doorGroup.add(lp,rp,tp,blockL,blockR);

    doorPivot=new THREE.Group(); doorPivot.position.set(-1.0,1.6,0);
    const dp=new THREE.Mesh(new THREE.BoxGeometry(2.0,3.05,.12),new THREE.MeshStandardMaterial({color:0x362113,roughness:.8}));
    dp.position.set(1.0,0,0); doorPivot.add(dp);
    const kn=new THREE.Mesh(new THREE.SphereGeometry(.06,8,8),new THREE.MeshStandardMaterial({color:0xcca233,metalness:.7}));
    kn.position.set(.8,0,.08); dp.add(kn);
    doorGroup.add(doorPivot);

    const corr=new THREE.Mesh(new THREE.BoxGeometry(5.0,3.2,3.5),new THREE.MeshBasicMaterial({color:0x000000,side:THREE.BackSide}));
    corr.position.set(0,1.6,-1.75); doorGroup.add(corr);
    
    scene.add(doorGroup); doorGroup.updateMatrixWorld(true);
    const sOff=new THREE.Vector3(0,1.0,-2.5); sOff.applyQuaternion(doorGroup.quaternion);
    escapeSensor.copy(doorGroup.position).add(sOff);
    
    const gl=new THREE.PointLight(0x00ff44,0,6); gl.position.set(0,1.6,-.2);
    doorGroup.add(gl); doorGroup.greenLight=gl;
}

function buildUnderground(){
    ugObjs.forEach(o=>scene.remove(o)); ugObjs=[];
    if(ugWalls){scene.remove(ugWalls);ugWalls=null;}
    if(ugFloor){scene.remove(ugFloor);ugFloor=null;}
    if(ugCeil){scene.remove(ugCeil);ugCeil=null;}
    if(ladderItem){scene.remove(ladderItem);ladderItem=null;}
    if(ladderMesh){scene.remove(ladderMesh);ladderMesh=null;}
    if(holeGroup){scene.remove(holeGroup);holeGroup=null;}
    ladderPlaced=false; climbing=false; climbT=0;

    ugMap=Array(UG_R).fill().map(()=>Array(UG_C).fill(1));
    const vis=Array(UG_R).fill().map(()=>Array(UG_C).fill(false));
    function carve(r,c){
        vis[r][c]=true; ugMap[r][c]=0;
        const dirs=[[-2,0],[2,0],[0,-2],[0,2]].sort(()=>Math.random()-.5);
        for(const[dr,dc]of dirs){const nr=r+dr,nc=c+dc;if(nr>0&&nr<UG_R-1&&nc>0&&nc<UG_C-1&&!vis[nr][nc]){ugMap[r+dr/2][c+dc/2]=0;carve(nr,nc);}}
    }
    carve(1,1);
    
    ugOX=pitCX; ugOZ=pitCZ;
    function ugW(r,c){return{x:ugOX+(c-UG_C/2)*UG_U+UG_U/2,z:ugOZ+(r-UG_R/2)*UG_U+UG_U/2};}

    let wc=0; for(let r=0;r<UG_R;r++)for(let c=0;c<UG_C;c++)if(ugMap[r][c]===1)wc++;
    const ugWGeo=new THREE.BoxGeometry(UG_U,UG_WH,UG_U);
    const ugWMat=new THREE.MeshStandardMaterial({color:0x0f0b07,roughness:.95});
    ugWalls=new THREE.InstancedMesh(ugWGeo,ugWMat,wc);
    const dum2=new THREE.Object3D(); let ui=0;
    for(let r=0;r<UG_R;r++){
        for(let c=0;c<UG_C;c++){
            if(ugMap[r][c]===1){
                const p=ugW(r,c);
                dum2.position.set(p.x,UG_Y+UG_WH/2,p.z); dum2.updateMatrix();
                ugWalls.setMatrixAt(ui++,dum2.matrix);

    scene.add(ugWalls); ugObjs.push(ugWalls);

    scene.add(ugCeil); ugObjs.push(ugCeil);

        }
        return{x:ugOX,z:ugOZ};
    }

    const lsp=ugSafeSpawn();
    ladderItem=new THREE.Group();

    const lv1=new THREE.Mesh(new THREE.BoxGeometry(.06,.9,.06),lMat); lv1.position.set(-.18,0,0);
    const lv2=new THREE.Mesh(new THREE.BoxGeometry(.06,.9,.06),lMat); lv2.position.set(.18,0,0);

    ladderItem.position.set(lsp.x,UG_Y+.5,lsp.z);
    scene.add(ladderItem); ugObjs.push(ladderItem);

    let holeR=1,holeC=1,holeWR=-1,holeWC=0;
    const hp=ugW(holeR,holeC);

    holeWallNX=-holeWC; holeWallNZ=-holeWR; 

    holeGroup=new THREE.Group();
    holeGroup.position.set(holePosX + holeWC*(UG_U/2-0.05), UG_Y+UG_WH*0.5, holePosZ + holeWR*(UG_U/2-0.05));
    holeGroup.rotation.y=Math.atan2(holeWallNX,holeWallNZ);

    const holeMat=new THREE.MeshStandardMaterial({color:0x00dd55,emissive:0x00dd55,emissiveIntensity:.7,roughness:.4});
    const hW=1.4,hH=1.8;
    const hTop=new THREE.Mesh(new THREE.BoxGeometry(hW+.1,.07,.07),holeMat); hTop.position.set(0,hH/2,0);
    const hBot=new THREE.Mesh(new THREE.BoxGeometry(hW+.1,.07,.07),holeMat); hBot.position.set(0,-hH/2,0);
    const hL=new THREE.Mesh(new THREE.BoxGeometry(.07,hH,.07),holeMat); hL.position.set(-hW/2,0,0);

//  COLLISION
// ════════════════════════════════════════════
function gridCollide(ox, oz, nx, nz, rad) {
    if (isNaN(nx) || isNaN(nz)) return { x: ox, z: oz };
    if (player.position.y < -.05) return { x: nx, z: nz };
    
    if (!doorOpened && doorGroup) {
        const ddx = doorGroup.position.x - nx;
        const ddz = doorGroup.position.z - nz;
        if (Math.sqrt(ddx * ddx + ddz * ddz) < 2.5) return { x: ox, z: oz }; 
    }

    let resultX = nx;
    let resultZ = nz;

    const checkAxisCollision = (targetX, targetZ) => {
        const pc = Math.floor((ox - UNIT / 2 + (COLS * UNIT) / 2) / UNIT);
        const pr = Math.floor((oz - UNIT / 2 + (ROWS * UNIT) / 2) / UNIT);
        
        for (let r = pr - 1; r <= pr + 1; r++) {
            for (let c = pc - 1; c <= pc + 1; c++) {
                if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
                if (mapData[r][c] === 1) {
                    const wx = (c - COLS / 2) * UNIT + UNIT / 2;
                    const wz = (r - ROWS / 2) * UNIT + UNIT / 2;
                    const half = UNIT / 2 + rad;
                    if (targetX > wx - half && targetX < wx + half && targetZ > wz - half && targetZ < wz + half) return true; 
                }
            }
        }
        return false;
    };

    if (checkAxisCollision(nx, oz)) resultX = ox; 
    if (checkAxisCollision(resultX, nz)) resultZ = oz; 

    return { x: resultX, z: resultZ };
}

function ugCollide(oldX, oldZ, newX, newZ, rad) {
    if (isNaN(newX) || isNaN(newZ)) return { x: oldX, z: oldZ };
    let resultX = newX;
    let resultZ = newZ;

    const checkUgCollision = (tx, tz) => {
        const pc = Math.floor((oldX - ugOX + (UG_C * UG_U) / 2) / UG_U);
        const pr = Math.floor((oldZ - ugOZ + (UG_R * UG_U) / 2) / UG_U);
        for (let r = Math.max(0, pr - 1); r <= Math.min(UG_R - 1, pr + 1); r++) {
            for (let c = Math.max(0, pc - 1); c <= Math.min(UG_C - 1, pc + 1); c++) {
                if (ugMap[r][c] !== 1) continue;
                const wx = ugOX + (c - UG_C / 2) * UG_U + UG_U / 2;
                const wz = ugOZ + (r - UG_R / 2) * UG_U + UG_U / 2;
                const half = UG_U / 2 + rad;
                if (tx > wx - half && tx < wx + half && tz > wz - half && tz < wz + half) return true;
            }
        }
        return false;
    };

    if (checkUgCollision(newX, oldZ)) resultX = oldX;
    if (checkUgCollision(resultX, newZ)) resultZ = oldZ;

    return { x: resultX, z: resultZ };
}

let entities=[];
function mkEntity(){
    const e=new THREE.Group();
    const em=new THREE.MeshStandardMaterial({color:0x070707,roughness:.8});
    const core=new THREE.Mesh(new THREE.SphereGeometry(.38,6,6),em); core.position.y=1.5; e.add(core);
    const legs=[];
    for(let j=0;j<4;j++){
        const lr=new THREE.Group(); const ang=(j/4)*Math.PI*2;
        lr.position.set(Math.cos(ang)*.25,1.4,Math.sin(ang)*.25);
        const up=new THREE.Mesh(new THREE.CylinderGeometry(.03,.02,.1),em); up.position.y=-.4; up.rotation.z=.4; lr.add(up);
        const lo=new THREE.Mesh(new THREE.CylinderGeometry(.018,.012,1.2),em); lo.position.set(.3,-1.0,0); lo.rotation.z=-.8; up.add(lo);
        e.add(lr); legs.push(lr);
    }
    const eyM=new THREE.MeshBasicMaterial({color:0xee0000});
    const ey=new THREE.Mesh(new THREE.SphereGeometry(.06,4,4),eyM);ey.position.set(0,1.6,.35);e.add(ey);
    scene.add(e); return{mesh:e,legs,core};
}
const ed=mkEntity();
entities.push({mesh:ed.mesh,legs:ed.legs,core:ed.core,state:'patrol',patrolTarget:null,baseSpeed:.07,speed:.07,stuckT:0,lastPos:new THREE.Vector3(),scream:false});

function entityAI(e,pp){
    const ep=e.mesh.position;
    const dist=Math.sqrt((ep.x-pp.x)**2+(ep.z-pp.z)**2);
    e.stuckT++;
    if(e.stuckT>60){
        const sd=Math.sqrt((ep.x-e.lastPos.x)**2+(ep.z-e.lastPos.z)**2);
        if(sd<.2)e.patrolTarget=safeSpawn(pp,0,false);
        e.lastPos.copy(ep);e.stuckT=0;
    }
    if(dist<20&&!isGameOver&&player.position.y>=-0.2){ 
        if(!e.scream){e.scream=true;scream(true);}e.state='chase';
    }else if(e.state==='chase'&&(dist>28||player.position.y<-.2)){
        e.state='patrol';e.scream=false;scream(false);e.patrolTarget=safeSpawn(pp,0,false);
    }
    const dest=e.state==='chase'?pp:e.patrolTarget;
    if(e.state==='patrol'&&Math.abs(ep.x-dest.x)<2.0&&Math.abs(ep.z-dest.z)<2.0)e.patrolTarget=safeSpawn(pp,0,false);
    const dx=dest.x-ep.x,dz=dest.z-ep.z,len=Math.sqrt(dx*dx+dz*dz);
    if(len>.1){
        const sp=e.state==='chase'?e.speed*1.45:e.speed;
        const te={x:ep.x+dx/len*sp,z:ep.z+dz/len*sp};
        const se=gridCollide(ep.x,ep.z,te.x,te.z,.6);
        ep.x=se.x;ep.z=se.z;e.mesh.rotation.y=Math.atan2(dx,dz);
    }
    if(e.state==='chase')screamVol(dist);
}

}

            jZone.style.left=`${t.clientX-55}px`;jZone.style.bottom=`${innerHeight-t.clientY-55}px`;
            jStart={x:t.clientX,y:t.clientY};calcJoy(t.clientX,t.clientY);
        }else if(t.clientX>=innerWidth/2&&rTouchId===null){rTouchId=t.identifier;prevX=t.clientX;prevY=t.clientY;}
    }
},{passive:false});

window.addEventListener('touchmove',e=>{
    if(platform!=='mobile')return;
    for(let i=0;i<e.touches.length;i++){
        const t=e.touches[i];
        if(t.identifier===jTouchId)calcJoy(t.clientX,t.clientY);
        if(t.identifier===rTouchId){
            const m = 0.0035 * sensitivity;
            camX -= (t.clientX-prevX)*m; 
            camY -= (t.clientY-prevY)*m; 
            prevX = t.clientX; prevY = t.clientY;
            camY = Math.max(-Math.PI/2.5,Math.min(Math.PI/2.5,camY));
        }
    }
});

let actx=null,bgGain=null,sfxGain=null,scGain=null,khGain=null,scOsc1=null,scOsc2=null,ambO1=null,ambO2=null,khOsc=null;
function initAudio(){
    try{
        if(actx)return;
        actx=new(window.AudioContext||window.webkitAudioContext)();
        bgGain=actx.createGain();syncBgm();
        const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(80,actx.currentTime);
        ambO1=actx.createOscillator();ambO1.type='sine';ambO1.frequency.setValueAtTime(50,actx.currentTime);
        ambO2=actx.createOscillator();ambO2.type='triangle';ambO2.frequency.setValueAtTime(53,actx.currentTime);
        ambO1.connect(lp);ambO2.connect(lp);lp.connect(bgGain);bgGain.connect(actx.destination);
        ambO1.start();ambO2.start();
        sfxGain=actx.createGain();sfxGain.connect(actx.destination);
        scGain=actx.createGain();scGain.gain.setValueAtTime(.001,actx.currentTime);scGain.connect(sfxGain);
        khGain=actx.createGain();khGain.gain.setValueAtTime(.001,actx.currentTime);
        khOsc=actx.createOscillator();khOsc.type='sine';khOsc.frequency.setValueAtTime(135,actx.currentTime);
        const kf=actx.createBiquadFilter();kf.type='bandpass';kf.frequency.setValueAtTime(240,actx.currentTime);
        khOsc.connect(kf);kf.connect(khGain);khGain.connect(sfxGain);khOsc.start();
    }catch(e){}
}
function syncBgm(){if(bgGain&&actx)bgGain.gain.setValueAtTime(volBgm*.35,actx.currentTime);}
function keyHint(pp){
    if(!khGain||!keyMesh||hasKey||!actx)return;
    const d=Math.sqrt((pp.x-keyMesh.position.x)**2+(pp.z-keyMesh.position.z)**2);
    if(d<25){ 
        let tv=Math.max(.001,(25-d)/25)*.4*volSfx;khGain.gain.setTargetAtTime(tv,actx.currentTime,.15);khOsc.frequency.setValueAtTime(135+Math.sin(Date.now()*.004)*20,actx.currentTime);}
    else khGain.gain.setTargetAtTime(.001,actx.currentTime,.2);
}
function scream(on){
    if(!actx||!scGain)return;
    if(on){try{scOsc1=actx.createOscillator();scOsc1.type='sawtooth';scOsc2=actx.createOscillator();scOsc2.type='square';scOsc1.frequency.setValueAtTime(260,actx.currentTime);scOsc2.frequency.setValueAtTime(420,actx.currentTime);const n=actx.currentTime;scOsc1.frequency.linearRampToValueAtTime(650,n+.3);scOsc1.frequency.linearRampToValueAtTime(140,n+.7);scOsc2.frequency.linearRampToValueAtTime(850,n+.4);scOsc1.connect(scGain);scOsc2.connect(scGain);scOsc1.start();scOsc2.start();}catch(e){}}
    else{try{if(scOsc1){scOsc1.stop();scOsc1=null;}if(scOsc2){scOsc2.stop();scOsc2=null;}}catch(e){}}
}
function screamVol(d){if(!scGain||!actx)return;scGain.gain.setTargetAtTime(Math.max(.001,(25-d)/25)*.6*volSfx,actx.currentTime,.1);}
function footstep(v){
    if(!actx||isPaused||isGameOver||!sfxGain)return;
    try{const o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.setValueAtTime(60,actx.currentTime);g.gain.setValueAtTime(v*.1*volSfx,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.1);o.connect(g);g.connect(sfxGain);o.start();o.stop(actx.currentTime+.11);}catch(e){}
}
function heartbeat(v){
    if(!actx||isPaused||isGameOver||!sfxGain)return;
    try{const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.setValueAtTime(46,actx.currentTime);g.gain.setValueAtTime(v*.6*volSfx,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.12);o.connect(g);g.connect(sfxGain);o.start();o.stop(actx.currentTime+.13);}catch(e){}
}

    isGameOver=false;gameActive=false;isPaused=false;scream(false);
    underground=false;hasLadder=false;ladderPlaced=false;climbing=false;
    ['pause-screen','gameover-screen','clear-screen','top-controls','cctv-ui','quest-ui','interact-prompt','btn-mobile-interact','joystick-zone','mobile-controls-right','stamina-container','ladder-hud'].forEach(id=>{
        const el=document.getElementById(id);if(el)el.style.display='none';
    });
    document.getElementById('start-screen').style.display='flex';
    document.getElementById('glitch-overlay').style.cssText='background:rgba(0,0,0,0);opacity:0;';
    scene.background.setHex(BG_COL);scene.fog.color.setHex(BG_COL);scene.fog.density=.035;ambient.intensity=.85;
    flash.intensity=isFlashOn?1.8:0;
    
    ugObjs.forEach(o=>scene.remove(o));ugObjs=[];
    if(ugWalls){scene.remove(ugWalls);ugWalls=null;}if(ugFloor){scene.remove(ugFloor);ugFloor=null;}if(ugCeil){scene.remove(ugCeil);ugCeil=null;}
    if(ladderMesh){scene.remove(ladderMesh);ladderMesh=null;}if(holeGroup){scene.remove(holeGroup);holeGroup=null;}
    pitMeshes.forEach(m=>{if(m&&m.parent)scene.remove(m);});pitMeshes=[];
    if(pitVoid){scene.remove(pitVoid);pitVoid=null;}pitBounds.active=false;
    
    if(floorGroup){scene.remove(floorGroup); floorGroup=null;}
    if(floorM)floorM.visible=true;
    if(iWalls)iWalls.visible=true;lamps.forEach(l=>{if(l.visible!==undefined)l.visible=true;});
    if(ceilM)ceilM.visible=true;
    
    try{if(ambO1){ambO1.stop();ambO1=null;}if(ambO2){ambO2.stop();ambO2=null;}if(khOsc){khOsc.stop();khOsc=null;}actx=null;}catch(e){}
    if(document.pointerLockElement===document.body)document.exitPointerLock();
}
function triggerBlackout(){
    document.getElementById('glitch-overlay').style.cssText='background:rgba(8,7,5,.6);opacity:1;';
    scene.background.setHex(0x12110e);scene.fog.color.setHex(0x12110e);scene.fog.density=.06;ambient.intensity=.15;
    entities.forEach(e=>e.speed=e.baseSpeed*1.4);
}

let player=new THREE.Group(); scene.add(player);

function launchGame(){
    if(!platform) {
        setPlatform('pc');
    }
    document.getElementById('start-screen').style.display='none';
    document.getElementById('top-controls').style.display='flex';
    document.getElementById('cctv-ui').style.display='block';
    document.getElementById('quest-ui').style.display='block';
    hasKey=false;doorOpened=false;underground=false;hasLadder=false;ladderPlaced=false;climbing=false;climbT=0;
    stamina=100;exhausted=false;velY=0;grounded=true;
    if(platform==='mobile'){
        document.getElementById('joystick-zone').style.display='block';
        document.getElementById('mobile-controls-right').style.display='flex';
        document.getElementById('stamina-container').style.display='block';
    }else{
        document.body.requestPointerLock();
        document.getElementById('crosshair').style.display='block';
    }
    camX=0;camY=0;sCamX=0;sCamY=0;
    
    genMaze(); buildGraphics();
    const pSp=safeSpawn({x:pitCX, z:pitCZ}, 40, false); 
    player.position.set(pSp.x,0,pSp.z);
    
    buildBingoPit();
    spawnDoor();
    spawnKey();
    entities.forEach(e=>{
        const ep=safeSpawn(player.position, 20, false);
        e.mesh.position.set(ep.x,0,ep.z);e.lastPos.copy(e.mesh.position);
        e.patrolTarget=ep;e.state='patrol';e.scream=false;
    });
    gameActive=true;recTime=0;speedBoosted=false;
    initAudio();
}

// ════════════════════════════════════════════
//  MAIN PREVIEW CANVAS
// ════════════════════════════════════════════
(function initPreview(){
    const pvs=document.getElementById('preview-canvas');
    pvs.width=innerWidth;pvs.height=innerHeight;
    const pvScene=new THREE.Scene();
    pvScene.background=new THREE.Color(0xa39458);
    pvScene.fog=new THREE.FogExp2(0xa39458,.06);
    const pvCam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,150);
    pvCam.position.set(0,1.5,0);
    const pvRen=new THREE.WebGLRenderer({canvas:pvs,antialias:false,precision:'mediump'});
    pvRen.setSize(innerWidth,innerHeight);

    const pvWMat=new THREE.MeshStandardMaterial({color:0xc7bc91,roughness:.9});
    const pvFMat=new THREE.MeshStandardMaterial({color:0x786b3c,roughness:.95});
    const pvCMat=new THREE.MeshStandardMaterial({color:0xbab085,roughness:.9});
    const pvAmb=new THREE.AmbientLight(0xeee9b5,.6);pvScene.add(pvAmb);
    
    const cW=9,cH=7.0,cL=60;
    const fl=new THREE.Mesh(new THREE.PlaneGeometry(cW,cL),pvFMat);fl.rotation.x=-Math.PI/2;fl.position.set(0,0,-cL/2);pvScene.add(fl);
    const cl=new THREE.Mesh(new THREE.PlaneGeometry(cW,cL),pvCMat);cl.rotation.x=Math.PI/2;cl.position.set(0,cH,-cL/2);pvScene.add(cl);
    const wl=new THREE.Mesh(new THREE.PlaneGeometry(cL,cH),pvWMat);wl.rotation.y=Math.PI/2;wl.position.set(-cW/2,cH/2,-cL/2);pvScene.add(wl);
    const wr=new THREE.Mesh(new THREE.PlaneGeometry(cL,cH),pvWMat);wr.rotation.y=-Math.PI/2;wr.position.set(cW/2,cH/2,-cL/2);pvScene.add(wr);
    
    for(let i=0; i<6; i++){
        const lg=new THREE.Group();
        lg.add(new THREE.Mesh(new THREE.BoxGeometry(3.0,.04,1.5),new THREE.MeshStandardMaterial({color:0x222222})),new THREE.Mesh(new THREE.BoxGeometry(2.7,.05,1.2),new THREE.MeshBasicMaterial({color:0xfffbc4})));
        lg.position.set(0,cH-.02,-i*10-5);pvScene.add(lg);
        const pl=new THREE.PointLight(0xfff2b3,.6,12);pl.position.set(0,cH-.2,-i*10-5);pvScene.add(pl);
    }
    let t=0;

    function drawPreview(){
        if(document.getElementById('start-screen').style.display==='none')return;
        requestAnimationFrame(drawPreview);
        t+=0.003;
        pvCam.position.set(Math.sin(t*.6)*.3,1.7+Math.sin(t*.4)*.04,-(t*3.5)%cL);
        pvCam.rotation.set(Math.sin(t*.2)*.02,Math.sin(t*.4)*.06,0,'YXZ');
        pvRen.render(pvScene,pvCam);
    }
    drawPreview();
})();

// ════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════
function animate(){
    requestAnimationFrame(animate);
    if(!gameActive){camera.position.set(0,12,18);camera.lookAt(0,0,0);renderer.render(scene,camera);return;}
    if(isGameOver||isPaused)return;

    recTime+=1/60;
    const m=Math.floor(recTime/60),s=Math.floor(recTime%60);
    document.getElementById('cctv-time').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(recTime>=100&&!speedBoosted){ 
        speedBoosted=true;
        triggerBlackout();
    }
    if(keyMesh&&!hasKey)keyMesh.rotation.y+=.02;
    if(!underground)keyHint(player.position);

    if(!underground&&pitBounds.active&&player.position.y>=-0.05){
        const inPit=player.position.x>pitBounds.minX&&player.position.x<pitBounds.maxX&&
                    player.position.z>pitBounds.minZ&&player.position.z<pitBounds.maxZ;
        if(inPit){
            const lx = player.position.x - pitBounds.minX;
            const lz = player.position.z - pitBounds.minZ;
            const CELL = B_HOLE_W + B_PATH_W;
            const mx = lx % CELL;
            const mz = lz % CELL;
            
            const pRad = 0.05; 
            let safe = false;

            if(mx <= B_PATH_W + pRad || mx >= CELL - pRad) safe = true;
            if(mz <= B_PATH_W + pRad || mz >= CELL - pRad) safe = true;

            if(!safe&&grounded){grounded=false;velY=-.025;}
        }
    }

    if(!underground&&player.position.y<-5.0&&!isGameOver){enterUnderground();return;}

    if(underground&&climbing){
        climbT++;
        player.position.y+=.075;
        velY=0;
        if(player.position.y>=-0.05||climbT>115){exitUnderground();return;}
    }

    if(!hasKey&&keyMesh&&!underground){
        const d=Math.sqrt((player.position.x-keyMesh.position.x)**2+(player.position.z-keyMesh.position.z)**2);
        if(d<1.5){
            hasKey=true;scene.remove(keyMesh);
            if(khGain&&actx)khGain.gain.setValueAtTime(.001,actx.currentTime);
            if(doorGroup?.greenLight)doorGroup.greenLight.intensity=3.5;
            showToast("🔑 황금 열쇠 확보!<br>빙고방을 가로질러 반대편 통로의 문을 여세요!");
        }
    }

    if(underground&&!hasLadder&&ladderItem){
        const d=Math.sqrt((player.position.x-ladderItem.position.x)**2+(player.position.z-ladderItem.position.z)**2);
        if(d<1.8){
            hasLadder=true;scene.remove(ladderItem);ladderItem=null;
            document.getElementById('ladder-hud').style.display='block';
            showToast("🪜 사다리 습득 완료!<br>초록빛 붕괴 구멍 앞에서 설치[E] 하세요!");
        }
    }

    const qu=document.getElementById('quest-ui');
    if(!underground){
        if(!hasKey)qu.innerHTML="🔑 QUEST:<br>미로 속 어딘가 숨겨진 열쇠 수색";
        else if(doorGroup){
            const dd=Math.floor(player.position.distanceTo(doorGroup.position));
            if(!doorOpened)qu.innerHTML=`🚪 QUEST:<br>빙고판 돌파 및 탈출문 잠금 해제<br><span style='color:#00ff55;font-size:14px;'>📍 남은거리: ${dd}m</span>`;
            else qu.innerHTML="🏃 QUEST:<br><span style='color:#00ff55;font-weight:900;'>개방된 탈출 포털로 탈출!</span>";
        }
    }else{
        if(!hasLadder&&!ladderPlaced)qu.innerHTML="🪜 UNDERGROUND:<br>미궁 속 방치된 사다리 서치";
        else if(hasLadder&&!ladderPlaced)qu.innerHTML="🟢 UNDERGROUND:<br>초록 구조물 정면에서 설치 연타";
        else qu.innerHTML="⬆ UNDERGROUND:<br>사다리 상호작용 후 등반 [▲]";
    }

    if(!underground&&doorGroup){
        const dd=player.position.distanceTo(doorGroup.position);
        if(hasKey&&dd<3.5&&!doorOpened){
            if(platform==='pc'){document.getElementById('interact-prompt').innerHTML='🚪 [E] Open Door';document.getElementById('interact-prompt').style.display='block';}
            else{document.getElementById('btn-mobile-interact').innerHTML='🚪';document.getElementById('btn-mobile-interact').style.display='flex';}
        }else if(!underground){
            document.getElementById('interact-prompt').style.display='none';
            document.getElementById('btn-mobile-interact').style.display='none';
        }
        if(doorOpened&&doorPivot){
            if(doorPivot.rotation.y>-Math.PI/2){doorPivot.rotation.y-=.05;doorGroup.updateMatrixWorld(true);}
            else{
                const de=player.position.distanceTo(escapeSensor);
                if(de<1.8){gameActive=false;scream(false);document.getElementById('clear-time').textContent=`⏱ ${m}분 ${s}초`;document.getElementById('clear-screen').style.display='flex';if(platform==='pc')document.exitPointerLock();return;}
            }
        }else if(!hasKey&&dd<1.5)showToast("🔒 게이트가 구속되어 있습니다.<br>황금 열쇠가 필요합니다.");
    }

    if(underground&&hasLadder&&!ladderPlaced&&holeGroup){
        const d=Math.sqrt((player.position.x-holePosX)**2+(player.position.z-holePosZ)**2);
        if(d<7.0){
            if(platform==='pc'){document.getElementById('interact-prompt').innerHTML='🪜 [E] Place Ladder';document.getElementById('interact-prompt').style.display='block';}
            else{document.getElementById('btn-mobile-interact').innerHTML='🪜';document.getElementById('btn-mobile-interact').style.display='flex';}
        }else{
            document.getElementById('interact-prompt').style.display='none';
            document.getElementById('btn-mobile-interact').style.display='none';
        }
    }

    sCamX+=(camX-sCamX)*.2; sCamY+=(camY-sCamY)*.2;
    
    const fX = -Math.sin(sCamX);
    const fZ = -Math.cos(sCamX);
    const rX = Math.cos(sCamX);
    const rZ = -Math.sin(sCamX);

    let mX=0,mZ=0;
    if(platform==='pc'){
        if(keys.w){mX+=fX;mZ+=fZ;}if(keys.s){mX-=fX;mZ-=fZ;}
        if(keys.a){mX-=rX;mZ-=rZ;}if(keys.d){mX+=rX;mZ+=rZ;}
        moving=mX!==0||mZ!==0;sprinting=moving&&keys.shift&&!exhausted;
    }else{
        if(Math.abs(jInput.x)>.05||Math.abs(jInput.y)>.05){
            mX = fX * (-jInput.y) + rX * jInput.x;
            mZ = fZ * (-jInput.y) + rZ * jInput.x;
        }
        moving=mX!==0||mZ!==0;sprinting=moving&&jRatio>.75&&!exhausted;
    }

    if(sprinting){stamina-=.22;if(stamina<=0){stamina=0;exhausted=true;}}
    else{stamina+=moving?.7:2.2;if(stamina>=100){stamina=100;exhausted=false;}}
    const sb=document.getElementById('stamina-bar');
    if(sb){sb.style.width=stamina+'%';sb.style.background=exhausted?'#cc2424':'#d1bd71';}

    const spd=exhausted?SPD_TIRED:(sprinting?SPD_SPRINT:SPD_BASE);
    const nx=player.position.x+mX*spd,nz=player.position.z+mZ*spd;

    const rt=Date.now()*.005;
    let bobX=0,bobY=0;

    if(moving&&!climbing){
        let safe;
        if(underground)safe=ugCollide(player.position.x,player.position.z,nx,nz,.5);
        else safe=gridCollide(player.position.x,player.position.z,nx,nz,.55);
        player.position.x=safe.x;player.position.z=safe.z;
        if(grounded){
            const wf=sprinting?2.5:1.4;
            bobX=Math.sin(rt*wf)*.035;bobY=Math.cos(rt*wf*2)*.022;
            const now=Date.now();
            if(now-lastFoot>(sprinting?220:380)){footstep(sprinting?.7:.35);lastFoot=now;}
        }
    }

    if(!climbing){
        velY+=GRAVITY;player.position.y+=velY;
        if(underground){
            if(player.position.y<=UG_Y){player.position.y=UG_Y;velY=0;grounded=true;}else grounded=false;
        }else{
            if(pitBounds.active){
                const inPit2=player.position.x>pitBounds.minX&&player.position.x<pitBounds.maxX&&
                             player.position.z>pitBounds.minZ&&player.position.z<pitBounds.maxZ;
                if(!inPit2&&player.position.y<=0){player.position.y=0;velY=0;grounded=true;}
                else if(!inPit2)grounded=false;
            }else{
                if(player.position.y<=0){player.position.y=0;velY=0;grounded=true;}else grounded=false;
            }
        }
    }

    let tiltX=0,tiltZ=0;
    if(!underground&&pitBounds.active){
        const inP=player.position.x>pitBounds.minX&&player.position.x<pitBounds.maxX&&
                  player.position.z>pitBounds.minZ&&player.position.z<pitBounds.maxZ;
        if(inP&&grounded){tiltX=Math.sin(Date.now()*.003)*.035;tiltZ=Math.cos(Date.now()*.0025)*.025;}
    }

    player.rotation.y=sCamX;
    fpsRig.position.set(player.position.x,player.position.y+1.5,player.position.z);
    fpsRig.rotation.set(sCamY+tiltX,sCamX,tiltZ,'YXZ');

    const aw=moving?Math.sin(rt*(sprinting?2.5:1.4))*.07:0;
    const ai=Math.sin(Date.now()*.001)*.01;
    lArm.position.z=-.3+aw+ai;lArm.position.y=-.22+Math.abs(aw)*.25;
    rArm.position.z=-.3-aw+ai;rArm.position.y=-.22+Math.abs(aw)*.25;
    flashMesh.position.z=-.35-aw+ai;flashMesh.position.y=-.20+Math.abs(aw)*.25;
    flash.position.set(.24,-.20,-.35);flashTgt.position.set(.24,-.20,-12);

    let closestD=999;
    if(!underground){
        entities.forEach(e=>{
            entityAI(e,player.position);
            const d=Math.sqrt((player.position.x-e.mesh.position.x)**2+(player.position.z-e.mesh.position.z)**2);
            if(d<closestD)closestD=d;
            const ws=e.state==='chase'?.048:.016;
            e.core.position.y=1.3+Math.sin(Date.now()*ws)*.1;
            e.legs.forEach((leg,i)=>{const off=i*(Math.PI/2);leg.rotation.x=Math.sin(Date.now()*ws*2+off)*.5;leg.rotation.z=.25+Math.cos(Date.now()*ws+off)*.15;});
        });
        const hu=document.getElementById('heartbeat-ui');
        if(closestD<15){ 
            const pf=(15-closestD)/15,hbi=800-pf*550,now=Date.now();
            if(now-lastHB>hbi){heartbeat(.35+pf*.45);lastHB=now;hu.style.transform=`translateX(-50%) scale(${1.2+pf*.4})`;setTimeout(()=>hu.style.transform=`translateX(-50%) scale(${.9+pf*.15})`,120);}
        }else hu.style.transform='translateX(-50%) scale(0)';
        if(closestD<1.3){triggerGameOver("체내 주파수가 엔티티의 간섭으로 완전 오염되었습니다.");return;}
    }

    camera.position.set(player.position.x+bobX,player.position.y+1.5+bobY,player.position.z);
    camera.rotation.set(sCamY+tiltX,sCamX,tiltZ,'YXZ');
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>
