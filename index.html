<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - True Escape</title>
    <style>
        html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:#0d0d0b;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
        canvas{display:block;width:100%!important;height:100%!important;position:absolute;top:0;left:0;z-index:1;}
        #vhs-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle,rgba(0,0,0,0) 35%,rgba(0,0,0,0.8) 100%);pointer-events:none;z-index:2;}
        #glitch-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0);opacity:0;pointer-events:none;z-index:3;transition:background-color .6s,opacity .6s;}
        #crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:rgba(255,255,255,.3);border-radius:50%;pointer-events:none;z-index:5;display:none;}
        #cctv-ui{position:absolute;top:25px;left:25px;color:rgba(220,40,40,.9);font-weight:bold;font-size:15px;z-index:210;letter-spacing:1.5px;pointer-events:none;font-family:monospace;display:none;text-shadow:0 0 6px rgba(220,40,40,.6);}
        #quest-ui{position:absolute;top:60px;left:25px;color:#dfd29e;font-weight:bold;font-size:14px;z-index:210;letter-spacing:1px;pointer-events:none;background:rgba(15,14,11,.85);padding:10px 16px;border-left:3px solid #bfae6f;border-radius:0 4px 4px 0;display:none;text-shadow:0 1px 3px rgba(0,0,0,.8);box-shadow:0 4px 10px rgba(0,0,0,.5);}
        #interact-prompt{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);color:#fff;background:rgba(0,0,0,.8);border:1px solid #bfae6f;padding:8px 16px;border-radius:4px;font-weight:bold;font-size:14px;z-index:100;display:none;pointer-events:none;text-align:center;}
        #top-controls{position:absolute;top:16px;right:16px;z-index:220;display:none;flex-direction:column;align-items:flex-end;gap:6px;}
        #ui-container{color:#d4cfb4;background:rgba(10,10,8,.96);padding:14px;border-radius:6px;border:1px solid #3a382e;width:220px;transition:all .3s;max-height:450px;opacity:1;overflow:hidden;transform-origin:top right;box-shadow:0 10px 25px rgba(0,0,0,.7);display:flex;flex-direction:column;gap:12px;}
        #ui-container.collapsed{max-height:0;padding:0 14px;opacity:0;border:0 solid transparent;pointer-events:none;}
        .btn{background:#1c1b17;color:#bfae6f;border:1px solid #3a382e;padding:8px 14px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;white-space:nowrap;transition:all .2s;width:100%;text-align:center;box-sizing:border-box;}
        .btn:hover{background:#2b2922;color:#dfd29e;}
        .setting-row{display:flex;flex-direction:column;gap:4px;font-size:12px;color:#bfae6f;font-weight:bold;}
        .setting-row div{display:flex;justify-content:space-between;align-items:center;color:#d4cfb4;font-weight:normal;}
        .setting-row input[type="range"]{width:100%;accent-color:#bfae6f;margin-top:2px;}
        .setting-row input[type="checkbox"]{accent-color:#bfae6f;width:16px;height:16px;cursor:pointer;}
        #mobile-controls-right{position:absolute;bottom:30px;right:30px;display:none;flex-direction:column;gap:15px;z-index:220;}
        .circle-btn{width:64px;height:64px;background:rgba(22,21,18,.92);border:2px solid #4a4537;border-radius:50%;color:#d4cfb4;font-size:24px;display:flex;justify-content:center;align-items:center;cursor:pointer;touch-action:none;box-shadow:0 6px 14px rgba(0,0,0,.7);}
        .circle-btn.active{background:#bfae6f;color:#111;border-color:#fff;}
        #btn-mobile-interact{background:#e2cc76!important;color:#111!important;border-color:#fff!important;display:none;font-size:28px;animation:pulse 1.2s infinite;z-index:230;}
        @keyframes pulse{0%{transform:scale(1);box-shadow:0 0 0 rgba(226,204,118,.6);}50%{transform:scale(1.15);box-shadow:0 0 20px rgba(226,204,118,.9);}100%{transform:scale(1);box-shadow:0 0 0 rgba(226,204,118,.6);}}
        #stamina-container{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);width:160px;background:rgba(10,10,8,.9);border:1px solid #3a382e;padding:5px;border-radius:4px;z-index:10;display:none;}
        .stamina-bg{background:rgba(0,0,0,.7);height:5px;overflow:hidden;border-radius:2px;}
        #stamina-bar{width:100%;height:100%;background:#bfae6f;}
        #heartbeat-ui{position:absolute;bottom:45px;left:50%;transform:translateX(-50%) scale(0);font-size:46px;color:#b81414;text-shadow:0 0 20px rgba(184,20,20,.9);pointer-events:none;z-index:15;transition:transform .1s cubic-bezier(.175,.885,.32,1.275);}
        #game-toast{position:absolute;top:20%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);color:#ffdd66;padding:12px 24px;border:1px solid #bfae6f;border-radius:4px;font-weight:bold;font-size:15px;z-index:300;display:none;pointer-events:none;text-align:center;}
        #ladder-hud{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#88ff88;padding:6px 18px;border:1px solid #44aa44;border-radius:4px;font-weight:bold;font-size:13px;z-index:210;display:none;pointer-events:none;}
        #joystick-zone{position:absolute;bottom:35px;left:35px;width:120px;height:120px;background:rgba(255,255,255,.02);border:2px solid rgba(255,255,255,.1);border-radius:50%;z-index:10;touch-action:none;display:none;}
        #joystick-stick{position:absolute;top:37px;left:37px;width:46px;height:46px;background:rgba(255,255,255,.25);border-radius:50%;}
        /* ─── START SCREEN ─── */
        #start-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#c5ba85;text-align:center;overflow:hidden;}
        #preview-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;}
        #scanline-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:2;animation:scanlines 6s linear infinite;}
        #vignette-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(0,0,0,0) 30%,rgba(0,0,0,.75) 100%);pointer-events:none;z-index:3;}
        #noise-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;opacity:.05;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:staticAnim .07s steps(1) infinite;}
        @keyframes scanlines{0%{background-position:0 0;}100%{background-position:0 100px;}}
        @keyframes staticAnim{0%{opacity:.04;}25%{opacity:.07;}50%{opacity:.03;}75%{opacity:.06;}100%{opacity:.04;}}
        #start-content{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;}
        #cctv-badge{font-family:monospace;font-size:13px;color:rgba(220,40,40,.9);letter-spacing:2px;margin-bottom:18px;animation:blink 1s step-end infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
        .title-main{font-size:22px;font-weight:600;letter-spacing:8px;margin:0;opacity:.7;font-family:monospace;}
        .title-sub{font-size:44px;font-weight:900;letter-spacing:7px;margin:5px 0 0;text-shadow:0 0 30px rgba(197,186,133,.5);}
        .title-level{font-size:14px;font-weight:500;letter-spacing:3px;margin:8px 0 35px;color:#7a7258;font-family:monospace;}
        .platform-select-box{display:flex;gap:15px;margin-bottom:35px;z-index:210;}
        .platform-choice-btn{background:rgba(28,27,23,.9);color:#dfd59e;border:1px solid #4a4537;padding:12px 24px;font-size:13px;font-weight:bold;border-radius:4px;cursor:pointer;letter-spacing:1.5px;}
        .platform-choice-btn.selected{background:#dfd59e;color:#1c1b17;border-color:#fff;box-shadow:0 6px 20px rgba(223,213,158,.4);}
        .start-btn-container{position:relative;width:120px;height:120px;display:flex;justify-content:center;align-items:center;cursor:pointer;opacity:.3;pointer-events:none;}
        .start-btn-container.ready{opacity:1;pointer-events:auto;}
        .circle-ring{position:absolute;border:2px solid rgba(197,186,133,.5);border-radius:50%;}
        .ring-1{width:110px;height:110px;animation:ringPulse 2s ease-in-out infinite;}
        .ring-2{width:96px;height:96px;animation:ringPulse 2s ease-in-out infinite .3s;}
        .ring-3{width:82px;height:82px;border-style:dashed;animation:ringPulse 2s ease-in-out infinite .6s;}
        @keyframes ringPulse{0%,100%{opacity:.5;}50%{opacity:1;}}
        .start-label{font-size:19px;font-weight:900;letter-spacing:2px;color:#c5ba85;z-index:5;font-family:monospace;}
        #gameover-screen,#pause-screen,#clear-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(4,4,3,.97);z-index:150;display:none;flex-direction:column;justify-content:center;align-items:center;}
        #gameover-screen{color:#b82323;}
        #clear-screen{color:#dfd29e;background:rgba(16,15,11,.98);}
        .go-btn{background:#240e0e;color:#ff7777;border:1px solid #5c1d1d;padding:14px 28px;font-size:13px;font-weight:bold;border-radius:4px;cursor:pointer;letter-spacing:1px;}
        .go-btn:hover{background:#421616;color:#fff;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="vhs-overlay"></div>
<div id="glitch-overlay"></div>
<div id="crosshair"></div>
<div id="cctv-ui">🔴 REC <span id="cctv-time">00:00</span></div>
<div id="quest-ui"></div>
<div id="interact-prompt"></div>
<div id="game-toast"></div>
<div id="heartbeat-ui">❤️</div>
<div id="ladder-hud">🪜 Ladder x1</div>

<div id="start-screen">
    <canvas id="preview-canvas"></canvas>
    <div id="scanline-overlay"></div>
    <div id="vignette-overlay"></div>
    <div id="noise-overlay"></div>
    <div id="start-content">
        <div id="cctv-badge">🔴 REC — CCTV FEED ACTIVE</div>
        <h2 class="title-main">THE BACKROOMS</h2>
        <h1 class="title-sub">EXPLORATION</h1>
        <div class="title-level">LEVEL 0 — HORROR ESCAPE</div>
        <div class="platform-select-box">
            <button id="pc-btn" class="platform-choice-btn" onclick="setPlatform('pc')">💻 PC</button>
            <button id="mobile-btn" class="platform-choice-btn" onclick="setPlatform('mobile')">📱 MOBILE</button>
        </div>
        <div id="start-trigger" class="start-btn-container" onclick="launchGame()">
            <div class="circle-ring ring-1"></div>
            <div class="circle-ring ring-2"></div>
            <div class="circle-ring ring-3"></div>
            <span class="start-label">ENTER</span>
        </div>
    </div>
</div>

<div id="top-controls">
    <button id="btn-toggle-panel" class="btn" style="background:#222;color:#bfae6f;width:44px;height:38px;font-size:16px;padding:0;" onclick="togglePanel()">◢</button>
    <div id="ui-container" class="collapsed">
        <button class="btn" style="background:#661e1e;color:#fff;border-color:#8c2b2b;" onclick="triggerPause(true)">⏸ PAUSE</button>
        <button class="btn" style="background:#1e4666;color:#fff;border-color:#2b6f8c;" onclick="toggleFS()">📺 FULLSCREEN</button>
        <div class="setting-row"><div><span>Sensitivity</span><span id="txt-sens">1.0</span></div><input type="range" id="cfg-sens" min="0.1" max="2.5" step="0.1" value="1.0" oninput="updateSens(this.value)"></div>
        <div class="setting-row"><div><span>Invert Look Y (시점반전)</span><input type="checkbox" onchange="invY=this.checked"></div></div>
        <div class="setting-row"><div><span>Invert Move (이동반전)</span><input type="checkbox" onchange="invMove=this.checked"></div></div>
        <div class="setting-row"><div><span>BGM Vol</span><span id="txt-bgm">50%</span></div><input type="range" id="cfg-bgm" min="0" max="100" step="5" value="50" oninput="updateBgm(this.value)"></div>
        <div class="setting-row"><div><span>SFX Vol</span><span id="txt-sfx">70%</span></div><input type="range" id="cfg-sfx" min="0" max="100" step="5" value="70" oninput="updateSfx(this.value)"></div>
    </div>
</div>
<div id="mobile-controls-right">
    <div id="btn-mobile-interact" class="circle-btn">🚪</div>
    <div id="btn-mobile-flash" class="circle-btn active" ontouchstart="handleFlash(event)">🔦</div>
    <div id="btn-mobile-jump" class="circle-btn" style="font-size:20px;font-weight:bold;" ontouchstart="handleJump(event)">▲</div>
</div>
<div id="stamina-container"><div class="stamina-bg"><div id="stamina-bar"></div></div></div>
<div id="joystick-zone"><div id="joystick-stick"></div></div>

<div id="pause-screen">
    <h1 style="font-size:26px;color:#bfae6f;margin-bottom:20px;letter-spacing:2px;">PAUSED</h1>
    <div style="display:flex;gap:12px;">
        <button class="btn" style="color:#fff;border-color:#bfae6f;padding:10px 24px;font-size:14px;width:auto;" onclick="triggerPause(false)">RESUME</button>
        <button class="btn" style="background:#222;color:#ff7777;border-color:#555;padding:10px 24px;font-size:14px;width:auto;" onclick="goMainMenu()">↩ MENU</button>
    </div>
</div>
<div id="gameover-screen">
    <h1 style="font-size:32px;margin-bottom:5px;letter-spacing:3px;">CONNECTION LOST</h1>
    <p id="go-cause" style="color:#555;font-size:13px;margin-bottom:25px;"></p>
    <div style="display:flex;gap:15px;">
        <button class="go-btn" onclick="goMainMenu()">↩ MAIN MENU</button>
        <button class="go-btn" style="background:#0e2411;color:#77ff77;border-color:#1d5c28;" onclick="respawn()">🛡 RESPAWN</button>
    </div>
</div>
<div id="clear-screen">
    <h1 style="font-size:36px;margin-bottom:5px;letter-spacing:5px;color:#ffdd66;text-shadow:0 0 15px rgba(255,221,102,.4);">NOCLIP SUCCESS</h1>
    <p id="clear-time" style="color:#ffdd66;font-size:18px;font-weight:bold;margin:0 0 15px;letter-spacing:1px;"></p>
    <p style="color:#aaa;font-size:14px;margin-bottom:30px;">You successfully no-clipped out of Backrooms Level 0.</p>
    <button class="go-btn" style="background:#bfae6f;color:#111;border-color:#fff;" onclick="goMainMenu()">↩ MAIN MENU</button>
</div>

<script>
// ════════════════════════════════════════════
//  CONSTANTS & GLOBALS
// ════════════════════════════════════════════
const ROWS=22, COLS=22, UNIT=5, WH=5.5;
const BINGO_CLEAR_R=3; 

// 지상 맵 오브젝트
let mapData=[], iWalls=null, lamps=[], floorM=null, ceilM=null, floorGroup=null;

// 지하
const UG_R=14, UG_C=14, UG_U=4, UG_WH=4.5;
const UG_Y=-32; 

let platform=null, gameActive=false, isGameOver=false, isPaused=false;
let isFlashOn=true, sensitivity=1.0, volBgm=0.5, volSfx=0.7;
let invY=false, invMove=false; // 조작 반전 세팅값
let recTime=0, speedBoosted=false, panelOpen=false;

let velY=0, grounded=true;
const GRAVITY=-0.014, JUMP=0.165;
let lastHB=0;
const SPD_BASE=0.11, SPD_SPRINT=0.17, SPD_TIRED=0.06;
let stamina=100, exhausted=false, moving=false, sprinting=false;

let hasKey=false, doorOpened=false;
let keyMesh=null, doorGroup=null, doorPivot=null;
let escapeSensor=new THREE.Vector3();

// 빙고판 관련
let pitCX=0, pitCZ=0;
let pitBounds={minX:0,maxX:0,minZ:0,maxZ:0,active:false};
let pitMeshes=[], pitVoid=null;
let flatAreas=[]; 

// 빙고판 규격 (새로운 Pitfalls 스타일)
const B_GRID_DIV = 4;    // 4x4 홀
const B_HOLE_W = 3.8;    // 구멍 너비
const B_PATH_W = 0.9;    // 걷는 길 너비
const PIT_TOTAL = B_GRID_DIV * B_HOLE_W + (B_GRID_DIV + 1) * B_PATH_W;
const BINGO_HALF = PIT_TOTAL / 2;

// 지하
let underground=false;
let ugMap=[], ugWalls=null, ugFloor=null, ugCeil=null, ugObjs=[];
let ugOX=0, ugOZ=0; 
let hasLadder=false, ladderItem=null, ladderMesh=null, ladderPlaced=false;
let holeGroup=null, holePosX=0, holePosZ=0, holeWallNX=0, holeWallNZ=0;
let climbing=false, climbT=0;

const BG_COL=0xbaa761;
const scene=new THREE.Scene();
scene.background=new THREE.Color(BG_COL);
scene.fog=new THREE.FogExp2(BG_COL,0.05);

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,500);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=false;
document.body.appendChild(renderer.domElement);

const ambient=new THREE.AmbientLight(0xfffdb8,0.85);
scene.add(ambient);

const fpsRig=new THREE.Group(); scene.add(fpsRig);
const flash=new THREE.SpotLight(0xfffbf0,1.8,40,Math.PI/4.5,0.6,0.6);
const flashTgt=new THREE.Object3D(); flashTgt.position.set(0,0,-10);
fpsRig.add(flash,flashTgt); flash.target=flashTgt;

const fbGeo=new THREE.CylinderGeometry(.04,.03,.25,8); fbGeo.rotateX(Math.PI/2);
const fhGeo=new THREE.CylinderGeometry(.06,.04,.08,8); fhGeo.rotateX(Math.PI/2); fhGeo.translate(0,0,-.13);
const fMat=new THREE.MeshStandardMaterial({color:0x222222,metalness:.8});
const flashMesh=new THREE.Group();
flashMesh.add(new THREE.Mesh(fbGeo,fMat),new THREE.Mesh(fhGeo,fMat));
const lensMesh=new THREE.Mesh(new THREE.CircleGeometry(.05,8),new THREE.MeshBasicMaterial({color:0xffffee}));
lensMesh.position.set(0,0,-.17); lensMesh.rotation.y=Math.PI; flashMesh.add(lensMesh);
flashMesh.position.set(.28,-.22,-.4); fpsRig.add(flashMesh);

const armMat=new THREE.MeshStandardMaterial({color:0x151515,roughness:.6});
const sharedArmGeo=new THREE.CylinderGeometry(.035,.025,.5,8);
const lArm=new THREE.Mesh(sharedArmGeo,armMat); lArm.rotateX(Math.PI/2.3); lArm.position.set(-.25,-.25,-.3); fpsRig.add(lArm);
const rArm=new THREE.Mesh(sharedArmGeo,armMat); rArm.rotateX(Math.PI/2.3); rArm.position.set(.25,-.25,-.3); fpsRig.add(rArm);

// ════════════════════════════════════════════
//  TEXTURES
// ════════════════════════════════════════════
function mkWallTex(){
    const c=document.createElement('canvas'); c.width=c.height=256;
    const x=c.getContext('2d');
    x.fillStyle='#dfd5a0'; x.fillRect(0,0,256,256);
    const d=x.getImageData(0,0,256,256);
    for(let i=0;i<d.data.length;i+=4){if(Math.random()<.12){const n=(Math.random()-.5)*16;d.data[i]=Math.max(0,Math.min(255,d.data[i]+n-6));d.data[i+1]=Math.max(0,Math.min(255,d.data[i+1]+n-6));d.data[i+2]=Math.max(0,Math.min(255,d.data[i+2]+n-8));}}
    x.putImageData(d,0,0);
    x.strokeStyle='rgba(194,183,126,.45)'; x.lineWidth=1.5;
    for(let i=0;i<256;i+=32){x.beginPath();x.moveTo(i,0);x.lineTo(i,256);x.stroke();}
    const t=new THREE.CanvasTexture(c); t.anisotropy=Math.min(4,renderer.capabilities.getMaxAnisotropy()||1); return t;
}
function mkFloorTex(){
    const c=document.createElement('canvas'); c.width=c.height=512;
    const x=c.getContext('2d');
    x.fillStyle='#837543'; x.fillRect(0,0,512,512);
    const d=x.getImageData(0,0,512,512);
    for(let i=0;i<d.data.length;i+=4){const g=(Math.random()-.5)*24;d.data[i]=Math.max(0,Math.min(255,d.data[i]+g));d.data[i+1]=Math.max(0,Math.min(255,d.data[i+1]+g));d.data[i+2]=Math.max(0,Math.min(255,d.data[i+2]+g*.8));}
    x.putImageData(d,0,0);
    const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(16,16); t.anisotropy=Math.min(4,renderer.capabilities.getMaxAnisotropy()||1); return t;
}
function mkCeilTex(){
    const c=document.createElement('canvas'); c.width=c.height=256;
    const x=c.getContext('2d');
    x.fillStyle='#d3c79b'; x.fillRect(0,0,256,256);
    const d=x.getImageData(0,0,256,256);
    for(let i=0;i<d.data.length;i+=4){const n=(Math.random()-.5)*8;d.data[i]=Math.max(0,Math.min(255,d.data[i]+n));d.data[i+1]=Math.max(0,Math.min(255,d.data[i+1]+n));d.data[i+2]=Math.max(0,Math.min(255,d.data[i+2]+n));}
    x.putImageData(d,0,0);
    const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(22,22); t.anisotropy=Math.min(4,renderer.capabilities.getMaxAnisotropy()||1); return t;
}
const wallTex=mkWallTex(), floorTex=mkFloorTex(), ceilTex=mkCeilTex();
const wallMat=new THREE.MeshStandardMaterial({map:wallTex,roughness:.85});
const floorMat=new THREE.MeshStandardMaterial({map:floorTex,roughness:.95});
const ceilMat=new THREE.MeshStandardMaterial({map:ceilTex,roughness:.88});

// ════════════════════════════════════════════
//  MAZE GENERATION
// ════════════════════════════════════════════
function genMaze(){
    mapData=Array(ROWS).fill().map(()=>Array(COLS).fill(1));
    flatAreas=[];
    const vis=Array(ROWS).fill().map(()=>Array(COLS).fill(false));
    function carve(r,c){
        vis[r][c]=true; mapData[r][c]=0;
        const dirs=[[-2,0],[2,0],[0,-2],[0,2]].sort(()=>Math.random()-.5);
        for(const[dr,dc]of dirs){const nr=r+dr,nc=c+dc;if(nr>0&&nr<ROWS-1&&nc>0&&nc<COLS-1&&!vis[nr][nc]){mapData[r+dr/2][c+dc/2]=0;carve(nr,nc);}}
    }
    carve(1,1);
    for(let k=0;k<3;k++){
        let cr,cc,tries=0;
        do{cr=Math.floor(Math.random()*(ROWS-8))+4;cc=Math.floor(Math.random()*(COLS-8))+4;tries++;}
        while(tries<50&&flatAreas.some(a=>Math.abs(a.r-cr)<6&&Math.abs(a.c-cc)<6));
        const R=BINGO_CLEAR_R+1;
        for(let r=cr-R;r<=cr+R;r++)for(let c=cc-R;c<=cc+R;c++){if(r>0&&r<ROWS-1&&c>0&&c<COLS-1)mapData[r][c]=0;}
        flatAreas.push({r:cr,c:cc});
    }
    for(let r=0;r<ROWS;r++){mapData[r][0]=1;mapData[r][COLS-1]=1;}
    for(let c=0;c<COLS;c++){mapData[0][c]=1;mapData[ROWS-1][c]=1;}
}

function buildGraphics(){
    if(iWalls){scene.remove(iWalls);iWalls.geometry.dispose();}
    lamps.forEach(l=>scene.remove(l)); lamps=[];
    if(floorM){scene.remove(floorM);floorM=null;}
    if(ceilM){scene.remove(ceilM);ceilM=null;}
    if(floorGroup){scene.remove(floorGroup);floorGroup=null;}

    let wc=0;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(mapData[r][c]===1)wc++;
    const wGeo=new THREE.BoxGeometry(UNIT,WH,UNIT);
    iWalls=new THREE.InstancedMesh(wGeo,wallMat,wc);
    iWalls.frustumCulled=false;
    const dum=new THREE.Object3D(); let idx=0;
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            const wx=(c-COLS/2)*UNIT+UNIT/2, wz=(r-ROWS/2)*UNIT+UNIT/2;
            if(mapData[r][c]===1){
                dum.position.set(wx,WH/2,wz); dum.updateMatrix();
                iWalls.setMatrixAt(idx++,dum.matrix);
            } else if(Math.random()<.12){
                const lg=new THREE.Group();
                const fr=new THREE.Mesh(new THREE.BoxGeometry(2.4,.05,1.2),new THREE.MeshStandardMaterial({color:0x333333,roughness:.8}));
                const pn=new THREE.Mesh(new THREE.BoxGeometry(2.2,.06,1.0),new THREE.MeshBasicMaterial({color:0xffffe0}));
                pn.position.y=-.01; lg.add(fr,pn);
                lg.position.set(wx,WH-.02,wz);
                if(Math.random()>.5)lg.rotation.y=Math.PI/2;
                scene.add(lg); lamps.push(lg);
                const pl=new THREE.PointLight(0xfff5cc,.6,11);
                pl.position.set(wx,WH-.3,wz); scene.add(pl); lamps.push(pl);
            }
        }
    }
    iWalls.instanceMatrix.needsUpdate=true;
    iWalls.count=idx;
    scene.add(iWalls);

    const mW=COLS*UNIT, mH=ROWS*UNIT;
    floorM=new THREE.Mesh(new THREE.PlaneGeometry(mW,mH),floorMat);
    floorM.rotation.x=-Math.PI/2; scene.add(floorM);
    ceilM=new THREE.Mesh(new THREE.PlaneGeometry(mW,mH),ceilMat);
    ceilM.rotation.x=Math.PI/2; ceilM.position.y=WH; scene.add(ceilM);
}

// ════════════════════════════════════════════
//  SPAWN HELPERS
// ════════════════════════════════════════════
function worldXZ(r,c){return{x:(c-COLS/2)*UNIT+UNIT/2,z:(r-ROWS/2)*UNIT+UNIT/2};}
function safeSpawn(avoid,minD){
    for(let i=0;i<400;i++){
        const r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);
        if(mapData[r][c]===0){
            const p=worldXZ(r,c);
            if(avoid&&minD&&Math.sqrt((p.x-avoid.x)**2+(p.z-avoid.z)**2)<minD)continue;
            return{x:p.x,z:p.z,r,c};
        }
    }
    return{x:UNIT,z:UNIT,r:1,c:1};
}

// ════════════════════════════════════════════
//  BINGO PIT — 바닥 타일에 뚫린 구멍 형태 (Pitfalls형)
// ════════════════════════════════════════════
function buildBingoPit(){
    pitMeshes.forEach(m=>{if(m&&m.parent)scene.remove(m);}); pitMeshes=[];
    if(pitVoid){scene.remove(pitVoid);pitVoid=null;}
    if(floorGroup){scene.remove(floorGroup); floorGroup=null;}
    pitBounds.active=false;

    const fa=flatAreas[0];
    const fp=worldXZ(fa.r,fa.c);
    pitCX=fp.x; pitCZ=fp.z;

    pitBounds.minX=pitCX-BINGO_HALF; pitBounds.maxX=pitCX+BINGO_HALF;
    pitBounds.minZ=pitCZ-BINGO_HALF; pitBounds.maxZ=pitCZ+BINGO_HALF;
    pitBounds.active=true;

    if(floorM) floorM.visible = false;
    floorGroup = new THREE.Group();
    const mW = COLS*UNIT, mH = ROWS*UNIT;

    const nL = pitBounds.minZ - (-mH/2);
    if(nL>0){
        const fN = new THREE.Mesh(new THREE.PlaneGeometry(mW, nL), floorMat);
        fN.rotation.x = -Math.PI/2; fN.position.set(0,0,-mH/2+nL/2); floorGroup.add(fN);
    }
    const sL = mH/2 - pitBounds.maxZ;
    if(sL>0){
        const fS = new THREE.Mesh(new THREE.PlaneGeometry(mW, sL), floorMat);
        fS.rotation.x = -Math.PI/2; fS.position.set(0,0,pitBounds.maxZ+sL/2); floorGroup.add(fS);
    }
    const wL = pitBounds.minX - (-mW/2);
    const pZLen = pitBounds.maxZ - pitBounds.minZ;
    if(wL>0){
        const fW = new THREE.Mesh(new THREE.PlaneGeometry(wL, pZLen), floorMat);
        fW.rotation.x = -Math.PI/2; fW.position.set(-mW/2+wL/2,0,pitCZ); floorGroup.add(fW);
    }
    const eL = mW/2 - pitBounds.maxX;
    if(eL>0){
        const fE = new THREE.Mesh(new THREE.PlaneGeometry(eL, pZLen), floorMat);
        fE.rotation.x = -Math.PI/2; fE.position.set(pitBounds.maxX+eL/2,0,pitCZ); floorGroup.add(fE);
    }
    scene.add(floorGroup);

    const pathMat = new THREE.MeshStandardMaterial({map:floorTex, roughness:0.95});
    const downWallMat = new THREE.MeshStandardMaterial({map:wallTex, roughness:0.88});
    const voidMat = new THREE.MeshBasicMaterial({color:0x020202});
    const holeDepth = 18;

    const hGeo = new THREE.BoxGeometry(PIT_TOTAL, 0.1, B_PATH_W);
    for(let i=0; i<=B_GRID_DIV; i++) {
        const z = pitBounds.minZ + B_PATH_W/2 + i*(B_HOLE_W+B_PATH_W);
        const p = new THREE.Mesh(hGeo, pathMat);
        p.position.set(pitCX, -0.05, z);
        scene.add(p); pitMeshes.push(p);
    }
    const vGeo = new THREE.BoxGeometry(B_PATH_W, 0.1, PIT_TOTAL);
    for(let i=0; i<=B_GRID_DIV; i++) {
        const x = pitBounds.minX + B_PATH_W/2 + i*(B_HOLE_W+B_PATH_W);
        const p = new THREE.Mesh(vGeo, pathMat);
        p.position.set(x, -0.05, pitCZ);
        scene.add(p); pitMeshes.push(p);
    }

    const wGeoX = new THREE.BoxGeometry(B_HOLE_W, holeDepth, 0.1);
    const wGeoZ = new THREE.BoxGeometry(0.1, holeDepth, B_HOLE_W);
    for(let r=0; r<B_GRID_DIV; r++) {
        for(let c=0; c<B_GRID_DIV; c++) {
            const hx = pitBounds.minX + B_PATH_W + B_HOLE_W/2 + c*(B_HOLE_W+B_PATH_W);
            const hz = pitBounds.minZ + B_PATH_W + B_HOLE_W/2 + r*(B_HOLE_W+B_PATH_W);

            const wN = new THREE.Mesh(wGeoX, downWallMat); wN.position.set(hx, -holeDepth/2, hz-B_HOLE_W/2);
            const wS = new THREE.Mesh(wGeoX, downWallMat); wS.position.set(hx, -holeDepth/2, hz+B_HOLE_W/2);
            const wW = new THREE.Mesh(wGeoZ, downWallMat); wW.position.set(hx-B_HOLE_W/2, -holeDepth/2, hz);
            const wE = new THREE.Mesh(wGeoZ, downWallMat); wE.position.set(hx+B_HOLE_W/2, -holeDepth/2, hz);

            scene.add(wN, wS, wW, wE);
            pitMeshes.push(wN, wS, wW, wE);
        }
    }

    pitVoid = new THREE.Mesh(new THREE.PlaneGeometry(PIT_TOTAL, PIT_TOTAL), voidMat);
    pitVoid.rotation.x = -Math.PI/2;
    pitVoid.position.set(pitCX, -holeDepth + 0.1, pitCZ);
    scene.add(pitVoid);

    const deepLight = new THREE.PointLight(0x1144ff, 1.8, 30);
    deepLight.position.set(pitCX, -10, pitCZ);
    scene.add(deepLight); pitMeshes.push(deepLight);
}

function spawnDoor(playerPos){
    if(doorGroup)scene.remove(doorGroup);
    doorGroup=null; doorPivot=null;
    let placed=false;
    const offsets=[[0,1],[0,-1],[1,0],[-1,0]];
    for(const[dr,dc]of offsets){
        const tr=Math.round((pitCZ+dr*(BINGO_HALF+UNIT*2))/(UNIT)+(ROWS/2-.5));
        const tc=Math.round((pitCX+dc*(BINGO_HALF+UNIT*2))/(UNIT)+(COLS/2-.5));
        if(tr>0&&tr<ROWS-1&&tc>0&&tc<COLS-1&&mapData[tr][tc]===0){
            const dirs2=[[0,-1,0,Math.PI/2],[0,1,0,-Math.PI/2],[-1,0,-2.45,0],[1,0,2.45,Math.PI]];
            for(const[wr,wc,offX,ang]of dirs2){
                if(mapData[tr+wr]&&mapData[tr+wr][tc+wc]===1){
                    const p=worldXZ(tr,tc);
                    _buildDoor(p.x+offX*(offX!==0?1:0),p.z+(offX===0?offX:0),ang,p.x,p.z);
                    placed=true; break;
                }
            }
            if(placed)break;
        }
    }
    if(!placed){
        for(let i=0;i<500;i++){
            const r=Math.floor(Math.random()*(ROWS-2))+1,c=Math.floor(Math.random()*(COLS-2))+1;
            if(mapData[r][c]===0){
                const p=worldXZ(r,c);
                if(mapData[r-1]&&mapData[r-1][c]===1){_buildDoor(p.x,p.z-2.45,0,p.x,p.z);break;}
                if(mapData[r+1]&&mapData[r+1][c]===1){_buildDoor(p.x,p.z+2.45,Math.PI,p.x,p.z);break;}
                if(mapData[r][c-1]===1){_buildDoor(p.x-2.45,p.z,Math.PI/2,p.x,p.z);break;}
                if(mapData[r][c+1]===1){_buildDoor(p.x+2.45,p.z,-Math.PI/2,p.x,p.z);break;}
            }
        }
    }
}
function _buildDoor(dx,dz,ang,cx,cz){
    doorGroup=new THREE.Group();
    doorGroup.position.set(dx,0,dz);
    doorGroup.rotation.y=ang;
    const fMat2=new THREE.MeshStandardMaterial({color:0x1d140e,roughness:.9});
    const lp=new THREE.Mesh(new THREE.BoxGeometry(.15,2.8,.2),fMat2); lp.position.set(-.85,1.4,0);
    const rp=new THREE.Mesh(new THREE.BoxGeometry(.15,2.8,.2),fMat2); rp.position.set(.85,1.4,0);
    const tp=new THREE.Mesh(new THREE.BoxGeometry(1.8,.15,.2),fMat2); tp.position.set(0,2.8,0);
    doorGroup.add(lp,rp,tp);
    doorPivot=new THREE.Group(); doorPivot.position.set(-.78,1.4,0);
    const dp=new THREE.Mesh(new THREE.BoxGeometry(1.56,2.65,.12),new THREE.MeshStandardMaterial({color:0x3d2516,roughness:.75}));
    dp.position.set(.78,0,0); doorPivot.add(dp);
    const kn=new THREE.Mesh(new THREE.SphereGeometry(.06,12,12),new THREE.MeshStandardMaterial({color:0xccaa44,metalness:.8,roughness:.1}));
    kn.position.set(.65,0,.09); dp.add(kn);
    doorGroup.add(doorPivot);
    const corr=new THREE.Mesh(new THREE.BoxGeometry(1.6,2.8,3.0),new THREE.MeshBasicMaterial({color:0x000000,side:THREE.BackSide}));
    corr.position.set(0,1.4,-1.5); doorGroup.add(corr);
    scene.add(doorGroup); doorGroup.updateMatrixWorld(true);
    const sOff=new THREE.Vector3(0,1.0,-2.2); sOff.applyQuaternion(doorGroup.quaternion);
    escapeSensor.copy(doorGroup.position).add(sOff);
    const gl=new THREE.PointLight(0x00ff55,0,6); gl.position.set(0,1.4,-.2);
    doorGroup.add(gl); doorGroup.greenLight=gl;
}
function spawnKey(playerPos){
    if(keyMesh)scene.remove(keyMesh);
    keyMesh=new THREE.Group();
    const kr=new THREE.Mesh(new THREE.TorusGeometry(.14,.04,8,16),new THREE.MeshStandardMaterial({color:0xffaa00,metalness:.9,roughness:.05}));
    const kb=new THREE.Mesh(new THREE.CylinderGeometry(.02,.02,.35),new THREE.MeshStandardMaterial({color:0xffaa00,metalness:.9}));
    kb.position.y=-.2; kb.rotation.z=Math.PI/2; keyMesh.add(kr,kb);
    const kl=new THREE.PointLight(0xffdd44,2.5,12); kl.position.y=.2; keyMesh.add(kl);
    const kp=safeSpawn(playerPos,15);
    keyMesh.position.set(kp.x,.6,kp.z); scene.add(keyMesh);
}

//  UNDERGROUND — 지하 공간

function buildUnderground(){
    ugObjs.forEach(o=>scene.remove(o)); ugObjs=[];
    if(ugWalls){scene.remove(ugWalls);ugWalls=null;}
    if(ugFloor){scene.remove(ugFloor);ugFloor=null;}
    if(ugCeil){scene.remove(ugCeil);ugCeil=null;}
    if(ladderItem){scene.remove(ladderItem);ladderItem=null;}
    if(ladderMesh){scene.remove(ladderMesh);ladderMesh=null;}
    if(holeGroup){scene.remove(holeGroup);holeGroup=null;}
    ladderPlaced=false; climbing=false; climbT=0;

    ugMap=Array(UG_R).fill().map(()=>Array(UG_C).fill(1));
    const vis=Array(UG_R).fill().map(()=>Array(UG_C).fill(false));
    function carve(r,c){
        vis[r][c]=true; ugMap[r][c]=0;
        const dirs=[[-2,0],[2,0],[0,-2],[0,2]].sort(()=>Math.random()-.5);
        for(const[dr,dc]of dirs){const nr=r+dr,nc=c+dc;if(nr>0&&nr<UG_R-1&&nc>0&&nc<UG_C-1&&!vis[nr][nc]){ugMap[r+dr/2][c+dc/2]=0;carve(nr,nc);}}
    }
    carve(1,1);
    for(let k=0;k<2;k++){
        const cr=Math.floor(Math.random()*(UG_R-6))+3,cc=Math.floor(Math.random()*(UG_C-6))+3;
        for(let r=cr-2;r<=cr+2;r++)for(let c=cc-2;c<=cc+2;c++){if(r>0&&r<UG_R-1&&c>0&&c<UG_C-1)ugMap[r][c]=0;}
    }
    for(let r=0;r<UG_R;r++){ugMap[r][0]=1;ugMap[r][UG_C-1]=1;}
    for(let c=0;c<UG_C;c++){ugMap[0][c]=1;ugMap[UG_R-1][c]=1;}

    ugOX=pitCX; ugOZ=pitCZ;
    function ugW(r,c){return{x:ugOX+(c-UG_C/2)*UG_U+UG_U/2,z:ugOZ+(r-UG_R/2)*UG_U+UG_U/2};}

    let wc=0; for(let r=0;r<UG_R;r++)for(let c=0;c<UG_C;c++)if(ugMap[r][c]===1)wc++;
    const ugWGeo=new THREE.BoxGeometry(UG_U,UG_WH,UG_U);
    const ugWMat=new THREE.MeshStandardMaterial({color:0x100c08,roughness:.98});
    ugWalls=new THREE.InstancedMesh(ugWGeo,ugWMat,wc);
    ugWalls.frustumCulled=false;
    const dum2=new THREE.Object3D(); let ui=0;
    for(let r=0;r<UG_R;r++){
        for(let c=0;c<UG_C;c++){
            if(ugMap[r][c]===1){
                const p=ugW(r,c);
                dum2.position.set(p.x,UG_Y+UG_WH/2,p.z); dum2.updateMatrix();
                ugWalls.setMatrixAt(ui++,dum2.matrix);
            }
        }
    }
    ugWalls.instanceMatrix.needsUpdate=true; ugWalls.count=ui;
    scene.add(ugWalls); ugObjs.push(ugWalls);

    const ugMW=UG_C*UG_U, ugMH=UG_R*UG_U;
    ugFloor=new THREE.Mesh(new THREE.PlaneGeometry(ugMW,ugMH),new THREE.MeshStandardMaterial({color:0x1a1208,roughness:.99}));
    ugFloor.rotation.x=-Math.PI/2; ugFloor.position.set(ugOX,UG_Y,ugOZ);
    scene.add(ugFloor); ugObjs.push(ugFloor);
    ugCeil=new THREE.Mesh(new THREE.PlaneGeometry(ugMW,ugMH),new THREE.MeshStandardMaterial({color:0x0d0a06,roughness:.99}));
    ugCeil.rotation.x=Math.PI/2; ugCeil.position.set(ugOX,UG_Y+UG_WH,ugOZ);
    scene.add(ugCeil); ugObjs.push(ugCeil);

    for(let k=0;k<8;k++){
        const sp=ugSafeSpawn();
        const pl=new THREE.PointLight(0xff3311,.55,12);
        pl.position.set(sp.x,UG_Y+UG_WH-.5,sp.z);
        scene.add(pl); ugObjs.push(pl);
    }

    const lsp=ugSafeSpawn();
    ladderItem=new THREE.Group();
    const lMat=new THREE.MeshStandardMaterial({color:0xcc8833,roughness:.5});
    const lv1=new THREE.Mesh(new THREE.BoxGeometry(.06,.8,.06),lMat); lv1.position.set(-.15,0,0);
    const lv2=new THREE.Mesh(new THREE.BoxGeometry(.06,.8,.06),lMat); lv2.position.set(.15,0,0);
    ladderItem.add(lv1,lv2);
    for(let i=0;i<4;i++){const lh=new THREE.Mesh(new THREE.BoxGeometry(.36,.05,.05),lMat);lh.position.set(0,-.3+i*.2,0);ladderItem.add(lh);}
    const ll=new THREE.PointLight(0xffaa22,2.0,5); ll.position.set(0,.5,0); ladderItem.add(ll);
    ladderItem.position.set(lsp.x,UG_Y+.5,lsp.z);
    scene.add(ladderItem); ugObjs.push(ladderItem);

    // [수정] 탈출구(초록 구멍)가 반드시 지하 평지 맵 중 한 곳의 벽(1)과 완벽히 맞닿아 붙도록 설계
    let holeR=-1,holeC=-1,holeWR=0,holeWC=0;
    let findTries = 0;
    while(findTries < 500) {
        let r = Math.floor(Math.random()*(UG_R-2))+1;
        let c = Math.floor(Math.random()*(UG_C-2))+1;
        if(ugMap[r][c] === 0) {
            let options = [[-1,0],[1,0],[0,-1],[0,1]].sort(()=>Math.random()-.5);
            let foundWall = false;
            for(const [dr, dc] of options) {
                if(ugMap[r+dr][c+dc] === 1) {
                    holeR = r; holeC = c; holeWR = dr; holeWC = dc;
                    foundWall = true; break;
                }
            }
            if(foundWall) break;
        }
        findTries++;
    }
    if(holeR<0){holeR=1;holeC=1;holeWR=-1;holeWC=0;}

    const hp=ugW(holeR,holeC);
    holePosX=hp.x; holePosZ=hp.z;
    holeWallNX=-holeWC; holeWallNZ=-holeWR; 

    // 벽면에 정확하게 달라붙도록 오프셋 가공 조율
    let attachX = holePosX + holeWC * (UG_U / 2 - 0.05);
    let attachZ = holePosZ + holeWR * (UG_U / 2 - 0.05);

    holeGroup=new THREE.Group();
    holeGroup.position.set(attachX,UG_Y+UG_WH*0.5,attachZ);
    holeGroup.rotation.y=Math.atan2(holeWallNX,holeWallNZ);

    const holeMat=new THREE.MeshStandardMaterial({color:0x00ff66,emissive:0x00ff66,emissiveIntensity:.9,roughness:.3});
    const hW=1.2,hH=1.4;
    const hTop=new THREE.Mesh(new THREE.BoxGeometry(hW+.1,.08,.08),holeMat); hTop.position.set(0,hH/2,0);
    const hBot=new THREE.Mesh(new THREE.BoxGeometry(hW+.1,.08,.08),holeMat); hBot.position.set(0,-hH/2,0);
    const hL=new THREE.Mesh(new THREE.BoxGeometry(.08,hH,.08),holeMat); hL.position.set(-hW/2,0,0);
    const hR=new THREE.Mesh(new THREE.BoxGeometry(.08,hH,.08),holeMat); hR.position.set(hW/2,0,0);
    const hIn=new THREE.Mesh(new THREE.BoxGeometry(hW,hH,.05),new THREE.MeshBasicMaterial({color:0x000000}));
    holeGroup.add(hTop,hBot,hL,hR,hIn);
    const hl1=new THREE.PointLight(0x00ff66,4.0,10); hl1.position.set(0,0,.3); holeGroup.add(hl1);
    const hl2=new THREE.PointLight(0x00ff66,2.0,14); hl2.position.set(0,-1.5,.3); holeGroup.add(hl2);
    scene.add(holeGroup); ugObjs.push(holeGroup);
}

function ugSafeSpawn(){
    for(let i=0;i<200;i++){
        const r=Math.floor(Math.random()*UG_R),c=Math.floor(Math.random()*UG_C);
        if(ugMap[r][c]===0) return{x:ugOX+(c-UG_C/2)*UG_U+UG_U/2,z:ugOZ+(r-UG_R/2)*UG_U+UG_U/2};
    }
    return{x:ugOX,z:ugOZ};
}

function ugCollide(oldX,oldZ,newX,newZ,rad){
    if(isNaN(newX)||isNaN(newZ))return{x:oldX,z:oldZ};
    let rx=newX,rz=newZ;
    const pc=Math.floor((oldX-ugOX+(UG_C*UG_U)/2)/UG_U);
    const pr=Math.floor((oldZ-ugOZ+(UG_R*UG_U)/2)/UG_U);
    for(let r=Math.max(0,pr-2);r<=Math.min(UG_R-1,pr+2);r++){
        for(let c=Math.max(0,pc-2);c<=Math.min(UG_C-1,pc+2);c++){
            if(ugMap[r][c]!==1)continue;
            const wx=ugOX+(c-UG_C/2)*UG_U+UG_U/2;
            const wz=ugOZ+(r-UG_R/2)*UG_U+UG_U/2;
            const half=UG_U/2+rad;
            if(rx>wx-half&&rx<wx+half&&rz>wz-half&&rz<wz+half){
                const ox=Math.min(Math.abs(rx-(wx-half)),Math.abs(rx-(wx+half)));
                const oz=Math.min(Math.abs(rz-(wz-half)),Math.abs(rz-(wz+half)));
                if(ox<oz)rx=oldX; else rz=oldZ;
            }
        }
    }
    return{x:rx,z:rz};
}

function gridCollide(ox,oz,nx,nz,rad){
    if(isNaN(nx)||isNaN(nz))return{x:ox,z:oz};
    if(player.position.y<-.05)return{x:nx,z:nz};
    if(doorOpened&&doorGroup){
        const dd=Math.sqrt((ox-doorGroup.position.x)**2+(oz-doorGroup.position.z)**2);
        if(dd<3.2)return{x:nx,z:nz};
    }
    let rx=nx,rz=nz;
    const pc=Math.floor((ox-UNIT/2+(COLS*UNIT)/2)/UNIT);
    const pr=Math.floor((oz-UNIT/2+(ROWS*UNIT)/2)/UNIT);
    for(let r=pr-1;r<=pr+1;r++){
        for(let c=pc-1;c<=pc+1;c++){
            if(r<0||r>=ROWS||c<0||c>=COLS)continue;
            if(mapData[r][c]===1){
                const wx=(c-COLS/2)*UNIT+UNIT/2,wz=(r-ROWS/2)*UNIT+UNIT/2;
                const half=UNIT/2+rad;
                if(rx>wx-half&&rx<wx+half&&rz>wz-half&&rz<wz+half){
                    const ox2=Math.min(Math.abs(rx-(wx-half)),Math.abs(rx-(wx+half)));
                    const oz2=Math.min(Math.abs(rz-(wz-half)),Math.abs(rz-(wz+half)));
                    if(ox2<oz2)rx=ox; else rz=oz;
                }
            }
        }
    }
    return{x:rx,z:rz};
}

function calcJoy(cx,cy){
    let dx=cx-jStart.x,dy=cy-jStart.y;
    const d=Math.sqrt(dx*dx+dy*dy),maxR=40;
    if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR;}
    jStick.style.transform=`translate(${dx}px,${dy}px)`;
    jInput.x=dx/maxR;jInput.y=dy/maxR;jRatio=d/maxR;
}

window.addEventListener('touchstart',e=>{

    for(let i=0;i<e.changedTouches.length;i++){
        const t=e.changedTouches[i];

            jTouchId=t.identifier;
            jZone.style.left=`${t.clientX-55}px`;jZone.style.bottom=`${innerHeight-t.clientY-55}px`;
            jStart={x:t.clientX,y:t.clientY};calcJoy(t.clientX,t.clientY);
        }else if(t.clientX>=innerWidth/2&&rTouchId===null){rTouchId=t.identifier;prevX=t.clientX;prevY=t.clientY;}
    }
},{passive:false});

window.addEventListener('touchmove',e=>{
    if(platform!=='mobile')return;
    for(let i=0;i<e.touches.length;i++){
        const t=e.touches[i];
        if(t.identifier===jTouchId)calcJoy(t.clientX,t.clientY);
        if(t.identifier===rTouchId){
            const m=0.004*sensitivity;
            const lookYDir = invY ? 1 : -1; 
            camX-=(t.clientX-prevX)*m;
            camY+=(t.clientY-prevY)*m*lookYDir; // [수정] 모바일 드래그 시점 표준화
            prevX=t.clientX;prevY=t.clientY;
            camY=Math.max(-Math.PI/2.4,Math.min(Math.PI/2.4,camY));
        }
    }
});

        camY=Math.max(-Math.PI/2.4,Math.min(Math.PI/2.4,camY));

});

function entityAI(e,pp){
    const ep=e.mesh.position;
    const dist=Math.sqrt((ep.x-pp.x)**2+(ep.z-pp.z)**2);
    e.stuckT++;
    if(e.stuckT>50){
        const sd=Math.sqrt((ep.x-e.lastPos.x)**2+(ep.z-e.lastPos.z)**2);
        if(sd<.15)e.patrolTarget=safeSpawn(pp);
        e.lastPos.copy(ep);e.stuckT=0;
    }
    if(dist<14&&!isGameOver&&player.position.y>=-0.2){
        if(!e.scream){e.scream=true;scream(true);}e.state='chase';
    }else if(e.state==='chase'&&(dist>20||player.position.y<-.2)){
        e.state='patrol';e.scream=false;scream(false);e.patrolTarget=safeSpawn(pp);
    }
    const dest=e.state==='chase'?pp:e.patrolTarget;
    if(e.state==='patrol'&&Math.abs(ep.x-dest.x)<1.2&&Math.abs(ep.z-dest.z)<1.2)e.patrolTarget=safeSpawn(pp);
    const dx=dest.x-ep.x,dz=dest.z-ep.z,len=Math.sqrt(dx*dx+dz*dz);
    if(len>.1){
        const sp=e.state==='chase'?e.speed*1.45:e.speed;
        const te={x:ep.x+dx/len*sp,z:ep.z+dz/len*sp};
        const se=gridCollide(ep.x,ep.z,te.x,te.z,.5);
        ep.x=se.x;ep.z=se.z;e.mesh.rotation.y=Math.atan2(dx,dz);
    }
    if(e.state==='chase')screamVol(dist);
}

let actx=null,bgGain=null,sfxGain=null,scGain=null,khGain=null,scOsc1=null,scOsc2=null,ambO1=null,ambO2=null,khOsc=null;
function initAudio(){
    try{
        if(actx)return;
        actx=new(window.AudioContext||window.webkitAudioContext)();
        bgGain=actx.createGain();syncBgm();
        const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(85,actx.currentTime);
        ambO1=actx.createOscillator();ambO1.type='sine';ambO1.frequency.setValueAtTime(55,actx.currentTime);
        ambO2=actx.createOscillator();ambO2.type='triangle';ambO2.frequency.setValueAtTime(57.5,actx.currentTime);
        ambO1.connect(lp);ambO2.connect(lp);lp.connect(bgGain);bgGain.connect(actx.destination);
        ambO1.start();ambO2.start();
        sfxGain=actx.createGain();sfxGain.connect(actx.destination);
        scGain=actx.createGain();scGain.gain.setValueAtTime(.001,actx.currentTime);scGain.connect(sfxGain);
        khGain=actx.createGain();khGain.gain.setValueAtTime(.001,actx.currentTime);
        khOsc=actx.createOscillator();khOsc.type='sine';khOsc.frequency.setValueAtTime(140,actx.currentTime);
        const kf=actx.createBiquadFilter();kf.type='bandpass';kf.frequency.setValueAtTime(250,actx.currentTime);
        khOsc.connect(kf);kf.connect(khGain);khGain.connect(sfxGain);khOsc.start();
    }catch(e){}
}
function syncBgm(){if(bgGain&&actx)bgGain.gain.setValueAtTime(volBgm*.35,actx.currentTime);}
function keyHint(pp){
    if(!khGain||!keyMesh||hasKey||!actx)return;
    const d=Math.sqrt((pp.x-keyMesh.position.x)**2+(pp.z-keyMesh.position.z)**2);
    if(d<16){let tv=Math.max(.001,(16-d)/16)*.45*volSfx;khGain.gain.setTargetAtTime(tv,actx.currentTime,.15);khOsc.frequency.setValueAtTime(140+Math.sin(Date.now()*.004)*25,actx.currentTime);}
    else khGain.gain.setTargetAtTime(.001,actx.currentTime,.2);
}
function scream(on){
    if(!actx||!scGain)return;
    if(on){try{scOsc1=actx.createOscillator();scOsc1.type='sawtooth';scOsc2=actx.createOscillator();scOsc2.type='square';scOsc1.frequency.setValueAtTime(280,actx.currentTime);scOsc2.frequency.setValueAtTime(450,actx.currentTime);const n=actx.currentTime;scOsc1.frequency.linearRampToValueAtTime(700,n+.3);scOsc1.frequency.linearRampToValueAtTime(150,n+.7);scOsc2.frequency.linearRampToValueAtTime(900,n+.4);scOsc1.connect(scGain);scOsc2.connect(scGain);scOsc1.start();scOsc2.start();}catch(e){}}
    else{try{if(scOsc1){scOsc1.stop();scOsc1=null;}if(scOsc2){scOsc2.stop();scOsc2=null;}}catch(e){}}
}
function screamVol(d){if(!scGain||!actx)return;scGain.gain.setTargetAtTime(Math.max(.001,(18-d)/18)*.65*volSfx,actx.currentTime,.1);}
function footstep(v){
    if(!actx||isPaused||isGameOver||!sfxGain)return;
    try{const o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.setValueAtTime(65,actx.currentTime);g.gain.setValueAtTime(v*.12*volSfx,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.1);o.connect(g);g.connect(sfxGain);o.start();o.stop(actx.currentTime+.11);}catch(e){}
}
function heartbeat(v){
    if(!actx||isPaused||isGameOver||!sfxGain)return;
    try{const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.setValueAtTime(48,actx.currentTime);g.gain.setValueAtTime(v*.65*volSfx,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.12);o.connect(g);g.connect(sfxGain);o.start();o.stop(actx.currentTime+.13);}catch(e){}
}

    document.getElementById('start-screen').style.display='flex';
    document.getElementById('glitch-overlay').style.cssText='background:rgba(0,0,0,0);opacity:0;';
    scene.background.setHex(BG_COL);scene.fog.color.setHex(BG_COL);scene.fog.density=.05;ambient.intensity=.85;
    flash.intensity=isFlashOn?1.8:0;
    
    ugObjs.forEach(o=>scene.remove(o));ugObjs=[];
    if(ugWalls){scene.remove(ugWalls);ugWalls=null;}if(ugFloor){scene.remove(ugFloor);ugFloor=null;}if(ugCeil){scene.remove(ugCeil);ugCeil=null;}
    if(ladderMesh){scene.remove(ladderMesh);ladderMesh=null;}if(holeGroup){scene.remove(holeGroup);holeGroup=null;}
    pitMeshes.forEach(m=>{if(m&&m.parent)scene.remove(m);});pitMeshes=[];
    if(pitVoid){scene.remove(pitVoid);pitVoid=null;}pitBounds.active=false;
    
    if(floorGroup){scene.remove(floorGroup); floorGroup=null;}
    if(floorM)floorM.visible=true;
    if(iWalls)iWalls.visible=true;lamps.forEach(l=>{if(l.visible!==undefined)l.visible=true;});
    if(ceilM)ceilM.visible=true;
    
    try{if(ambO1){ambO1.stop();ambO1=null;}if(ambO2){ambO2.stop();ambO2=null;}if(khOsc){khOsc.stop();khOsc=null;}actx=null;}catch(e){}
    if(document.pointerLockElement===document.body)document.exitPointerLock();
}
function triggerBlackout(){
    document.getElementById('glitch-overlay').style.cssText='background:rgba(10,9,7,.65);opacity:1;';
    scene.background.setHex(0x1a1914);scene.fog.color.setHex(0x1a1914);scene.fog.density=.12;ambient.intensity=.15;
    entities.forEach(e=>e.speed=e.baseSpeed*1.45);
}

// ════════════════════════════════════════════
//  LAUNCH
// ════════════════════════════════════════════
let player=new THREE.Group(); scene.add(player);
genMaze(); buildGraphics();
document.addEventListener('click',function _fsOnce(){try{(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen||document.documentElement.mozRequestFullScreen).call(document.documentElement);}catch(e){}document.removeEventListener('click',_fsOnce);},{once:true});

function launchGame(){
    if(!platform)return;
    document.getElementById('start-screen').style.display='none';
    try{const el=document.documentElement;(el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen).call(el);}catch(e){}
    document.getElementById('top-controls').style.display='flex';
    document.getElementById('cctv-ui').style.display='block';
    document.getElementById('quest-ui').style.display='block';
    hasKey=false;doorOpened=false;underground=false;hasLadder=false;ladderPlaced=false;climbing=false;climbT=0;
    stamina=100;exhausted=false;velY=0;grounded=true;
    if(platform==='mobile'){
        document.getElementById('joystick-zone').style.display='block';
        document.getElementById('mobile-controls-right').style.display='flex';
        document.getElementById('stamina-container').style.display='block';
    }else{
        document.body.requestPointerLock();
        document.getElementById('crosshair').style.display='block';
    }
    camX=0;camY=0;sCamX=0;sCamY=0;
    genMaze();buildGraphics();
    const pSp=safeSpawn();player.position.set(pSp.x,0,pSp.z);
    buildBingoPit();
    spawnDoor(player.position);
    spawnKey(player.position);
    entities.forEach(e=>{
        const ep=safeSpawn(player.position,12);
        e.mesh.position.set(ep.x,0,ep.z);e.lastPos.copy(e.mesh.position);
        e.patrolTarget=ep;e.state='patrol';e.scream=false;
    });
    gameActive=true;recTime=0;speedBoosted=false;
    initAudio();
}

// ════════════════════════════════════════════
//  CCTV START SCREEN
// ════════════════════════════════════════════
(function initPreview(){
    const pvs=document.getElementById('preview-canvas');
    pvs.width=innerWidth;pvs.height=innerHeight;
    const pvScene=new THREE.Scene();
    pvScene.background=new THREE.Color(0xbaa761);
    pvScene.fog=new THREE.FogExp2(0xbaa761,.06);
    const pvCam=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,200);
    pvCam.position.set(0,1.5,0);
    const pvRen=new THREE.WebGLRenderer({canvas:pvs,antialias:false});
    pvRen.setSize(innerWidth,innerHeight);
    pvRen.setPixelRatio(1);

    const pvWMat=new THREE.MeshStandardMaterial({color:0xdfd5a0,roughness:.85});
    const pvFMat=new THREE.MeshStandardMaterial({color:0x837543,roughness:.95});
    const pvCMat=new THREE.MeshStandardMaterial({color:0xd3c79b,roughness:.88});
    const pvAmb=new THREE.AmbientLight(0xfffdb8,.7);pvScene.add(pvAmb);
    
    const cW=5,cH=5.5,cL=80;
    const fl=new THREE.Mesh(new THREE.PlaneGeometry(cW,cL),pvFMat);fl.rotation.x=-Math.PI/2;fl.position.set(0,0,-cL/2);pvScene.add(fl);
    const cl=new THREE.Mesh(new THREE.PlaneGeometry(cW,cL),pvCMat);cl.rotation.x=Math.PI/2;cl.position.set(0,cH,-cL/2);pvScene.add(cl);
    const wl=new THREE.Mesh(new THREE.PlaneGeometry(cL,cH),pvWMat);wl.rotation.y=Math.PI/2;wl.position.set(-cW/2,cH/2,-cL/2);pvScene.add(wl);
    const wr=new THREE.Mesh(new THREE.PlaneGeometry(cL,cH),pvWMat);wr.rotation.y=-Math.PI/2;wr.position.set(cW/2,cH/2,-cL/2);pvScene.add(wr);
    
    for(let i=0;i<8;i++){
        const lp2=new THREE.Mesh(new THREE.BoxGeometry(2.4,.05,1.2),new THREE.MeshStandardMaterial({color:0x333333}));
        const lp3=new THREE.Mesh(new THREE.BoxGeometry(2.2,.06,1.0),new THREE.MeshBasicMaterial({color:0xffffe0}));
        lp3.position.y=-.01;
        const lg=new THREE.Group();lg.add(lp2,lp3);lg.position.set(0,cH-.02,-i*9-4);pvScene.add(lg);
        const pl=new THREE.PointLight(0xfff5cc,.8,12);pl.position.set(0,cH-.3,-i*9-4);pvScene.add(pl);
    }
    let t=0;
    const pvCanvas2=document.createElement('canvas');pvCanvas2.width=innerWidth;pvCanvas2.height=innerHeight;
    const pvCtx=pvCanvas2.getContext('2d');

    function drawPreview(){
        if(document.getElementById('start-screen').style.display==='none')return;
        requestAnimationFrame(drawPreview);
        pvs.width=innerWidth;pvs.height=innerHeight;
        pvRen.setSize(innerWidth,innerHeight);
        pvCam.aspect=innerWidth/innerHeight;pvCam.updateProjectionMatrix();

        t+=0.004;
        pvCam.position.set(Math.sin(t*.7)*.4,1.5+Math.sin(t*.5)*.05,-(t*4)%cL);
        pvCam.rotation.set(Math.sin(t*.3)*.02,Math.sin(t*.5)*.08,0,'YXZ');
        pvRen.render(pvScene,pvCam);

        pvCanvas2.width=innerWidth;pvCanvas2.height=innerHeight;
        const w=innerWidth,h=innerHeight;
        pvCtx.clearRect(0,0,w,h);
        for(let y=0;y<h;y+=4){pvCtx.fillStyle='rgba(0,0,0,.08)';pvCtx.fillRect(0,y,w,2);}
        for(let i=0;i<80;i++){pvCtx.fillStyle=`rgba(255,255,255,${Math.random()*.02})`;pvCtx.fillRect(Math.random()*w,Math.random()*h,1,1);}
        if(Math.random()<.05){const gy=Math.random()*h;pvCtx.fillStyle=`rgba(200,180,100,${Math.random()*.3})`;pvCtx.fillRect(0,gy,w,1+Math.random()*3);}
        const vg=pvCtx.createRadialGradient(w/2,h/2,h*.2,w/2,h/2,h*.8);
        vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.65)');
        pvCtx.fillStyle=vg;pvCtx.fillRect(0,0,w,h);
    }
    drawPreview();
})();

// ════════════════════════════════════════════
//  MAIN ANIMATE LOOP
// ════════════════════════════════════════════
function animate(){
    requestAnimationFrame(animate);
    if(!gameActive){camera.position.set(0,15,20);camera.lookAt(0,0,0);renderer.render(scene,camera);return;}
    if(isGameOver||isPaused)return;

    recTime+=1/60;
    const m=Math.floor(recTime/60),s=Math.floor(recTime%60);
    document.getElementById('cctv-time').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(recTime>=90&&!speedBoosted){speedBoosted=true;triggerBlackout();}
    if(keyMesh&&!hasKey)keyMesh.rotation.y+=.025;
    if(!underground)keyHint(player.position);

    // ─── [수정] 빙고판 디딤돌 브릿지 및 테두리 완벽 안전 낙사 판정 계산식 ───
    if(!underground&&pitBounds.active&&player.position.y>=-0.05){
        const inPit=player.position.x>pitBounds.minX&&player.position.x<pitBounds.maxX&&
                    player.position.z>pitBounds.minZ&&player.position.z<pitBounds.maxZ;
        if(inPit){
            const lx = player.position.x - pitBounds.minX;
            const lz = player.position.z - pitBounds.minZ;
            const CELL = B_HOLE_W + B_PATH_W;
            const mx = lx % CELL;
            const mz = lz % CELL;
            
            const pRad = 0.42; // 낙사 관용 허용 마진 조율 수치
            let safe = false;

            // 디딤돌 브릿지 격자 라인 위 조준 확인
            if(mx <= B_PATH_W + pRad || mx >= CELL - pRad) safe = true;
            if(mz <= B_PATH_W + pRad || mz >= CELL - pRad) safe = true;
            
            // 빙고판의 완전한 외곽 테두리 4면 영역을 디디고 있을 경우 안전 처리 보장
            if(lx <= B_PATH_W + pRad || lx >= PIT_TOTAL - B_PATH_W - pRad) safe = true;
            if(lz <= B_PATH_W + pRad || lz >= PIT_TOTAL - B_PATH_W - pRad) safe = true;

            if(!safe&&grounded){grounded=false;velY=-.02;}
        }
    }

    if(!underground&&player.position.y<-4.5&&!isGameOver){enterUnderground();return;}

    if(underground&&climbing){
        climbT++;
        player.position.y+=.07;
        velY=0;
        if(player.position.y>=UG_Y+UG_WH*.82||climbT>130){exitUnderground();return;}
    }

    if(!hasKey&&keyMesh&&!underground){
        const d=Math.sqrt((player.position.x-keyMesh.position.x)**2+(player.position.z-keyMesh.position.z)**2);
        if(d<1.3){
            hasKey=true;scene.remove(keyMesh);
            if(khGain&&actx)khGain.gain.setValueAtTime(.001,actx.currentTime);
            if(doorGroup?.greenLight)doorGroup.greenLight.intensity=3.5;
            showToast("🔑 황금 열쇠 획득!<br>빙고판을 건너 탈출 문으로 가세요!");
        }
    }

    if(underground&&!hasLadder&&ladderItem){
        const d=Math.sqrt((player.position.x-ladderItem.position.x)**2+(player.position.z-ladderItem.position.z)**2);
        if(d<1.5){
            hasLadder=true;scene.remove(ladderItem);ladderItem=null;
            document.getElementById('ladder-hud').style.display='block';
            showToast("🪜 사다리 획득!<br>초록 구멍 앞에서 설치!");
        }
    }

    const qu=document.getElementById('quest-ui');
    if(!underground){
        if(!hasKey)qu.innerHTML="🔑 QUEST:<br>Find the hidden key.";
        else if(doorGroup){
            const dd=Math.floor(player.position.distanceTo(doorGroup.position)*1.5);
            if(!doorOpened)qu.innerHTML=`🚪 QUEST:<br>Cross the pit & open the door.<br><span style='color:#00ff66;font-size:15px;'>📍 ${dd}m</span>`;
            else qu.innerHTML="🏃 QUEST:<br><span style='color:#11ff77;font-weight:900;'>Step into the escape portal!</span>";
        }
    }else{
        if(!hasLadder&&!ladderPlaced)qu.innerHTML="🪜 UNDERGROUND:<br>Find the ladder item!";
        else if(hasLadder&&!ladderPlaced)qu.innerHTML="🟢 UNDERGROUND:<br>초록 구멍 앞에서 설치!";
        else qu.innerHTML="⬆ UNDERGROUND:<br>사다리 타고 탈출!<br>[▲]";
    }

    if(!underground&&doorGroup){
        const dd=player.position.distanceTo(doorGroup.position);
        if(hasKey&&dd<2.5&&!doorOpened){
            if(platform==='pc'){document.getElementById('interact-prompt').innerHTML='🚪 [E] Open Door';document.getElementById('interact-prompt').style.display='block';}
            else{document.getElementById('btn-mobile-interact').innerHTML='🚪';document.getElementById('btn-mobile-interact').style.display='flex';}
        }else if(!underground){
            document.getElementById('interact-prompt').style.display='none';
            document.getElementById('btn-mobile-interact').style.display='none';
        }
        if(doorOpened&&doorPivot){
            if(doorPivot.rotation.y>-Math.PI/2){doorPivot.rotation.y-=.06;doorGroup.updateMatrixWorld(true);}
            else{
                const de=player.position.distanceTo(escapeSensor);
                if(de<1.5){gameActive=false;scream(false);document.getElementById('clear-time').textContent=`⏱ ${m}m ${s}s`;document.getElementById('clear-screen').style.display='flex';if(platform==='pc')document.exitPointerLock();return;}
            }
        }else if(!hasKey&&dd<1.4)showToast("🔒 문이 잠겨있습니다.<br>황금 열쇠를 찾으세요.");
    }

    if(underground&&hasLadder&&!ladderPlaced&&holeGroup){
        const d=Math.sqrt((player.position.x-holePosX)**2+(player.position.z-holePosZ)**2);
        if(d<6.0){
            if(platform==='pc'){document.getElementById('interact-prompt').innerHTML='🪜 [E] Place Ladder';document.getElementById('interact-prompt').style.display='block';}
            else{document.getElementById('btn-mobile-interact').innerHTML='🪜';document.getElementById('btn-mobile-interact').style.display='flex';}
        }else{
            document.getElementById('interact-prompt').style.display='none';
            document.getElementById('btn-mobile-interact').style.display='none';
        }
    }

    sCamX+=(camX-sCamX)*.18; sCamY+=(camY-sCamY)*.18;
    const fX=Math.sin(sCamX),fZ=-Math.cos(sCamX);
    const rX=Math.cos(sCamX),rZ=Math.sin(sCamX);

    let mX=0,mZ=0;
    if(platform==='pc'){
        // [수정] 조작키 벡터 방향 직관성 매칭 정상화
        if(keys.w){mX+=fX;mZ+=fZ;}if(keys.s){mX-=fX;mZ-=fZ;}
        if(keys.a){mX-=rX;mZ-=rZ;}if(keys.d){mX+=rX;mZ+=rZ;}
        moving=mX!==0||mZ!==0;sprinting=moving&&keys.shift&&!exhausted;
    }else{
        if(Math.abs(jInput.x)>.05||Math.abs(jInput.y)>.05){
            const mvDir = invMove ? -1 : 1; 
            mX=(fX*(-jInput.y)+rX*jInput.x)*mvDir;
            mZ=(fZ*(-jInput.y)+rZ*jInput.x)*mvDir;
        }
        moving=mX!==0||mZ!==0;sprinting=moving&&jRatio>.75&&!exhausted;
    }

    if(sprinting){stamina-=.18;if(stamina<=0){stamina=0;exhausted=true;}}
    else{stamina+=moving?.6:2.5;if(stamina>=100){stamina=100;exhausted=false;}}
    const sb=document.getElementById('stamina-bar');
    if(sb){sb.style.width=stamina+'%';sb.style.background=exhausted?'#d62828':'#bfae6f';}

    const spd=exhausted?SPD_TIRED:(sprinting?SPD_SPRINT:SPD_BASE);
    const nx=player.position.x+mX*spd,nz=player.position.z+mZ*spd;

    const rt=Date.now()*.005;
    let bobX=0,bobY=0;

    if(moving&&!climbing){
        let safe;
        if(underground)safe=ugCollide(player.position.x,player.position.z,nx,nz,.45);
        else safe=gridCollide(player.position.x,player.position.z,nx,nz,.55);
        player.position.x=safe.x;player.position.z=safe.z;
        if(grounded){
            const wf=sprinting?2.5:1.5;
            bobX=Math.sin(rt*wf)*.035;bobY=Math.cos(rt*wf*2)*.025;
            const now=Date.now();
            if(now-lastFoot>(sprinting?230:380)){footstep(sprinting?.8:.4);lastFoot=now;}
        }
    }

    if(!climbing){
        velY+=GRAVITY;player.position.y+=velY;
        if(underground){
            if(player.position.y<=UG_Y){player.position.y=UG_Y;velY=0;grounded=true;}else grounded=false;
        }else{
            if(pitBounds.active){
                const inPit2=player.position.x>pitBounds.minX&&player.position.x<pitBounds.maxX&&
                             player.position.z>pitBounds.minZ&&player.position.z<pitBounds.maxZ;
                if(!inPit2&&player.position.y<=0){player.position.y=0;velY=0;grounded=true;}
                else if(!inPit2)grounded=false;
            }else{
                if(player.position.y<=0){player.position.y=0;velY=0;grounded=true;}else grounded=false;
            }
        }
    }

    let tiltX=0,tiltZ=0;
    if(!underground&&pitBounds.active){
        const inP=player.position.x>pitBounds.minX&&player.position.x<pitBounds.maxX&&
                  player.position.z>pitBounds.minZ&&player.position.z<pitBounds.maxZ;
        if(inP&&grounded){tiltX=Math.sin(Date.now()*.003)*.045;tiltZ=Math.cos(Date.now()*.0025)*.03;}
    }

    player.rotation.y=sCamX;
    fpsRig.position.set(player.position.x,player.position.y+1.5,player.position.z);
    fpsRig.rotation.set(sCamY+tiltX,sCamX,tiltZ,'YXZ');

    const aw=moving?Math.sin(rt*(sprinting?2.5:1.5))*.08:0;
    const ai=Math.sin(Date.now()*.001)*.01;
    lArm.position.z=-.3+aw+ai;lArm.position.y=-.25+Math.abs(aw)*.3;
    rArm.position.z=-.3-aw+ai;rArm.position.y=-.25+Math.abs(aw)*.3;
    flashMesh.position.z=-.4-aw+ai;flashMesh.position.y=-.22+Math.abs(aw)*.3;
    flash.position.set(.28,-.22,-.4);flashTgt.position.set(.28,-.22,-15);

    let closestD=999;
    if(!underground){
        entities.forEach(e=>{
            entityAI(e,player.position);
            const d=Math.sqrt((player.position.x-e.mesh.position.x)**2+(player.position.z-e.mesh.position.z)**2);
            if(d<closestD)closestD=d;
            const ws=e.state==='chase'?.045:.015;
            e.core.position.y=1.3+Math.sin(Date.now()*ws)*.12;
            e.legs.forEach((leg,i)=>{const off=i*(Math.PI/3);leg.rotation.x=Math.sin(Date.now()*ws*2+off)*.55;leg.rotation.z=.3+Math.cos(Date.now()*ws+off)*.2;});
        });
        const hu=document.getElementById('heartbeat-ui');
        if(closestD<12){
            const pf=(12-closestD)/12,hbi=800-pf*550,now=Date.now();
            if(now-lastHB>hbi){heartbeat(.4+pf*.5);lastHB=now;hu.style.transform=`translateX(-50%) scale(${1.2+pf*.5})`;setTimeout(()=>hu.style.transform=`translateX(-50%) scale(${.9+pf*.2})`,120);}
        }else hu.style.transform='translateX(-50%) scale(0)';
        if(closestD<1.2){triggerGameOver("The entity has completely severed your life signal.");return;}
    }

    camera.position.set(player.position.x+bobX,player.position.y+1.5+bobY,player.position.z);
    camera.rotation.set(sCamY+tiltX,sCamX,tiltZ,'YXZ');
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>
