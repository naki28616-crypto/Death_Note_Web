<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,minimal-ui">
<title>The Backrooms - True Escape</title>
<style>
html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:#0d0d0b;touch-action:none;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI',sans-serif}
canvas{display:block;width:100%!important;height:100%!important;position:absolute;top:0;left:0;z-index:1}
#vhs{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle,rgba(0,0,0,0) 35%,rgba(0,0,0,0.82) 100%);pointer-events:none;z-index:2}
#glitch{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;pointer-events:none;z-index:3;transition:opacity .6s}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:rgba(255,255,255,.3);border-radius:50%;pointer-events:none;z-index:5;display:none}
#cctv{position:absolute;top:22px;left:22px;color:rgba(220,40,40,.9);font-weight:bold;font-size:15px;z-index:210;letter-spacing:1.5px;pointer-events:none;font-family:monospace;display:none;text-shadow:0 0 6px rgba(220,40,40,.6)}
#quest{position:absolute;top:58px;left:22px;color:#dfd29e;font-weight:bold;font-size:14px;z-index:210;letter-spacing:1px;pointer-events:none;background:rgba(15,14,11,.88);padding:10px 16px;border-left:3px solid #bfae6f;border-radius:0 4px 4px 0;display:none;text-shadow:0 1px 3px rgba(0,0,0,.8);box-shadow:0 4px 10px rgba(0,0,0,.5)}
#prompt{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);color:#fff;background:rgba(0,0,0,.85);border:1px solid #bfae6f;padding:8px 18px;border-radius:4px;font-weight:bold;font-size:14px;z-index:100;display:none;pointer-events:none;text-align:center}
#toast{position:absolute;top:20%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.92);color:#ffdd66;padding:12px 24px;border:1px solid #bfae6f;border-radius:4px;font-weight:bold;font-size:15px;z-index:300;display:none;pointer-events:none;text-align:center}
#hud-ladder{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#88ff88;padding:6px 18px;border:1px solid #44aa44;border-radius:4px;font-weight:bold;font-size:13px;z-index:210;display:none;pointer-events:none}
#topctrl{position:absolute;top:16px;right:16px;z-index:220;display:none;flex-direction:column;align-items:flex-end;gap:6px}
#panel{color:#d4cfb4;background:rgba(10,10,8,.96);padding:14px;border-radius:6px;border:1px solid #3a382e;width:220px;transition:all .3s;max-height:450px;opacity:1;overflow:hidden;transform-origin:top right;box-shadow:0 10px 25px rgba(0,0,0,.7);display:flex;flex-direction:column;gap:12px}
#panel.collapsed{max-height:0;padding:0 14px;opacity:0;border:0;pointer-events:none}
.btn{background:#1c1b17;color:#bfae6f;border:1px solid #3a382e;padding:8px 14px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;white-space:nowrap;transition:all .2s;width:100%;text-align:center;box-sizing:border-box}
.btn:hover{background:#2b2922;color:#dfd29e}
.srow{display:flex;flex-direction:column;gap:4px;font-size:12px;color:#bfae6f;font-weight:bold}
.srow div{display:flex;justify-content:space-between;color:#d4cfb4;font-weight:normal}
.srow input{width:100%;accent-color:#bfae6f;margin-top:2px}
#mright{position:absolute;bottom:30px;right:30px;display:none;flex-direction:column;gap:15px;z-index:220}
.cbtn{width:64px;height:64px;background:rgba(22,21,18,.92);border:2px solid #4a4537;border-radius:50%;color:#d4cfb4;font-size:24px;display:flex;justify-content:center;align-items:center;cursor:pointer;touch-action:none;box-shadow:0 6px 14px rgba(0,0,0,.7)}
.cbtn.active{background:#bfae6f;color:#111;border-color:#fff}
#btn-interact{background:#e2cc76!important;color:#111!important;border-color:#fff!important;display:none;font-size:28px;animation:pulse 1.2s infinite;z-index:230}
@keyframes pulse{0%{transform:scale(1);box-shadow:0 0 0 rgba(226,204,118,.6)}50%{transform:scale(1.15);box-shadow:0 0 20px rgba(226,204,118,.9)}100%{transform:scale(1);box-shadow:0 0 0 rgba(226,204,118,.6)}}
#stamina-wrap{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);width:160px;background:rgba(10,10,8,.9);border:1px solid #3a382e;padding:5px;border-radius:4px;z-index:10;display:none}
.sbg{background:rgba(0,0,0,.7);height:5px;overflow:hidden;border-radius:2px}
#sbar{width:100%;height:100%;background:#bfae6f}
#hb{position:absolute;bottom:45px;left:50%;transform:translateX(-50%) scale(0);font-size:46px;color:#b81414;text-shadow:0 0 20px rgba(184,20,20,.9);pointer-events:none;z-index:15;transition:transform .1s cubic-bezier(.175,.885,.32,1.275)}
#start{position:absolute;top:0;left:0;width:100%;height:100%;background:#c5ba85;z-index:200;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#161511;text-align:center}
.tmain{font-size:26px;font-weight:600;letter-spacing:6px;margin:0;opacity:.8}
.tsub{font-size:48px;font-weight:900;letter-spacing:7px;margin:5px 0 0}
.tlvl{font-size:16px;font-weight:500;letter-spacing:3px;margin:8px 0 35px;color:#3a382e}
.pbox{display:flex;gap:15px;margin-bottom:35px}
.pbtn{background:#1c1b17;color:#dfd59e;border:1px solid #4a4537;padding:12px 24px;font-size:13px;font-weight:bold;border-radius:4px;cursor:pointer;letter-spacing:1.5px}
.pbtn.sel{background:#dfd59e;color:#1c1b17;border-color:#fff;box-shadow:0 6px 20px rgba(223,213,158,.4)}
.sbx{position:relative;width:120px;height:120px;display:flex;justify-content:center;align-items:center;cursor:pointer;opacity:.3;pointer-events:none}
.sbx.ready{opacity:1;pointer-events:auto}
.ring{position:absolute;border:2px solid rgba(22,21,17,.5);border-radius:50%}
.r1{width:110px;height:110px}.r2{width:96px;height:96px}.r3{width:82px;height:82px;border-style:dashed}
.slbl{font-size:19px;font-weight:900;letter-spacing:2px;color:#161511;z-index:5}
#go,#pause,#clear{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(4,4,3,.97);z-index:150;display:none;flex-direction:column;justify-content:center;align-items:center}
#go{color:#b82323}#clear{color:#dfd29e;background:rgba(16,15,11,.98)}
.gbx{display:flex;gap:15px;margin-top:30px}
.gbtn{background:#240e0e;color:#ff7777;border:1px solid #5c1d1d;padding:14px 28px;font-size:13px;font-weight:bold;border-radius:4px;cursor:pointer;letter-spacing:1px}
.gbtn:hover{background:#421616;color:#fff}
#jzone{position:absolute;bottom:35px;left:35px;width:120px;height:120px;background:rgba(255,255,255,.02);border:2px solid rgba(255,255,255,.1);border-radius:50%;z-index:10;touch-action:none;display:none}
#jstick{position:absolute;top:37px;left:37px;width:46px;height:46px;background:rgba(255,255,255,.25);border-radius:50%}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="vhs"></div>
<div id="glitch"></div>
<div id="crosshair"></div>
<div id="cctv">🔴 REC <span id="rectime">00:00</span></div>
<div id="quest"></div>
<div id="prompt"></div>
<div id="toast"></div>
<div id="hb">❤️</div>
<div id="hud-ladder">🪜 Ladder ×1</div>
<div id="topctrl">
  <button id="btntoggle" class="btn" style="background:#222;color:#bfae6f;width:44px;height:38px;font-size:16px;padding:0" onclick="togglePanel()">◢</button>
  <div id="panel" class="collapsed">
    <button class="btn" style="background:#661e1e;color:#fff;border-color:#8c2b2b" onclick="doPause(true)">⏸ PAUSE</button>
    <button class="btn" style="background:#1e4666;color:#fff;border-color:#2b6f8c" onclick="toggleFS()">📺 FULLSCREEN</button>
    <div class="srow"><div><span>Sensitivity</span><span id="tsens">1.0</span></div><input type="range" id="cfg-sens" min="0.1" max="2.5" step="0.1" value="1.0" oninput="setSens(this.value)"></div>
    <div class="srow"><div><span>BGM Vol</span><span id="tvbgm">50%</span></div><input type="range" id="cfg-bgm" min="0" max="100" step="5" value="50" oninput="setBgm(this.value)"></div>
    <div class="srow"><div><span>SFX Vol</span><span id="tvsfx">70%</span></div><input type="range" id="cfg-sfx" min="0" max="100" step="5" value="70" oninput="setSfx(this.value)"></div>
  </div>
</div>
<div id="mright">
  <div id="btn-interact" class="cbtn">🚪</div>
  <div id="btn-flash" class="cbtn active" ontouchstart="mFlash(event)">🔦</div>
  <div id="btn-jump" class="cbtn" style="font-size:20px;font-weight:bold" ontouchstart="mJump(event)">▲</div>
</div>
<div id="stamina-wrap"><div class="sbg"><div id="sbar"></div></div></div>
<div id="jzone"><div id="jstick"></div></div>
<div id="start">
  <h2 class="tmain">THE BACKROOMS</h2>
  <h1 class="tsub">EXPLORATION</h1>
  <div class="tlvl">LEVEL 0 — HORROR ESCAPE</div>
  <div class="pbox">
    <button id="pc-btn" class="pbtn" onclick="setPlatform('pc')">💻 PC</button>
    <button id="mb-btn" class="pbtn" onclick="setPlatform('mobile')">📱 MOBILE</button>
  </div>
  <div id="startbx" class="sbx" onclick="startGame()">
    <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
    <span class="slbl">ENTER</span>
  </div>
</div>
<div id="pause">
  <h1 style="font-size:26px;color:#bfae6f;margin-bottom:20px;letter-spacing:2px">PAUSED</h1>
  <div style="display:flex;gap:12px">
    <button class="btn" style="color:#fff;border-color:#bfae6f;padding:10px 24px;font-size:14px;width:auto" onclick="doPause(false)">RESUME</button>
    <button class="btn" style="background:#222;color:#ff7777;border-color:#555;padding:10px 24px;font-size:14px;width:auto" onclick="toMenu()">↩ MENU</button>
  </div>
</div>
<div id="go">
  <h1 style="font-size:32px;margin-bottom:5px;letter-spacing:3px">CONNECTION LOST</h1>
  <p id="go-msg" style="color:#555;font-size:13px;margin-bottom:25px"></p>
  <div class="gbx">
    <button class="gbtn" onclick="toMenu()">↩ MENU</button>
    <button class="gbtn" style="background:#0e2411;color:#77ff77;border-color:#1d5c28" onclick="respawn()">🛡 RESPAWN</button>
  </div>
</div>
<div id="clear">
  <h1 style="font-size:36px;margin-bottom:5px;letter-spacing:5px;color:#ffdd66;text-shadow:0 0 15px rgba(255,221,102,.4)">NOCLIP SUCCESS</h1>
  <p id="clear-rec" style="color:#ffdd66;font-size:18px;font-weight:bold;margin:0 0 15px;letter-spacing:1px"></p>
  <p style="color:#aaa;font-size:14px;margin-bottom:30px">You escaped Backrooms Level 0.</p>
  <button class="gbtn" style="background:#bfae6f;color:#111;border-color:#fff" onclick="toMenu()">↩ MENU</button>
</div>
<script>
'use strict';
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const ROWS=22,COLS=22,UNIT=5,WALL_H=5.5;
const PLAYER_H=1.55,PLAYER_R=0.52;
const GRAVITY=-0.013,JUMP_V=0.16;
const SPD_BASE=0.11,SPD_SPRINT=0.17,SPD_TIRED=0.065;
const UG_ROWS=12,UG_COLS=12,UG_UNIT=4,UG_WALL_H=4.5;
const UG_FLOOR_Y=-30;
const BK_YELLOW=0xbaa761;
const PIT_CLEAR=4; // 빙고판 주변 벽 제거 반경(타일)
const PIT_GRID=4;  // 빙고판 격자 수 (4×4)

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let platform=null,gameActive=false,isPaused=false,isGameOver=false;
let recTime=0,isBlackout=false,panelOpen=false;
let sens=1.0,volBgm=0.5,volSfx=0.7;
let camYaw=0,camPitch=0,smoothYaw=0,smoothPitch=0;
let velY=0,grounded=true,stamina=100,tired=false,moving=false,sprinting=false;
let lastStep=0,lastHB=0;
let flashOn=true;
// surface items
let hasKey=false,doorOpened=false;
let keyMesh=null,doorGroup=null,doorPivot=null;
let escapeSensor=new THREE.Vector3();
// bingo pit
let pitActive=false;
let pitMinX=0,pitMaxX=0,pitMinZ=0,pitMaxZ=0;
let pitCX=0,pitCZ=0;
let pitMeshes=[];
// underground
let underground=false;
let hasLadder=false,ladderPlaced=false,climbActive=false,climbTimer=0;
let ladderItem=null,ladderMesh=null;
let ugObjects=[];
let holePos=new THREE.Vector3();
let ugSpawn=new THREE.Vector3();
let ugMapData=null;
let safeSpawn=new THREE.Vector3();

// joystick
let jInput={x:0,y:0},jRatio=0,jTouchId=null,rTouchId=null,jStart={x:0,y:0},rPrev={x:0,y:0};

// ═══════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════
const scene=new THREE.Scene();
scene.background=new THREE.Color(BK_YELLOW);
scene.fog=new THREE.FogExp2(BK_YELLOW,0.048);

const camera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,0.08,400);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=false; // 렉 방지: 그림자 비활성
document.body.appendChild(renderer.domElement);

const ambient=new THREE.AmbientLight(0xfffdb8,0.88);
scene.add(ambient);

// FPS rig
const rig=new THREE.Group();
scene.add(rig);

const flash=new THREE.SpotLight(0xfffbf0,2.0,38,Math.PI/4.2,0.55,0.55);
const flashTgt=new THREE.Object3D();
flashTgt.position.set(0,0,-10);
rig.add(flash,flashTgt);
flash.target=flashTgt;

// 손/손전등 메시
const armMat=new THREE.MeshStandardMaterial({color:0x151515,roughness:0.6});
const armGeo=new THREE.CylinderGeometry(0.035,0.025,0.5,6);
const lArm=new THREE.Mesh(armGeo,armMat); lArm.rotateX(Math.PI/2.3); lArm.position.set(-0.25,-0.25,-0.3); rig.add(lArm);
const rArm=new THREE.Mesh(armGeo,armMat); rArm.rotateX(Math.PI/2.3); rArm.position.set(0.25,-0.25,-0.3); rig.add(rArm);
const fbGeo=new THREE.CylinderGeometry(0.04,0.03,0.25,6); fbGeo.rotateX(Math.PI/2);
const fhGeo=new THREE.CylinderGeometry(0.06,0.04,0.08,6); fhGeo.rotateX(Math.PI/2); fhGeo.translate(0,0,-0.13);
const fMat=new THREE.MeshStandardMaterial({color:0x222222,metalness:0.8});
const fGrp=new THREE.Group();
fGrp.add(new THREE.Mesh(fbGeo,fMat),new THREE.Mesh(fhGeo,fMat));
const lens=new THREE.Mesh(new THREE.CircleGeometry(0.05,6),new THREE.MeshBasicMaterial({color:0xffffee}));
lens.position.set(0,0,-0.17); lens.rotation.y=Math.PI; fGrp.add(lens);
fGrp.position.set(0.28,-0.22,-0.4); rig.add(fGrp);

// ═══════════════════════════════════════════════
//  TEXTURES (고품질, 한 번만 생성)
// ═══════════════════════════════════════════════
function mkTex(size,drawFn){
  const c=document.createElement('canvas'); c.width=c.height=size;
  drawFn(c.getContext('2d'),size);
  const t=new THREE.CanvasTexture(c);
  t.anisotropy=Math.min(8,renderer.capabilities.getMaxAnisotropy()||1);
  return t;
}
const wallTex=mkTex(256,(ctx,s)=>{
  ctx.fillStyle='#dfd5a0'; ctx.fillRect(0,0,s,s);
  const d=ctx.getImageData(0,0,s,s),px=d.data;
  for(let i=0;i<px.length;i+=4){const n=(Math.random()-.5)*18;px[i]=Math.max(0,Math.min(255,px[i]+n-5));px[i+1]=Math.max(0,Math.min(255,px[i+1]+n-5));px[i+2]=Math.max(0,Math.min(255,px[i+2]+n-7));}
  ctx.putImageData(d,0,0);
  ctx.strokeStyle='rgba(190,178,118,.4)'; ctx.lineWidth=1.5;
  for(let x=0;x<s;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,s);ctx.stroke();}
  for(let y=0;y<s;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(s,y);ctx.stroke();}
});
wallTex.wrapS=wallTex.wrapT=THREE.RepeatWrapping;

const floorTex=mkTex(512,(ctx,s)=>{
  ctx.fillStyle='#837543'; ctx.fillRect(0,0,s,s);
  const d=ctx.getImageData(0,0,s,s),px=d.data;
  for(let i=0;i<px.length;i+=4){const n=(Math.random()-.5)*26;px[i]=Math.max(0,Math.min(255,px[i]+n));px[i+1]=Math.max(0,Math.min(255,px[i+1]+n));px[i+2]=Math.max(0,Math.min(255,px[i+2]+n*.7));}
  ctx.putImageData(d,0,0);
});
floorTex.wrapS=floorTex.wrapT=THREE.RepeatWrapping; floorTex.repeat.set(18,18);

const ceilTex=mkTex(256,(ctx,s)=>{
  ctx.fillStyle='#d3c79b'; ctx.fillRect(0,0,s,s);
  const d=ctx.getImageData(0,0,s,s),px=d.data;
  for(let i=0;i<px.length;i+=4){const n=(Math.random()-.5)*10;px[i]=Math.max(0,Math.min(255,px[i]+n));px[i+1]=Math.max(0,Math.min(255,px[i+1]+n));px[i+2]=Math.max(0,Math.min(255,px[i+2]+n));}
  ctx.putImageData(d,0,0);
});
ceilTex.wrapS=ceilTex.wrapT=THREE.RepeatWrapping; ceilTex.repeat.set(22,22);

// 공유 재질 (렉 감소)
const wallMat=new THREE.MeshStandardMaterial({map:wallTex,roughness:0.85});
const floorMat=new THREE.MeshStandardMaterial({map:floorTex,roughness:0.95});
const ceilMat=new THREE.MeshStandardMaterial({map:ceilTex,roughness:0.88});
const metalMat=new THREE.MeshStandardMaterial({color:0x2d2b22,roughness:0.55,metalness:0.75});
const woodMat=new THREE.MeshStandardMaterial({color:0x3d2516,roughness:0.75});

// ═══════════════════════════════════════════════
//  MAP DATA
// ═══════════════════════════════════════════════
let mapData=[];
function genMaze(){
  mapData=Array(ROWS).fill().map(()=>Array(COLS).fill(1));
  const vis=Array(ROWS).fill().map(()=>Array(COLS).fill(false));
  function carve(r,c){
    vis[r][c]=true; mapData[r][c]=0;
    const dirs=[[-2,0],[2,0],[0,-2],[0,2]].sort(()=>Math.random()-.5);
    for(const[dr,dc]of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr>0&&nr<ROWS-1&&nc>0&&nc<COLS-1&&!vis[nr][nc]){mapData[r+dr/2][c+dc/2]=0;carve(nr,nc);}
    }
  }
  carve(1,1);
  // 평지 3개 추가
  for(let k=0;k<3;k++){
    const cr=3+Math.floor(Math.random()*(ROWS-8)),cc=3+Math.floor(Math.random()*(COLS-8));
    for(let r=cr-2;r<=cr+2;r++) for(let c=cc-2;c<=cc+2;c++) if(r>0&&r<ROWS-1&&c>0&&c<COLS-1) mapData[r][c]=0;
  }
  for(let r=0;r<ROWS;r++){mapData[r][0]=1;mapData[r][COLS-1]=1;}
  for(let c=0;c<COLS;c++){mapData[0][c]=1;mapData[ROWS-1][c]=1;}
}

// ─ 지상 그래픽 오브젝트 참조 ─
let iWalls=null,floorMesh=null,ceilMesh=null,lampList=[];
// 공유 지오메트리 (렉 감소)
const sharedWallGeo=new THREE.BoxGeometry(UNIT,WALL_H,UNIT);
const sharedLampFrameGeo=new THREE.BoxGeometry(2.4,0.05,1.2);
const sharedLampPanelGeo=new THREE.BoxGeometry(2.2,0.06,1.0);
const lampFrameMat=new THREE.MeshStandardMaterial({color:0x333333,roughness:0.8});
const lampPanelMat=new THREE.MeshBasicMaterial({color:0xffffe0});

function buildSurface(){
  // 기존 제거
  if(iWalls){scene.remove(iWalls);iWalls.geometry.dispose();}
  lampList.forEach(l=>scene.remove(l)); lampList=[];
  if(floorMesh) scene.remove(floorMesh);
  if(ceilMesh) scene.remove(ceilMesh);

  // InstancedMesh 벽
  let wc=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(mapData[r][c]===1) wc++;
  iWalls=new THREE.InstancedMesh(sharedWallGeo,wallMat,wc);
  iWalls.frustumCulled=true;
  const dum=new THREE.Object3D(); let idx=0;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=(c-COLS/2)*UNIT+UNIT/2, z=(r-ROWS/2)*UNIT+UNIT/2;
      if(mapData[r][c]===1){
        dum.position.set(x,WALL_H/2,z); dum.updateMatrix();
        iWalls.setMatrixAt(idx++,dum.matrix);
      } else if(Math.random()<0.11){
        // 램프 (공유 지오메트리)
        const lg=new THREE.Group();
        lg.add(new THREE.Mesh(sharedLampFrameGeo,lampFrameMat));
        const lp=new THREE.Mesh(sharedLampPanelGeo,lampPanelMat); lp.position.y=-0.01; lg.add(lp);
        lg.position.set(x,WALL_H-0.02,z);
        if(Math.random()>.5) lg.rotation.y=Math.PI/2;
        scene.add(lg); lampList.push(lg);
        const pl=new THREE.PointLight(0xfff5cc,0.55,10);
        pl.position.set(x,WALL_H-0.3,z); scene.add(pl); lampList.push(pl);
      }
    }
  }
  iWalls.instanceMatrix.needsUpdate=true;
  scene.add(iWalls);

  const mW=COLS*UNIT,mH=ROWS*UNIT;
  floorMesh=new THREE.Mesh(new THREE.PlaneGeometry(mW,mH),floorMat);
  floorMesh.rotation.x=-Math.PI/2; scene.add(floorMesh);
  ceilMesh=new THREE.Mesh(new THREE.PlaneGeometry(mW,mH),ceilMat);
  ceilMesh.rotation.x=Math.PI/2; ceilMesh.position.y=WALL_H; scene.add(ceilMesh);
}

function tileToWorld(r,c){
  return {x:(c-COLS/2)*UNIT+UNIT/2, z:(r-ROWS/2)*UNIT+UNIT/2};
}
function getSafeCell(avoidX,avoidZ,minDist){
  for(let i=0;i<500;i++){
    const r=1+Math.floor(Math.random()*(ROWS-2)),c=1+Math.floor(Math.random()*(COLS-2));
    if(mapData[r][c]===0){
      const p=tileToWorld(r,c);
      if(minDist===undefined) return p;
      const d=Math.hypot(p.x-avoidX,p.z-avoidZ);
      if(d>=minDist) return p;
    }
  }
  return tileToWorld(1,1);
}

// 빙고판 주변 PIT_CLEAR 반경 벽 제거
function clearPitArea(pr,pc){
  for(let r=pr-PIT_CLEAR;r<=pr+PIT_CLEAR;r++)
    for(let c=pc-PIT_CLEAR;c<=pc+PIT_CLEAR;c++)
      if(r>0&&r<ROWS-1&&c>0&&c<COLS-1) mapData[r][c]=0;
}

let pitVoidMesh=null,pitGridGroup=null;
function buildBingoPit(cx,cz){
  // 제거
  pitMeshes.forEach(m=>scene.remove(m)); pitMeshes=[];
  if(pitVoidMesh){scene.remove(pitVoidMesh);}
  if(pitGridGroup){scene.remove(pitGridGroup);}

  pitCX=cx; pitCZ=cz;
  const pitW=UNIT*1.85, pitD=UNIT*1.85;
  pitMinX=cx-pitW/2; pitMaxX=cx+pitW/2;
  pitMinZ=cz-pitD/2; pitMaxZ=cz+pitD/2;
  pitActive=true;

  // 지하가 보이는 검은 구멍 (바닥 아래)
  const voidGeo=new THREE.BoxGeometry(pitW-0.1,8,pitD-0.1);
  pitVoidMesh=new THREE.Mesh(voidGeo,new THREE.MeshBasicMaterial({color:0x000000}));
  pitVoidMesh.position.set(cx,-4.01,cz);
  scene.add(pitVoidMesh); pitMeshes.push(pitVoidMesh);

  // 지하 공간 힌트 빛 (구멍 안에서 올라오는 파란 빛)
  const ugHintLight=new THREE.PointLight(0x0044ff,1.2,6);
  ugHintLight.position.set(cx,-1.5,cz);
  scene.add(ugHintLight); pitMeshes.push(ugHintLight);

  // 빙고판 격자 (고정, 꽉 찬 형태)
  pitGridGroup=new THREE.Group();
  const lineThick=0.22;
  const hGeo=new THREE.BoxGeometry(pitW,0.12,lineThick);
  const vGeo=new THREE.BoxGeometry(lineThick,0.12,pitD);
  const spacing=pitW/(PIT_GRID-1);

  // 가로선 PIT_GRID개
  for(let i=0;i<PIT_GRID;i++){
    const m=new THREE.Mesh(hGeo,metalMat);
    m.position.set(cx,0.01,cz-pitD/2+i*(pitD/(PIT_GRID-1)));
    pitGridGroup.add(m);
  }
  // 세로선 PIT_GRID개
  for(let i=0;i<PIT_GRID;i++){
    const m=new THREE.Mesh(vGeo,metalMat);
    m.position.set(cx-pitW/2+i*spacing,0.01,cz);
    pitGridGroup.add(m);
  }
  scene.add(pitGridGroup);
  pitMeshes.push(pitGridGroup);

  // 지하 스폰 위치
  ugSpawn.set(cx,UG_FLOOR_Y+0.05,cz);
}

// ═══════════════════════════════════════════════
//  DOOR
// ═══════════════════════════════════════════════
function spawnDoor(pitRow,pitCol,pitAngle){
  if(doorGroup) scene.remove(doorGroup);
  doorGroup=new THREE.Group();

  // 문은 빙고판 건넌 뒤 조금 뒤 벽에 붙도록:
  // 빙고판 방향으로 UNIT*2.5 앞에 배치
  const pitWX=tileToWorld(pitRow,pitCol);
  let offX=0,offZ=0;
  if(Math.abs(pitAngle)<0.1) offZ=UNIT*2.5;
  else if(Math.abs(pitAngle-Math.PI)<0.1) offZ=-UNIT*2.5;
  else if(Math.abs(pitAngle-Math.PI/2)<0.1) offX=UNIT*2.5;
  else offX=-UNIT*2.5;

  let doorX=pitWX.x+offX, doorZ=pitWX.z+offZ;
  // 가장 가까운 빈 칸에 스냅
  let bestR=pitRow,bestC=pitCol,bestD=999;
  for(let r=1;r<ROWS-1;r++) for(let c=1;c<COLS-1;c++){
    if(mapData[r][c]===0){
      const p=tileToWorld(r,c);
      const d=Math.hypot(p.x-doorX,p.z-doorZ);
      if(d<bestD){bestD=d;bestR=r;bestC=c;}
    }
  }
  // 문이 붙을 벽 찾기
  let wallOffX=0,wallOffZ=0,doorAngle=0;
  const dr=bestR,dc=bestC;
  if(mapData[dr-1]&&mapData[dr-1][dc]===1){wallOffZ=-2.45;doorAngle=0;}
  else if(mapData[dr+1]&&mapData[dr+1][dc]===1){wallOffZ=2.45;doorAngle=Math.PI;}
  else if(mapData[dr][dc-1]===1){wallOffX=-2.45;doorAngle=Math.PI/2;}
  else if(mapData[dr][dc+1]===1){wallOffX=2.45;doorAngle=-Math.PI/2;}

  const wp=tileToWorld(bestR,bestC);
  doorGroup.position.set(wp.x+wallOffX,0,wp.z+wallOffZ);
  doorGroup.rotation.y=doorAngle;

  // 문 프레임
  const fMat2=new THREE.MeshStandardMaterial({color:0x1d140e,roughness:0.9});
  const lp=new THREE.Mesh(new THREE.BoxGeometry(0.15,2.8,0.2),fMat2); lp.position.set(-0.85,1.4,0); doorGroup.add(lp);
  const rp=new THREE.Mesh(new THREE.BoxGeometry(0.15,2.8,0.2),fMat2); rp.position.set(0.85,1.4,0); doorGroup.add(rp);
  const tp=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.15,0.2),fMat2); tp.position.set(0,2.8,0); doorGroup.add(tp);

  // 문 패널
  doorPivot=new THREE.Group(); doorPivot.position.set(-0.78,1.4,0);
  const dp=new THREE.Mesh(new THREE.BoxGeometry(1.56,2.65,0.12),woodMat); dp.position.set(0.78,0,0); doorPivot.add(dp);
  const knob=new THREE.Mesh(new THREE.SphereGeometry(0.06,10,10),new THREE.MeshStandardMaterial({color:0xccaa44,metalness:0.8,roughness:0.1}));
  knob.position.set(0.65,0,0.09); dp.add(knob);
  doorGroup.add(doorPivot);

  // 탈출 복도
  const ec=new THREE.Mesh(new THREE.BoxGeometry(1.6,2.8,3.0),new THREE.MeshBasicMaterial({color:0x000000,side:THREE.BackSide}));
  ec.position.set(0,1.4,-1.5); doorGroup.add(ec);

  // 초록 힌트 빛
  const gl=new THREE.PointLight(0x00ff55,0,6); gl.position.set(0,1.4,-0.2); doorGroup.add(gl);
  doorGroup.userData.greenLight=gl;

  scene.add(doorGroup);
  doorGroup.updateMatrixWorld(true);

  // 탈출 센서 위치
  const sv=new THREE.Vector3(0,1.0,-2.2);
  sv.applyQuaternion(doorGroup.quaternion);
  escapeSensor.copy(doorGroup.position).add(sv);
}

function buildUnderground(){
  // 기존 정리
  ugObjects.forEach(o=>scene.remove(o)); ugObjects=[];
  if(ladderMesh){scene.remove(ladderMesh);ladderMesh=null;}
  if(ladderItem){scene.remove(ladderItem);ladderItem=null;}
  ladderPlaced=false; climbActive=false; climbTimer=0;

  // 지하 미로 생성 (2개 평지 + 미로)
  ugMapData=Array(UG_ROWS).fill().map(()=>Array(UG_COLS).fill(1));
  const ugVis=Array(UG_ROWS).fill().map(()=>Array(UG_COLS).fill(false));
  function ugCarve(r,c){
    ugVis[r][c]=true; ugMapData[r][c]=0;
    const dirs=[[-2,0],[2,0],[0,-2],[0,2]].sort(()=>Math.random()-.5);
    for(const[dr,dc]of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr>0&&nr<UG_ROWS-1&&nc>0&&nc<UG_COLS-1&&!ugVis[nr][nc]){ugMapData[r+dr/2][c+dc/2]=0;ugCarve(nr,nc);}
    }
  }
  ugCarve(1,1);
  // 2개 평지
  for(let k=0;k<2;k++){
    const cr=2+Math.floor(Math.random()*(UG_ROWS-5)),cc=2+Math.floor(Math.random()*(UG_COLS-5));
    for(let r=cr-1;r<=cr+1;r++) for(let c=cc-1;c<=cc+1;c++) if(r>0&&r<UG_ROWS-1&&c>0&&c<UG_COLS-1) ugMapData[r][c]=0;
  }
  for(let r=0;r<UG_ROWS;r++){ugMapData[r][0]=1;ugMapData[r][UG_COLS-1]=1;}
  for(let c=0;c<UG_COLS;c++){ugMapData[0][c]=1;ugMapData[UG_ROWS-1][c]=1;}

  const ox=ugSpawn.x, oz=ugSpawn.z, by=UG_FLOOR_Y;
  function ugWorld(r,c){return{x:ox+(c-UG_COLS/2)*UG_UNIT+UG_UNIT/2,z:oz+(r-UG_ROWS/2)*UG_UNIT+UG_UNIT/2};}

  // 벽 InstancedMesh
  let wc=0;
  for(let r=0;r<UG_ROWS;r++) for(let c=0;c<UG_COLS;c++) if(ugMapData[r][c]===1) wc++;
  const ugWGeo=new THREE.BoxGeometry(UG_UNIT,UG_WALL_H,UG_UNIT);
  const ugWMat=new THREE.MeshStandardMaterial({color:0x100c08,roughness:0.98});
  const ugWalls=new THREE.InstancedMesh(ugWGeo,ugWMat,wc);
  ugWalls.frustumCulled=true;
  const dum2=new THREE.Object3D(); let uidx=0;
  for(let r=0;r<UG_ROWS;r++){
    for(let c=0;c<UG_COLS;c++){
      if(ugMapData[r][c]===1){
        const p=ugWorld(r,c);
        dum2.position.set(p.x,by+UG_WALL_H/2,p.z); dum2.updateMatrix();
        ugWalls.setMatrixAt(uidx++,dum2.matrix);
      }
    }
  }
  ugWalls.instanceMatrix.needsUpdate=true;
  scene.add(ugWalls); ugObjects.push(ugWalls);

  // 바닥/천장
  const ugFW=UG_COLS*UG_UNIT,ugFH=UG_ROWS*UG_UNIT;
  const ugFloor=new THREE.Mesh(new THREE.PlaneGeometry(ugFW,ugFH),new THREE.MeshStandardMaterial({color:0x080604,roughness:1}));
  ugFloor.rotation.x=-Math.PI/2; ugFloor.position.set(ox,by,oz); scene.add(ugFloor); ugObjects.push(ugFloor);
  const ugCeil=new THREE.Mesh(new THREE.PlaneGeometry(ugFW,ugFH),new THREE.MeshStandardMaterial({color:0x0c0a07,roughness:1}));
  ugCeil.rotation.x=Math.PI/2; ugCeil.position.set(ox,by+UG_WALL_H,oz); scene.add(ugCeil); ugObjects.push(ugCeil);

  // 조명 (4개)
  const ugAmb=new THREE.AmbientLight(0x080302,0.5); scene.add(ugAmb); ugObjects.push(ugAmb);
  for(let i=0;i<4;i++){
    for(let att=0;att<200;att++){
      const lr=1+Math.floor(Math.random()*(UG_ROWS-2)),lc=1+Math.floor(Math.random()*(UG_COLS-2));
      if(ugMapData[lr][lc]===0){
        const lp2=ugWorld(lr,lc);
        const pl=new THREE.PointLight(0xff1800,0.45,UG_UNIT*3.2);
        pl.position.set(lp2.x,by+UG_WALL_H-0.4,lp2.z);
        scene.add(pl); ugObjects.push(pl); break;
      }
    }
  }

  // 사다리 아이템 (랜덤 빈 칸)
  for(let att=0;att<300;att++){
    const lr=1+Math.floor(Math.random()*(UG_ROWS-2)),lc=1+Math.floor(Math.random()*(UG_COLS-2));
    if(ugMapData[lr][lc]===0){
      const lp2=ugWorld(lr,lc);
      ladderItem=makeLadderItem();
      ladderItem.position.set(lp2.x,by+0.6,lp2.z);
      scene.add(ladderItem); ugObjects.push(ladderItem); break;
    }
  }

  // 탈출 구멍: 북쪽 경계 벽 중앙 (UG_ROWS-1, UG_COLS/2)
  const holeRow=UG_ROWS-2, holeCol=Math.floor(UG_COLS/2);
  // 구멍 위치: 해당 칸 앞 빈 공간
  const holeCell=ugWorld(holeRow,holeCol);
  // 구멍은 벽 상단 (플레이어 키보다 높은 곳)
  const holeY=by+UG_WALL_H*0.60; // 약 2.7m 높이
  holePos.set(holeCell.x,holeY,holeCell.z);

  // 구멍 시각화 — 초록 빛나는 네모 구멍 (잘 보이도록 크게)
  const hW=1.4,hH=1.6;
  const hfMat=new THREE.MeshStandardMaterial({color:0x003311,emissive:new THREE.Color(0x00ff44),emissiveIntensity:1.2});
  const hGrp=new THREE.Group();
  // 테두리 4면
  const ht=new THREE.Mesh(new THREE.BoxGeometry(hW+0.12,0.1,0.12),hfMat); ht.position.set(0,hH/2,0); hGrp.add(ht);
  const hb2=new THREE.Mesh(new THREE.BoxGeometry(hW+0.12,0.1,0.12),hfMat); hb2.position.set(0,-hH/2,0); hGrp.add(hb2);
  const hl=new THREE.Mesh(new THREE.BoxGeometry(0.1,hH,0.12),hfMat); hl.position.set(-hW/2,0,0); hGrp.add(hl);
  const hr2=new THREE.Mesh(new THREE.BoxGeometry(0.1,hH,0.12),hfMat); hr2.position.set(hW/2,0,0); hGrp.add(hr2);
  // 안쪽 검은 패널
  const hi=new THREE.Mesh(new THREE.BoxGeometry(hW,hH,0.06),new THREE.MeshBasicMaterial({color:0x000000})); hGrp.add(hi);
  hGrp.position.set(holePos.x,holeY,holeCell.z+UG_UNIT*0.4);
  scene.add(hGrp); ugObjects.push(hGrp);

  // 구멍 포인트라이트 (강하게)
  const hLight=new THREE.PointLight(0x00ff44,3.5,8);
  hLight.position.set(holePos.x,holeY,holeCell.z+UG_UNIT*0.6);
  scene.add(hLight); ugObjects.push(hLight);

  // 구멍 앞 바닥 빛 (찾기 쉽도록)
  const hFloorLight=new THREE.PointLight(0x00aa22,1.5,5);
  hFloorLight.position.set(holePos.x,by+0.3,holeCell.z);
  scene.add(hFloorLight); ugObjects.push(hFloorLight);
}

function makeLadderItem(){
  const g=new THREE.Group();
  const lMat=new THREE.MeshStandardMaterial({color:0xffaa22,emissive:new THREE.Color(0xff6600),emissiveIntensity:0.7,roughness:0.4});
  const postGeo=new THREE.BoxGeometry(0.08,1.2,0.08);
  const p1=new THREE.Mesh(postGeo,lMat); p1.position.set(-0.25,0,0); g.add(p1);
  const p2=new THREE.Mesh(postGeo,lMat); p2.position.set(0.25,0,0); g.add(p2);
  const rungGeo=new THREE.BoxGeometry(0.52,0.07,0.07);
  for(let i=0;i<4;i++){const r=new THREE.Mesh(rungGeo,lMat);r.position.set(0,-0.4+i*0.28,0);g.add(r);}
  const gl=new THREE.PointLight(0xff8800,1.8,3.5); g.add(gl);
  return g;
}

function placeLadderMesh(){
  // 사다리를 구멍 바로 아래 벽에 기대어 설치
  const by=UG_FLOOR_Y;
  const postH=UG_WALL_H*0.72;
  const lMat2=new THREE.MeshStandardMaterial({color:0xcc8833,roughness:0.5});
  const lg=new THREE.Group();
  const postGeo=new THREE.BoxGeometry(0.1,postH,0.1);
  const lp1=new THREE.Mesh(postGeo,lMat2); lp1.position.set(-0.28,postH/2,0); lg.add(lp1);
  const lp2=new THREE.Mesh(postGeo,lMat2); lp2.position.set(0.28,postH/2,0); lg.add(lp2);
  const rungCount=Math.floor(postH/0.32);
  const rGeo=new THREE.BoxGeometry(0.58,0.08,0.08);
  for(let i=0;i<rungCount;i++){const r=new THREE.Mesh(rGeo,lMat2);r.position.set(0,0.25+i*0.32,0);lg.add(r);}
  // 구멍 바로 아래 배치
  lg.position.set(holePos.x,by,holePos.z+UG_UNIT*0.4);
  scene.add(lg);
  ladderMesh=lg;
  ugObjects.push(lg);
}

  for(let j=0;j<6;j++){

    const dn=new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.01,1.2),eMat); dn.position.set(0.3,-1.1,0); dn.rotation.z=-0.9; up.add(dn);

}

// ═══════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════
let actx=null,bgmGain=null,sfxGain=null,screamGain=null,keyHintGain=null;
let bgmOsc1=null,bgmOsc2=null,screamOsc1=null,screamOsc2=null,keyOsc=null;

function initAudio(){
  if(actx) return;
  try{
    actx=new(window.AudioContext||window.webkitAudioContext)();
    bgmGain=actx.createGain(); bgmGain.gain.value=volBgm*0.35;
    const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=88;
    bgmOsc1=actx.createOscillator(); bgmOsc1.type='sine'; bgmOsc1.frequency.value=55;
    bgmOsc2=actx.createOscillator(); bgmOsc2.type='triangle'; bgmOsc2.frequency.value=57.5;
    bgmOsc1.connect(lp); bgmOsc2.connect(lp); lp.connect(bgmGain); bgmGain.connect(actx.destination);
    bgmOsc1.start(); bgmOsc2.start();
    sfxGain=actx.createGain(); sfxGain.gain.value=1; sfxGain.connect(actx.destination);
    screamGain=actx.createGain(); screamGain.gain.value=0.001; screamGain.connect(sfxGain);
    keyHintGain=actx.createGain(); keyHintGain.gain.value=0.001;
    keyOsc=actx.createOscillator(); keyOsc.type='sine'; keyOsc.frequency.value=140;
    const kf=actx.createBiquadFilter(); kf.type='bandpass'; kf.frequency.value=250;
    keyOsc.connect(kf); kf.connect(keyHintGain); keyHintGain.connect(sfxGain); keyOsc.start();
  }catch(e){}
}
function playTone(freq,dur,vol,type='triangle'){
  if(!actx||!sfxGain) return;
  try{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol*volSfx,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
    o.connect(g); g.connect(sfxGain); o.start(); o.stop(actx.currentTime+dur+0.01);
  }catch(e){}
}
function startScream(){
  if(!actx||!screamGain) return;
  try{
    screamOsc1=actx.createOscillator(); screamOsc1.type='sawtooth'; screamOsc1.frequency.value=280;
    screamOsc2=actx.createOscillator(); screamOsc2.type='square'; screamOsc2.frequency.value=450;
    const now=actx.currentTime;
    screamOsc1.frequency.linearRampToValueAtTime(700,now+0.3); screamOsc1.frequency.linearRampToValueAtTime(150,now+0.7);
    screamOsc2.frequency.linearRampToValueAtTime(900,now+0.4);
    screamOsc1.connect(screamGain); screamOsc2.connect(screamGain); screamOsc1.start(); screamOsc2.start();
  }catch(e){}
}
function stopScream(){
  try{if(screamOsc1){screamOsc1.stop();screamOsc1=null;}if(screamOsc2){screamOsc2.stop();screamOsc2=null;}}catch(e){}
}

// ═══════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════
function collide(oldX,oldZ,newX,newZ,rad){
  if(isNaN(newX)||isNaN(newZ)) return{x:oldX,z:oldZ};
  let rx=newX,rz=newZ;
  if(underground&&ugMapData){
    const ox=ugSpawn.x,oz=ugSpawn.z;
    const pc=Math.floor((oldX-ox+(UG_COLS*UG_UNIT)/2)/UG_UNIT);
    const pr=Math.floor((oldZ-oz+(UG_ROWS*UG_UNIT)/2)/UG_UNIT);
    for(let r=pr-1;r<=pr+1;r++) for(let c=pc-1;c<=pc+1;c++){
      if(r<0||r>=UG_ROWS||c<0||c>=UG_COLS) continue;
      if(ugMapData[r][c]===1){
        const wx=ox+(c-UG_COLS/2)*UG_UNIT+UG_UNIT/2, wz=oz+(r-UG_ROWS/2)*UG_UNIT+UG_UNIT/2;
        const mnX=wx-UG_UNIT/2-rad,mxX=wx+UG_UNIT/2+rad,mnZ=wz-UG_UNIT/2-rad,mxZ=wz+UG_UNIT/2+rad;
        if(rx>mnX&&rx<mxX&&rz>mnZ&&rz<mxZ){
          if(oldX<=mnX||oldX>=mxX) rx=oldX;
          if(oldZ<=mnZ||oldZ>=mxZ) rz=oldZ;
        }
      }
    }
    return{x:rx,z:rz};
  }
  if(doorOpened&&doorGroup){
    const dd=Math.hypot(oldX-doorGroup.position.x,oldZ-doorGroup.position.z);
    if(dd<3.5) return{x:newX,z:newZ};
  }
  const pc=Math.floor((oldX-UNIT/2+(COLS*UNIT)/2)/UNIT);
  const pr=Math.floor((oldZ-UNIT/2+(ROWS*UNIT)/2)/UNIT);
  for(let r=pr-1;r<=pr+1;r++) for(let c=pc-1;c<=pc+1;c++){
    if(r<0||r>=ROWS||c<0||c>=COLS) continue;
    if(mapData[r][c]===1){
      const wx=(c-COLS/2)*UNIT+UNIT/2, wz=(r-ROWS/2)*UNIT+UNIT/2;
      const mnX=wx-UNIT/2-rad,mxX=wx+UNIT/2+rad,mnZ=wz-UNIT/2-rad,mxZ=wz+UNIT/2+rad;
      if(rx>mnX&&rx<mxX&&rz>mnZ&&rz<mxZ){
        if(oldX<=mnX||oldX>=mxX) rx=oldX;
        if(oldZ<=mnZ||oldZ>=mxZ) rz=oldZ;
      }
    }
  }
  return{x:rx,z:rz};
}

function startGame(){
  if(!platform) return;
  document.getElementById('start').style.display='none';
  document.getElementById('topctrl').style.display='flex';
  document.getElementById('cctv').style.display='block';
  document.getElementById('quest').style.display='block';
  if(platform==='mobile'){
    document.getElementById('jzone').style.display='block';
    document.getElementById('mright').style.display='flex';
    document.getElementById('stamina-wrap').style.display='block';
  } else {
    document.body.requestPointerLock();
    document.getElementById('crosshair').style.display='block';
  }
  // 초기화
  hasKey=false; doorOpened=false; underground=false;
  hasLadder=false; ladderPlaced=false; climbActive=false; climbTimer=0;
  pitActive=false; isBlackout=false; recTime=0;
  stamina=100; tired=false; velY=0; grounded=true;
  camYaw=0; camPitch=0; smoothYaw=0; smoothPitch=0;
  document.getElementById('hud-ladder').style.display='none';
  document.getElementById('glitch').style.opacity=0;

  // 맵 생성
  genMaze();

  // 문 + 빙고판 배치
  // 문 위치: 맵 중앙 근처 빈 칸
  let doorR=Math.floor(ROWS/2),doorC=Math.floor(COLS/2);
  for(let i=0;i<200;i++){
    const tr=2+Math.floor(Math.random()*(ROWS-4)),tc=2+Math.floor(Math.random()*(COLS-4));
    if(mapData[tr][tc]===0){doorR=tr;doorC=tc;break;}
  }
  // 빙고판: 문 앞 방향 (문에서 UNIT*3 앞)
  const doorAngle=Math.random()*Math.PI*2;
  const pitOffR=Math.round(Math.sin(doorAngle)*3),pitOffC=Math.round(Math.cos(doorAngle)*3);
  let pitR=Math.max(2,Math.min(ROWS-3,doorR+pitOffR));
  let pitC=Math.max(2,Math.min(COLS-3,doorC+pitOffC));
  // 빙고판 주변 평지 확보
  clearPitArea(pitR,pitC);
  buildSurface();
  const pitWP=tileToWorld(pitR,pitC);
  buildBingoPit(pitWP.x,pitWP.z);
  spawnDoor(doorR,doorC,doorAngle);

  // 플레이어 스폰 (빙고판 반대편)
  const spawnR=Math.max(1,Math.min(ROWS-2,pitR-pitOffR*3));
  const spawnC=Math.max(1,Math.min(COLS-2,pitC-pitOffC*3));
  const sp=tileToWorld(spawnR,spawnC);
  px=sp.x; py=0; pz=sp.z;
  safeSpawn.set(px,0,pz);

  // 열쇠 스폰
  spawnKey(px,pz);

  // 엔티티
  createEntity();
  const ep=getSafeCell(px,pz,12);
  entity.mesh.position.set(ep.x,0,ep.z);
  entity.lastPos.set(ep.x,0,ep.z);
  entity.patrolTarget=ep;

  gameActive=true; isGameOver=false; isPaused=false;
  initAudio();
  setQuest('🔑 QUEST:<br>Find the hidden key.');
}

const jZone=document.getElementById('jzone'),jStick=document.getElementById('jstick');
function calcJoystick(cx,cy){
  let dx=cx-jStart.x,dy=cy-jStart.y;
  const d=Math.hypot(dx,dy),maxR=40;
  if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR;}
  jStick.style.transform=`translate(${dx}px,${dy}px)`;
  jInput.x=dx/maxR; jInput.y=dy/maxR; jRatio=Math.min(d/maxR,1);
}
window.addEventListener('touchstart',e=>{
  if(e.target.closest('#btn-interact')||e.target.closest('#topctrl')||e.target.closest('#mright')||e.target.closest('#pause')) return;
  if(!gameActive||isGameOver||isPaused||platform!=='mobile') return;
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    if(t.clientX<innerWidth/2&&jTouchId===null){
      jTouchId=t.identifier;
      jZone.style.left=(t.clientX-55)+'px'; jZone.style.bottom=(innerHeight-t.clientY-55)+'px';
      jStart={x:t.clientX,y:t.clientY}; calcJoystick(t.clientX,t.clientY);
    } else if(t.clientX>=innerWidth/2&&rTouchId===null){
      rTouchId=t.identifier; rPrev={x:t.clientX,y:t.clientY};
    }
  }
},{passive:false});
window.addEventListener('touchmove',e=>{
  if(platform!=='mobile') return;
  for(let i=0;i<e.touches.length;i++){
    const t=e.touches[i];
    if(t.identifier===jTouchId) calcJoystick(t.clientX,t.clientY);
    if(t.identifier===rTouchId){
      const m=0.004*sens;
      camYaw-=(t.clientX-rPrev.x)*m; camPitch-=(t.clientY-rPrev.y)*m;
      camPitch=Math.max(-Math.PI/2.3,Math.min(Math.PI/2.3,camPitch));
      rPrev={x:t.clientX,y:t.clientY};
    }
  }
});
window.addEventListener('touchend',e=>{
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    if(t.identifier===jTouchId){jTouchId=null;jStick.style.transform='';jInput={x:0,y:0};jRatio=0;jZone.style.left='35px';jZone.style.bottom='35px';}

});

//  ENTITY AI
// ═══════════════════════════════════════════════
function updateEntity(){
  if(underground||!entity) return;
  const e=entity;
  const ep=e.mesh.position;
  const dist=Math.hypot(ep.x-px,ep.z-pz);
  e.stuckTimer++;
  if(e.stuckTimer>55){
    if(Math.hypot(ep.x-e.lastPos.x,ep.z-e.lastPos.z)<0.12) e.patrolTarget=getSafeCell(px,pz);
    e.lastPos.copy(ep); e.stuckTimer=0;
  }
  if(dist<14&&!isGameOver&&py>=-0.3){
    if(!e.scream){e.scream=true;startScream();}
    e.state='chase';
  } else if(e.state==='chase'&&(dist>20||py<-0.5)){
    e.state='patrol'; e.scream=false; stopScream();
    e.patrolTarget=getSafeCell(px,pz);
  }
  const dest=e.state==='chase'?{x:px,z:pz}:e.patrolTarget;
  if(e.state==='patrol'&&Math.hypot(ep.x-dest.x,ep.z-dest.z)<1.2) e.patrolTarget=getSafeCell(px,pz);
  const dx=dest.x-ep.x,dz=dest.z-ep.z,len=Math.hypot(dx,dz);
  if(len>0.1){
    const sp=e.state==='chase'?e.speed*1.4:e.speed;
    const nc=collide(ep.x,ep.z,ep.x+dx/len*sp,ep.z+dz/len*sp,0.5);
    ep.x=nc.x; ep.z=nc.z; e.mesh.rotation.y=Math.atan2(dx,dz);
  }
  if(e.state==='chase'&&screamGain&&actx){
    screamGain.gain.setTargetAtTime(Math.max(0.001,(18-dist)/18)*0.65*volSfx,actx.currentTime,0.1);
  }
  if(dist<1.15&&py>=-0.3) gameOver('The entity has severed your life signal.');
}

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  if(!gameActive){camera.position.set(0,18,22);camera.lookAt(0,0,0);renderer.render(scene,camera);return;}
  if(isGameOver||isPaused) return;

  const dt=Math.min(clock.getDelta(),0.05);
  recTime+=dt;
  const rm=Math.floor(recTime/60),rs=Math.floor(recTime%60);
  document.getElementById('rectime').textContent=`${String(rm).padStart(2,'0')}:${String(rs).padStart(2,'0')}`;
  if(recTime>=90&&!isBlackout&&!underground) triggerBlackout();

  const t=Date.now()*0.001;

  // 열쇠 회전
  if(keyMesh&&!hasKey) keyMesh.rotation.y+=0.025;
  // 사다리 아이템 회전
  if(ladderItem&&!hasLadder) ladderItem.rotation.y+=0.03;

  // 키 힌트 오디오
  if(keyHintGain&&keyMesh&&!hasKey&&actx&&!underground){
    const kd=Math.hypot(px-keyMesh.position.x,pz-keyMesh.position.z);
    if(kd<16){keyHintGain.gain.setTargetAtTime(Math.max(0.001,(16-kd)/16)*0.45*volSfx,actx.currentTime,0.15);keyOsc.frequency.setValueAtTime(140+Math.sin(t*4)*25,actx.currentTime);}
    else keyHintGain.gain.setTargetAtTime(0.001,actx.currentTime,0.2);
  }

  // ─ 빙고판 낙사 판정 ─
  if(!underground&&pitActive&&py<=0.02&&py>=-0.1){
    const inPit=px>pitMinX&&px<pitMaxX&&pz>pitMinZ&&pz<pitMaxZ;
    if(inPit){
      // 격자선 위인지 확인
      const pitW=pitMaxX-pitMinX, pitD=pitMaxZ-pitMinZ;
      const lineThick=0.26;
      let onLine=false;
      for(let i=0;i<PIT_GRID;i++){
        const lz=pitMinZ+i*(pitD/(PIT_GRID-1));
        if(Math.abs(pz-lz)<lineThick){onLine=true;break;}
        const lx=pitMinX+i*(pitW/(PIT_GRID-1));
        if(Math.abs(px-lx)<lineThick){onLine=true;break;}
      }
      if(!onLine&&grounded){
        // 격자 사이 빈 공간 → 낙사
        grounded=false; velY=-0.02;
      }
    }
  }

  // ─ 지하 진입 ─
  if(!underground&&py<-5.0&&!isGameOver){
    enterUnderground(); return;
  }

  // ─ 이동 ─
  smoothYaw+=(camYaw-smoothYaw)*0.22;
  smoothPitch+=(camPitch-smoothPitch)*0.22;
  const fwX=-Math.sin(smoothYaw),fwZ=-Math.cos(smoothYaw);
  const rtX=Math.cos(smoothYaw),rtZ=-Math.sin(smoothYaw);
  let mx=0,mz=0;
  if(platform==='pc'){
    if(keys.w)mz+=1;if(keys.s)mz-=1;if(keys.a)mx-=1;if(keys.d)mx+=1;
    moving=(mx!==0||mz!==0); sprinting=(moving&&keys.shift&&!tired);
  } else {
    if(Math.abs(jInput.x)>0.05||Math.abs(jInput.y)>0.05){mx=jInput.x;mz=-jInput.y;}
    moving=(mx!==0||mz!==0); sprinting=(moving&&jRatio>0.75&&!tired);
  }
  if(sprinting){stamina-=0.45;if(stamina<=0){stamina=0;tired=true;}}
  else{stamina+=moving?0.25:1.2;if(stamina>=100){stamina=100;tired=false;}}
  const sb=document.getElementById('sbar');
  if(sb){sb.style.width=stamina+'%';sb.style.background=tired?'#d62828':'#bfae6f';}

  const spd=tired?SPD_TIRED:(sprinting?SPD_SPRINT:SPD_BASE);
  const mvX=(fwX*mz+rtX*mx)*spd, mvZ=(fwZ*mz+rtZ*mx)*spd;

  if(moving&&!climbActive){
    const nc=collide(px,pz,px+mvX,pz+mvZ,PLAYER_R);
    px=nc.x; pz=nc.z;
    if(grounded){
      const now=Date.now();
      if(now-lastStep>(sprinting?220:370)){playTone(underground?45:65,0.1,0.12);lastStep=now;}
    }
  }

  // 사다리 타기
  if(climbActive&&underground){
    velY=0; py+=0.07; climbTimer++;
    if(py>=UG_FLOOR_Y+UG_WALL_H*0.78||climbTimer>100){exitUnderground();return;}
  } else {
    // 중력
    velY+=GRAVITY; py+=velY;
  }

  // 바닥 처리
  if(underground){
    if(py<=UG_FLOOR_Y+0.02){py=UG_FLOOR_Y+0.02;velY=0;grounded=true;}
    else grounded=false;
  } else {
    // 지상 바닥
    const inPitZone=pitActive&&px>pitMinX&&px<pitMaxX&&pz>pitMinZ&&pz<pitMaxZ;
    if(py<=0&&!inPitZone){py=0;velY=0;grounded=true;}
    else if(py<=0&&inPitZone){/* 낙사 중 */}
    else if(py>0) grounded=false;
  }

  // 빙고판 위 기울기 효과 (테두리/줄 위에 있을 때)
  let pitTiltZ=0,pitTiltX=0;
  if(!underground&&pitActive){
    const inPit=px>pitMinX&&px<pitMaxX&&pz>pitMinZ&&pz<pitMaxZ;
    if(inPit&&grounded){
      pitTiltZ=Math.sin(t*3)*0.06;
      pitTiltX=Math.cos(t*2.5)*0.04;
    }
  }

  // 카메라 bob
  let bobX=0,bobY=0;
  if(moving&&grounded){
    const freq=sprinting?2.5:1.5;
    bobX=Math.sin(t*freq)*0.032; bobY=Math.cos(t*freq*2)*0.022;
  }

  // 팔 애니메이션
  const aw=moving?Math.sin(t*(sprinting?2.5:1.5))*0.08:0;
  const ai=Math.sin(t)*0.01;
  lArm.position.z=-0.3+aw+ai; lArm.position.y=-0.25+Math.abs(aw)*0.3;
  rArm.position.z=-0.3-aw+ai; rArm.position.y=-0.25+Math.abs(aw)*0.3;
  fGrp.position.z=-0.4-aw+ai; fGrp.position.y=-0.22+Math.abs(aw)*0.3;

  // 엔티티
  updateEntity();
  if(entity){
    entity.core.position.y=1.3+Math.sin(t*(entity.state==='chase'?3:1))*0.12;
    entity.legs.forEach((l,i)=>{
      l.rotation.x=Math.sin(t*2+i*Math.PI/3)*0.55;
      l.rotation.z=0.3+Math.cos(t+i*Math.PI/3)*0.2;
    });
    if(entity.state==='chase'&&!underground){
      const dist=Math.hypot(px-entity.mesh.position.x,pz-entity.mesh.position.z);
      const now=Date.now();
      if(now-lastHB>800-(dist/14)*550){
        playTone(48,0.12,0.4+((14-dist)/14)*0.5,'sine'); lastHB=now;
        document.getElementById('hb').style.transform=`translateX(-50%) scale(${1.2+(14-dist)/14*0.5})`;
        setTimeout(()=>document.getElementById('hb').style.transform='translateX(-50%) scale(0.9)',120);
      }
    } else {
      document.getElementById('hb').style.transform='translateX(-50%) scale(0)';
    }
  }

  // ─ 지하 로직 ─
  if(underground){
    // 사다리 아이템 획득
    if(!hasLadder&&ladderItem&&Math.hypot(px-ladderItem.position.x,pz-ladderItem.position.z)<1.6){
      hasLadder=true;
      scene.remove(ladderItem);
      const idx=ugObjects.indexOf(ladderItem);if(idx>-1)ugObjects.splice(idx,1);
      ladderItem=null;
      document.getElementById('hud-ladder').style.display='block';
      toast('🪜 사다리 획득!<br>초록 구멍 앞에서 [E] 설치!');
    }
    // 프롬프트
    if(hasLadder&&!ladderPlaced){
      const dh=Math.hypot(px-holePos.x,pz-holePos.z);
      if(dh<6.0){setPrompt('🪜 [E] 사다리 설치',true);setInteract('🪜',true);}
      else{setPrompt('',false);setInteract('',false);}
    } else if(ladderPlaced&&ladderMesh){
      const dl=Math.hypot(px-ladderMesh.position.x,pz-ladderMesh.position.z);
      if(dl<2.8){setPrompt('⬆ [SPACE/▲] 사다리 타고 탈출!',true);setInteract('⬆',true);}
      else{setPrompt('',false);setInteract('',false);}
    }
    // 퀘스트
    if(!hasLadder) setQuest('🪜 UNDERGROUND:<br>사다리 아이템을 찾으세요!<br><span style="color:#ff6644;font-size:12px">주황 빛나는 아이템</span>');
    else if(!ladderPlaced) setQuest('🪜 UNDERGROUND:<br>초록 구멍 앞에 사다리 설치!<br><span style="color:#00ff88;font-size:12px">[E] 설치</span>');
    else setQuest('⬆ UNDERGROUND:<br>사다리 타고 탈출!<br><span style="color:#ffdd66;font-size:12px">[SPACE/▲] 올라가기</span>');

  } else {
    // ─ 지상 로직 ─
    // 열쇠 획득
    if(!hasKey&&keyMesh&&Math.hypot(px-keyMesh.position.x,pz-keyMesh.position.z)<1.3){
      hasKey=true; scene.remove(keyMesh);
      if(keyHintGain&&actx) keyHintGain.gain.setValueAtTime(0.001,actx.currentTime);
      if(doorGroup&&doorGroup.userData.greenLight) doorGroup.userData.greenLight.intensity=3.5;
      toast('🔑 Golden Key acquired!<br><span style="color:#00ff66">Bingo Pit route to door unlocked.</span>');
    }
    // 퀘스트 UI
    if(!hasKey){
      setQuest('🔑 QUEST:<br>Find the hidden key.');
    } else if(doorGroup){
      const dd=Math.floor(Math.hypot(px-doorGroup.position.x,pz-doorGroup.position.z)*1.5);
      if(!doorOpened){
        setQuest(`🚪 QUEST:<br>Cross the Bingo Pit & open the door.<br><span style="color:#00ff66;font-size:13px">📍 Door: ${dd}m</span>`);
      } else {
        setQuest('🏃 QUEST:<br><span style="color:#11ff77;font-weight:900">Step into the escape portal!</span>');
      }
    }
    // 문 상호작용
    if(doorGroup){
      const dd=Math.hypot(px-doorGroup.position.x,pz-doorGroup.position.z);
      if(hasKey&&dd<2.8&&!doorOpened){
        setPrompt('🚪 [E] Open Door',true); setInteract('🚪',true);
      } else if(!hasKey&&dd<1.6){
        toast('🔒 Locked. Find the golden key.');
        setPrompt('',false); setInteract('',false);
      } else {
        setPrompt('',false); setInteract('',false);
      }
      // 문 열기 애니메이션
      if(doorOpened&&doorPivot){
        if(doorPivot.rotation.y>-Math.PI/2) doorPivot.rotation.y-=0.055;
        else {
          // 탈출 센서
          if(Math.hypot(px-escapeSensor.x,pz-escapeSensor.z)<1.6){
            gameActive=false; stopScream();
            document.getElementById('clear-rec').textContent=`⏱ Escape Time: ${rm}m ${rs}s`;
            document.getElementById('clear').style.display='flex';
            if(platform==='pc') document.exitPointerLock();
            return;
          }
        }
      }
    }
  }

  // ─ 카메라 적용 ─
  rig.position.set(px+bobX,py+PLAYER_H+bobY,pz);
  rig.rotation.set(smoothPitch+pitTiltX,smoothYaw,pitTiltZ,'YXZ');
  camera.position.copy(rig.position);
  camera.rotation.copy(rig.rotation);

  renderer.render(scene,camera);
}

// ─ 초기 씬 빌드 ─
genMaze(); buildSurface();
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
