<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, minimal-ui">
    <title>The Backrooms - Escape</title>
    <style>
        html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; background:#0d0d0b; touch-action:none; -webkit-touch-callout:none; user-select:none; -webkit-user-select:none; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        canvas { display:block; width:100%!important; height:100%!important; position:absolute; top:0; left:0; z-index:1; }
        #vhs-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle,rgba(0,0,0,0) 35%,rgba(0,0,0,0.8) 100%); pointer-events:none; z-index:2; }
        #glitch-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0); opacity:0; pointer-events:none; z-index:3; transition:background-color 0.6s ease,opacity 0.6s ease; }
        #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:4px; height:4px; background:rgba(255,255,255,0.3); border-radius:50%; pointer-events:none; z-index:5; display:none; }
        #cctv-ui { position:absolute; top:25px; left:25px; color:rgba(220,40,40,0.9); font-weight:bold; font-size:15px; z-index:210; letter-spacing:1.5px; pointer-events:none; font-family:monospace; display:none; text-shadow:0 0 6px rgba(220,40,40,0.6); }
        #quest-ui { position:absolute; top:60px; left:25px; color:#dfd29e; font-weight:bold; font-size:14px; z-index:210; letter-spacing:1px; pointer-events:none; background:rgba(15,14,11,0.85); padding:10px 16px; border-left:3px solid #bfae6f; border-radius:0 4px 4px 0; display:none; text-shadow:0 1px 3px rgba(0,0,0,0.8); box-shadow:0 4px 10px rgba(0,0,0,0.5); }
        #interact-prompt { position:absolute; top:55%; left:50%; transform:translate(-50%,-50%); color:#fff; background:rgba(0,0,0,0.8); border:1px solid #bfae6f; padding:8px 16px; border-radius:4px; font-weight:bold; font-size:14px; z-index:100; display:none; pointer-events:none; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.5); }
        #top-controls { position:absolute; top:16px; right:16px; z-index:220; display:none; flex-direction:column; align-items:flex-end; gap:6px; }
        #ui-container { color:#d4cfb4; background:rgba(10,10,8,0.96); padding:14px; border-radius:6px; border:1px solid #3a382e; width:220px; transition:all 0.3s cubic-bezier(0.25,1,0.5,1); max-height:450px; opacity:1; overflow:hidden; transform-origin:top right; box-shadow:0 10px 25px rgba(0,0,0,0.7); display:flex; flex-direction:column; gap:12px; }
        #ui-container.collapsed { max-height:0px; padding:0px 14px; opacity:0; border:0px solid transparent; pointer-events:none; }
        .btn { background:#1c1b17; color:#bfae6f; border:1px solid #3a382e; padding:8px 14px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:12px; white-space:nowrap; transition:all 0.2s; width:100%; text-align:center; box-sizing:border-box; }
        .btn:hover { background:#2b2922; color:#dfd29e; }
        .setting-row { display:flex; flex-direction:column; gap:4px; font-size:12px; color:#bfae6f; font-weight:bold; }
        .setting-row div { display:flex; justify-content:space-between; color:#d4cfb4; font-weight:normal; }
        .setting-row input { width:100%; accent-color:#bfae6f; margin-top:2px; }
        #mobile-controls-right { position:absolute; bottom:30px; right:30px; display:none; flex-direction:column; gap:15px; z-index:220; }
        .circle-btn { width:64px; height:64px; background:rgba(22,21,18,0.92); border:2px solid #4a4537; border-radius:50%; color:#d4cfb4; font-size:24px; display:flex; justify-content:center; align-items:center; cursor:pointer; touch-action:none; box-shadow:0 6px 14px rgba(0,0,0,0.7); }
        .circle-btn.active { background:#bfae6f; color:#111; border-color:#fff; }
        #btn-mobile-interact { background:#e2cc76!important; color:#111!important; border-color:#fff!important; display:none; font-size:28px; animation:pulse 1.2s infinite; z-index:230; }
        @keyframes pulse { 0%{transform:scale(1);box-shadow:0 0 0px rgba(226,204,118,0.6)} 50%{transform:scale(1.15);box-shadow:0 0 20px rgba(226,204,118,0.9)} 100%{transform:scale(1);box-shadow:0 0 0px rgba(226,204,118,0.6)} }
        #stamina-container { position:absolute; bottom:25px; left:50%; transform:translateX(-50%); width:160px; background:rgba(10,10,8,0.9); border:1px solid #3a382e; padding:5px; border-radius:4px; z-index:10; display:none; }
        .stamina-bg { background:rgba(0,0,0,0.7); height:5px; overflow:hidden; border-radius:2px; }
        #stamina-bar { width:100%; height:100%; background:#bfae6f; }
        #heartbeat-ui { position:absolute; bottom:45px; left:50%; transform:translateX(-50%) scale(0); font-size:46px; color:#b81414; text-shadow:0 0 20px rgba(184,20,20,0.9); pointer-events:none; z-index:15; transition:transform 0.1s cubic-bezier(0.175,0.885,0.32,1.275); }
        #game-toast { position:absolute; top:20%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); color:#ffdd66; padding:12px 24px; border:1px solid #bfae6f; border-radius:4px; font-weight:bold; font-size:15px; z-index:300; display:none; box-shadow:0 4px 15px rgba(0,0,0,0.6); pointer-events:none; text-align:center; }
        #start-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:#c5ba85; z-index:200; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#161511; text-align:center; }
        .title-main { font-size:26px; font-weight:600; letter-spacing:6px; margin:0; opacity:0.8; }
        .title-sub { font-size:48px; font-weight:900; letter-spacing:7px; margin:5px 0 0 0; }
        .title-level { font-size:16px; font-weight:500; letter-spacing:3px; margin:8px 0 35px 0; color:#3a382e; }
        .platform-select-box { display:flex; gap:15px; margin-bottom:35px; z-index:210; }
        .platform-choice-btn { background:#1c1b17; color:#dfd59e; border:1px solid #4a4537; padding:12px 24px; font-size:13px; font-weight:bold; border-radius:4px; cursor:pointer; letter-spacing:1.5px; }
        .platform-choice-btn.selected { background:#dfd59e; color:#1c1b17; border-color:#fff; box-shadow:0 6px 20px rgba(223,213,158,0.4); }
        .start-btn-container { position:relative; width:120px; height:120px; display:flex; justify-content:center; align-items:center; cursor:pointer; opacity:0.3; pointer-events:none; }
        .start-btn-container.ready { opacity:1; pointer-events:auto; }
        .circle-ring { position:absolute; border:2px solid rgba(22,21,17,0.5); border-radius:50%; }
        .ring-1 { width:110px; height:110px; } .ring-2 { width:96px; height:96px; } .ring-3 { width:82px; height:82px; border-style:dashed; }
        .start-label { font-size:19px; font-weight:900; letter-spacing:2px; color:#161511; z-index:5; }
        #gameover-screen,#pause-screen,#clear-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(4,4,3,0.97); z-index:150; display:none; flex-direction:column; justify-content:center; align-items:center; }
        #gameover-screen { color:#b82323; } #clear-screen { color:#dfd29e; background:rgba(16,15,11,0.98); }
        .go-btn-box { display:flex; gap:15px; margin-top:30px; }
        .go-btn { background:#240e0e; color:#ff7777; border:1px solid #5c1d1d; padding:14px 28px; font-size:13px; font-weight:bold; border-radius:4px; cursor:pointer; letter-spacing:1px; }
        .go-btn:hover { background:#421616; color:#fff; }
        #joystick-zone { position:absolute; bottom:35px; left:35px; width:120px; height:120px; background:rgba(255,255,255,0.02); border:2px solid rgba(255,255,255,0.1); border-radius:50%; z-index:10; touch-action:none; display:none; }
        #joystick-stick { position:absolute; top:37px; left:37px; width:46px; height:46px; background:rgba(255,255,255,0.25); border-radius:50%; }
        #ladder-hud { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(10,10,8,0.9); border:1px solid #4a4537; border-radius:6px; padding:8px 18px; color:#dfd29e; font-size:14px; font-weight:bold; z-index:210; display:none; pointer-events:none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="vhs-overlay"></div>
<div id="glitch-overlay"></div>
<div id="crosshair"></div>
<div id="cctv-ui">🔴 REC <span id="cctv-time">00:00</span></div>
<div id="quest-ui"></div>
<div id="interact-prompt"></div>
<div id="game-toast"></div>
<div id="heartbeat-ui">❤️</div>
<div id="ladder-hud">🪜 사다리 보유</div>

<div id="start-screen">
    <h2 class="title-main">THE BACKROOMS</h2>
    <h1 class="title-sub">EXPLORATION</h1>
    <div class="title-level">LEVEL 0 - HORROR ESCAPE</div>
    <div class="platform-select-box">
        <button id="pc-select-btn" class="platform-choice-btn" onclick="setPlatformType('pc')">💻 PC CONTROL</button>
        <button id="mobile-select-btn" class="platform-choice-btn" onclick="setPlatformType('mobile')">📱 MOBILE TOUCH</button>
    </div>
    <div id="main-start-trigger" class="start-btn-container" onclick="launchGameCore()">
        <div class="circle-ring ring-1"></div><div class="circle-ring ring-2"></div><div class="circle-ring ring-3"></div>
        <span class="start-label">ENTER</span>
    </div>
</div>

<div id="top-controls">
    <button id="btn-toggle-panel" class="btn" style="background:#222;color:#bfae6f;width:44px;height:38px;font-size:16px;padding:0;" onclick="toggleSettingsPanel()">◢</button>
    <div id="ui-container" class="collapsed">
        <button class="btn" style="background:#661e1e;color:#fff;border-color:#8c2b2b;" onclick="triggerPause(true)">⏸️ PAUSE</button>
        <button class="btn" style="background:#1e4666;color:#fff;border-color:#2b6f8c;" onclick="toggleFullScreen()">📺 FULL SCREEN</button>
        <div class="setting-row"><div><span>Sensitivity</span><span id="txt-sens">1.0</span></div><input type="range" id="cfg-sensitivity" min="0.1" max="2.5" step="0.1" value="1.0" oninput="updateSensitivity(this.value)"></div>
        <div class="setting-row"><div><span>BGM Volume</span><span id="txt-vol-bgm">50%</span></div><input type="range" id="cfg-volume-bgm" min="0" max="100" step="5" value="50" oninput="updateBgmVolume(this.value)"></div>
        <div class="setting-row"><div><span>SFX Volume</span><span id="txt-vol-sfx">70%</span></div><input type="range" id="cfg-volume-sfx" min="0" max="100" step="5" value="70" oninput="updateSfxVolume(this.value)"></div>
    </div>
</div>

<div id="mobile-controls-right">
    <div id="btn-mobile-interact" class="circle-btn">🚪</div>
    <div id="btn-mobile-flash" class="circle-btn active" ontouchstart="handleMobileFlash(event)">🔦</div>
    <div id="btn-mobile-jump" class="circle-btn" style="font-size:20px;font-weight:bold;" ontouchstart="handleMobileJump(event)">▲</div>
</div>
<div id="stamina-container"><div class="stamina-bg"><div id="stamina-bar"></div></div></div>
<div id="joystick-zone"><div id="joystick-stick"></div></div>

<div id="pause-screen">
    <h1 style="font-size:26px;color:#bfae6f;margin-bottom:20px;letter-spacing:2px;">PAUSED</h1>
    <div style="display:flex;gap:12px;">
        <button class="btn" style="color:#fff;border-color:#bfae6f;padding:10px 24px;font-size:14px;width:auto;" onclick="triggerPause(false)">RESUME</button>
        <button class="btn" style="background:#222;color:#ff7777;border-color:#555;padding:10px 24px;font-size:14px;width:auto;" onclick="backToMainMenu()">↩️ MAIN MENU</button>
    </div>
</div>
<div id="gameover-screen">
    <h1 style="font-size:32px;margin-bottom:5px;letter-spacing:3px;">CONNECTION LOST</h1>
    <p id="gameover-cause" style="color:#555;font-size:13px;margin-bottom:25px;"></p>
    <div class="go-btn-box">
        <button class="go-btn" onclick="backToMainMenu()">↩️ MAIN MENU</button>
        <button class="go-btn" style="background:#0e2411;color:#77ff77;border-color:#1d5c28;" onclick="doRespawn()">🛡️ RESPAWN</button>
    </div>
</div>
<div id="clear-screen">
    <h1 style="font-size:36px;margin-bottom:5px;letter-spacing:5px;color:#ffdd66;text-shadow:0 0 15px rgba(255,221,102,0.4)">NOCLIP SUCCESS</h1>
    <p id="clear-time-record" style="color:#ffdd66;font-size:18px;font-weight:bold;margin:0 0 15px 0;letter-spacing:1px;"></p>
    <p style="color:#aaa;font-size:14px;margin-bottom:30px;">You successfully no-clipped out of Backrooms Level 0.</p>
    <button class="go-btn" style="background:#bfae6f;color:#111;border-color:#fff;" onclick="backToMainMenu()">↩️ MAIN MENU</button>
</div>

<script>
// ── 전역 상태 ──────────────────────────────────────────────
let platform=null, isGameOver=false, isPaused=false, gameActive=false;
let isFlashlightOn=true, globalSensitivity=1.0;
let volumeBgmRatio=0.5, volumeSfxRatio=0.7;
const blackoutTriggerTime=90;
let actualRecordTime=0, isSpeedBoosted=false, isPanelExpanded=false;

let playerVelocityY=0, isGrounded=true;
const gravity=-0.014, jumpStrength=0.18;
let lastHeartbeatSoundTime=0;

const basePlayerSpeed=0.11, sprintPlayerSpeed=0.17, exhaustedPlayerSpeed=0.06;
let safeSpawnPosition=new THREE.Vector3();
let hasKey=false, isDoorOpened=false;
let keyMesh=null, doorGroup=null, doorPivot=null;
let globalEscapeSensorPos=new THREE.Vector3();

// ── 맵 설정 ───────────────────────────────────────────────
const mapRows=22, mapCols=22, unitSize=5, wallHeight=5.5;
let mapData=[], instancedWalls=null, lamps=[];

// ── 빙고판 변수 ────────────────────────────────────────────
// 빙고판은 고정(흔들리지 않음), 격자 사이 빈 공간만 낙사
let bingoPits=[];
// pitBounds: 낙사 판정 영역 (테두리 제외한 안쪽)
let pitBounds={ minX:0,maxX:0,minZ:0,maxZ:0,active:false };
// pitOuterBounds: 빙고판 전체 외곽 (테두리 포함)
let pitOuterBounds={ minX:0,maxX:0,minZ:0,maxZ:0 };
const pathThickness=0.32;
// 빙고판 주변 넓은 평지 반경 (타일 단위)
const PIT_CLEAR_RADIUS=3; // 빙고판 중심에서 이 반경 내 벽 제거

// ── 지하 시스템 ────────────────────────────────────────────
let isUnderground=false;
let undergroundObjects=[];
let ladderItemMesh=null;
let hasLadder=false;
let isLadderPlaced=false;
let ladderPlacedMesh=null;
let escapeHolePos=new THREE.Vector3();
let escapeHoleMesh=null;
let undergroundSpawnPos=new THREE.Vector3();
let pitDropX=0, pitDropZ=0;
const UG_Y=-28;         // 지하 바닥 Y
const UG_WALL_H=5.0;    // 지하 벽 높이
const UG_UNIT=4.0;      // 지하 타일 크기
// 사다리 올라가기: 사다리 앞에서 점프하면 자동으로 지상 복귀
let ladderClimbActive=false;
let ladderClimbTimer=0;

// ── Three.js 초기화 ────────────────────────────────────────
const backroomsYellow=0xbaa761;
const scene=new THREE.Scene();
scene.background=new THREE.Color(backroomsYellow);
scene.fog=new THREE.FogExp2(backroomsYellow,0.05);

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,500);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:"high-performance"});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
document.body.appendChild(renderer.domElement);

const ambientLight=new THREE.AmbientLight(0xfffdb8,0.85);
scene.add(ambientLight);

const fpsRig=new THREE.Group(); scene.add(fpsRig);
const flashlight=new THREE.SpotLight(0xfffbf0,1.8,40,Math.PI/4.5,0.6,0.6);
const flashlightTarget=new THREE.Object3D();
flashlightTarget.position.set(0,0,-10);
fpsRig.add(flashlight,flashlightTarget);
flashlight.target=flashlightTarget;

const flashBodyGeo=new THREE.CylinderGeometry(0.04,0.03,0.25,8); flashBodyGeo.rotateX(Math.PI/2);
const flashHeadGeo=new THREE.CylinderGeometry(0.06,0.04,0.08,8); flashHeadGeo.rotateX(Math.PI/2); flashHeadGeo.translate(0,0,-0.13);
const flashMat=new THREE.MeshStandardMaterial({color:0x222222,metalness:0.8});
const flashlightMesh=new THREE.Group();
flashlightMesh.add(new THREE.Mesh(flashBodyGeo,flashMat),new THREE.Mesh(flashHeadGeo,flashMat));
const lensMesh=new THREE.Mesh(new THREE.CircleGeometry(0.05,8),new THREE.MeshBasicMaterial({color:0xffffee}));
lensMesh.position.set(0,0,-0.17); lensMesh.rotation.y=Math.PI;
flashlightMesh.add(lensMesh);
flashlightMesh.position.set(0.28,-0.22,-0.4);
fpsRig.add(flashlightMesh);

const armMat=new THREE.MeshStandardMaterial({color:0x151515,roughness:0.6});
const leftArm=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.025,0.5,8),armMat); leftArm.rotateX(Math.PI/2.3); leftArm.position.set(-0.25,-0.25,-0.3); fpsRig.add(leftArm);
const rightArm=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.025,0.5,8),armMat); rightArm.rotateX(Math.PI/2.3); rightArm.position.set(0.25,-0.25,-0.3); fpsRig.add(rightArm);

// ── 텍스처 생성 ────────────────────────────────────────────
function makeWallTex(){
    const s=256,cv=document.createElement('canvas'); cv.width=cv.height=s;
    const c=cv.getContext('2d'); c.fillStyle='#dfd5a0'; c.fillRect(0,0,s,s);
    const d=c.getImageData(0,0,s,s).data;
    for(let i=0;i<d.length;i+=4){if(Math.random()<0.12){const n=(Math.random()-0.5)*16;d[i]=Math.max(0,Math.min(255,d[i]+n-6));d[i+1]=Math.max(0,Math.min(255,d[i+1]+n-6));d[i+2]=Math.max(0,Math.min(255,d[i+2]+n-8));}}
    c.putImageData(new ImageData(d,s,s),0,0);
    c.strokeStyle='rgba(194,183,126,0.45)'; c.lineWidth=1.5;
    for(let x=0;x<s;x+=32){c.beginPath();c.moveTo(x,0);c.lineTo(x,s);c.stroke();}
    const t=new THREE.CanvasTexture(cv); t.anisotropy=Math.min(4,renderer.capabilities.getMaxAnisotropy()||1); return t;
}
function makeFloorTex(){
    const s=512,cv=document.createElement('canvas'); cv.width=cv.height=s;
    const c=cv.getContext('2d'); c.fillStyle='#837543'; c.fillRect(0,0,s,s);
    const id=c.getImageData(0,0,s,s); const d=id.data;
    for(let i=0;i<d.length;i+=4){const n=(Math.random()-0.5)*24;d[i]=Math.max(0,Math.min(255,d[i]+n));d[i+1]=Math.max(0,Math.min(255,d[i+1]+n));d[i+2]=Math.max(0,Math.min(255,d[i+2]+n*0.8));}
    c.putImageData(id,0,0);
    const t=new THREE.CanvasTexture(cv); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(16,16); t.anisotropy=Math.min(4,renderer.capabilities.getMaxAnisotropy()||1); return t;
}
function makeCeilTex(){
    const s=256,cv=document.createElement('canvas'); cv.width=cv.height=s;
    const c=cv.getContext('2d'); c.fillStyle='#d3c79b'; c.fillRect(0,0,s,s);
    const id=c.getImageData(0,0,s,s); const d=id.data;
    for(let i=0;i<d.length;i+=4){const n=(Math.random()-0.5)*8;d[i]=Math.max(0,Math.min(255,d[i]+n));d[i+1]=Math.max(0,Math.min(255,d[i+1]+n));d[i+2]=Math.max(0,Math.min(255,d[i+2]+n));}
    c.putImageData(id,0,0);
    const t=new THREE.CanvasTexture(cv); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(22,22); t.anisotropy=Math.min(4,renderer.capabilities.getMaxAnisotropy()||1); return t;
}
const wallTex=makeWallTex(), floorTex=makeFloorTex(), ceilTex=makeCeilTex();
const wallMat=new THREE.MeshStandardMaterial({map:wallTex,roughness:0.85});
const floorMat=new THREE.MeshStandardMaterial({map:floorTex,roughness:0.95});
const ceilMat=new THREE.MeshStandardMaterial({map:ceilTex,roughness:0.88});

// ── 미로 생성 ──────────────────────────────────────────────
// pitClearCenter: 빙고판 주변 평지를 만들 중심 좌표 (row,col)
let pitClearCenterRow=-1, pitClearCenterCol=-1;

function generateRandomMaze(){
    mapData=Array(mapRows).fill().map(()=>Array(mapCols).fill(1));
    let vis=Array(mapRows).fill().map(()=>Array(mapCols).fill(false));
    function carve(r,c){
        vis[r][c]=true; mapData[r][c]=0;
        const dirs=[[-2,0],[2,0],[0,-2],[0,2]].sort(()=>Math.random()-0.5);
        for(let[dr,dc]of dirs){let nr=r+dr,nc=c+dc;if(nr>0&&nr<mapRows-1&&nc>0&&nc<mapCols-1&&!vis[nr][nc]){mapData[r+dr/2][c+dc/2]=0;carve(nr,nc);}}
    }
    carve(1,1);
    // 기본 평지 3개
    for(let k=0;k<3;k++){
        let cr=Math.floor(Math.random()*(mapRows-6))+3, cc=Math.floor(Math.random()*(mapCols-6))+3;
        for(let r=cr-2;r<=cr+2;r++) for(let c=cc-2;c<=cc+2;c++) if(r>0&&r<mapRows-1&&c>0&&c<mapCols-1) mapData[r][c]=0;
    }
    // 경계
    for(let r=0;r<mapRows;r++){mapData[r][0]=1;mapData[r][mapCols-1]=1;}
    for(let c=0;c<mapCols;c++){mapData[0][c]=1;mapData[mapRows-1][c]=1;}
}

// 빙고판 주변 평지 확보 (맵 데이터에서 벽 제거)
function clearAreaAroundPit(centerRow, centerCol){
    pitClearCenterRow=centerRow; pitClearCenterCol=centerCol;
    const R=PIT_CLEAR_RADIUS;
    for(let r=centerRow-R;r<=centerRow+R;r++){
        for(let c=centerCol-R;c<=centerCol+R;c++){
            if(r>0&&r<mapRows-1&&c>0&&c<mapCols-1) mapData[r][c]=0;
        }
    }
}

function buildMazeGraphics(){
    if(instancedWalls) scene.remove(instancedWalls);
    lamps.forEach(l=>scene.remove(l)); lamps=[];
    let wc=0;
    for(let r=0;r<mapRows;r++) for(let c=0;c<mapCols;c++) if(mapData[r][c]===1) wc++;
    const wGeo=new THREE.BoxGeometry(unitSize,wallHeight,unitSize);
    instancedWalls=new THREE.InstancedMesh(wGeo,wallMat,wc);
    let dummy=new THREE.Object3D(),idx=0;
    for(let r=0;r<mapRows;r++){
        for(let c=0;c<mapCols;c++){
            const x=(c-mapCols/2)*unitSize+unitSize/2, z=(r-mapRows/2)*unitSize+unitSize/2;
            if(mapData[r][c]===1){ dummy.position.set(x,wallHeight/2,z); dummy.updateMatrix(); instancedWalls.setMatrixAt(idx++,dummy.matrix); }
            else if(mapData[r][c]===0&&Math.random()<0.12){
                const lg=new THREE.Group();
                lg.add(new THREE.Mesh(new THREE.BoxGeometry(2.4,0.05,1.2),new THREE.MeshStandardMaterial({color:0x333333,roughness:0.8})));
                const p=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.06,1.0),new THREE.MeshBasicMaterial({color:0xffffe0})); p.position.y=-0.01; lg.add(p);
                lg.position.set(x,wallHeight-0.02,z); if(Math.random()>0.5) lg.rotation.y=Math.PI/2;
                scene.add(lg); lamps.push(lg);
                const pl=new THREE.PointLight(0xfff5cc,0.6,11); pl.position.set(x,wallHeight-0.3,z); scene.add(pl);
            }
        }
    }
    scene.add(instancedWalls);
    const mW=mapCols*unitSize, mH=mapRows*unitSize;
    const f=new THREE.Mesh(new THREE.PlaneGeometry(mW,mH),floorMat); f.rotation.x=-Math.PI/2; scene.add(f);
    const cl=new THREE.Mesh(new THREE.PlaneGeometry(mW,mH),ceilMat); cl.rotation.x=Math.PI/2; cl.position.y=wallHeight; scene.add(cl);
}

function getSafeSpawn(avoidPos=null,minDist=0){
    for(let i=0;i<400;i++){
        let r=Math.floor(Math.random()*mapRows), c=Math.floor(Math.random()*mapCols);
        if(mapData[r][c]===0){
            let sx=(c-mapCols/2)*unitSize+unitSize/2, sz=(r-mapRows/2)*unitSize+unitSize/2;
            if(avoidPos){let d=Math.sqrt(Math.pow(sx-avoidPos.x,2)+Math.pow(sz-avoidPos.z,2));if(d<minDist)continue;}
            return{x:sx,z:sz,row:r,col:c};
        }
    }
    return{x:unitSize,z:unitSize,row:1,col:1};
}

// ── 빙고판 구덩이 생성 ─────────────────────────────────────
// 수정사항:
//  1. 빙고판 주변 넓은 평지 확보 (PIT_CLEAR_RADIUS 타일)
//  2. 격자는 고정 (흔들리지 않음)
//  3. 구멍 안에 지하 공간이 보이도록 어두운 공간 시각화
//  4. 테두리만 밟을 수 있고 안쪽 격자 사이는 낙사
function clearAndBuildBingoPit(doorCenterX, doorCenterZ, dirAngle){
    bingoPits.forEach(p=>{if(p&&p.parent) scene.remove(p);});
    bingoPits=[];
    pitBounds.active=false;

    // 빙고판 중심 = 문 앞 한 타일
    let pcX=doorCenterX, pcZ=doorCenterZ;
    if(Math.abs(dirAngle)<0.1)          pcZ+=unitSize;
    else if(Math.abs(dirAngle-Math.PI)<0.1) pcZ-=unitSize;
    else if(Math.abs(dirAngle-Math.PI/2)<0.1) pcX+=unitSize;
    else                                pcX-=unitSize;

    pitDropX=pcX; pitDropZ=pcZ;

    // 빙고판 크기: unitSize * 1.8 정사각형
    const PW=unitSize*1.8; // 빙고판 폭
    const BORDER=0.6;      // 테두리 두께 (안전 구역)

    // 낙사 판정: 테두리 안쪽 영역
    pitBounds.minX=pcX-PW/2+BORDER; pitBounds.maxX=pcX+PW/2-BORDER;
    pitBounds.minZ=pcZ-PW/2+BORDER; pitBounds.maxZ=pcZ+PW/2-BORDER;
    pitBounds.active=true;
    pitBounds.cx=pcX; pitBounds.cz=pcZ;

    // 전체 외곽 (테두리 포함)
    pitOuterBounds.minX=pcX-PW/2; pitOuterBounds.maxX=pcX+PW/2;
    pitOuterBounds.minZ=pcZ-PW/2; pitOuterBounds.maxZ=pcZ+PW/2;

    // 빙고판 주변 평지 확보 (맵 데이터 수정 후 그래픽 재빌드)
    const pitRow=Math.floor((pcZ-unitSize/2+(mapRows*unitSize)/2)/unitSize);
    const pitCol=Math.floor((pcX-unitSize/2+(mapCols*unitSize)/2)/unitSize);
    clearAreaAroundPit(pitRow, pitCol);
    buildMazeGraphics(); // 평지 확보 후 그래픽 재빌드

    // ─ 구덩이 안 지하 공간 시각화 ─
    // 구멍 바닥: 완전히 어두운 박스 (지하가 보이는 효과)
    const voidGeo=new THREE.BoxGeometry(PW-BORDER*2,30,PW-BORDER*2);
    const voidMat=new THREE.MeshBasicMaterial({color:0x000000});
    const voidMesh=new THREE.Mesh(voidGeo,voidMat);
    voidMesh.position.set(pcX,-15,pcZ);
    scene.add(voidMesh); bingoPits.push(voidMesh);

    // 구멍 안 희미한 빛 (지하 느낌)
    const pitLight=new THREE.PointLight(0x001122,1.5,12);
    pitLight.position.set(pcX,-3,pcZ);
    scene.add(pitLight); bingoPits.push(pitLight);

    // ─ 격자 선 (고정, 흔들리지 않음) ─
    const metalMat=new THREE.MeshStandardMaterial({color:0x2d2b22,roughness:0.5,metalness:0.8});
    const lineCount=4;
    const spacing=(PW-BORDER*2)/(lineCount-1);

    // 가로 격자선 (Z 방향으로 간격)
    for(let i=0;i<lineCount;i++){
        const oz=-(PW/2-BORDER)+i*spacing;
        const m=new THREE.Mesh(new THREE.BoxGeometry(PW,0.1,pathThickness),metalMat);
        m.position.set(pcX,0.02,pcZ+oz);
        scene.add(m); bingoPits.push(m);
    }
    // 세로 격자선 (X 방향으로 간격)
    for(let i=0;i<lineCount;i++){
        const ox=-(PW/2-BORDER)+i*spacing;
        const m=new THREE.Mesh(new THREE.BoxGeometry(pathThickness,0.1,PW),metalMat);
        m.position.set(pcX+ox,0.02,pcZ);
        scene.add(m); bingoPits.push(m);
    }

    // ─ 테두리 프레임 (4면, 안전하게 밟을 수 있음) ─
    const bMat=new THREE.MeshStandardMaterial({color:0x111008,roughness:0.4,metalness:0.9});
    const bH=0.14;
    // 앞
    const fb=new THREE.Mesh(new THREE.BoxGeometry(PW,bH,BORDER),bMat); fb.position.set(pcX,0.03,pcZ-PW/2+BORDER/2); scene.add(fb); bingoPits.push(fb);
    // 뒤
    const bb=new THREE.Mesh(new THREE.BoxGeometry(PW,bH,BORDER),bMat); bb.position.set(pcX,0.03,pcZ+PW/2-BORDER/2); scene.add(bb); bingoPits.push(bb);
    // 왼
    const lb=new THREE.Mesh(new THREE.BoxGeometry(BORDER,bH,PW),bMat); lb.position.set(pcX-PW/2+BORDER/2,0.03,pcZ); scene.add(lb); bingoPits.push(lb);
    // 오른
    const rb=new THREE.Mesh(new THREE.BoxGeometry(BORDER,bH,PW),bMat); rb.position.set(pcX+PW/2-BORDER/2,0.03,pcZ); scene.add(rb); bingoPits.push(rb);
}

// ── 지하 공간 생성 ─────────────────────────────────────────
function buildUndergroundLevel(){
    undergroundObjects.forEach(o=>scene.remove(o)); undergroundObjects=[];
    isLadderPlaced=false; ladderClimbActive=false; ladderClimbTimer=0;
    if(ladderPlacedMesh){scene.remove(ladderPlacedMesh);ladderPlacedMesh=null;}

    const ugRows=12, ugCols=12;
    let ugMap=Array(ugRows).fill().map(()=>Array(ugCols).fill(1));
    let ugVis=Array(ugRows).fill().map(()=>Array(ugCols).fill(false));
    function ugCarve(r,c){
        ugVis[r][c]=true; ugMap[r][c]=0;
        const dirs=[[-2,0],[2,0],[0,-2],[0,2]].sort(()=>Math.random()-0.5);
        for(let[dr,dc]of dirs){let nr=r+dr,nc=c+dc;if(nr>0&&nr<ugRows-1&&nc>0&&nc<ugCols-1&&!ugVis[nr][nc]){ugMap[r+dr/2][c+dc/2]=0;ugCarve(nr,nc);}}
    }
    ugCarve(1,1);
    for(let r=0;r<ugRows;r++){ugMap[r][0]=1;ugMap[r][ugCols-1]=1;}
    for(let c=0;c<ugCols;c++){ugMap[0][c]=1;ugMap[ugRows-1][c]=1;}

    const offX=pitDropX, offZ=pitDropZ;
    const baseY=UG_Y;

    // 벽
    const ugWMat=new THREE.MeshStandardMaterial({color:0x120e0a,roughness:0.95});
    let wc=0; for(let r=0;r<ugRows;r++) for(let c=0;c<ugCols;c++) if(ugMap[r][c]===1) wc++;
    const ugWalls=new THREE.InstancedMesh(new THREE.BoxGeometry(UG_UNIT,UG_WALL_H,UG_UNIT),ugWMat,wc);
    let dum=new THREE.Object3D(),uidx=0;
    for(let r=0;r<ugRows;r++){
        for(let c=0;c<ugCols;c++){
            if(ugMap[r][c]===1){
                const x=offX+(c-ugCols/2)*UG_UNIT+UG_UNIT/2;
                const z=offZ+(r-ugRows/2)*UG_UNIT+UG_UNIT/2;
                dum.position.set(x,baseY+UG_WALL_H/2,z); dum.updateMatrix(); ugWalls.setMatrixAt(uidx++,dum.matrix);
            }
        }
    }
    scene.add(ugWalls); undergroundObjects.push(ugWalls);

    // 바닥/천장
    const ugFW=ugCols*UG_UNIT, ugFH=ugRows*UG_UNIT;
    const ugFloor=new THREE.Mesh(new THREE.PlaneGeometry(ugFW,ugFH),new THREE.MeshStandardMaterial({color:0x0a0806,roughness:1}));
    ugFloor.rotation.x=-Math.PI/2; ugFloor.position.set(offX,baseY,offZ);
    scene.add(ugFloor); undergroundObjects.push(ugFloor);
    const ugCeil=new THREE.Mesh(new THREE.PlaneGeometry(ugFW,ugFH),new THREE.MeshStandardMaterial({color:0x0d0b09,roughness:1}));
    ugCeil.rotation.x=Math.PI/2; ugCeil.position.set(offX,baseY+UG_WALL_H,offZ);
    scene.add(ugCeil); undergroundObjects.push(ugCeil);

    // 조명
    const ugAmb=new THREE.AmbientLight(0x0a0302,0.6); scene.add(ugAmb); undergroundObjects.push(ugAmb);
    for(let i=0;i<4;i++){
        for(let att=0;att<50;att++){
            let lr=Math.floor(Math.random()*(ugRows-2))+1, lc=Math.floor(Math.random()*(ugCols-2))+1;
            if(ugMap[lr][lc]===0){
                const lx=offX+(lc-ugCols/2)*UG_UNIT+UG_UNIT/2;
                const lz=offZ+(lr-ugRows/2)*UG_UNIT+UG_UNIT/2;
                const pl=new THREE.PointLight(0xff1500,0.4,UG_UNIT*3.5);
                pl.position.set(lx,baseY+UG_WALL_H-0.4,lz);
                scene.add(pl); undergroundObjects.push(pl); break;
            }
        }
    }

    // ─ 사다리 아이템 (랜덤 빈 칸) ─
    if(ladderItemMesh){scene.remove(ladderItemMesh);ladderItemMesh=null;}
    for(let att=0;att<300;att++){
        let lr=Math.floor(Math.random()*(ugRows-2))+1, lc=Math.floor(Math.random()*(ugCols-2))+1;
        if(ugMap[lr][lc]===0){
            const lx=offX+(lc-ugCols/2)*UG_UNIT+UG_UNIT/2;
            const lz=offZ+(lr-ugRows/2)*UG_UNIT+UG_UNIT/2;
            ladderItemMesh=makeLadderItem();
            ladderItemMesh.position.set(lx,baseY+0.5,lz);
            scene.add(ladderItemMesh); undergroundObjects.push(ladderItemMesh); break;
        }
    }

    // ─ 탈출 구멍: 경계 벽에 구멍 뚫기 ─
    // 경계 벽 중 한 면에 구멍 위치 설정
    // 구멍 높이 = 벽 높이 60% 위치 (플레이어 키 1.5보다 높음)
    const holeH=UG_WALL_H*0.62;
    const holeW=UG_UNIT*0.7, holeHH=UG_WALL_H*0.38;

    // 4방향 중 랜덤으로 구멍 위치 선택
    const sides=[0,1,2,3].sort(()=>Math.random()-0.5);
    let holeSet=false;
    for(let si=0;si<sides.length&&!holeSet;si++){
        const side=sides[si];
        for(let att=0;att<20&&!holeSet;att++){
            let holeRow,holeCol,hx,hz,holeAngle;
            if(side===0){holeRow=0;holeCol=Math.floor(Math.random()*(ugCols-2))+1;hx=offX+(holeCol-ugCols/2)*UG_UNIT+UG_UNIT/2;hz=offZ+(holeRow-ugRows/2)*UG_UNIT;holeAngle=0;}
            else if(side===1){holeRow=ugRows-1;holeCol=Math.floor(Math.random()*(ugCols-2))+1;hx=offX+(holeCol-ugCols/2)*UG_UNIT+UG_UNIT/2;hz=offZ+(holeRow-ugRows/2)*UG_UNIT+UG_UNIT;holeAngle=Math.PI;}
            else if(side===2){holeRow=Math.floor(Math.random()*(ugRows-2))+1;holeCol=0;hx=offX+(holeCol-ugCols/2)*UG_UNIT;hz=offZ+(holeRow-ugRows/2)*UG_UNIT+UG_UNIT/2;holeAngle=Math.PI/2;}
            else{holeRow=Math.floor(Math.random()*(ugRows-2))+1;holeCol=ugCols-1;hx=offX+(holeCol-ugCols/2)*UG_UNIT+UG_UNIT;hz=offZ+(holeRow-ugRows/2)*UG_UNIT+UG_UNIT/2;holeAngle=-Math.PI/2;}

            // 구멍 시각화: 검은 사각형 (벽 안에 박힘)
            if(escapeHoleMesh){scene.remove(escapeHoleMesh);}
            const hGeo=new THREE.BoxGeometry(holeW,holeHH,0.5);
            const hMat=new THREE.MeshBasicMaterial({color:0x000000});
            escapeHoleMesh=new THREE.Mesh(hGeo,hMat);

            // 구멍 위치: 벽 면에 붙임
            let hMeshX=hx, hMeshZ=hz;
            if(side===0) hMeshZ=hz+0.3;
            else if(side===1) hMeshZ=hz-0.3;
            else if(side===2) hMeshX=hx+0.3;
            else hMeshX=hx-0.3;

            escapeHoleMesh.position.set(hMeshX,baseY+holeH,hMeshZ);
            if(side===2||side===3) escapeHoleMesh.rotation.y=Math.PI/2;
            scene.add(escapeHoleMesh); undergroundObjects.push(escapeHoleMesh);

            // 구멍 주변 초록 빛 (탈출구 표시)
            const hLight=new THREE.PointLight(0x00ff88,3.0,UG_UNIT*4);
            hLight.position.set(hMeshX,baseY+holeH,hMeshZ);
            scene.add(hLight); undergroundObjects.push(hLight);

            // 탈출 구멍 위치 저장
            escapeHolePos.set(hMeshX,baseY+holeH,hMeshZ);
            holeSet=true;
        }
    }

    // 지하 스폰 위치 = 구덩이 중앙 바로 아래
    undergroundSpawnPos.set(offX,baseY+0.5,offZ);

    // 지하 맵 데이터 저장 (충돌용)
    window._ugData={map:ugMap,rows:ugRows,cols:ugCols,offX,offZ,baseY};
}

function makeLadderItem(){
    const g=new THREE.Group();
    const m=new THREE.MeshStandardMaterial({color:0xcc8833,roughness:0.6,metalness:0.3});
    g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.07,0.9,0.07),m),{position:{x:-0.18,y:0,z:0}}));
    const rp=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.9,0.07),m); rp.position.x=0.18; g.add(rp);
    for(let i=0;i<4;i++){const r=new THREE.Mesh(new THREE.BoxGeometry(0.42,0.05,0.07),m);r.position.y=-0.3+i*0.2;g.add(r);}
    const lgt=new THREE.PointLight(0xffaa44,2.5,6); lgt.position.y=0.6; g.add(lgt);
    return g;
}

// ─ 설치된 사다리 (벽에 기댄 형태) ─
function makePlacedLadder(px,py,pz,angle){
    const g=new THREE.Group();
    const m=new THREE.MeshStandardMaterial({color:0x8b5e2a,roughness:0.7});
    // 두 기둥 (길이 = UG_WALL_H * 0.75)
    const postH=UG_WALL_H*0.75;
    const lp=new THREE.Mesh(new THREE.BoxGeometry(0.1,postH,0.1),m); lp.position.set(-0.3,postH/2,0); g.add(lp);
    const rp=new THREE.Mesh(new THREE.BoxGeometry(0.1,postH,0.1),m); rp.position.set(0.3,postH/2,0); g.add(rp);
    // 발판 7개
    const steps=7;
    for(let i=0;i<steps;i++){
        const s=new THREE.Mesh(new THREE.BoxGeometry(0.72,0.07,0.12),m);
        s.position.set(0,0.35+i*(postH-0.35)/(steps-1),0); g.add(s);
    }
    g.position.set(px,py,pz);
    g.rotation.y=angle;
    g.rotation.x=0.15; // 약간 기울어짐
    scene.add(g); undergroundObjects.push(g);
    return g;
}

// ── 문 스폰 ────────────────────────────────────────────────
function spawnWallAttachedDoor(){
    if(doorGroup) scene.remove(doorGroup);
    doorGroup=new THREE.Group();
    let dRow=1,dCol=1,angle=0,ox=0,oz=0,found=false;
    for(let i=0;i<500;i++){
        let r=Math.floor(Math.random()*(mapRows-2))+1, c=Math.floor(Math.random()*(mapCols-2))+1;
        if(mapData[r][c]===0){
            if(mapData[r-1][c]===1){ox=0;oz=-2.45;angle=0;dRow=r;dCol=c;found=true;break;}
            if(mapData[r+1][c]===1){ox=0;oz=2.45;angle=Math.PI;dRow=r;dCol=c;found=true;break;}
            if(mapData[r][c-1]===1){ox=-2.45;oz=0;angle=Math.PI/2;dRow=r;dCol=c;found=true;break;}
            if(mapData[r][c+1]===1){ox=2.45;oz=0;angle=-Math.PI/2;dRow=r;dCol=c;found=true;break;}
        }
    }
    const tx=(dCol-mapCols/2)*unitSize+unitSize/2, tz=(dRow-mapRows/2)*unitSize+unitSize/2;
    doorGroup.position.set(tx+ox,0,tz+oz);
    doorGroup.rotation.y=angle;
    const fMat=new THREE.MeshStandardMaterial({color:0x1d140e,roughness:0.9});
    doorGroup.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.15,2.8,0.2),fMat),{position:{x:-0.85,y:1.4,z:0}}));
    doorGroup.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.15,2.8,0.2),fMat),{position:{x:0.85,y:1.4,z:0}}));
    doorGroup.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(1.8,0.15,0.2),fMat),{position:{x:0,y:2.8,z:0}}));
    doorPivot=new THREE.Group(); doorPivot.position.set(-0.78,1.4,0);
    const dp=new THREE.Mesh(new THREE.BoxGeometry(1.56,2.65,0.12),new THREE.MeshStandardMaterial({color:0x3d2516,roughness:0.75}));
    dp.position.set(0.78,0,0); doorPivot.add(dp);
    const knob=new THREE.Mesh(new THREE.SphereGeometry(0.06,12,12),new THREE.MeshStandardMaterial({color:0xccaa44,metalness:0.8,roughness:0.1}));
    knob.position.set(0.65,0,0.09); dp.add(knob);
    doorGroup.add(doorPivot);
    const esc=new THREE.Mesh(new THREE.BoxGeometry(1.6,2.8,3.0),new THREE.MeshBasicMaterial({color:0x000000,side:THREE.BackSide}));
    esc.position.set(0,1.4,-1.5); doorGroup.add(esc);
    scene.add(doorGroup); doorGroup.updateMatrixWorld(true);
    let so=new THREE.Vector3(0,1.0,-2.2); so.applyQuaternion(doorGroup.quaternion);
    globalEscapeSensorPos.copy(doorGroup.position).add(so);
    const gl=new THREE.PointLight(0x00ff55,0,6); gl.position.set(0,1.4,-0.2); doorGroup.add(gl); doorGroup.greenLight=gl;

    // 빙고판 생성 (문 앞)
    clearAndBuildBingoPit(tx,tz,angle);
    return{x:doorGroup.position.x,z:doorGroup.position.z};
}

function spawnQuestItems(playerPos){
    isDoorOpened=false;
    spawnWallAttachedDoor();
    if(keyMesh) scene.remove(keyMesh);
    keyMesh=new THREE.Group();
    keyMesh.add(new THREE.Mesh(new THREE.TorusGeometry(0.14,0.04,8,16),new THREE.MeshStandardMaterial({color:0xffaa00,metalness:0.9,roughness:0.05})));

let joystickInput={x:0,y:0},jDistRatio=0,jTouchId=null,rTouchId=null,prevX=0,prevY=0,jStart={x:0,y:0};
const jZone=document.getElementById('joystick-zone'),jStick=document.getElementById('joystick-stick');
function calcJoystick(cx,cy){

    if(d>mr){dx=dx/d*mr;dy=dy/d*mr;}

}

},{passive:false});

// ── 충돌 체크 ──────────────────────────────────────────────
function checkCollision(oldPos,tentPos,radius=0.55){
    if(isNaN(tentPos.x)||isNaN(tentPos.z))return{x:oldPos.x,z:oldPos.z};

    if(isUnderground&&window._ugData){
        const ug=window._ugData;
        let res={x:tentPos.x,z:tentPos.z};
        const pc=Math.floor((oldPos.x-ug.offX+(ug.cols*UG_UNIT)/2)/UG_UNIT);
        const pr=Math.floor((oldPos.z-ug.offZ+(ug.rows*UG_UNIT)/2)/UG_UNIT);
        for(let r=pr-1;r<=pr+1;r++){
            for(let c=pc-1;c<=pc+1;c++){
                if(r<0||r>=ug.rows||c<0||c>=ug.cols)continue;
                if(ug.map[r][c]===1){
                    const wx=ug.offX+(c-ug.cols/2)*UG_UNIT+UG_UNIT/2;
                    const wz=ug.offZ+(r-ug.rows/2)*UG_UNIT+UG_UNIT/2;
                    const mnX=wx-UG_UNIT/2-radius,mxX=wx+UG_UNIT/2+radius;
                    const mnZ=wz-UG_UNIT/2-radius,mxZ=wz+UG_UNIT/2+radius;
                    if(res.x>mnX&&res.x<mxX&&res.z>mnZ&&res.z<mxZ){
                        if(oldPos.x<=mnX||oldPos.x>=mxX)res.x=oldPos.x;
                        if(oldPos.z<=mnZ||oldPos.z>=mxZ)res.z=oldPos.z;
                    }
                }
            }
        }
        return res;
    }

    if(player.position.y<-0.05) return{x:tentPos.x,z:tentPos.z};
    if(isDoorOpened&&doorGroup&&player.position.distanceTo(doorGroup.position)<3.2) return{x:tentPos.x,z:tentPos.z};

    let res={x:tentPos.x,z:tentPos.z};
    const pc=Math.floor((oldPos.x-unitSize/2+(mapCols*unitSize)/2)/unitSize);
    const pr=Math.floor((oldPos.z-unitSize/2+(mapRows*unitSize)/2)/unitSize);
    for(let r=pr-1;r<=pr+1;r++){
        for(let c=pc-1;c<=pc+1;c++){
            if(r<0||r>=mapRows||c<0||c>=mapCols)continue;
            if(mapData[r][c]===1){
                const wx=(c-mapCols/2)*unitSize+unitSize/2;
                const wz=(r-mapRows/2)*unitSize+unitSize/2;
                const mnX=wx-unitSize/2-radius,mxX=wx+unitSize/2+radius;
                const mnZ=wz-unitSize/2-radius,mxZ=wz+unitSize/2+radius;
                if(res.x>mnX&&res.x<mxX&&res.z>mnZ&&res.z<mxZ){
                    if(oldPos.x<=mnX||oldPos.x>=mxX)res.x=oldPos.x;
                    if(oldPos.z<=mnZ||oldPos.z>=mxZ)res.z=oldPos.z;
                }
            }
        }
    }
    return res;
}

// ── 엔티티 AI ──────────────────────────────────────────────
function processEntityAI(e,pp){
    if(isUnderground)return;
    const ep=e.mesh.position;
    const dist=ep.distanceTo(pp);
    e.stuckCheckTimer++;
    if(e.stuckCheckTimer>50){
        if(ep.distanceTo(e.lastPos)<0.15) e.patrolTarget=getSafeSpawn(pp);
        e.lastPos.copy(ep); e.stuckCheckTimer=0;
    }
    if(dist<14&&!isGameOver&&player.position.y>=-0.2){
        if(!e.screamActive){e.screamActive=true;playScream(true);}
        e.state='chase';
    }else if(e.state==='chase'&&(dist>20||player.position.y<-0.2)){
        e.state='patrol';e.screamActive=false;playScream(false);e.patrolTarget=getSafeSpawn(pp);
    }
    let dest=e.state==='chase'?pp:e.patrolTarget;
    if(e.state==='patrol'&&Math.abs(ep.x-dest.x)<1.2&&Math.abs(ep.z-dest.z)<1.2) e.patrolTarget=getSafeSpawn(pp);
    const dx=dest.x-ep.x,dz=dest.z-ep.z,len=Math.sqrt(dx*dx+dz*dz);
    if(len>0.1){
        const sp=e.state==='chase'?e.speed*1.45:e.speed;
        const te={x:ep.x+dx/len*sp,z:ep.z+dz/len*sp};
        const se=checkCollision({x:ep.x,z:ep.z},te,0.5);
        ep.x=se.x;ep.z=se.z;e.mesh.rotation.y=Math.atan2(dx,dz);
    }
    if(e.state==='chase')updateScreamVol(dist);
}

// ── 오디오 ─────────────────────────────────────────────────
let audioCtx=null,ambGain=null,sfxGain=null,screamGain=null,keyHintGain=null;
let scOsc1=null,scOsc2=null,ambOsc1=null,ambOsc2=null,khOsc=null;
let lastFootstep=0;
function initAudio(){
    try{
        if(audioCtx)return;
        audioCtx=new(window.AudioContext||window.webkitAudioContext)();
        ambGain=audioCtx.createGain();syncBgm();
        const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=85;
        ambOsc1=audioCtx.createOscillator();ambOsc1.type='sine';ambOsc1.frequency.value=55;
        ambOsc2=audioCtx.createOscillator();ambOsc2.type='triangle';ambOsc2.frequency.value=57.5;
        ambOsc1.connect(lp);ambOsc2.connect(lp);lp.connect(ambGain);ambGain.connect(audioCtx.destination);
        ambOsc1.start();ambOsc2.start();
        sfxGain=audioCtx.createGain();sfxGain.connect(audioCtx.destination);
        screamGain=audioCtx.createGain();screamGain.gain.value=0.001;screamGain.connect(sfxGain);
        keyHintGain=audioCtx.createGain();keyHintGain.gain.value=0.001;
        khOsc=audioCtx.createOscillator();khOsc.type='sine';khOsc.frequency.value=140;
        const kf=audioCtx.createBiquadFilter();kf.type='bandpass';kf.frequency.value=250;
        khOsc.connect(kf);kf.connect(keyHintGain);keyHintGain.connect(sfxGain);khOsc.start();
    }catch(e){}
}
function syncBgm(){if(ambGain&&audioCtx)ambGain.gain.value=volumeBgmRatio*0.35;}
function playScream(on){
    if(!audioCtx||!screamGain)return;
    if(on){try{scOsc1=audioCtx.createOscillator();scOsc1.type='sawtooth';scOsc2=audioCtx.createOscillator();scOsc2.type='square';scOsc1.frequency.value=280;scOsc2.frequency.value=450;const n=audioCtx.currentTime;scOsc1.frequency.linearRampToValueAtTime(700,n+0.3);scOsc1.frequency.linearRampToValueAtTime(150,n+0.7);scOsc2.frequency.linearRampToValueAtTime(900,n+0.4);scOsc1.connect(screamGain);scOsc2.connect(screamGain);scOsc1.start();scOsc2.start();}catch(e){}}
    else{try{scOsc1?.stop();scOsc1=null;scOsc2?.stop();scOsc2=null;}catch(e){}}
}
function updateScreamVol(d){if(!screamGain||!audioCtx)return;screamGain.gain.setTargetAtTime(Math.max(0.001,(18-d)/18)*0.65*volumeSfxRatio,audioCtx.currentTime,0.1);}
function playFootstep(v){if(!audioCtx||isPaused||isGameOver||!sfxGain)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=isUnderground?45:65;g.gain.setValueAtTime(v*0.12*volumeSfxRatio,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);o.connect(g);g.connect(sfxGain);o.start();o.stop(audioCtx.currentTime+0.11);}catch(e){}}
function playHeartbeat(v){if(!audioCtx||isPaused||isGameOver||!sfxGain)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=48;g.gain.setValueAtTime(v*0.65*volumeSfxRatio,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);o.connect(g);g.connect(sfxGain);o.start();o.stop(audioCtx.currentTime+0.13);}catch(e){}}
function processKeyHint(pp){
    if(!keyHintGain||!keyMesh||hasKey||!audioCtx||isUnderground)return;
    const d=pp.distanceTo(keyMesh.position);
    if(d<16){keyHintGain.gain.setTargetAtTime(Math.max(0.001,(16-d)/16)*0.45*volumeSfxRatio,audioCtx.currentTime,0.15);khOsc.frequency.value=140+Math.sin(Date.now()*0.004)*25;}
    else keyHintGain.gain.setTargetAtTime(0.001,audioCtx.currentTime,0.2);
}

    const g=document.getElementById('glitch-overlay');
    g.style.background='rgba(10,9,7,0.65)';g.style.opacity=1;
    scene.background.setHex(0x1a1914);scene.fog.color.setHex(0x1a1914);scene.fog.density=0.12;
    ambientLight.intensity=0.15;
    entities.forEach(e=>e.speed=e.baseSpeed*1.45);
}

// ── 지하 진입/복귀 ─────────────────────────────────────────
function enterUnderground(){
    isUnderground=true;
    buildUndergroundLevel();
    player.position.copy(undergroundSpawnPos);
    playerVelocityY=0;isGrounded=true;
    scene.background.setHex(0x030201);
    scene.fog.color.setHex(0x030201);
    scene.fog.density=0.07;
    ambientLight.intensity=0.05;
    showToast("⬇ 지하로 떨어졌습니다!\n🪜 사다리 아이템을 찾으세요!");
}

function returnToSurface(){
    isUnderground=false;
    undergroundObjects.forEach(o=>scene.remove(o));undergroundObjects=[];
    if(ladderPlacedMesh){scene.remove(ladderPlacedMesh);ladderPlacedMesh=null;}
    ladderClimbActive=false;ladderClimbTimer=0;
    // 빙고판 건너편(문 반대쪽)으로 복귀
    const dx=pitDropX-(doorGroup?doorGroup.position.x:pitDropX);
    const dz=pitDropZ-(doorGroup?doorGroup.position.z:pitDropZ);
    const len=Math.sqrt(dx*dx+dz*dz)||1;
    player.position.set(pitDropX+dx/len*3.5, 0.5, pitDropZ+dz/len*3.5);
    playerVelocityY=0;isGrounded=true;
    restoreSurfaceAtmosphere();
    document.getElementById('ladder-hud').style.display='none';
    showToast("⬆ 지상으로 돌아왔습니다!\n🚪 빙고판을 건너 문을 여세요!");
}

// ── 메인 루프 ──────────────────────────────────────────────
function animate(){
    requestAnimationFrame(animate);
    if(!gameActive){camera.position.set(0,15,20);camera.lookAt(0,0,0);renderer.render(scene,camera);return;}
    if(isGameOver||isPaused)return;

    actualRecordTime+=1/60;
    const cm=Math.floor(actualRecordTime/60),cs=Math.floor(actualRecordTime%60);
    document.getElementById('cctv-time').textContent=`${String(cm).padStart(2,'0')}:${String(cs).padStart(2,'0')}`;
    if(actualRecordTime>=blackoutTriggerTime&&!isSpeedBoosted&&!isUnderground){isSpeedBoosted=true;triggerBlackout();}

    if(keyMesh&&!hasKey) keyMesh.rotation.y+=0.025;
    if(ladderItemMesh&&!hasLadder) ladderItemMesh.rotation.y+=0.03;
    processKeyHint(player.position);

    // ─ 빙고판 낙사 판정 (지상, 고정 격자) ─
    if(!isUnderground&&pitBounds.active&&player.position.y>=-0.05&&player.position.y<0.5){
        const inOuter=(player.position.x>pitOuterBounds.minX&&player.position.x<pitOuterBounds.maxX&&
                       player.position.z>pitOuterBounds.minZ&&player.position.z<pitOuterBounds.maxZ);
        if(inOuter){
            const inInner=(player.position.x>pitBounds.minX&&player.position.x<pitBounds.maxX&&
                           player.position.z>pitBounds.minZ&&player.position.z<pitBounds.maxZ);
            if(inInner){
                // 안쪽: 격자 선 위에 있는지 확인 (고정 위치)
                let onGrid=false;
                for(const p of bingoPits){
                    if(!p.isMesh)continue;
                    const pg=p.geometry;
                    if(!pg)continue;
                    const pw=pg.parameters?.width, ph=pg.parameters?.depth;
                    if(!pw||!ph)continue;
                    // 가로선: depth가 pathThickness에 가까움
                    if(ph<=pathThickness*2){
                        if(Math.abs(player.position.z-p.position.z)<pathThickness*1.8){onGrid=true;break;}
                    }
                    // 세로선: width가 pathThickness에 가까움
                    if(pw<=pathThickness*2){
                        if(Math.abs(player.position.x-p.position.x)<pathThickness*1.8){onGrid=true;break;}
                    }
                }
                if(!onGrid&&isGrounded){
                    isGrounded=false;
                    playerVelocityY=-0.025;
                }
            }
            // 테두리 위는 항상 안전 (inOuter && !inInner)
        }
    }

    // ─ 지하 진입 트리거 ─
    if(!isUnderground&&player.position.y<-6&&!isGameOver){
        enterUnderground(); return;
    }

    // ─ 지하 로직 ─
    if(isUnderground&&window._ugData){
        const baseY=window._ugData.baseY;

        // 바닥 고정
        if(player.position.y<=baseY+0.02){player.position.y=baseY+0.02;playerVelocityY=0;isGrounded=true;}

        // 사다리 아이템 획득
        if(!hasLadder&&ladderItemMesh&&player.position.distanceTo(ladderItemMesh.position)<1.6){
            hasLadder=true;
            scene.remove(ladderItemMesh);
            const i=undergroundObjects.indexOf(ladderItemMesh);if(i>-1)undergroundObjects.splice(i,1);
            ladderItemMesh=null;
            document.getElementById('ladder-hud').style.display='block';
            showToast("🪜 사다리 획득!\n빛나는 구멍 앞에서 [E]로 설치!");
        }

        // 사다리 설치 프롬프트
        if(hasLadder&&!isLadderPlaced&&escapeHolePos){
            const dh=player.position.distanceTo(escapeHolePos);
            if(dh<5.0){
                if(platform==='pc') setInteractPrompt('🪜 [E] 사다리 설치');
                else setMobileInteract('🪜');
            }else{setInteractPrompt(null);setMobileInteract(null);}
        }

        // 사다리 타고 올라가기
        // 설치된 사다리 근처에서 점프하면 자동으로 위로 이동 → 지상 복귀
        if(isLadderPlaced&&ladderPlacedMesh){
            const dl=player.position.distanceTo(ladderPlacedMesh.position);
            if(dl<2.2){
                if(platform==='pc') setInteractPrompt('⬆ [SPACE] 사다리 타고 탈출!');
                else setMobileInteract('⬆');
                // 점프하면 사다리 타기 시작
                if(!isGrounded&&playerVelocityY>0){
                    ladderClimbActive=true;
                }
                if(ladderClimbActive){
                    // 중력 무시하고 위로 강제 이동
                    playerVelocityY=0;
                    player.position.y+=0.06;
                    ladderClimbTimer++;
                    // 천장 높이에 도달하면 지상 복귀
                    if(player.position.y>=baseY+UG_WALL_H*0.85||ladderClimbTimer>80){
                        returnToSurface(); return;
                    }
                }
            }else{
                if(!ladderClimbActive){setInteractPrompt(null);setMobileInteract(null);}
            }
        }

        // 퀘스트 UI
        if(!hasLadder) setQuestUI("🪜 UNDERGROUND:<br>사다리 아이템을 찾으세요!<br><span style='color:#ff6644;font-size:12px;'>빛나는 아이템을 찾아라</span>");
        else if(!isLadderPlaced) setQuestUI("🪜 UNDERGROUND:<br>빛나는 구멍 앞에 사다리 설치!<br><span style='color:#00ff88;font-size:12px;'>[E] 설치</span>");
        else setQuestUI("⬆ UNDERGROUND:<br>사다리 타고 탈출!<br><span style='color:#ffdd66;font-size:12px;'>[SPACE/▲] 점프 → 올라가기</span>");

    }else if(!isUnderground){
        // ─ 지상 퀘스트 UI ─
        if(!hasKey) setQuestUI("🔑 QUEST:<br>숨겨진 열쇠를 찾으세요.");
        else if(doorGroup&&!isDoorOpened){
            const dd=Math.floor(player.position.distanceTo(doorGroup.position)*1.5);
            setQuestUI(`🚪 QUEST:<br>빙고판을 건너 문을 여세요.<br><span style='color:#00ff66;font-size:15px;'>📍 문까지: ${dd}m</span>`);
        }else if(isDoorOpened){
            setQuestUI("🏃 QUEST:<br><span style='color:#11ff77;font-weight:900;'>탈출 포털로 들어가세요!</span>");
        }

        // ─ 지상 문 상호작용 ─
        if(doorGroup){
            const dd=player.position.distanceTo(doorGroup.position);
            if(hasKey&&dd<2.5&&!isDoorOpened){
                if(platform==='pc') setInteractPrompt('🚪 [E] 문 열기');
                else setMobileInteract('🚪');
            }else if(!hasKey||isDoorOpened){
                setInteractPrompt(null); setMobileInteract(null);
            }
            if(isDoorOpened&&doorPivot){
                if(doorPivot.rotation.y>-Math.PI/2){doorPivot.rotation.y-=0.06;doorGroup.updateMatrixWorld(true);}
                else{
                    if(player.position.distanceTo(globalEscapeSensorPos)<1.5){
                        gameActive=false;playScream(false);
                        document.getElementById('clear-time-record').textContent=`⏱️ 탈출 시간: ${cm}m ${cs}s`;
                        document.getElementById('clear-screen').style.display='flex';
                        if(platform==='pc')document.exitPointerLock();
                        return;
                    }
                }
            }else if(!hasKey&&dd<1.4){
                showToast("🔒 문이 잠겨있습니다. 황금 열쇠를 찾으세요.");
            }
        }

        // ─ 열쇠 획득 ─
        if(!hasKey&&keyMesh&&player.position.distanceTo(keyMesh.position)<1.3){
            hasKey=true;scene.remove(keyMesh);
            if(keyHintGain)keyHintGain.gain.value=0.001;
            if(doorGroup?.greenLight)doorGroup.greenLight.intensity=3.5;
            showToast("🔑 황금 열쇠 획득!\n<span style='color:#00ff66;'>빙고판을 건너 탈출문을 여세요!</span>");
        }
    }

    // ─ 카메라/이동 ─
    smoothCamX+=(cameraAngleX-smoothCamX)*0.25;
    smoothCamY+=(cameraAngleY-smoothCamY)*0.25;
    const fwX=-Math.sin(smoothCamX),fwZ=-Math.cos(smoothCamX);
    const rtX=Math.cos(smoothCamX),rtZ=-Math.sin(smoothCamX);
    let mX=0,mZ=0;
    if(platform==='pc'){
        if(keys.w)mZ+=1;if(keys.s)mZ-=1;if(keys.a)mX-=1;if(keys.d)mX+=1;
        isMoving=(mX!==0||mZ!==0);isSprinting=(isMoving&&keys.shift&&!isExhausted);
    }else{
        if(Math.abs(joystickInput.x)>0.05||Math.abs(joystickInput.y)>0.05){mX=joystickInput.x;mZ=-joystickInput.y;}
        isMoving=(mX!==0||mZ!==0);isSprinting=(isMoving&&jDistRatio>0.75&&!isExhausted);
    }
    if(isSprinting){stamina-=0.45;if(stamina<=0){stamina=0;isExhausted=true;}}
    else{stamina+=isMoving?0.25:1.2;if(stamina>=100){stamina=100;isExhausted=false;}}
    const sb=document.getElementById('stamina-bar');
    if(sb){sb.style.width=`${stamina}%`;sb.style.background=isExhausted?'#d62828':'#bfae6f';}

    const spd=isExhausted?exhaustedPlayerSpeed:(isSprinting?sprintPlayerSpeed:basePlayerSpeed);
    const fX=(fwX*mZ+rtX*mX)*spd, fZ=(fwZ*mZ+rtZ*mX)*spd;
    const rt=Date.now()*0.005;
    let bobX=0,bobY=0;

    if(isMoving&&!ladderClimbActive){
        const tp={x:player.position.x+fX,z:player.position.z+fZ};
        const sp=checkCollision(player.position,new THREE.Vector3(tp.x,0,tp.z),0.55);
        player.position.x=sp.x;player.position.z=sp.z;
        if(isGrounded){
            const wf=isSprinting?2.5:1.5;
            bobX=Math.sin(rt*wf)*0.035;bobY=Math.cos(rt*wf*2)*0.025;
            const now=Date.now();
            if(now-lastFootstep>(isSprinting?230:380)){playFootstep(isSprinting?0.8:0.4);lastFootstep=now;}
        }
    }

    // 중력 (사다리 타는 중 제외)
    if(!ladderClimbActive){
        playerVelocityY+=gravity;
        player.position.y+=playerVelocityY;
    }

    // 바닥 처리
    if(isUnderground&&window._ugData){
        const by=window._ugData.baseY;
        if(player.position.y<=by+0.02){player.position.y=by+0.02;playerVelocityY=0;isGrounded=true;}
    }else if(!isUnderground){
        if(player.position.y<=0&&player.position.y>-0.5){
            const inOuter=(pitBounds.active&&player.position.x>pitOuterBounds.minX&&player.position.x<pitOuterBounds.maxX&&player.position.z>pitOuterBounds.minZ&&player.position.z<pitOuterBounds.maxZ);
            const inInner=(pitBounds.active&&player.position.x>pitBounds.minX&&player.position.x<pitBounds.maxX&&player.position.z>pitBounds.minZ&&player.position.z<pitBounds.maxZ);
            if(!inOuter||(inOuter&&!inInner)){player.position.y=0;playerVelocityY=0;isGrounded=true;}
        }
    }

    player.rotation.y=smoothCamX;
    fpsRig.position.set(player.position.x,player.position.y+1.5,player.position.z);
    fpsRig.rotation.set(smoothCamY,smoothCamX,0,'YXZ');
    const aw=isMoving?Math.sin(rt*(isSprinting?2.5:1.5))*0.08:0;
    const ai=Math.sin(Date.now()*0.001)*0.01;
    leftArm.position.z=-0.3+aw+ai;leftArm.position.y=-0.25+Math.abs(aw)*0.3;
    rightArm.position.z=-0.3-aw+ai;rightArm.position.y=-0.25+Math.abs(aw)*0.3;
    flashlightMesh.position.z=-0.4-aw+ai;flashlightMesh.position.y=-0.22+Math.abs(aw)*0.3;
    flashlight.position.set(0.28,-0.22,-0.4);flashlightTarget.position.set(0.28,-0.22,-15);

    // 엔티티
    let closestDist=999;
    if(!isUnderground){
        entities.forEach(e=>{
            processEntityAI(e,player.position);
            const d=player.position.distanceTo(e.mesh.position);
            if(d<closestDist)closestDist=d;
            const ws=e.state==='chase'?0.045:0.015;
            e.core.position.y=1.3+Math.sin(Date.now()*ws)*0.12;
            e.legs.forEach((leg,i)=>{const o=i*(Math.PI/3);leg.rotation.x=Math.sin(Date.now()*ws*2+o)*0.55;leg.rotation.z=0.3+Math.cos(Date.now()*ws+o)*0.2;});
        });
    }

    const hu=document.getElementById('heartbeat-ui');
    if(!isUnderground&&closestDist<12&&player.position.y>=-0.5){
        const pf=(12-closestDist)/12,hi=800-pf*550;
        const now=Date.now();
        if(now-lastHeartbeatSoundTime>hi){playHeartbeat(0.4+pf*0.5);lastHeartbeatSoundTime=now;hu.style.transform=`translateX(-50%) scale(${1.2+pf*0.5})`;setTimeout(()=>hu.style.transform=`translateX(-50%) scale(${0.9+pf*0.2})`,120);}
    }else{hu.style.transform='translateX(-50%) scale(0)';}

    if(!isUnderground&&closestDist<1.2&&player.position.y>=-0.5){triggerGameOver("엔티티에게 잡혔습니다.");return;}

    camera.position.set(player.position.x+bobX,player.position.y+1.5+bobY,player.position.z);
    camera.rotation.set(smoothCamY,smoothCamX,0,'YXZ');
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
