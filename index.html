<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>The Backrooms - Advanced High Quality Edition</title>
    <style>
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #1a1913; 
            touch-action: none; -webkit-touch-callout: none;
            user-select: none; -webkit-user-select: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas { display: block; width: 100% !important; height: 100% !important; position: absolute; top:0; left:0; z-index: 1; }
        
        #vhs-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%);
            pointer-events: none; z-index: 2;
        }
        #cctv-ui {
            position: absolute; top: 20px; right: 20px; color: rgba(204, 41, 41, 0.7); font-weight: bold;
            font-size: 14px; z-index: 210; letter-spacing: 1px; pointer-events: none; font-family: monospace; display: none;
        }

        #ui-container {
            position: absolute; top: 16px; left: 16px; color: #d4cfb4;
            background: rgba(15, 15, 10, 0.9); padding: 12px; border-radius: 4px; 
            border: 1px solid #444135; z-index: 10; display: none;
        }
        .btn {
            background: #25241f; color: #bfae6f; border: 1px solid #444135; padding: 8px 14px; 
            margin-right: 5px; margin-bottom: 5px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;
        }
        .btn.active { background: #733333; color: #fff; border-color: #9c4444; }

        #mobile-controls-right {
            position: absolute; bottom: 30px; right: 30px; display: none; flex-direction: column; gap: 15px; z-index: 10;
        }
        .circle-btn {
            width: 60px; height: 60px; background: rgba(37, 36, 31, 0.9); border: 2px solid #5c5746; 
            border-radius: 50%; color: #d4cfb4; font-size: 22px; display: flex; justify-content: center; 
            align-items: center; cursor: pointer; touch-action: none; box-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }
        .circle-btn.active { background: #c7b256; color: #000; border-color: #fff; }

        #stamina-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 140px; background: rgba(15, 15, 10, 0.85); border: 2px solid #444135; padding: 4px; border-radius: 4px; z-index: 10; display: none;
        }
        .stamina-bg { background: rgba(0,0,0,0.6); height: 6px; overflow: hidden; }
        #stamina-bar { width: 100%; height: 100%; background: #c7b256; }

        #glitch-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(220, 40, 40, 0); opacity: 0; pointer-events: none; z-index: 3;
        }

        #heartbeat-ui {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) scale(0);
            font-size: 42px; color: #cc1111; text-shadow: 0 0 16px rgba(200, 10, 10, 0.8);
            pointer-events: none; z-index: 15; transition: transform 0.1s ease-out;
        }

        /* 시작 화면 기기 매칭 UI 디자인 */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.05); z-index: 200; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #000000; text-align: center;
        }
        .title-main { font-size: 24px; font-weight: 600; letter-spacing: 4px; margin: 0; text-shadow: 0 2px 4px rgba(255,255,255,0.4); }
        .title-sub { font-size: 44px; font-weight: bold; letter-spacing: 5px; margin: 5px 0 0 0; text-shadow: 0 2px 5px rgba(255,255,255,0.4); }
        .title-level { font-size: 16px; font-weight: 500; letter-spacing: 2px; margin: 8px 0 25px 0; color: #222; }
        
        .platform-select-box { display: flex; gap: 15px; margin-bottom: 30px; z-index: 210; }
        .platform-choice-btn {
            background: rgba(30, 29, 24, 0.85); color: #dfd59e; border: 1px solid #5c553a;
            padding: 10px 20px; font-size: 13px; font-weight: bold; border-radius: 4px; cursor: pointer; letter-spacing: 1px;
            transition: all 0.2s;
        }
        .platform-choice-btn.selected {
            background: #dfd59e; color: #000; border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .start-btn-container {
            position: relative; width: 110px; height: 110px; display: flex; justify-content: center; align-items: center; cursor: pointer; opacity: 0.4; pointer-events: none; transition: opacity 0.3s;
        }
        .start-btn-container.ready { opacity: 1; pointer-events: auto; }
        .circle-ring { position: absolute; border: 1.5px solid rgba(0,0,0,0.4); border-radius: 50%; pointer-events: none; }
        .ring-1 { width: 100px; height: 100px; }
        .ring-2 { width: 88px; height: 88px; }
        .ring-3 { width: 76px; height: 76px; border-style: dashed; }
        .start-label { font-size: 18px; font-weight: bold; letter-spacing: 2px; color: #111; z-index: 5; margin-top: -2px; }

        #gameover-screen, #pause-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 150; display: none; flex-direction: column;
            justify-content: center; align-items: center; color: #a62424;
        }
        .go-btn-box { display: flex; gap: 15px; margin-top: 25px; }
        .go-btn {
            background: #2b1212; color: #ff8888; border: 1.5px solid #6b2424; padding: 12px 24px;
            font-size: 13px; font-weight: bold; border-radius: 4px; cursor: pointer; letter-spacing: 1px;
        }
        .go-btn:hover { background: #4a1d1d; color: #fff; }

        #joystick-zone {
            position: absolute; bottom: 30px; left: 30px; width: 110px; height: 110px; 
            background: rgba(0,0,0,0.05); border: 2px solid rgba(0,0,0,0.2); border-radius: 50%; z-index: 10; touch-action: none; display: none;
        }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 40px; height: 40px; background: rgba(0,0,0,0.4); border-radius: 50%; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 4px; background: rgba(0,0,0,0.4); border-radius: 50%; pointer-events: none; z-index: 5; display: none; }
        #top-controls { position: absolute; top: 16px; right: 16px; z-index: 12; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="vhs-overlay"></div>
    <div id="glitch-overlay"></div>
    <div id="crosshair"></div>
    <div id="cctv-ui">🔴 REC LIVE <span id="cctv-time">00:00:00</span></div>
    
    <div id="heartbeat-ui">❤️</div>

    <div id="start-screen">
        <h2 class="title-main">THE BACKROOMS</h2>
        <h1 class="title-sub">START EXPLORATION</h1>
        <div class="title-level">LEVEL 0</div>
        
        <div class="platform-select-box">
            <button id="pc-select-btn" class="platform-choice-btn" onclick="setPlatformType('pc')">💻 PC CONTROL</button>
            <button id="mobile-select-btn" class="platform-choice-btn" onclick="setPlatformType('mobile')">📱 MOBILE TOUCH</button>
        </div>

        <div id="main-start-trigger" class="start-btn-container" onclick="launchGameCore()">
            <div class="circle-ring ring-1"></div>
            <div class="circle-ring ring-2"></div>
            <div class="circle-ring ring-3"></div>
            <span class="start-label">START</span>
        </div>
    </div>

    <div id="top-controls">
        <button class="btn" style="margin:0; background:#222; color:#fff;" onclick="triggerPause(true)">⏸️ PAUSE</button>
    </div>

    <div id="ui-container">
        <button id="btn-view" class="btn btn-view" onclick="toggleViewMode()">🎥 1인칭 시점</button>
        <div id="settings-panel">
            <div class="setting-row">
               <span>시점 감도</span>
               <input type="range" id="cfg-sensitivity" min="0.1" max="2.5" step="0.1" value="1.0">
            </div>
        </div>
    </div>

    <div id="mobile-controls-right">
        <div id="btn-mobile-flash" class="circle-btn active" onclick="toggleFlashlight()">🔦</div>
        <div id="btn-mobile-jump" class="circle-btn" style="font-size:20px; font-weight:bold;">▲</div>
    </div>
    <div id="stamina-container"><div class="stamina-bg"><div id="stamina-bar"></div></div></div>
    <div id="joystick-zone"><div id="joystick-stick"></div></div>

    <div id="pause-screen">
        <h1 style="font-size: 26px; color:#bfae6f; margin-bottom:20px;">SYSTEM PAUSED</h1>
        <button class="btn" style="color:#fff; border-color:#bfae6f; padding:10px 20px;" onclick="triggerPause(false)">CONTINUE</button>
    </div>

    <div id="gameover-screen">
        <h1 style="font-size: 28px; margin-bottom: 5px;">SIGNAL LOST</h1>
        <p style="color:#666; font-size:12px; margin-bottom:15px;">플레이어가 엔티티에게 붙잡혔습니다.</p>
        <div class="go-btn-box">
            <button class="go-btn" onclick="backToMainMenu()">↩️ RETURN TO MAIN</button>
            <button class="go-btn" style="background:#152b12; color:#88ff88; border-color:#246b24;" onclick="rollback30SecondsSafe()">🛡️ 30s ROLLBACK SAFE</button>
        </div>
    </div>

    <script>
        let platform = null, viewMode = '3rd', isGameOver = false, isPaused = false, gameActive = false, isFlashlightOn = true, globalSensitivity = 1.0;
        let batteryTimer = 0; const batteryDuration = 240; 

        let playerVelocityY = 0, isGrounded = true;
        const gravity = -0.012, jumpStrength = 0.28;
        let lastHeartbeatSoundTime = 0;

        // 세이프 롤백용 좌표 기록 트래커
        let safeSpawnPosition = new THREE.Vector3();

        const scene = new THREE.Scene();
        const backroomsYellow = 0xdad1a2;
        scene.background = new THREE.Color(backroomsYellow); 
        scene.fog = new THREE.FogExp2(backroomsYellow, 0.038); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.015, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xfffdb8, 0.75); 
        scene.add(ambientLight);

        // 천장 높이 대폭 상향 수정 (6.5 유닛)
        const mapRows = 43, mapCols = 43, unitSize = 5, wallHeight = 6.5;
        let mapData = [], instancedWalls = null, lamps = [];

        function generateWallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#dfd59e'; ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#c5ba82'; ctx.lineWidth = 4;
            for (let x = 0; x < 256; x += 32) {
                ctx.beginPath();
                for (let y = 0; y <= 256; y += 16) {
                    if (y === 0) ctx.moveTo(x + 16, y);
                    else ctx.lineTo(x + 16 + (y % 32 === 0 ? 6 : -6), y);
                }
                ctx.stroke();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const wallMat = new THREE.MeshStandardMaterial({ map: generateWallTexture(), roughness: 0.6, metalness: 0.01 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xb5a973, roughness: 0.95 }); 
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xe5dcba, roughness: 0.7 });

        // 여러 갈래 길이 있는 광장형 랜덤 복합 미로 생성 알고리즘 개편
        function generateRandomMaze() {
            mapData = Array(mapRows).fill().map(() => Array(mapCols).fill(1));
            let visited = Array(mapRows).fill().map(() => Array(mapCols).fill(false));
            function carve(r, c) {
                visited[r][c] = true; mapData[r][c] = 0;
                const dirs = [[-2,0], [2,0], [0,-2], [0,2]].sort(() => Math.random() - 0.5);
                for(let [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    if(nr > 0 && nr < mapRows-1 && nc > 0 && nc < mapCols-1 && !visited[nr][nc]) {
                        mapData[r + dr/2][c + dc/2] = 0; carve(nr, nc);
                    }
                }
            }
            carve(1, 1);
            
            // 🗺️ 랜덤 여러 갈래 다중 광장 공간 파괴 가공 레이어
            for(let k=0; k<12; k++) {
                let centerR = Math.floor(Math.random()*(mapRows-6))+3;
                let centerC = Math.floor(Math.random()*(mapCols-6))+3;
                let size = Math.floor(Math.random()*3)+3; // 3x3 ~ 5x5 규모의 광장 공간 방 배치
                for(let r = centerR-size; r<=centerR+size; r++) {
                    for(let c = centerC-size; c<=centerC+size; c++) {
                        if(r>0 && r<mapRows-1 && c>0 && c<mapCols-1) {
                            mapData[r][c] = 0; // 광장 허물기
                        }
                    }
                }
            }
            // 잔여 통로 완화 통로 추가 개척
            for(let i=0; i<200; i++) {
                let r = Math.floor(Math.random()*(mapRows-2))+1, c = Math.floor(Math.random()*(mapCols-2))+1;
                mapData[r][c] = 0;
            }
        }

        function buildMazeGraphics() {
            if(instancedWalls) scene.remove(instancedWalls);
            lamps.forEach(l => scene.remove(l)); lamps = [];
            let wallCount = 0;
            for(let r=0; r<mapRows; r++) { for(let c=0; c<mapCols; c++) { if(mapData[r][c] === 1) wallCount++; } }

            const wallGeo = new THREE.BoxGeometry(unitSize, wallHeight, unitSize);
            instancedWalls = new THREE.InstancedMesh(wallGeo, wallMat, wallCount);
            let dummy = new THREE.Object3D(), idx = 0;

            for(let r=0; r<mapData.length; r++) {
                for(let c=0; c<mapData[r].length; c++) {
                    const x = (c - mapCols/2) * unitSize + unitSize/2;
                    const z = (r - mapRows/2) * unitSize + unitSize/2;
                    if(mapData[r][c] === 1) {
                        dummy.position.set(x, wallHeight/2, z); dummy.updateMatrix();
                        instancedWalls.setMatrixAt(idx++, dummy.matrix);
                    } else if(Math.random() < 0.09) {
                        const lamp = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.02, 0.8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                        lamp.position.set(x, wallHeight - 0.01, z); scene.add(lamp); lamps.push(lamp);
                        const pl = new THREE.PointLight(0xfffca8, 0.8, 18); pl.position.set(x, wallHeight - 0.3, z); lamp.add(pl);
                    }
                }
            }
            scene.add(instancedWalls);
            const mW = mapCols*unitSize, mH = mapRows*unitSize;
            const f = new THREE.Mesh(new THREE.PlaneGeometry(mW, mH), floorMat); f.rotation.x = -Math.PI/2; scene.add(f);
            const cl = new THREE.Mesh(new THREE.PlaneGeometry(mW, mH), ceilMat); cl.rotation.x = Math.PI/2; cl.position.y = wallHeight; scene.add(cl);
        }

        function getSafeSpawn() {
            while(true) {
                let r = Math.floor(Math.random()*mapRows), c = Math.floor(Math.random()*mapCols);
                if(mapData[r][c] === 0) return { x: (c - mapCols/2)*unitSize + unitSize/2, z: (r - mapRows/2)*unitSize + unitSize/2 };
            }
        }

        generateRandomMaze(); buildMazeGraphics();

        // 🕴️ 고퀄리티 인간형 캐릭터 리그 조립 (헤드, 바디, 양팔, 양다리 분할 구조화)
        let player = new THREE.Group(); scene.add(player);
        let playerParts = []; const hazmatColor = 0xd9ab26;
        const pMat = new THREE.MeshStandardMaterial({ color: hazmatColor, roughness: 0.6 });

        // 몸통 (Torso)
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 0.8, 12), pMat); torso.position.y = 0.85; player.add(torso); playerParts.push(torso);
        // 머리 (Head) & 바이저 가공
        const headGroup = new THREE.Group(); headGroup.position.set(0, 1.4, 0); player.add(headGroup); playerParts.push(headGroup);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), pMat); headGroup.add(head);
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.09, 0.1), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.9 })); visor.position.set(0, 0.02, 0.15); headGroup.add(visor);

        // 양팔 (Arms)
        let leftArm3rd = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.5), pMat); leftArm3rd.position.set(-0.35, 0.8, 0); player.add(leftArm3rd); playerParts.push(leftArm3rd);
        let rightArm3rd = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.5), pMat); rightArm3rd.position.set(0.35, 0.8, 0); player.add(rightArm3rd); playerParts.push(rightArm3rd);
        // 양다리 (Legs)
        let leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.07, 0.55), pMat); leftLeg.position.set(-0.13, 0.28, 0); player.add(leftLeg); playerParts.push(leftLeg);
        let rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.07, 0.55), pMat); rightLeg.position.set(0.13, 0.28, 0); player.add(rightLeg); playerParts.push(rightLeg);

        // 1인칭 전용 핸들링 암 구조체 리깅
        let firstPersonRig = new THREE.Group(); scene.add(firstPersonRig);
        const armMat = new THREE.MeshStandardMaterial({ color: hazmatColor, roughness: 0.7 });
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.5), armMat); leftArm.rotation.x = Math.PI / 2; leftArm.position.set(-0.25, -0.25, -0.35); firstPersonRig.add(leftArm);
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.5), armMat); rightArm.rotation.x = Math.PI / 2; rightArm.position.set(0.25, -0.25, -0.35); firstPersonRig.add(rightArm);

        const flashlightMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.3), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.7 }));
        flashlightMesh.rotation.x = Math.PI / 2; flashlightMesh.position.set(0.25, -0.2, -0.5); firstPersonRig.add(flashlightMesh);

        const flashlight = new THREE.SpotLight(0xfffefa, 14.0, 60, Math.PI / 4.2, 0.6, 0.8); firstPersonRig.add(flashlight);
        flashlight.position.set(0.25, -0.2, -0.5);
        const flashlightTarget = new THREE.Object3D(); flashlightTarget.position.set(0.25, -0.2, -5); firstPersonRig.add(flashlightTarget); flashlight.target = flashlightTarget;

        // 엔티티 기동 파츠 재조립
        let entities = []; const entityColors = [0x090909, 0x1a1108]; 
        for(let i=0; i<2; i++) {
            let ent = new THREE.Group();
            let eMat = new THREE.MeshStandardMaterial({ color: entityColors[i], roughness: 0.9 });
            let body = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.26, 2.2, 6), eMat); body.position.y = 1.1; ent.add(body);
            
            // 움직이는 모션 관절 지지대용 다리 어레이 할당
            let legParts = [];
            for(let j=0; j<6; j++) {
                let t = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.01, 1.5), eMat);
                t.position.set((j%2===0?0.3:-0.3), 0.8, -0.4 + (j*0.2)); t.rotation.z = (j%2===0?0.4:-0.4); ent.add(t);
                legParts.push(t);
            }
            scene.add(ent);
            entities.push({ mesh: ent, legs: legParts, state: 'patrol', patrolTarget: getSafeSpawn(), speed: 0.052 + (i*0.01), stuckCheckTimer: 0, lastPos: new THREE.Vector3() });
        }

        const pSp = getSafeSpawn(); player.position.set(pSp.x, 0, pSp.z); safeSpawnPosition.copy(player.position);
        entities.forEach(e => { const esp = getSafeSpawn(); e.mesh.position.set(esp.x, 0, esp.z); e.lastPos.copy(e.mesh.position); });

        let cameraAngleX = 0, cameraAngleY = 0, targetRotationY = 0;
        let stamina = 100, isExhausted = false, isMoving = false, isSprinting = false;
        const keys = { w: false, a: false, s: false, d: false, shift: false };

        const sensitivityInput = document.getElementById('cfg-sensitivity');
        sensitivityInput.addEventListener('input', (e) => { globalSensitivity = parseFloat(e.target.value); });

        function setPlatformType(type) {
            platform = type;
            document.getElementById('pc-select-btn').classList.remove('selected');
            document.getElementById('mobile-select-btn').classList.remove('selected');
            document.getElementById(type + '-select-btn').classList.add('selected');
            document.getElementById('main-start-trigger').classList.add('ready');
        }

        function launchGameCore() {
            if(!platform) return;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui-container').style.display = 'block';
            document.getElementById('top-controls').style.display = 'block';
            document.getElementById('cctv-ui').style.display = 'block';
            
            if(platform === 'mobile') {
                document.getElementById('joystick-zone').style.display = 'block';
                document.getElementById('mobile-controls-right').style.display = 'flex';
                document.getElementById('stamina-container').style.display = 'block';
            } else {
                document.body.requestPointerLock();
            }
            gameActive = true; 
            initBackroomsAudio();
        }

        function triggerPause(pState) {
            if(!gameActive || isGameOver) return;
            isPaused = pState;
            document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none';
        }

        function toggleFlashlight() {
            isFlashlightOn = !isFlashlightOn;
            const mBtn = document.getElementById('btn-mobile-flash');
            if(isFlashlightOn) mBtn?.classList.add('active'); else mBtn?.classList.remove('active');
        }

        function toggleViewMode() {
            const btn = document.getElementById('btn-view'), ch = document.getElementById('crosshair');
            if (viewMode === '3rd') {
                viewMode = '1st'; btn.textContent = "🎥 3인칭 시점"; btn.classList.add('active'); if(platform === 'pc') ch.style.display = 'block';
                playerParts.forEach(p => p.visible = false); firstPersonRig.visible = true;
            } else {
                viewMode = '3rd'; btn.textContent = "🎥 1인칭 시점"; btn.classList.remove('active'); ch.style.display = 'none';
                playerParts.forEach(p => p.visible = true); firstPersonRig.visible = false;
            }
        }

        document.getElementById('btn-mobile-jump').addEventListener('touchstart', (e) => {
            e.preventDefault(); if(isGrounded && gameActive && !isPaused && !isGameOver) { playerVelocityY = jumpStrength; isGrounded = false; }
        });

        window.addEventListener('keydown', (e) => { 
            const k = e.key.toLowerCase(); if (k in keys) keys[k] = true;
            if (e.key === 'Spacebar' || e.key === ' ') {
                if(isGrounded && gameActive && !isPaused && !isGameOver) { playerVelocityY = jumpStrength; isGrounded = false; }
            }
            if (k === 'f' && gameActive && !isPaused) toggleFlashlight();
            if (k === 'p') triggerPause(!isPaused);
        });
        window.addEventListener('keyup', (e) => { const k = e.key.toLowerCase(); if (k in keys) keys[k] = false; });

        window.addEventListener('mousemove', (e) => {
            if (!gameActive || isGameOver || isPaused || platform !== 'pc') return;
            if (document.pointerLockElement === document.body) {
                const multi = 0.0022 * globalSensitivity; cameraAngleX -= e.movementX * multi; cameraAngleY -= e.movementY * multi;
                cameraAngleY = Math.max(-Math.PI/2.4, Math.min(Math.PI/2.4, cameraAngleY));
            }
        });

        let joystickInput = { x: 0, y: 0 }, joystickDistanceRatio = 0, joystickTouchId = null, rotationTouchId = null, prevX = 0, prevY = 0, joystickStartPos = { x: 0, y: 0 };
        const joystickZone = document.getElementById('joystick-zone'), joystickStick = document.getElementById('joystick-stick');

        function calculateJoystick(cX, cY) {
            let dX = cX - joystickStartPos.x, dY = cY - joystickStartPos.y;
            const dist = Math.sqrt(dX*dX + dY*dY), maxR = 40;
            if (dist > maxR) { dX = (dX / dist) * maxR; dY = (dY / dist) * maxR; }
            joystickStick.style.transform = `translate(${dX}px, ${dY}px)`;
            joystickInput.x = dX / maxR; joystickInput.y = dY / maxR; joystickDistanceRatio = dist / maxR;
        }

        window.addEventListener('touchstart', (e) => {
            if(!gameActive || isGameOver || isPaused || platform !== 'mobile') return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.target.closest('#ui-container') || t.target.closest('#mobile-controls-right') || t.target.closest('#top-controls')) continue;
                if (t.clientX < window.innerWidth / 2 && joystickTouchId === null) {
                    joystickTouchId = t.identifier; joystickZone.style.left = `${t.clientX - 55}px`; joystickZone.style.bottom = `${window.innerHeight - t.clientY - 55}px`;
                    joystickStartPos = { x: t.clientX, y: t.clientY }; calculateJoystick(t.clientX, t.clientY);
                } else if (t.clientX >= window.innerWidth / 2 && rotationTouchId === null) {
                    rotationTouchId = t.identifier; prevX = t.clientX; prevY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if(platform !== 'mobile') return;
            for (let i = 0; i < e.touches.length; i++) {
                const t = e.touches[i];
                if (t.identifier === joystickTouchId) calculateJoystick(t.clientX, t.clientY);
                if (t.identifier === rotationTouchId) {
                    const multi = 0.005 * globalSensitivity; cameraAngleX -= (t.clientX - prevX) * multi; cameraAngleY -= (t.clientY - prevY) * multi;
                    prevX = t.clientX; prevY = t.clientY; cameraAngleY = Math.max(-Math.PI/2.4, Math.min(Math.PI/2.4, cameraAngleY));
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === joystickTouchId) {
                    joystickTouchId = null; joystickStick.style.transform = 'translate(0px, 0px)';
                    joystickInput = { x: 0, y: 0 }; joystickDistanceRatio = 0;
                    joystickZone.style.left = '30px'; joystickZone.style.bottom = '30px';
                }
                if (t.identifier === rotationTouchId) rotationTouchId = null;
            }
        });

        function checkGridCollision(oldPos, tentativePos, radius = 0.6) {
            let res = { x: tentativePos.x, z: tentativePos.z };
            const pCol = Math.floor((oldPos.x - unitSize/2 + (mapCols * unitSize)/2) / unitSize);
            const pRow = Math.floor((oldPos.z - unitSize/2 + (mapRows * unitSize)/2) / unitSize);
            for (let r = pRow - 1; r <= pRow + 1; r++) {
                for (let c = pCol - 1; c <= pCol + 1; c++) {
                    if (r < 0 || r >= mapRows || c < 0 || c >= mapCols) continue;
                    if (mapData[r][c] === 1) {
                        const wX = (c - mapCols/2) * unitSize + unitSize/2;
                        const wZ = (r - mapRows/2) * unitSize + unitSize/2;
                        const minX = wX - unitSize/2 - radius, maxX = wX + unitSize/2 + radius;
                        const minZ = wZ - unitSize/2 - radius, maxZ = wZ + unitSize/2 + radius;
                        if (res.x > minX && res.x < maxX && res.z > minZ && res.z < maxZ) {
                            if (oldPos.x <= minX || oldPos.x >= maxX) res.x = oldPos.x;
                            if (oldPos.z <= minZ || oldPos.z >= maxZ) res.z = oldPos.z;
                        }
                    }
                }
            }
            return res;
        }

        function processEntityAI(e, playerPos) {
            const ePos = e.mesh.position; const dist = ePos.distanceTo(playerPos);
            e.stuckCheckTimer += 1;
            if(e.stuckCheckTimer > 45) {
                if(ePos.distanceTo(e.lastPos) < 0.15) { 
                    const escapeSp = getSafeSpawn(); ePos.set(escapeSp.x, 0, escapeSp.z); e.patrolTarget = getSafeSpawn();
                }
                e.lastPos.copy(ePos); e.stuckCheckTimer = 0;
            }
            if (dist < 18 && !isGameOver) { e.state = 'chase'; } 
            else if (e.state === 'chase' && dist > 24) { e.state = 'patrol'; e.patrolTarget = getSafeSpawn(); }
            let dest = (e.state === 'chase') ? playerPos : e.patrolTarget;
            if(e.state === 'patrol' && Math.abs(ePos.x - dest.x) < 1.2 && Math.abs(ePos.z - dest.z) < 1.2) { e.patrolTarget = getSafeSpawn(); }
            const dX = dest.x - ePos.x, dZ = dest.z - ePos.z; const len = Math.sqrt(dX*dX + dZ*dZ);
            if (len > 0.1) {
                const sp = e.state === 'chase' ? e.speed * 1.2 : e.speed;
                const tenE = { x: ePos.x + (dX / len) * sp, z: ePos.z + (dZ / len) * sp };
                const safeE = checkGridCollision({x:ePos.x, z:ePos.z}, tenE, 0.5);
                ePos.x = safeE.x; ePos.z = safeE.z; e.mesh.lookAt(dest.x, ePos.y, dest.z);
            }
        }

        // 🔊 배경음 및 발소리 재생 신호 합성 인터페이스
        let audioCtx = null, mainGain = null, buzzOsc = null, buzzFilter = null;
        let lastFootstepTime = 0;

        function initBackroomsAudio() {
            try {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                mainGain = audioCtx.createGain(); 
                mainGain.gain.setValueAtTime(0.02, audioCtx.currentTime); // 🔊 유저 요청: 배경음 볼륨 대폭 축소 (0.02)
                
                buzzOsc = audioCtx.createOscillator();
                buzzOsc.type = 'sawtooth';
                buzzOsc.frequency.setValueAtTime(60, audioCtx.currentTime); 

                buzzFilter = audioCtx.createBiquadFilter();
                buzzFilter.type = 'lowpass';
                buzzFilter.frequency.setValueAtTime(140, audioCtx.currentTime);

                buzzOsc.connect(buzzFilter);
                buzzFilter.connect(mainGain);
                mainGain.connect(audioCtx.destination);
                buzzOsc.start();
            } catch(e){}
        }

        // 👣 발소리 사운드 트리거 오디오 레이어
        function playFootstepSound(volume) {
            if (!audioCtx || isPaused || isGameOver) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(75, audioCtx.currentTime); 
            gain.gain.setValueAtTime(volume * 0.18, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.11);
        }

        function playHeartbeatSound(volume, isDouble) {
            if (!audioCtx || isPaused || isGameOver) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(55, audioCtx.currentTime); 
            gain.gain.setValueAtTime(volume * 0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.13);

            if (isDouble) {
                setTimeout(() => {
                    if (isPaused || isGameOver) return;
                    let osc2 = audioCtx.createOscillator();
                    let gain2 = audioCtx.createGain();
                    osc2.type = 'sine'; osc2.frequency.setValueAtTime(50, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(volume * 0.4, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.11);
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.start(); osc2.stop(audioCtx.currentTime + 0.12);
                }, 120);
            }
        }

        // 죽으면 완전히 초기 메인 페이지로 돌아가는 리셋 핸들러
        function backToMainMenu() {
            isGameOver = false; gameActive = false; isPaused = false;
            platform = null;
            document.getElementById('gameover-screen').style.display = 'none';
            document.getElementById('ui-container').style.display = 'none';
            document.getElementById('top-controls').style.display = 'none';
            document.getElementById('cctv-ui').style.display = 'none';
            document.getElementById('joystick-zone').style.display = 'none';
            document.getElementById('mobile-controls-right').style.display = 'none';
            document.getElementById('stamina-container').style.display = 'none';
            
            document.getElementById('pc-select-btn').classList.remove('selected');
            document.getElementById('mobile-select-btn').classList.remove('selected');
            document.getElementById('main-start-trigger').classList.remove('ready');
            document.getElementById('start-screen').style.display = 'flex';
        }

        // 🛡️ 세이프 리턴 시스템: 안전 구역 롤백 맵 재배치
        function rollback30SecondsSafe() {
            isGameOver = false;
            player.position.copy(safeSpawnPosition); // 기록해둔 최초 안전 위치로 역추적 텔레포트
            playerVelocityY = 0; isGrounded = true;
            stamina = 100; isExhausted = false;
            
            // 근접한 엔티티 거리를 강제로 안전반경 외곽으로 리스폰 분산 유도
            entities.forEach(e => {
                const esp = getSafeSpawn();
                e.mesh.position.set(esp.x, 0, esp.z);
                e.state = 'patrol'; e.patrolTarget = esp;
            });
            document.getElementById('gameover-screen').style.display = 'none';
            if(platform === 'pc') document.body.requestPointerLock();
        }

        function resetGame() {
            generateRandomMaze(); buildMazeGraphics();
            const pSp = getSafeSpawn(); player.position.set(pSp.x, 0, pSp.z); safeSpawnPosition.copy(player.position);
            playerVelocityY = 0; isGrounded = true;
            entities.forEach(e => { const esp = getSafeSpawn(); e.mesh.position.set(esp.x, 0, esp.z); e.state = 'patrol'; e.patrolTarget = esp; });
            stamina = 100; cameraAngleX = 0; cameraAngleY = 0; isExhausted = false; isGameOver = false; isPaused = false;
            isFlashlightOn = true; batteryTimer = 0;
            document.getElementById('gameover-screen').style.display = 'none';
            if(platform === 'pc') document.body.requestPointerLock();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!gameActive) {
                const timer = Date.now() * 0.0003;
                camera.position.set(Math.sin(timer)*9, 3.5, Math.cos(timer)*9);
                camera.lookAt(0, 2.0, 0);
                renderer.render(scene, camera);
                return;
            }

            if (isGameOver || isPaused) return;

            // 🔦 4분 루프 연산
            batteryTimer += 1 / 60; let bPower = 1.0;
            let isCurrentlyFlickering = false;

            if (batteryTimer >= batteryDuration) {
                if (Math.random() < 0.1) { bPower = 0.04 + Math.random()*0.08; isCurrentlyFlickering = true; } else { bPower = 0.04; }
            } else if (batteryTimer > batteryDuration - 12) {
                if (Math.random() < 0.06) { bPower = 0.15; isCurrentlyFlickering = true; }
            }
            flashlight.intensity = isFlashlightOn ? 14.0 * bPower : 0;

            if (isCurrentlyFlickering && audioCtx && buzzFilter) {
                buzzFilter.frequency.setValueAtTime(350 + Math.random()*400, audioCtx.currentTime); mainGain.gain.setValueAtTime(0.08, audioCtx.currentTime); 
            } else if (audioCtx && buzzFilter) {
                buzzFilter.frequency.setValueAtTime(140, audioCtx.currentTime); mainGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            }

            playerVelocityY += gravity; player.position.y += playerVelocityY;
            if (player.position.y <= 0) { player.position.y = 0; playerVelocityY = 0; isGrounded = true; }

            let moveX = 0, moveZ = 0;
            if (platform === 'pc') {
                if (keys.w) moveZ -= 1; if (keys.s) moveZ += 1; if (keys.a) moveX -= 1; if (keys.d) moveX += 1;
                isMoving = (moveX !== 0 || moveZ !== 0); isSprinting = (isMoving && keys.shift && !isExhausted);
            } else {
                if (Math.abs(joystickInput.x) > 0.05 || Math.abs(joystickInput.y) > 0.05) { moveX = joystickInput.x; moveZ = joystickInput.y; }
                isMoving = (moveX !== 0 || moveZ !== 0); isSprinting = (isMoving && joystickDistanceRatio > 0.76 && !isExhausted);
            }

            if (isSprinting) { stamina -= 0.65; if (stamina <= 0) { stamina = 0; isExhausted = true; } } 
            else { stamina += isMoving ? 0.2 : 0.5; if (stamina >= 100) { stamina = 100; isExhausted = false; } }

            const sBar = document.getElementById('stamina-bar');
            if(sBar) { sBar.style.width = `${stamina}%`; sBar.style.background = isExhausted ? '#e63946' : '#c7b256'; }

            const runtime = Date.now() * 0.005;
            let bobX = 0, bobY = 0;
            
            // 🕴️ 고퀄리티 인간형 캐릭터 애니메이션 수치 적용 가공 처리부
            if (isMoving && isGrounded) {
                let waveFreq = isSprinting ? 2.2 : 1.4;
                bobX = Math.sin(runtime * waveFreq) * 0.025;
                bobY = Math.cos(runtime * waveFreq * 2) * 0.02;

                let speed = isExhausted ? 0.045 : (isSprinting ? 0.13 : 0.08);
                const sin = Math.sin(cameraAngleX), cos = Math.cos(cameraAngleX);
                const fX = (moveX * cos + moveZ * sin) * speed;
                const fZ = (-moveX * sin + moveZ * cos) * speed;

                const oldP = { x: player.position.x, z: player.position.z };
                const tenP = { x: player.position.x + fX, z: player.position.z + fZ };
                
                const safeP = checkGridCollision(oldP, tenP, 0.6);
                player.position.x = safeP.x; player.position.z = safeP.z;
                targetRotationY = cameraAngleX + Math.atan2(-moveX, -moveZ);

                // 🚶 3인칭 팔다리 런타임 역학 교차 흔들림 구현 (고퀄리티 모션 추가)
                const swing = Math.sin(runtime * waveFreq * 4) * 0.5;
                leftArm3rd.rotation.x = swing; rightArm3rd.rotation.x = -swing;
                leftLeg.rotation.x = -swing * 1.2; rightLeg.rotation.x = swing * 1.2;

                // 👣 발소리 디스패처 연동 (0.42초 주기 간격)
                let footstepInterval = isSprinting ? 230 : 380;
                let now = Date.now();
                if(now - lastFootstepTime > footstepInterval) {
                    playFootstepSound(isSprinting ? 0.8 : 0.45);
                    lastFootstepTime = now;
                }
            } else {
                // 서있을 때 기본 대기(Idle) 자세 복원
                leftArm3rd.rotation.x = 0; rightArm3rd.rotation.x = 0;
                leftLeg.rotation.x = 0; rightLeg.rotation.x = 0;
            }

            if (viewMode === '3rd') {
                player.quaternion.slerp(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), targetRotationY), 0.15);
            } else {
                player.rotation.y = cameraAngleX;
            }

            let closestDist = 999;
            entities.forEach(e => {
                processEntityAI(e, player.position);
                const d = player.position.distanceTo(e.mesh.position);
                if (d < closestDist) closestDist = d;

                // 👾 엔티티 다리 꿈틀거리는 기괴한 모션 처리 루프 추가
                if(e.state === 'chase' || e.mesh.position.distanceTo(e.lastPos) > 0.01) {
                    e.legs.forEach((leg, idx) => {
                        leg.rotation.x = Math.sin(Date.now() * 0.02 + idx) * 0.6;
                    });
                }
            });

            // ❤️ 하트비트 레이아웃 핸들러
            const heartUI = document.getElementById('heartbeat-ui');
            if (closestDist < 16) {
                let proximityFactor = (16 - closestDist) / 16; 
                let heartbeatInterval = 900 - (proximityFactor * 600); 
                let now = Date.now();
                
                if (now - lastHeartbeatSoundTime > heartbeatInterval) {
                    playHeartbeatSound(0.3 + (proximityFactor * 0.7), true);
                    lastHeartbeatSoundTime = now;
                    heartUI.style.transform = `translateX(-50%) scale(${1.2 + proximityFactor * 0.6})`;
                    setTimeout(() => { heartUI.style.transform = `translateX(-50%) scale(${0.9 + proximityFactor * 0.3})`; }, 140);
                }

                const glitchOverlay = document.getElementById('glitch-overlay');
                glitchOverlay.style.background = `rgba(140, 20, 20, ${proximityFactor * 0.45})`;
                glitchOverlay.style.opacity = (Math.sin(Date.now() * 0.09) * 0.15) + proximityFactor;
            } else {
                heartUI.style.transform = 'translateX(-50%) scale(0)';
                document.getElementById('glitch-overlay').style.opacity = 0;
            }

            if (closestDist < 1.3) {
                isGameOver = true; document.getElementById('gameover-screen').style.display = 'flex';
                if(platform === 'pc') document.exitPointerLock(); return;
            }

            if (viewMode === '3rd') {
                const r = 5.2;
                const tX = player.position.x + Math.sin(cameraAngleX)*Math.cos(cameraAngleY)*r;
                const tY = player.position.y + 1.8 + Math.sin(cameraAngleY)*r + 1.2;
                const tZ = player.position.z + Math.cos(cameraAngleX)*Math.cos(cameraAngleY)*r;
                camera.position.x += (tX - camera.position.x) * 0.18;
                camera.position.y += (tY - camera.position.y) * 0.18;
                camera.position.z += (tZ - camera.position.z) * 0.18;
                camera.lookAt(player.position.x, player.position.y + 1.3, player.position.z);
            } else {
                camera.position.x = player.position.x; 
                camera.position.y = player.position.y + 1.65 + bobY; 
                camera.position.z = player.position.z;

                const viewDir = new THREE.Vector3(-Math.sin(cameraAngleX)*Math.cos(cameraAngleY), Math.sin(cameraAngleY), -Math.cos(cameraAngleX)*Math.cos(cameraAngleY));
                camera.lookAt(new THREE.Vector3().copy(camera.position).add(viewDir));

                firstPersonRig.position.copy(camera.position);
                firstPersonRig.rotation.set(camera.rotation.x, camera.rotation.y, camera.rotation.z);
                
                leftArm.position.x = -0.25 + bobX * 0.5; rightArm.position.x = 0.25 + bobX * 0.5;
                flashlightMesh.position.x = 0.25 + bobX * 0.5; flashlight.position.x = 0.25 + bobX * 0.5;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
