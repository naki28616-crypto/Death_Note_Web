<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms - Escape Room Ultimate</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background-color: #1a1913; touch-action: none; font-family: monospace; }
        canvas { display: block; }
        
        /* VHS 및 캠코더 효과 오버레이 */
        #vhs-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.65) 100%); pointer-events: none; z-index: 2; }
        #glitch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0); opacity: 0; pointer-events: none; z-index: 3; transition: background-color 0.5s, opacity 0.5s; }
        
        /* 상단 UI */
        #cctv-ui { position: absolute; top: 20px; left: 20px; color: #cc1111; font-weight: bold; font-size: 18px; z-index: 10; text-shadow: 1px 1px 2px #000; }
        #cctv-ui span { animation: blink 1s infinite; }
        
        /* 버튼 컨트롤 (이동하면서 누를 수 있도록 배치) */
        #controls { position: absolute; top: 20px; right: 20px; z-index: 10; display: flex; gap: 10px; }
        .btn { background: rgba(40, 40, 40, 0.85); color: #fff; border: 2px solid #666; padding: 12px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; font-family: monospace; transition: 0.2s; }
        .btn:active { background: #fff; color: #000; }
        
        /* 스테미너 바 */
        #stamina-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 250px; height: 12px; background: rgba(0,0,0,0.5); border: 2px solid #555; z-index: 10; border-radius: 6px; overflow: hidden; }
        #stamina-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffd700, #c7b256); transition: width 0.05s linear; }
        
        /* 안내 문구 */
        #instructions { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); color: #fff; text-align: center; font-size: 14px; pointer-events: none; text-shadow: 1px 1px 3px #000; z-index: 5; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="vhs-overlay"></div>
    <div id="glitch-overlay"></div>
    <div id="cctv-ui">● REC <span id="time">00:00</span></div>
    
    <div id="controls">
        <button class="btn" id="viewBtn">VIEW (3인칭)</button>
        <button class="btn" id="pauseBtn">PAUSE</button>
    </div>
    
    <div id="instructions">WASD : 이동 | Shift : 달리기 | Space : 점프 (달리며 점프 시 앞으로 대시)</div>
    <div id="stamina-container"><div id="stamina-fill"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 게임 설정 변수 ---
        let scene, camera, renderer, player;
        let keys = { w: false, a: false, s: false, d: false, Shift: false };
        
        // 조작 및 물리 상태
        let stamina = 100;
        let isSprinting = false;
        let isPaused = false;
        let viewMode = '3rd'; 
        let velocityY = 0;
        let jumpForwardVelocity = new THREE.Vector3(); // 대시 점프 관성 벡터
        let currentFacingDir = new THREE.Vector3(0, 0, -1); // 플레이어가 직전에 바라본 실제 방향
        
        const GRAVITY = 0.010; // 체공시간 상향을 위해 중력 소폭 완화
        const JUMP_FORCE = 0.20;
        
        // 정전 시스템 (1분 = 60초)
        let gameTime = 0;
        let isBlackout = false;
        let light, ambientLight;

        // 엔티티(살인마) 설정
        let entities = [];
        const ENTITY_COUNT = 2;

        // 미로 크기 (넓은 랜덤 맵)
        const MAP_SIZE = 35; 
        const GRID_SIZE = 3; 
        let maze = [];

        // --- 1. 초기화 구문 ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xbbb285); 
            scene.fog = new THREE.FogExp2(0xbbb285, 0.05);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            light = new THREE.PointLight(0xfffee0, 0.8, 40);
            light.castShadow = true;
            scene.add(light);

            // 플레이어 생성
            player = new THREE.Group();
            let playerMat = new THREE.MeshBasicMaterial({ color: 0x555555, visible: true });
            let playerBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.6), playerMat);
            playerBody.position.y = 0.9;
            player.add(playerBody);
            
            // 월드 중앙 부근으로 초기 위치 고정
            player.position.set(0, 0, 0);
            scene.add(player);

            // 맵 및 엔티티 배치
            generateMaze();
            spawnEntities();

            // 이벤트 리스너 등록
            window.addEventListener('keydown', (e) => handleInput(e, true));
            window.addEventListener('keyup', (e) => handleInput(e, false));
            window.addEventListener('resize', onWindowResize);

            // UI 버튼 작동 (포커스를 무력화하여 끊김 없는 조작)
            document.getElementById('viewBtn').addEventListener('click', (e) => {
                viewMode = viewMode === '3rd' ? '1st' : '3rd';
                e.target.innerText = `VIEW (${viewMode === '3rd' ? '3인칭' : '1인칭'})`;
                e.target.blur(); 
            });

            document.getElementById('pauseBtn').addEventListener('click', (e) => {
                isPaused = !isPaused;
                e.target.innerText = isPaused ? "RESUME" : "PAUSE";
                e.target.blur();
            });

            animate();
        }

        // --- 2. 랜덤 미로 생성 알고리즘 (스폰 구역 보장형) ---
        function generateMaze() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x9e9463, roughness: 0.8 });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x8a7f55, roughness: 0.5 });
            const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xb5aa74 });

            const wallGeo = new THREE.BoxGeometry(GRID_SIZE, 3.5, GRID_SIZE);
            const floorGeo = new THREE.PlaneGeometry(MAP_SIZE * GRID_SIZE, MAP_SIZE * GRID_SIZE);

            let floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            let ceiling = new THREE.Mesh(floorGeo, ceilingMat);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = 3.5;
            scene.add(ceiling);

            // 실제 월드 좌표계 중심 보정값
            const halfMap = (MAP_SIZE * GRID_SIZE) / 2;

            for (let x = 0; x < MAP_SIZE; x++) {
                maze[x] = [];
                for (let z = 0; z < MAP_SIZE; z++) {
                    let isWall = false;
                    
                    // 외곽 테두리 벽 생성
                    if (x === 0 || x === MAP_SIZE - 1 || z === 0 || z === MAP_SIZE - 1) {
                        isWall = true; 
                    } else {
                        // 플레이어 스폰 주변 공간(중앙 인덱스)은 벽 생성을 무조건 제외하여 갇힘 방지
                        let midX = Math.floor(MAP_SIZE / 2);
                        let midZ = Math.floor(MAP_SIZE / 2);
                        if (Math.abs(x - midX) > 2 || Math.abs(z - midZ) > 2) {
                            if (Math.random() < 0.18) isWall = true;
                        }
                    }
                    maze[x][z] = isWall;

                    if (isWall) {
                        let wall = new THREE.Mesh(wallGeo, wallMat);
                        wall.position.set(x * GRID_SIZE - halfMap + GRID_SIZE/2, 1.75, z * GRID_SIZE - halfMap + GRID_SIZE/2);
                        wall.castShadow = true;
                        wall.receiveShadow = true;
                        scene.add(wall);
                    }
                }
            }
            
            // 플레이어를 안전하게 격자 정중앙에 재배치
            let startGridX = Math.floor(MAP_SIZE / 2);
            let startGridZ = Math.floor(MAP_SIZE / 2);
            player.position.set(startGridX * GRID_SIZE - halfMap + GRID_SIZE/2, 0, startGridZ * GRID_SIZE - halfMap + GRID_SIZE/2);
        }

        // --- 3. 엔티티 플레이어 근처 즉시 스폰 ---
        function spawnEntities() {
            const entityMat = new THREE.MeshBasicMaterial({ color: 0x111111 }); 
            const entityGeo = new THREE.BoxGeometry(0.7, 2.2, 0.7);

            for (let i = 0; i < ENTITY_COUNT; i++) {
                let entity = new THREE.Mesh(entityGeo, entityMat);
                
                // 항상 플레이어 반경 6~9 유닛 거리 근처 빈 공간에 강제 타겟팅 스폰
                let angle = Math.random() * Math.PI * 2;
                let dist = 6 + Math.random() * 3;
                let offsetX = Math.cos(angle) * dist;
                let offsetZ = Math.sin(angle) * dist;
                
                entity.position.set(player.position.x + offsetX, 1.1, player.position.z + offsetZ);
                scene.add(entity);
                entities.push(entity);
            }
        }

        // --- 4. 키보드 입력 처리 ---
        function handleInput(e, isDown) {
            if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') keys.w = isDown;
            if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') keys.a = isDown;
            if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') keys.s = isDown;
            if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') keys.d = isDown;
            if (e.key === 'Shift') keys.Shift = isDown;

            // [정상화 완료] 점프 시, 실시간 이동 방향 벡터 정보를 가진 'currentFacingDir'를 사용하여 도약 관성 부여
            if (e.key === ' ' && isDown && velocityY === 0 && !isPaused) {
                velocityY = JUMP_FORCE;

                if (isSprinting && (keys.w || keys.a || keys.s || keys.d)) {
                    // 진행 중이던 정밀 진행 방향으로 튀어나가도록 세팅
                    jumpForwardVelocity.copy(currentFacingDir).normalize().multiplyScalar(0.16); 
                } else {
                    jumpForwardVelocity.set(0, 0, 0);
                }
            }
        }

        // --- 5. 실시간 게임 루프 ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isPaused) {
                // [1] 타이머 및 1분 제한 정전
                gameTime += 1 / 60;
                let min = Math.floor(gameTime / 60);
                let sec = Math.floor(gameTime % 60);
                document.getElementById('time').innerText = 
                    `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;

                if (gameTime >= 60 && !isBlackout) {
                    isBlackout = true;
                    ambientLight.intensity = 0.02; 
                    light.intensity = 0.1;
                    scene.fog.color.setHex(0x050505);
                    document.getElementById('glitch-overlay').style.background = 'rgba(20, 0, 0, 0.4)';
                    document.getElementById('glitch-overlay').style.opacity = 1;
                }

                // [2] 이동 속도 상향 및 스테미너 천천히 차감
                isSprinting = keys.Shift && stamina > 5 && (keys.w || keys.a || keys.s || keys.d);
                let currentSpeed = isSprinting ? 0.15 : 0.09; 

                if (isSprinting) {
                    stamina -= 0.12; // 소모 속도 감소 완화
                } else {
                    stamina += 0.45; 
                }
                stamina = Math.min(100, Math.max(0, stamina));
                document.getElementById('stamina-fill').style.width = stamina + '%';

                // 이동 방향 벡터 계산
                let moveVector = new THREE.Vector3();
                if (keys.w) moveVector.z -= 1;
                if (keys.s) moveVector.z += 1;
                if (keys.a) moveVector.x -= 1;
                if (keys.d) moveVector.x += 1;

                if (moveVector.lengthSq() > 0) {
                    moveVector.normalize();
                    // 대시 점프 관성 유도를 위한 최신 진행 방향 저장
                    currentFacingDir.copy(moveVector); 
                    
                    let angle = Math.atan2(moveVector.x, moveVector.z);
                    player.rotation.y = angle;
                }
                
                moveVector.multiplyScalar(currentSpeed);

                // 점프 시 대시 관성 합산
                if (velocityY > 0 || player.position.y > 0) {
                    moveVector.add(jumpForwardVelocity);
                }

                // 슬라이딩 방식의 벽 충돌 검사 알고리즘
                const halfMap = (MAP_SIZE * GRID_SIZE) / 2;
                
                // X축 분리 이동 검사
                let nextX = player.position.x + moveVector.x;
                let gridX = Math.floor((nextX + halfMap) / GRID_SIZE);
                let currentGridZ = Math.floor((player.position.z + halfMap) / GRID_SIZE);
                if (gridX >= 0 && gridX < MAP_SIZE && !maze[gridX][currentGridZ]) {
                    player.position.x = nextX;
                }

                // Z축 분리 이동 검사
                let nextZ = player.position.z + moveVector.z;
                let currentGridX = Math.floor((player.position.x + halfMap) / GRID_SIZE);
                let gridZ = Math.floor((nextZ + halfMap) / GRID_SIZE);
                if (gridZ >= 0 && gridZ < MAP_SIZE && !maze[currentGridX][gridZ]) {
                    player.position.z = nextZ;
                }

                // 중력 및 점프 수직 제어
                player.position.y += velocityY;
                if (player.position.y > 0) {
                    velocityY -= GRAVITY;
                } else {
                    player.position.y = 0;
                    velocityY = 0;
                    jumpForwardVelocity.set(0, 0, 0); 
                }

                // 손전등 동기화
                light.position.set(player.position.x, player.position.y + 1.2, player.position.z);

                // [3] 엔티티 AI: 즉시 추격
                entities.forEach(entity => {
                    let dir = new THREE.Vector3().subVectors(player.position, entity.position);
                    let distance = dir.length();
                    dir.normalize();
                    
                    entity.position.add(dir.multiplyScalar(0.052)); 
                    entity.lookAt(player.position.x, entity.position.y, player.position.z);

                    if (distance < 0.75) {
                        document.getElementById('glitch-overlay').style.background = 'rgba(150, 0, 0, 0.9)';
                        document.getElementById('glitch-overlay').style.opacity = 1;
                        document.getElementById('instructions').innerText = "집어삼켜졌습니다. 새로고침(F5)으로 재도전하세요.";
                        isPaused = true;
                    }
                });
            }

            // [4] 실시간 시점 동기화
            if (viewMode === '1st') {
                camera.position.set(player.position.x, player.position.y + 1.4, player.position.z);
                let target = new THREE.Vector3(0, 0, -4).applyQuaternion(player.quaternion).add(camera.position);
                camera.lookAt(target);
            } else { 
                camera.position.set(player.position.x, player.position.y + 5.5, player.position.z + 5.0);
                camera.lookAt(player.position.x, player.position.y + 0.5, player.position.z);
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
