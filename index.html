<script>

const BG_COL = 0x8a7a40;

const fpsRig = new THREE.Group(); scene.add(fpsRig);

flashMesh.add(new THREE.Mesh(fbGeo, fMat));

flashMesh.position.set(.2, -.15, -.3); fpsRig.add(flashMesh);

let player = new THREE.Group(); scene.add(player);

function createProceduralTexture(type) {
    const c = document.createElement('canvas'); c.width = c.height = 512; const ctx = c.getContext('2d');
    if (type === 'wall') {
        ctx.fillStyle = '#bfa95a'; ctx.fillRect(0,0,512,512);
        for(let i=0; i<4000; i++) {
            ctx.fillStyle = `rgba(100, 80, 20, ${Math.random()*0.15})`;
            ctx.fillRect(Math.random()*512, Math.random()*512, Math.random()*10, Math.random()*50);
        }
        ctx.strokeStyle = 'rgba(150, 130, 60, 0.4)'; ctx.lineWidth = 4;
        for(let i=0; i<=512; i+=32) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke(); }
    } else if (type === 'floor') {
        ctx.fillStyle = '#5c5234'; ctx.fillRect(0,0,512,512);
        for(let i=0; i<10000; i++) {
            ctx.fillStyle = (Math.random()>0.5) ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.05)';
            ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
        }
    } else if (type === 'ceil') {
        ctx.fillStyle = '#c7c2ab'; ctx.fillRect(0,0,512,512);
        ctx.strokeStyle = '#8a8571'; ctx.lineWidth = 2;
        ctx.strokeRect(0,0,512,512);
    }
    const tex = new THREE.CanvasTexture(c);
    if(type !== 'wall') { tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(30, 30); }
    return tex;
}

const wallTex = createProceduralTexture('wall'), floorTex = createProceduralTexture('floor'), ceilTex = createProceduralTexture('ceil');
const wallMat = new THREE.MeshStandardMaterial({map:wallTex, roughness:0.8});
const floorMat = new THREE.MeshStandardMaterial({map:floorTex, roughness:0.9});
const ceilMat = new THREE.MeshStandardMaterial({map:ceilTex, roughness:1.0});

function worldXZ(r,c){ return {x: (c-COLS/2)*UNIT + UNIT/2, z: (r-ROWS/2)*UNIT + UNIT/2}; }

function genRandomMap() {
    mapData = Array(ROWS).fill().map(()=>Array(COLS).fill(1)); // 1 = Wall, 0 = Empty

    function clearArea(r1, r2, c1, c2) {
        for(let r=r1; r<=r2; r++) {
            for(let c=c1; c<=c2; c++) {
                if(r>0 && r<ROWS-1 && c>0 && c<COLS-1) mapData[r][c] = 0;
            }
        }
    }

    // 1. Small Start Room (West)
    clearArea(21, 24, 3, 6);
    centerSpawnPoint = worldXZ(22, 4);

    // 2. 9x9 Full Bingo Pit Room (Center-East)
    // Pit dimensions calculation to clear enough space
    // 9 holes + 10 paths = 9 * 6.2 + 10 * 2.0 = 55.8 + 20 = 75.8 units
    // 75.8 / 9 (UNIT) ~= 8.4 blocks. Let's clear a 10x10 area.
    const prTop = 17, prBot = 27;
    const prLeft = 21, prRight = 31;
    clearArea(prTop, prBot, prLeft, prRight);
    pitCX = (26 - COLS/2)*UNIT + UNIT/2;
    pitCZ = (22 - ROWS/2)*UNIT + UNIT/2;

    // 3. Exit Fork (East of Pit)
    // Main corridor from pit
    clearArea(21, 23, 32, 36); 
    // Fork Up
    clearArea(12, 21, 35, 37);
    // Fork Down
    clearArea(23, 32, 35, 37);

    // 4. Random Maze Area (Between Start and Pit)
    clearArea(5, 39, 7, 20); // Open a large area first
    
    // Fill with random pillars and walls to make it a maze
    for(let r=6; r<=38; r+=3) {
        for(let c=8; c<=19; c+=3) {
            if(Math.random() > 0.25) {
                mapData[r][c] = 1;
                if(Math.random() > 0.5) mapData[r+1][c] = 1;
                if(Math.random() > 0.5) mapData[r][c+1] = 1;
            }
        }
    }
    
    // Ensure main path is clear to pit room to avoid softlocks
    clearArea(21, 23, 6, 20); 
    // Add some obstacles in the main path so it's not too easy
    for(let c=8; c<19; c+=3) {
        if(Math.random() > 0.4) mapData[21][c] = 1;
        if(Math.random() > 0.4) mapData[23][c] = 1;
    }

    entitySpawnPoint = worldXZ(22, 18);
}

function buildGraphics(){
    if(iWalls){scene.remove(iWalls); iWalls.geometry.dispose();}
    lamps.forEach(l => scene.remove(l)); lamps = [];
    if(floorM){scene.remove(floorM); floorM=null;}
    if(ceilM){scene.remove(ceilM); ceilM=null;}
    if(floorGroup){scene.remove(floorGroup); floorGroup=null;}
    
    surfaceDecals.forEach(d => { if(d.parent) scene.remove(d); if(d.geometry) d.geometry.dispose(); }); surfaceDecals = [];

    let wc=0;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(mapData[r][c]===1)wc++; 
    const wGeo = new THREE.BoxGeometry(UNIT, WH, UNIT);
    iWalls = new THREE.InstancedMesh(wGeo, wallMat, wc);
    
    const dum = new THREE.Object3D(); let idx=0;
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            const wx = (c-COLS/2)*UNIT + UNIT/2, wz = (r-ROWS/2)*UNIT + UNIT/2;
            
            if(mapData[r][c]===1){
                dum.position.set(wx, WH/2, wz); dum.updateMatrix();
                iWalls.setMatrixAt(idx++, dum.matrix);
            } else if(mapData[r][c]===0) { 
                if(Math.random() < 0.08){ 
                    const lg = new THREE.Group();
                    const fr = new THREE.Mesh(new THREE.BoxGeometry(4, .05, 1.5), new THREE.MeshStandardMaterial({color:0x222}));
                    const pn = new THREE.Mesh(new THREE.BoxGeometry(3.8, .06, 1.3), new THREE.MeshBasicMaterial({color:0xfffcd1}));
                    pn.position.y = -.01; lg.add(fr, pn);
                    lg.position.set(wx, WH-.03, wz);
                    scene.add(lg); lamps.push(lg);
                    const pl = new THREE.PointLight(0xfff5bf, 0.8, 25, 1.2);
                    pl.position.set(wx, WH-.5, wz); scene.add(pl); lamps.push(pl);
                }
            }
        }
    }
    iWalls.instanceMatrix.needsUpdate = true;
    scene.add(iWalls);

    const mW = COLS*UNIT, mH = ROWS*UNIT;
    floorM = new THREE.Mesh(new THREE.PlaneGeometry(mW, mH), floorMat);
    floorM.rotation.x = -Math.PI/2; scene.add(floorM);
    ceilM = new THREE.Mesh(new THREE.PlaneGeometry(mW, mH), ceilMat);
    ceilM.rotation.x = Math.PI/2; ceilM.position.y = WH; scene.add(ceilM);
}

function safeSpawn(avoid, minD){
    for(let i=0; i<1000; i++){
        // Spawn key mostly in the maze area (left of pit)
        const r=Math.floor(Math.random()*34)+5, c=Math.floor(Math.random()*15)+6;
        if(mapData[r][c] === 0){
            const p = worldXZ(r,c);
            if(avoid && minD && Math.sqrt((p.x-avoid.x)**2 + (p.z-avoid.z)**2) < minD) continue;
            return {x:p.x, z:p.z, r, c};
        }
    }
    return {x:UNIT, z:UNIT, r:1, c:1};
}

function buildSurfaceHole() {
    if(surfaceHoleGroup) { scene.remove(surfaceHoleGroup); surfaceHoleGroup = null; }
    
    const sp = safeSpawn({x:pitCX, z:pitCZ}, 25);
    let targetWall = null;

function gridCollide(ox, oz, nx, nz, rad) {
    if(isFlying) return {x: nx, z: nz}; 
    if(isNaN(nx) || isNaN(nz)) return { x: ox, z: oz };
    if(player.position.y < -.05) return { x: nx, z: nz };

    let resultX = nx, resultZ = nz;
    const checkAxisCollision = (targetX, targetZ) => {
        const pc = Math.floor((ox - UNIT/2 + (COLS*UNIT)/2) / UNIT); const pr = Math.floor((oz - UNIT/2 + (ROWS*UNIT)/2) / UNIT);
        for(let r = pr-1; r <= pr+1; r++) {
            for(let c = pc-1; c <= pc+1; c++) {
                if(r<0 || r>=ROWS || c<0 || c>=COLS) continue;
                if(mapData[r][c] === 1) { 
                    const wx = (c - COLS/2)*UNIT + UNIT/2, wz = (r - ROWS/2)*UNIT + UNIT/2; const half = UNIT/2 + rad;
                    if(targetX > wx - half && targetX < wx + half && targetZ > wz - half && targetZ < wz + half) return true; 
                }
            }
        }
        return false;
    };
    if (checkAxisCollision(nx, oz)) resultX = ox; 
    if (checkAxisCollision(resultX, nz)) resultZ = oz; 
    
    let finalPc = Math.floor((resultX - UNIT/2 + (COLS*UNIT)/2) / UNIT);
    let finalPr = Math.floor((resultZ - UNIT/2 + (ROWS*UNIT)/2) / UNIT);
    if(finalPr>=0 && finalPr<ROWS && finalPc>=0 && finalPc<COLS && mapData[finalPr][finalPc] === 2) {
        return { x: ox, z: oz };
    }
    return { x: resultX, z: resultZ };
}

function ugCollide(oldX, oldZ, newX, newZ, rad) {
    if(isFlying) return {x: newX, z: newZ}; 
    if(isNaN(newX) || isNaN(newZ)) return { x: oldX, z: oldZ };
    let resultX = newX, resultZ = newZ;
    const checkUgCollision = (tx, tz) => {
        const pc = Math.floor((oldX - ugOX + (UG_C*UG_U)/2) / UG_U); const pr = Math.floor((oldZ - ugOZ + (UG_R*UG_U)/2) / UG_U);
        for(let r = Math.max(0, pr-1); r <= Math.min(UG_R-1, pr+1); r++) {
            for(let c = Math.max(0, pc-1); c <= Math.min(UG_C-1, pc+1); c++) {
                if(ugMap[r][c] !== 1) continue;
                const wx = ugOX + (c - UG_C/2)*UG_U + UG_U/2, wz = ugOZ + (r - UG_R/2)*UG_U + UG_U/2; const half = UG_U/2 + rad;
                if(tx > wx - half && tx < wx + half && tz > wz - half && tz < wz + half) return true;
            }
        }
        return false;
    };
    if (checkUgCollision(newX, oldZ)) resultX = oldX; if (checkUgCollision(resultX, newZ)) resultZ = oldZ; return { x: resultX, z: resultZ };
}

function mkEntity(){
    const e = new THREE.Group();
    const c = document.createElement('canvas'); c.width = 128; c.height = 128; const ctx = c.getContext('2d');
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(64, 64, 60, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(40, 50, 10, 0, Math.PI*2); ctx.arc(88, 50, 10, 0, Math.PI*2); ctx.fill();
    const tex = new THREE.CanvasTexture(c);
    const mat = new THREE.SpriteMaterial({ map: tex, color: 0xffffff }); const sprite = new THREE.Sprite(mat);
    sprite.scale.set(5, 5, 1); sprite.position.y = 2.5; e.add(sprite); scene.add(e); 
    return {mesh: e, sprite: sprite, state: 'patrol', patrolTarget: null, baseSpeed: 0.12, speed: 0.12, stuckT: 0, lastPos: new THREE.Vector3()};
}

function entityAI(e, pp){
    const ep = e.mesh.position; const dist = Math.sqrt((ep.x-pp.x)**2 + (ep.z-pp.z)**2); e.stuckT++;
    if(e.stuckT > 60){
        const sd = Math.sqrt((ep.x-e.lastPos.x)**2 + (ep.z-e.lastPos.z)**2);
        if(sd < .2) e.patrolTarget = safeSpawn(pp, 0);
        e.lastPos.copy(ep); e.stuckT = 0;
    }
    
    if (gameState === 'MENU' || isFlying) { 
        e.state = 'patrol';
    } else {
        if(dist < 50 && gameState === 'PLAYING' && player.position.y >= -0.2){ 
            e.state = 'chase';
        } else if(e.state === 'chase' && (dist > 55 || player.position.y < -.2)){ 
            e.state = 'patrol'; e.patrolTarget = safeSpawn(pp, 0);
        }
    }

    const dest = e.state === 'chase' ? pp : e.patrolTarget;
    if(e.state === 'patrol' && (!dest || (Math.abs(ep.x-dest.x)<2.0 && Math.abs(ep.z-dest.z)<2.0))) {
        e.patrolTarget = safeSpawn(pp, 0);
    }
    
    if(dest) {
        const dx = dest.x-ep.x, dz = dest.z-ep.z, len = Math.sqrt(dx*dx+dz*dz);
        if(len > .1){
            const sp = e.state === 'chase' ? e.speed*1.5 : e.speed; const te = {x: ep.x+dx/len*sp, z: ep.z+dz/len*sp}; 
            const se = gridCollide(ep.x, ep.z, te.x, te.z, .6);
            ep.x = se.x; ep.z = se.z;
        }
    }
}

window.addEventListener('touchstart', e => {
    if(e.target.closest('.btn') || e.target.closest('.circle-btn') || e.target.closest('#admin-panel') || gameState !== 'PLAYING' || platform !== 'mobile') return;
    for(let i=0; i<e.changedTouches.length; i++){
        const t = e.changedTouches[i];
        if(t.clientX < innerWidth/2 && jTouchId === null){
            jTouchId = t.identifier; jZone.style.left = `${t.clientX-60}px`; jZone.style.bottom = `${innerHeight-t.clientY-60}px`; jStart = {x:t.clientX, y:t.clientY}; calcJoy(t.clientX, t.clientY);
        } else if(t.clientX >= innerWidth/2 && rTouchId === null){ rTouchId = t.identifier; prevX = t.clientX; prevY = t.clientY; }
    }
}, {passive:false});
window.addEventListener('touchmove', e => {
    if(platform !== 'mobile') return;
    for(let i=0; i<e.touches.length; i++){
        const t = e.touches[i];
        if(t.identifier === jTouchId) calcJoy(t.clientX, t.clientY);
        if(t.identifier === rTouchId){
            const m = 0.004 * sensitivity; camX -= (t.clientX-prevX)*m; camY -= (t.clientY-prevY)*m; prevX = t.clientX; prevY = t.clientY; 
            if(!isFlying) camY = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, camY)); 
        }
    }
});
window.addEventListener('touchend', e => {
    for(let i=0; i<e.changedTouches.length; i++){
        const t = e.changedTouches[i];
        if(t.identifier === jTouchId){ jTouchId = null; jStick.style.transform = 'translate(0,0)'; jInput = {x:0, y:0}; jRatio = 0; jZone.style.left = '35px'; jZone.style.bottom = '35px'; }
        if(t.identifier === rTouchId) rTouchId = null;
    }
});

let isDragging = false;
window.addEventListener('mousedown', () => { if(gameState==='PLAYING' && platform==='pc' && document.getElementById('admin-panel').style.display !== 'flex') { isDragging = true; try{ document.body.requestPointerLock(); } catch(e){} } });
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
    if(gameState !== 'PLAYING' || platform !== 'pc') return;
    if(document.pointerLockElement === document.body || isDragging){
        const m = 0.002 * sensitivity; camX -= e.movementX*m; camY -= e.movementY*m; 
        if(!isFlying) camY = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, camY));
    }
});
document.pointerLockElement = null; document.addEventListener('pointerlockchange', ()=>{});

function handleFlash(e){ e.preventDefault(); e.stopPropagation(); if(gameState === 'PLAYING') toggleFlash(); }
function handleJumpDown(e){
    e.preventDefault(); e.stopPropagation();
    jumpBtnPressed = true;
    if(gameState !== 'PLAYING') return;
    
    if(isAdmin && document.getElementById('admin-panel').style.display !== 'flex') {
        let now = Date.now();
        if(now - lastJumpTime < 350) { toggleNoClip(); lastJumpTime = 0; return; }
        lastJumpTime = now;
    }

    if(!isFlying) {
        if(underground && ladderPlaced && ladderMesh){ const d=Math.sqrt((player.position.x-ladderMesh.position.x)**2 + (player.position.z-ladderMesh.position.z)**2); if(d<4.0){ climbing=true; return; } }
        if(grounded){ velY=JUMP; grounded=false; }
    }
}
function handleJumpUp(e){ e.preventDefault(); e.stopPropagation(); jumpBtnPressed = false; }

function toggleFlash(){ 
    isFlashOn = !isFlashOn; 
    document.getElementById('btn-mobile-flash')?.classList.toggle('active', isFlashOn); 
    flash.intensity = isFlashOn ? (underground ? 3.0 : 2.5) : 0; 
    lensMesh.material.color.setHex(isFlashOn ? 0xffffee : 0x222222); 
}
function placeLadder(){
    if(!hasLadder || ladderPlaced || !underground || !holeGroup) return;
    ladderPlaced = true; hasLadder = false; document.getElementById('ladder-hud').style.display = 'none';
    ladderMesh = new THREE.Group(); const lMat = new THREE.MeshStandardMaterial({color:0x885522});
    const lv1 = new THREE.Mesh(new THREE.BoxGeometry(.1, UG_WH*.9, .1), lMat); lv1.position.set(-.3, 0, 0); 
    const lv2 = new Mesh(new THREE.BoxGeometry(.1, UG_WH*.9, .1), lMat); lv2.position.set(.3, 0, 0); 
    ladderMesh.add(lv1, lv2);
    for(let i=0; i<7; i++){ const lh = new THREE.Mesh(new THREE.BoxGeometry(.7, .05, .05), lMat); lh.position.set(0, -UG_WH*.4 + i*(UG_WH*.8/6), 0); ladderMesh.add(lh); }
    ladderMesh.position.set(holePosX, UG_Y+UG_WH*.42, holePosZ+holeWallNZ*.25); ladderMesh.rotation.x = .1; scene.add(ladderMesh); ugObjs.push(ladderMesh);
    showToast("LADDER PLACED!<br>HOLD JUMP TO CLIMB.");
}

document.getElementById('btn-mobile-interact').addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation(); if(gameState !== 'PLAYING') return;
    if(underground){ if(hasLadder && !ladderPlaced && holeGroup){ const d=Math.sqrt((player.position.x-holePosX)**2+(player.position.z-holePosZ)**2); if(d<7.0){ placeLadder(); return; } } }
    else{ interactDoors(); }
});

window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if(k in keys) keys[k] = true;
    
    if(e.key === 'Escape') {
        if(gameState === 'PLAYING') triggerPause(true);
        else if(gameState === 'PAUSED') triggerPause(false);
    }
    
    if(e.key === ' ' && gameState === 'PLAYING'){
        keys.space = true;
        if(isAdmin && document.getElementById('admin-panel').style.display !== 'flex') {
            let now = Date.now();
            if(now - lastJumpTime < 350) { toggleNoClip(); lastJumpTime = 0; return; }
            lastJumpTime = now;
        }
        if(!isFlying) {
            if(underground && ladderPlaced && ladderMesh){ const d=Math.sqrt((player.position.x-ladderMesh.position.x)**2+(player.position.z-ladderMesh.position.z)**2); if(d<4.0){ climbing=true; return; } }
            if(grounded){ velY=JUMP; grounded=false; }
        }
    }
    if(k === 'f' && gameState === 'PLAYING') toggleFlash();
    if(k === 'e' && gameState === 'PLAYING'){
        if(underground){ if(hasLadder && !ladderPlaced && holeGroup){ const d=Math.sqrt((player.position.x-holePosX)**2+(player.position.z-holePosZ)**2); if(d<7.0){ placeLadder(); return; } } }
        else{ interactDoors(); }
    }
});
window.addEventListener('keyup', e => { const k = e.key.toLowerCase(); if(k in keys) keys[k] = false; if(e.key === ' ') keys.space = false; });

function interactDoors() {
    if(!hasKey) return;
    let closestDoor = null; let minDist = 3.5;
    doors.forEach(d => {
        let dist = player.position.distanceTo(d.group.position);
        if(dist < minDist && !d.opened) { closestDoor = d; minDist = dist; }
    });
    
    if(closestDoor) {
        if(closestDoor.isTrue) {
            closestDoor.opened = true;
            showToast("TRUE DOOR UNLOCKED!<br>PROCEED TO ESCAPE!");
        } else {
            closestDoor.opened = true;
            showToast("FAKE DOOR...<br>IT'S A TRAP!");
            setTimeout(() => { triggerGameOver("YOU OPENED THE WRONG DOOR."); }, 1500);
        }
        document.getElementById('interact-prompt').style.display = 'none'; document.getElementById('btn-mobile-interact').style.display = 'none';
    }
}

function triggerPause(s){
    if(gameState === 'GAMEOVER' || gameState === 'CLEAR') return;
    gameState = s ? 'PAUSED' : 'PLAYING';
    document.getElementById('pause-screen').style.display = s ? 'flex' : 'none';
    if(!s && platform === 'pc' && !isDragging) { try { document.body.requestPointerLock(); } catch(e){} }
    if(s && document.pointerLockElement === document.body) document.exitPointerLock();
}
function triggerGameOver(msg){ gameState = 'GAMEOVER'; document.getElementById('go-cause').textContent = msg; document.getElementById('gameover-screen').style.display = 'flex'; if(document.pointerLockElement === document.body) document.exitPointerLock(); }
function respawn(){
    gameState = 'PLAYING'; if(underground) exitUnderground();
    player.position.set(centerSpawnPoint.x, 0.1, centerSpawnPoint.z);
    sCamX = Math.PI/2; camX = Math.PI/2; sCamY = 0; camY = 0;
    velY = 0; grounded = true; stamina = 200; exhausted = false;
    isFlying = false; camera.far = 150; camera.updateProjectionMatrix(); scene.fog.density = 0.035;
    
    entities.forEach(e => { e.mesh.position.set(entitySpawnPoint.x, 0, entitySpawnPoint.z); e.state = 'patrol'; e.patrolTarget = entitySpawnPoint; });
    document.getElementById('gameover-screen').style.display = 'none'; if(platform === 'pc') { try{ document.body.requestPointerLock(); } catch(e){} }
}
function goMainMenu(){
    gameState = 'MENU'; underground = false; hasLadder = false; ladderPlaced = false; climbing = false;
    ['pause-screen', 'gameover-screen', 'clear-screen', 'top-controls', 'cctv-ui', 'quest-ui', 'interact-prompt', 'btn-mobile-interact', 'joystick-zone', 'mobile-controls-right', 'stamina-container', 'ladder-hud', 'admin-panel'].forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; });
    
    document.getElementById('start-screen').style.display = 'flex';
    document.getElementById('glitch-overlay').style.cssText = 'background:rgba(0,0,0,0);opacity:0;';
    scene.background.setHex(BG_COL); scene.fog.color.setHex(BG_COL); scene.fog.density = 0.035; ambient.intensity = 0.7; flash.intensity = isFlashOn ? 2.5 : 0;
    
    ugObjs.forEach(o => scene.remove(o)); ugObjs = []; 
    if(ugWalls){scene.remove(ugWalls); ugWalls=null;} if(ugFloor){scene.remove(ugFloor); ugFloor=null;} if(ugCeil){scene.remove(ugCeil); ugCeil=null;}
    if(ladderMesh){scene.remove(ladderMesh); ladderMesh=null;} if(holeGroup){scene.remove(holeGroup); holeGroup=null;}
    pitMeshes.forEach(m => { if(m && m.parent) scene.remove(m); }); pitMeshes = []; if(pitVoid){scene.remove(pitVoid); pitVoid=null;} pitBounds.active = false;
    
    if(surfaceHoleGroup){scene.remove(surfaceHoleGroup); surfaceHoleGroup=null;}
    if(floorGroup){scene.remove(floorGroup); floorGroup=null;} if(floorM) floorM.visible=true; if(iWalls) iWalls.visible=true; lamps.forEach(l=>{if(l.visible!==undefined) l.visible=true;}); if(ceilM) ceilM.visible=true;
    
    if(document.pointerLockElement === document.body) document.exitPointerLock(); lightState = 'normal'; hintSpawned = false; targetFov = 65;
    isFlying = false; camera.far = 150; camera.updateProjectionMatrix();
    
    genRandomMap(); buildGraphics();
    buildBingoPit(); spawnDoors(); spawnKey();
    entities.forEach(e => { e.mesh.position.set(entitySpawnPoint.x, 0, entitySpawnPoint.z); e.patrolTarget = entitySpawnPoint; e.state = 'patrol'; });
}

function launchGame(pf){
    platform = pf;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('top-controls').style.display = 'flex'; document.getElementById('cctv-ui').style.display = 'block'; document.getElementById('quest-ui').style.display = 'block'; document.getElementById('stamina-container').style.display = 'block';

    hasKey = false; underground = false; hasLadder = false; ladderPlaced = false; climbing = false; climbT = 0;
    stamina = 200; exhausted = false; velY = 0; grounded = true; lightState = 'normal'; hintSpawned = false; speedBoosted = false; targetFov = 65;
    isFlying = false; camera.far = 150; camera.updateProjectionMatrix(); scene.fog.density = 0.035;
    
    if(platform === 'mobile'){ document.getElementById('joystick-zone').style.display = 'block'; document.getElementById('mobile-controls-right').style.display = 'flex'; }
    else{ document.getElementById('crosshair').style.display = 'block'; try{ document.body.requestPointerLock(); } catch(e){} }
    
    genRandomMap(); buildGraphics(); buildSurfaceHole(); 
    
    player.position.set(centerSpawnPoint.x, 0.1, centerSpawnPoint.z);
    sCamX = Math.PI/2; camX = Math.PI/2; sCamY = 0; camY = 0; // Face east (towards the maze)
    
    buildBingoPit(); spawnDoors(); spawnKey();
    entities.forEach(e => { e.mesh.position.set(entitySpawnPoint.x, 0, entitySpawnPoint.z); e.lastPos.copy(e.mesh.position); e.patrolTarget = entitySpawnPoint; e.state = 'patrol'; });
    
    gameState = 'PLAYING'; recTime = 0;
}

genRandomMap(); buildGraphics(); entities.push(mkEntity()); 

let menuCamAngle = 0;

function animate(){
    requestAnimationFrame(animate);
    const rt = Date.now() * .005;

    if(gameState === 'MENU') {
        menuCamAngle += 0.002;
        camera.position.set(centerSpawnPoint.x + Math.sin(menuCamAngle)*15, 5, centerSpawnPoint.z + Math.cos(menuCamAngle)*15);
        camera.lookAt(centerSpawnPoint.x, 3.5, centerSpawnPoint.z);
        renderer.render(scene, camera); return;
    }

    if(gameState === 'GAMEOVER' || gameState === 'CLEAR' || gameState === 'PAUSED') { renderer.render(scene, camera); return; }

    recTime += 1/60;
    const m = Math.floor(recTime/60), s = Math.floor(recTime%60);
    document.getElementById('cctv-time').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    if(recTime >= 100 && recTime < 104 && lightState === 'normal') lightState = 'flickering';
    if(lightState === 'flickering') {
        if (Math.random() < 0.2) { ambient.intensity = Math.random() * 0.8; if(!isFlying) scene.fog.density = 0.05; }
        if(recTime >= 104) {
            lightState = 'off'; ambient.intensity = 0.08; if(!isFlying) scene.fog.density = 0.05; 
            lamps.forEach(l => { if(l.isPointLight) l.intensity = 0; });
            document.getElementById('glitch-overlay').style.cssText = 'background:rgba(5,5,5,.8);opacity:1;';
            entities.forEach(e => e.speed = e.baseSpeed * 1.4); speedBoosted = true;
        }
    }

    if(keyMesh && !hasKey) keyMesh.rotation.y += .02;

    if(!underground && player.position.y < -5.0 && !isFlying){ enterUnderground(); return; } 

    if(underground && climbing){
        climbT++; player.position.y += .075; velY = 0;
        if(player.position.y >= -0.05 || climbT > 115){ exitUnderground(); return; }
    }

    if(!hasKey && keyMesh && !underground){
        const d = Math.sqrt((player.position.x-keyMesh.position.x)**2 + (player.position.z-keyMesh.position.z)**2);
        if(d < 1.5){
            hasKey = true; scene.remove(keyMesh); 
            showToast("🔑 GOLDEN KEY ACQUIRED!<br>CROSS THE PIT TO UNLOCK THE EXIT!");
        }
    }

    if(underground && !hasLadder && ladderItem){
        const d = Math.sqrt((player.position.x-ladderItem.position.x)**2 + (player.position.z-ladderItem.position.z)**2);
        if(d < 1.8){
            hasLadder = true; scene.remove(ladderItem); ladderItem = null; document.getElementById('ladder-hud').style.display = 'block';
            showToast("LADDER ACQUIRED!<br>PLACE IT AT THE GREEN HOLE [E]!");
        }
    }

    const qu = document.getElementById('quest-ui');
    if(!underground){
        if(isFlying) qu.innerHTML = "ADMIN MODE<br><span style='color:#0ff;'>NOCLIP ACTIVE</span>";
        else if(!hasKey) qu.innerHTML = "QUEST: FIND THE HIDDEN KEY IN MAZE";
        else {
            let trueDist = 999;
            doors.forEach(d => { if(d.isTrue && !d.opened) trueDist = Math.floor(player.position.distanceTo(d.group.position)); });
            if(trueDist < 999) qu.innerHTML = `QUEST: CHOOSE THE TRUE DOOR<br>DIST: ${trueDist}m`;
            else qu.innerHTML = "<span style='color:#0f0;'>ESCAPE THROUGH THE TRUE PORTAL!</span>";
        }
    } else {
        if(isFlying) qu.innerHTML = "ADMIN MODE<br><span style='color:#0ff;'>NOCLIP ACTIVE</span>";
        else if(!hasLadder && !ladderPlaced) qu.innerHTML = "QUEST: FIND A LADDER";
        else if(hasLadder && !ladderPlaced) qu.innerHTML = "QUEST: PLACE LADDER AT GREEN LIGHT";
        else qu.innerHTML = "QUEST: CLIMB THE LADDER";
    }

    if(!underground && doors.length > 0){
        let closestDoor = null; let minDist = 3.5;
        doors.forEach(d => {
            let dist = player.position.distanceTo(d.group.position);
            if(dist < minDist && !d.opened) { closestDoor = d; minDist = dist; }
        });

        if(hasKey && closestDoor){
            if(platform === 'pc'){ document.getElementById('interact-prompt').innerHTML = '[E] OPEN DOOR'; document.getElementById('interact-prompt').style.display = 'block'; }
            else{ document.getElementById('btn-mobile-interact').innerHTML = 'USE'; document.getElementById('btn-mobile-interact').style.display = 'flex'; }
        } else if(!underground){ document.getElementById('interact-prompt').style.display = 'none'; document.getElementById('btn-mobile-interact').style.display = 'none'; }
        
        doors.forEach(d => {
            if(d.opened && d.pivot){
                if(d.pivot.rotation.y > -Math.PI/2){ d.pivot.rotation.y -= .05; d.group.updateMatrixWorld(true); }
                else if (d.isTrue) {
                    const de = player.position.distanceTo(d.sensor);
                    if(de < 1.8){ gameState = 'CLEAR'; document.getElementById('clear-time').textContent = `TIME: ${m}:${s}`; document.getElementById('clear-screen').style.display = 'flex'; if(platform === 'pc') document.exitPointerLock(); return; }
                }
            }
        });
        
        if(!hasKey && closestDoor && minDist < 2.0) showToast("DOOR IS LOCKED.<br>KEY REQUIRED.");
    }

    if(underground && hasLadder && !ladderPlaced && holeGroup){
        const d = Math.sqrt((player.position.x-holePosX)**2 + (player.position.z-holePosZ)**2);
        if(d < 7.0){
            if(platform === 'pc'){ document.getElementById('interact-prompt').innerHTML = '[E] PLACE LADDER'; document.getElementById('interact-prompt').style.display = 'block'; }
            else{ document.getElementById('btn-mobile-interact').innerHTML = 'USE'; document.getElementById('btn-mobile-interact').style.display = 'flex'; }
        } else { document.getElementById('interact-prompt').style.display = 'none'; document.getElementById('btn-mobile-interact').style.display = 'none'; }
    }

    sCamX += (camX-sCamX)*.2; sCamY += (camY-sCamY)*.2;
    let bobX = 0, bobY = 0;

    if(isFlying) {
        moving = keys.w || keys.a || keys.s || keys.d || Math.abs(jInput.x)>.05 || Math.abs(jInput.y)>.05;
        sprinting = moving && (keys.shift || jRatio > 0.75);

        const fDir = new THREE.Vector3(0, 0, -1); fDir.applyEuler(new THREE.Euler(sCamY, sCamX, 0, 'YXZ'));
        const rDir = new THREE.Vector3(1, 0, 0); rDir.applyEuler(new THREE.Euler(0, sCamX, 0, 'YXZ'));
        
        let fmX = 0, fmY = 0, fmZ = 0;
        
        if(platform === 'pc') {
            if(keys.w){ fmX += fDir.x; fmY += fDir.y; fmZ += fDir.z; }
            if(keys.s){ fmX -= fDir.x; fmY -= fDir.y; fmZ -= fDir.z; }
            if(keys.a){ fmX -= rDir.x; fmY -= rDir.y; fmZ -= rDir.z; }
            if(keys.d){ fmX += rDir.x; fmY += rDir.y; fmZ += rDir.z; }
        } else {
            if(Math.abs(jInput.x)>.05 || Math.abs(jInput.y)>.05){ 
                fmX = fDir.x * (-jInput.y) + rDir.x * jInput.x; fmY = fDir.y * (-jInput.y); fmZ = fDir.z * (-jInput.y) + rDir.z * jInput.x; 
            }
        }

        const len = Math.sqrt(fmX*fmX + fmY*fmY + fmZ*fmZ);
        if(len > 0) {
            const flySpd = sprinting ? 0.6 : 0.2;
            player.position.x += (fmX/len) * flySpd; player.position.y += (fmY/len) * flySpd; player.position.z += (fmZ/len) * flySpd;
        }
        if(keys.space || jumpBtnPressed) { player.position.y += 0.35; }
        stamina = 200; velY = 0; 
    } else {
        const fX = -Math.sin(sCamX), fZ = -Math.cos(sCamX), rX = Math.cos(sCamX), rZ = -Math.sin(sCamX);
        let mX = 0, mZ = 0;
        if(platform === 'pc'){
            if(keys.w){mX+=fX; mZ+=fZ;} if(keys.s){mX-=fX; mZ-=fZ;} if(keys.a){mX-=rX; mZ-=rZ;} if(keys.d){mX+=rX; mZ+=rZ;} moving = mX!==0 || mZ!==0; sprinting = moving && keys.shift && !exhausted;
        } else {
            if(Math.abs(jInput.x)>.05 || Math.abs(jInput.y)>.05){ mX = fX * (-jInput.y) + rX * jInput.x; mZ = fZ * (-jInput.y) + rZ * jInput.x; } moving = mX!==0 || mZ!==0; sprinting = moving && jRatio>.75 && !exhausted;
        }

        if(sprinting){ stamina -= .25; if(stamina <= 0){ stamina = 0; exhausted = true; } } else { stamina += moving ? 0.2 : 0.5; if(stamina >= 200){ stamina = 200; exhausted = false; } }
        
        const spd = exhausted ? SPD_TIRED : (sprinting ? SPD_SPRINT : SPD_BASE);
        const nx = player.position.x + mX*spd, nz = player.position.z + mZ*spd; 

        if(moving && !climbing){
            let safe; if(underground) safe = ugCollide(player.position.x, player.position.z, nx, nz, .5); else safe = gridCollide(player.position.x, player.position.z, nx, nz, .55);
            player.position.x = safe.x; player.position.z = safe.z;
            if(grounded){ const wf = sprinting ? 2.5 : 1.4; bobX = Math.sin(rt*wf)*.04; bobY = Math.cos(rt*wf*2)*.025; }
        }
    }

    const sb = document.getElementById('stamina-bar'); 
    if(sb){
        sb.style.width = (isFlying ? 100 : (stamina/2)) + '%';
        sb.style.background = isFlying ? '#0ff' : (exhausted ? '#f00' : '#d1bd71');
    }

    if(!climbing && !isFlying){
        velY += GRAVITY; player.position.y += velY;
        if(underground){ 
            if(player.position.y <= UG_Y+0.05){ player.position.y = UG_Y+0.05; velY = 0; grounded = true; } else grounded = false; 
        } else {
            if(pitBounds.active){
                const inPit2 = player.position.x > pitBounds.minX && player.position.x < pitBounds.maxX && player.position.z > pitBounds.minZ && player.position.z < pitBounds.maxZ;
                if(inPit2){
                    const lx = player.position.x - pitBounds.minX; const lz = player.position.z - pitBounds.minZ;
                    const CELL = B_HOLE_W + B_PATH_W; const mx = lx % CELL; const mz = lz % CELL;
                    const margin = 0.5; 
                    const isInsideHoleX = (mx > B_PATH_W + margin) && (mx < CELL - margin);
                    const isInsideHoleZ = (mz > B_PATH_W + margin) && (mz < CELL - margin);
                    if(isInsideHoleX && isInsideHoleZ) { grounded = false; } else {
                        if(player.position.y <= 0.05){ player.position.y = 0.05; velY = 0; grounded = true; } else grounded = false; 
                    }
                } else { if(player.position.y <= 0.05){ player.position.y = 0.05; velY = 0; grounded = true; } else grounded = false; }
            } else { if(player.position.y <= 0.05){ player.position.y = 0.05; velY = 0; grounded = true; } else grounded = false; }
        }
    }

    let tiltX = 0, tiltZ = 0; targetFov = 65;
    if(!underground && pitBounds.active && !isFlying){
        const inP = player.position.x > pitBounds.minX && player.position.x < pitBounds.maxX && player.position.z > pitBounds.minZ && player.position.z < pitBounds.maxZ;
        if(inP && !grounded){
            targetFov = 80; tiltZ += (Math.random()-0.5)*0.1; velY -= 0.01;
        }
    }
    camera.fov += (targetFov - camera.fov) * 0.1;
    camera.updateProjectionMatrix();
