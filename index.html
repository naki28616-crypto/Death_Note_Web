<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - True Escape Remastered (Accurate Map + Admin)</title>
    <style>
        html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:#030302;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
        canvas{display:block;width:100%!important;height:100%!important;position:absolute;top:0;left:0;z-index:1;}
        #vhs-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle,rgba(0,0,0,0) 30%,rgba(0,0,0,0.85) 100%);pointer-events:none;z-index:2;}
        #glitch-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0);opacity:0;pointer-events:none;z-index:3;transition:background-color .1s,opacity .1s;}
        #crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:rgba(255,255,255,.6);border-radius:50%;pointer-events:none;z-index:5;display:none;}
        #cctv-ui{position:absolute;top:25px;left:25px;color:#ff3333;font-weight:bold;font-size:16px;z-index:210;letter-spacing:1.5px;pointer-events:none;font-family:monospace;display:none;text-shadow:0 0 8px rgba(255,51,51,0.7);}
        #quest-ui{position:absolute;top:60px;left:25px;color:#ffea9f;font-weight:bold;font-size:14px;z-index:210;letter-spacing:1px;pointer-events:none;background:rgba(12,11,9,.9);padding:10px 16px;border-left:3px solid #d1bd71;border-radius:0 4px 4px 0;display:none;text-shadow:0 1px 4px rgba(0,0,0,1);box-shadow:0 4px 12px rgba(0,0,0,.6);}
        #interact-prompt{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);color:#fff;background:rgba(0,0,0,.85);border:1px solid #d1bd71;padding:10px 20px;border-radius:4px;font-weight:bold;font-size:14px;z-index:100;display:none;pointer-events:none;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.5);}
        
        #top-controls{position:absolute;top:16px;right:16px;z-index:220;display:none; gap: 8px;}
        
        .btn{background:#1a1914;color:#d1bd71;border:1px solid #474436;padding:9px 14px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;white-space:nowrap;transition:all .2s;text-align:center;box-sizing:border-box;}
        .btn:hover{background:#2e2b21;color:#ffea9f;border-color:#615d4a;}
        
        .setting-row{display:flex;flex-direction:column;gap:5px;font-size:13px;color:#9e9573;font-weight:bold;font-family:monospace;width:100%;box-sizing:border-box;}
        .setting-row div{display:flex;justify-content:space-between;align-items:center;color:#e8e4cf;font-weight:normal;font-size:15px;}
        .setting-row input[type="range"]{width:100%;accent-color:#d1bd71;margin-top:4px;cursor:pointer;height:10px;}
        
        #mobile-controls-right{position:absolute;bottom:30px;right:30px;display:none;flex-direction:column;gap:15px;z-index:220;}
        .circle-btn{width:64px;height:64px;background:rgba(20,19,16,.95);border:2px solid #544e3e;border-radius:50%;color:#e8e4cf;font-size:24px;display:flex;justify-content:center;align-items:center;cursor:pointer;touch-action:none;box-shadow:0 6px 14px rgba(0,0,0,.8);}
        .circle-btn.active{background:#d1bd71;color:#111;border-color:#fff;}
        #btn-mobile-interact{background:#ffea9f!important;color:#111!important;border-color:#fff!important;display:none;font-size:28px;animation:pulse 1.2s infinite;z-index:230;}
        @keyframes pulse{0%{transform:scale(1);box-shadow:0 0 0 rgba(255,234,159,.5);}50%{transform:scale(1.15);box-shadow:0 0 20px rgba(255,234,159,.8);}100%{transform:scale(1);box-shadow:0 0 0 rgba(255,234,159,.5);}}
        
        #stamina-container{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);width:200px;background:rgba(8,8,6,.95);border:1px solid #474436;padding:5px;border-radius:4px;z-index:10;display:none;}
        .stamina-bg{background:rgba(0,0,0,.7);height:5px;overflow:hidden;border-radius:2px;}
        #stamina-bar{width:100%;height:100%;background:#d1bd71;transition:width 0.1s linear;}
        
        #heartbeat-ui{position:absolute;bottom:45px;left:50%;transform:translateX(-50%) scale(0);font-size:46px;color:#cc1818;text-shadow:0 0 25px rgba(204,24,24,.9);pointer-events:none;z-index:15;transition:transform .1s cubic-bezier(.175,.885,.32,1.275);}
        #game-toast{position:absolute;top:20%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.92);color:#ffcc00;padding:12px 24px;border:1px solid #d1bd71;border-radius:4px;font-weight:bold;font-size:15px;z-index:300;display:none;pointer-events:none;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.8);}
        #ladder-hud{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#66ff66;padding:6px 18px;border:1px solid #339933;border-radius:4px;font-weight:bold;font-size:13px;z-index:210;display:none;pointer-events:none;}
        #joystick-zone{position:absolute;bottom:35px;left:35px;width:120px;height:120px;background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.15);border-radius:50%;z-index:10;touch-action:none;display:none;}
        #joystick-stick{position:absolute;top:37px;left:37px;width:46px;height:46px;background:rgba(255,255,255,.3);border-radius:50%;}

        #start-screen{
            position:absolute;top:0;left:0;width:100%;height:100%;z-index:200;
            display:flex;flex-direction:column;justify-content:center;align-items:flex-start;
            color:#fff;overflow:hidden;padding-left:10%;box-sizing:border-box;pointer-events:auto;
        }
        #vignette-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(0,0,0,0.1) 15%,rgba(0,0,0,.85) 100%);pointer-events:none;z-index:3;}
        
        #noise-overlay{
            position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;opacity:.06;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            animation:staticAnim .08s steps(2) infinite;
        }
        #cctv-glitch-blind{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;opacity:0;z-index:6;pointer-events:none;}
        @keyframes staticAnim{0%,100%{opacity:.05;}50%{opacity:.08;}}
        
        #start-content{
            position:relative;z-index:10;display:flex;flex-direction:column;align-items:flex-start;text-align:left;max-width:600px;
            transition:opacity 0.3s ease;
            padding:35px 45px;
            background:rgba(12, 11, 9, 0.45);
            border-left: 4px solid #d1bd71;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        #cctv-badge{font-family:monospace;font-size:14px;color:#ff3333;letter-spacing:4px;margin-bottom:14px;font-weight:900;text-shadow:0 0 12px rgba(255,51,51,0.95);animation:blink 1.2s step-end infinite;}
        
        .title-main{font-size:24px;font-weight:700;letter-spacing:12px;margin:0;color:#c9b35d;font-family:monospace;text-shadow: 0 2px 4px rgba(0,0,0,0.8);}
        .title-sub{font-size:56px;font-weight:900;letter-spacing:4px;margin:6px 0 0;color:#ffffff;line-height:1.1;text-shadow: 0 2px 0 #1c1a14, 0 4px 0 #111, 0 6px 15px rgba(0,0,0,0.95), 0 0 30px rgba(209,189,113,0.45);}
        .title-level{font-size:15px;font-weight:700;letter-spacing:4px;margin:16px 0 35px;color:#ebd997;font-family:monospace;text-shadow: 0 2px 4px rgba(0,0,0,0.9);background:rgba(211, 191, 113, 0.15); display:inline-block; padding:5px 14px; border-radius: 3px;}
        
        .menu-group{display:flex;flex-direction:column;gap:16px;width:100%;align-items:flex-start;}
        .start-btn-container{position:relative;width:240px;height:54px;display:flex;justify-content:center;align-items:center;cursor:pointer;background:#d1bd71;border:2px solid #fff;border-radius:4px;box-shadow:0 8px 25px rgba(209,189,113,0.35);transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);}
        .start-btn-container:hover{transform:translateY(-2px);background:#ffea9f;box-shadow:0 12px 35px rgba(255,234,159,0.55);}
        .start-btn-container:active{transform:translateY(1px);}
        .start-label{font-size:18px;font-weight:900;letter-spacing:4px;color:#111;font-family:monospace;}
        
        .setting-toggle-btn{background:rgba(12,11,9,0.85);color:#d1bd71;border:1px solid #7c6f3e;padding:12px 24px;font-size:13px;font-weight:900;border-radius:4px;cursor:pointer;letter-spacing:2px;transition:all 0.2s;font-family:monospace;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
        .setting-toggle-btn:hover{color:#fff;border-color:#d1bd71;background:rgba(30,28,23,0.95);transform:translateY(-1px);}
        
        .inline-settings-panel {position: absolute; top: 0; left: 0; width: 100%; height: 100%;background: rgba(4, 4, 3, 0.98); z-index: 210; opacity: 0; pointer-events: none;display: flex; flex-direction: column; justify-content: flex-start; align-items: center;box-sizing: border-box; overflow-y: auto; transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);padding: 50px 20px;}
        .inline-settings-panel.open { opacity: 1; pointer-events: auto; }
        
        .settings-content-wrapper { display: flex; flex-direction: column; gap: 22px; width: 100%; max-width: 500px; padding-bottom: 50px; }
        .platform-mini-box{display:flex;gap:12px;width:100%;}
        .platform-choice-btn{background:#1c1b17;color:#9e9573;border:1px solid #4a4537;flex:1;padding:14px 0;font-size:13px;font-weight:bold;border-radius:3px;cursor:pointer;transition:all 0.2s;font-family:monospace;}
        .platform-choice-btn.selected{background:#d1bd71;color:#1c1b17;border-color:#fff;box-shadow:0 4px 12px rgba(209,189,113,.3);font-weight:900;}

        #gameover-screen,#pause-screen,#clear-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(3,3,2,.95);z-index:150;display:none;flex-direction:column;justify-content:center;align-items:center;backdrop-filter:blur(6px);}
        #gameover-screen{color:#cc2424;}
        #clear-screen{color:#ffcc00;background:rgba(12,11,9,.95);}
        .go-btn{background:#260f0f;color:#ff8888;border:1px solid #662222;padding:14px 28px;font-size:14px;font-weight:bold;border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all 0.2s;}
        .go-btn:hover{background:#471919;color:#fff;}

        /* Admin UI */
        #admin-panel {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 5, 5, 0.95); border: 2px solid #ff3333; padding: 25px;
            z-index: 9999; flex-direction: column; align-items: center; border-radius: 8px;
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.4); font-family: monospace;
        }
        #admin-panel h3 { color: #ff5555; margin: 0 0 15px 0; letter-spacing: 2px; }
        #admin-pw { background: #111; color: #fff; border: 1px solid #ff5555; padding: 12px; margin-bottom: 15px; width: 200px; text-align: center; font-size: 16px; outline: none; }
        #admin-panel .btn-wrap { display: flex; gap: 10px; width: 100%; }
        #admin-panel .btn-wrap button { flex: 1; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; border: 1px solid; }
        #admin-panel .btn-cancel { background: #222; color: #aaa; border-color: #555; }
        #admin-panel .btn-cancel:hover { background: #444; color: #fff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="vhs-overlay"></div>
<div id="glitch-overlay"></div>
<div id="crosshair"></div>
<div id="cctv-ui">🔴 REC <span id="cctv-time">00:00</span></div>
<div id="quest-ui"></div>
<div id="interact-prompt"></div>
<div id="game-toast"></div>
<div id="heartbeat-ui">♡</div>
<div id="ladder-hud">🪜 Ladder x1</div>

<div id="start-screen">
    <div id="vignette-overlay"></div>
    <div id="noise-overlay"></div>
    <div id="cctv-glitch-blind"></div>
    
    <div id="start-content">
        <div id="cctv-badge">🔴 REC — CAM 04 LIVE</div>
        <h2 class="title-main">LEVEL 0</h2>
        <h1 class="title-sub">THE<br>BACKROOMS</h1>
        <div class="title-level">Accurate Map + Admin Mod</div>
        
        <div class="menu-group">
            <div id="start-trigger" class="start-btn-container" onclick="launchGame()">
                <span class="start-label">START ESCAPE</span>
            </div>
            <button class="setting-toggle-btn" onclick="toggleStartSettings(true)">⚙️ SYSTEM SETTINGS</button>
        </div>
    </div>

    <div id="start-settings-panel" class="inline-settings-panel">
        <div class="settings-content-wrapper">
            <h1 style="font-size:32px; font-weight:900; letter-spacing:2px; margin:0 0 10px 0; color:#ffffff; font-family:monospace; text-align:center;">SETTINGS</h1>
            
            <div style="font-size:12px; color:#9e9573; font-weight:bold; font-family:monospace; margin-bottom:-6px;">SELECT PLATFORM</div>
            <div class="platform-mini-box">
                <button id="pc-btn" class="platform-choice-btn" onclick="setPlatform('pc')">PC</button>
                <button id="mobile-btn" class="platform-choice-btn" onclick="setPlatform('mobile')">MOBILE (Landscape)</button>
            </div>
            <hr style="border:0; border-top:1px solid #3d3a2e; margin:6px 0; width:100%;">
            <div class="setting-row">
                <div><span>Sensitivity</span><span id="txt-sens">1.0</span></div>
                <input type="range" id="cfg-sens" min="0.1" max="2.5" step="0.1" value="1.0" oninput="updateSens(this.value)">
            </div>
            <div class="setting-row">
                <div><span>BGM Volume</span><span id="txt-bgm">40%</span></div>
                <input type="range" id="cfg-bgm" min="0" max="100" step="5" value="40" oninput="updateBgm(this.value)">
            </div>
            <div class="setting-row">
                <div><span>SFX Volume</span><span id="txt-sfx">70%</span></div>
                <input type="range" id="cfg-sfx" min="0" max="100" step="5" value="70" oninput="updateSfx(this.value)">
            </div>
            <button class="platform-choice-btn" style="width:100%; margin-top:4px; padding:12px 0; border-color:#595443;" onclick="toggleFS()">📺 FULLSCREEN</button>
            <hr style="border:0; border-top:1px solid #3d3a2e; margin:6px 0; width:100%;">
            <button class="platform-choice-btn" style="width:100%; background:#1c1a14; color:#ffea9f; border-color:#d1bd71; font-weight:900; font-size:14px; letter-spacing:2px;" onclick="toggleStartSettings(false)">↩ RETURN</button>
        </div>
    </div>
</div>

<!-- Admin Panel -->
<div id="admin-panel">
    <h3>ADMIN ACCESS</h3>
    <input type="password" id="admin-pw" placeholder="Enter Password" onkeydown="if(event.key==='Enter')checkAdmin()">
    <div class="btn-wrap">
        <button class="btn-cancel" onclick="closeAdmin()">CANCEL</button>
    </div>
</div>

<div id="top-controls">
    <button class="btn" style="background:#5e1919; color:#ffcccc; border-color:#822525; padding: 8px 16px; font-size:12px;" onclick="toggleAdminPanel()">🛠 ADMIN</button>
    <button class="btn" style="background:#1a1914; color:#fff; border-color:#474436; padding: 8px 16px; font-size:12px;" onclick="triggerPause(true)">⏸ MENU</button>
</div>

<div id="mobile-controls-right">
    <div id="btn-mobile-interact" class="circle-btn">🚪</div>
    <div id="btn-mobile-throw" class="circle-btn" style="display:none;background:#ff3333!important;color:#fff!important;" ontouchstart="handleThrow(event)">💥</div>
    <div id="btn-mobile-flash" class="circle-btn active" ontouchstart="handleFlash(event)">🔦</div>
    <div id="btn-mobile-jump" class="circle-btn" style="font-size:20px;font-weight:bold;" ontouchstart="handleJumpDown(event)" ontouchend="handleJumpUp(event)">▲</div>
</div>

<div id="stamina-container"><div class="stamina-bg"><div id="stamina-bar"></div></div></div>
<div id="joystick-zone"><div id="joystick-stick"></div></div>

<div id="pause-screen">
    <h1 style="font-size:32px;color:#d1bd71;margin-bottom:20px;letter-spacing:4px;font-family:monospace;font-weight:900;">SYSTEM PAUSED</h1>
    <div style="display:flex;gap:15px;">
        <button class="btn" style="color:#111;background:#d1bd71;border-color:#fff;padding:12px 28px;font-size:15px;width:auto;" onclick="triggerPause(false)">RESUME</button>
        <button class="btn" style="background:#1a1914;color:#ff6666;border-color:#474436;padding:12px 28px;font-size:15px;width:auto;" onclick="goMainMenu()">↩ MAIN MENU</button>
    </div>
</div>
<div id="gameover-screen">
    <h1 style="font-size:36px;margin-bottom:5px;letter-spacing:5px;font-family:monospace;font-weight:900;text-shadow:0 0 20px rgba(204,36,36,0.8);">SIGNAL LOST</h1>
    <p id="go-cause" style="color:#999;font-size:14px;margin-bottom:30px;font-family:monospace;"></p>
    <div style="display:flex;gap:15px;">
        <button class="go-btn" onclick="goMainMenu()">↩ MAIN MENU</button>
        <button class="go-btn" style="background:#0f2613;color:#77ff77;border-color:#1d5724;" onclick="respawn()">🛡 RECOVER</button>
    </div>
</div>
<div id="clear-screen">
    <h1 style="font-size:38px;margin-bottom:5px;letter-spacing:5px;color:#ffcc00;text-shadow:0 0 25px rgba(255,204,0,.6);font-family:monospace;font-weight:900;">NOCLIP DETECTED</h1>
    <p id="clear-time" style="color:#ffcc00;font-size:20px;font-weight:bold;margin:0 0 15px;letter-spacing:1px;font-family:monospace;"></p>
    <p style="color:#bbb;font-size:15px;margin-bottom:35px;">Successfully phased into safe reality bounds.</p>
    <button class="go-btn" style="background:#d1bd71;color:#111;border-color:#fff;" onclick="goMainMenu()">↩ RETURN TO MENU</button>
</div>

<script>
let ROWS=45, COLS=45; 
const UNIT=9, WH=7.0; 

let mapData=[], reserved=[];
let obstacles=[]; 
let iWalls=null, lamps=[], floorM=null, ceilM=null, floorGroup=null;
let surfaceDecals = [], furnitures = [], staticColliders = [];

const UG_R=12, UG_C=12, UG_U=8.0, UG_WH=6.5;
const UG_Y=-35; 

let gameState = 'MENU';
let platform=null;
let isFlashOn=true, sensitivity=1.0, volBgm=0.4, volSfx=0.7;
let recTime=0, speedBoosted=false;
let lightState = 'normal'; 
let hintSpawned = false; 

// --- Admin Controls ---
let isAdmin = false;
let isFlying = false;
let lastJumpTime = 0;

let velY=0, grounded=true;
const GRAVITY=-0.016, JUMP=0.18;
let lastHB=0;
const SPD_BASE=0.15, SPD_SPRINT=0.26, SPD_TIRED=0.08;
let stamina=200, exhausted=false, moving=false, sprinting=false;

let hasKey=false, doorOpened=false;
let keyMesh=null, doorGroup=null, doorPivot=null;
let escapeSensor=new THREE.Vector3();
let escapeDoorPos = {x:0, z:0, ang:0};
let escapeRow = 24; // Randomized escape exit door row

let pitCX=0, pitCZ=0;
let pitBounds={minX:0,maxX:0,minZ:0,maxZ:0,active:false};
let pitMeshes=[], pitVoid=null;

const B_GRID_DIV = 3;    
const B_PATH_W = 3.0; 
let PIT_TOTAL = 0; 

let underground=false;
let ugMap=[], ugWalls=null, ugFloor=null, ugCeil=null, ugObjs=[];
let ugOX=0, ugOZ=0; 
let hasLadder=false, ladderItem=null, ladderMesh=null, ladderPlaced=false;
let holeGroup=null, holePosX=0, holePosZ=0, holeWallNX=0, holeWallNZ=0;
let climbing=false, climbT=0;

let surfaceHoleSpawn = {x:0, z:0, lookX:0, lookZ:1};
let surfaceHoleGroup = null;

// Raycaster for Picking and Throwing
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(0, 0); // Screen Center
let heldObject = null;
let dustParticles = null;

// Map Coordinates Layout
const centerSpawnPoint = {x: (22 - COLS/2)*UNIT + UNIT/2, z: (3 - ROWS/2)*UNIT + UNIT/2}; // North Studio Spawn Room
const keySpawnPoints = [
    {r: 37, c: 37}, {r: 26, c: 30}, {r: 31, c: 31}, {r: 25, c: 15}
];
const entitySpawnPoint = {x: (22 - COLS/2)*UNIT + UNIT/2, z: (18 - ROWS/2)*UNIT + UNIT/2}; // Center Intersection

const BG_COL=0x5c502b; // Realistic Kane Pixels brownish dirty yellow color
const scene=new THREE.Scene();
scene.background=new THREE.Color(BG_COL);
scene.fog=new THREE.FogExp2(BG_COL, 0.032); 

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,180);
let targetFov = 60;
const cctvCamera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,200);

const renderer=new THREE.WebGLRenderer({antialias:false, powerPreference:'high-performance', precision:'mediump'});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.0)); 
renderer.shadowMap.enabled = false; 

document.body.appendChild(renderer.domElement);

const ambient=new THREE.AmbientLight(0xdec58e, 0.85);
scene.add(ambient);

const fpsRig=new THREE.Group(); scene.add(fpsRig);
const flash=new THREE.SpotLight(0xfff5d1, 3.8, 85, Math.PI/4.2, 0.85, 0.5);
const flashTgt=new THREE.Object3D(); flashTgt.position.set(0,0,-10);

function mkWallTex(){
    const c=document.createElement('canvas'); c.width=c.height=512; const x=c.getContext('2d');
    x.fillStyle='#ccbe82'; x.fillRect(0,0,512,512);
    const d=x.getImageData(0,0,512,512);
    for(let i=0;i<d.data.length;i+=4){
        if(Math.random()<.35){
            const n=(Math.random()-.5)*18;
            d.data[i]=Math.max(0,Math.min(255,d.data[i]+n)); d.data[i+1]=Math.max(0,Math.min(255,d.data[i+1]+n)); d.data[i+2]=Math.max(0,Math.min(255,d.data[i+2]+n-5));
        }
    }
    x.putImageData(d,0,0);
    x.strokeStyle='rgba(130,118,65,.55)'; x.lineWidth=3;
    for(let i=0;i<512;i+=32){x.beginPath();x.moveTo(i,0);x.lineTo(i,512);x.stroke();}
    return new THREE.CanvasTexture(c);
}

}

// Check key accessibility using BFS pathfinding
function isReachable(startR, startC, targetR, targetC) {
    const queue = [{r: startR, c: startC}];
    const visited = Array(ROWS).fill().map(()=>Array(COLS).fill(false));
    visited[startR][startC] = true;
    
    while(queue.length > 0) {
        const curr = queue.shift();
        if(curr.r === targetR && curr.c === targetC) return true;
        
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        for(let [dr, dc] of dirs) {
            const nr = curr.r + dr, nc = curr.c + dc;
            if(nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                if(!visited[nr][nc] && mapData[nr][nc] === 0) {
                    visited[nr][nc] = true;
                    queue.push({r: nr, c: nc});
                }
            }
        }
    }
    return false;
}

function genFixedMap() {
    // 2 = Void Outer Area (No Render)
    mapData = Array(ROWS).fill().map(()=>Array(COLS).fill(2)); 
    reserved = Array(ROWS).fill().map(()=>Array(COLS).fill(false));
    obstacles = Array(ROWS).fill().map(()=>Array(COLS).fill(null));

    function clearArea(r1, r2, c1, c2) {
        for(let r=r1; r<=r2; r++) {
            for(let c=c1; c<=c2; c++) {
                if(r>=0 && r<ROWS && c>=0 && c<COLS) mapData[r][c] = 0;
            }
        }
    }

    // Carve main rooms
    clearArea(2, 3, 21, 23);   // North spawn room (Narrow studio size)
    clearArea(5, 11, 21, 23);  // North corridor
    clearArea(12, 19, 16, 28); // North-middle office rooms
    clearArea(20, 29, 12, 33); // Center main hall & intersection
    clearArea(20, 28, 2, 11);  // West bingo pit room
    clearArea(30, 42, 12, 25); // South-west maze rooms
    clearArea(30, 42, 26, 42); // South-east columns room

    // Door for starting room
    mapData[4][22] = 0;

    pitCX = (7 - COLS/2) * UNIT; 
    pitCZ = (24 - ROWS/2) * UNIT + UNIT/2;

    // Inside walls layout
    
    // 1. North-middle office room partitions
    for(let r=12; r<=17; r++) {
        if(r !== 15) { // Doorways at row 15
            mapData[r][19] = 1;
            mapData[r][25] = 1;
        }
    }
    for(let c=16; c<=28; c++) {
        if(c !== 22 && c !== 23) { // Open center hallway
            mapData[19][c] = 1;
        }
    }

    // 2. Center main hall partitions (Row 20-29, Col 12-33)
    // Horizontal divider (Row 24)
    for(let c=12; c<=33; c++) {
        if(c !== 12 && c !== 22 && c !== 23) { // Open column 12 to allow path to Bingo room
            mapData[24][c] = 1;
        }
    }
    // Vertical dividers
    for(let r=20; r<=29; r++) {
        if(r !== 24 && r !== 21) {
            mapData[r][25] = 1;
        }
        if(r !== 24 && r !== 27) {
            mapData[r][18] = 1;
        }
    }
    for(let c=12; c<=15; c++) mapData[21][c] = 1;
    for(let c=28; c<=33; c++) mapData[27][c] = 1;

    // 3. West Bingo room divider wall
    for(let r=20; r<=28; r++) {
        if(r !== 24) { // Open entry at row 24
            mapData[r][11] = 1;
        }
    }

    // 4. South-west maze room partitions
    for(let r=30; r<=42; r++) {
        mapData[r][25] = 1;
    }
    for(let c=12; c<=42; c++) {
        if(c !== 18 && c !== 34) { // Open doorways
            mapData[29][c] = 1;
        }
    }
    // Maze details (shifted col 18 to 17 to keep entrance open)
    for(let r=30; r<=35; r++) mapData[r][17] = 1; 
    for(let c=12; c<=17; c++) mapData[35][c] = 1; 
    for(let c=20; c<=25; c++) mapData[33][c] = 1;
    for(let r=33; r<=38; r++) mapData[r][21] = 1;
    for(let c=15; c<=22; c++) mapData[38][c] = 1;
    for(let r=35; r<=40; r++) mapData[r][15] = 1;
    for(let c=12; c<=15; c++) mapData[40][c] = 1;
    for(let r=38; r<=42; r++) mapData[r][23] = 1;

    // 5. South-east columns room layout
    for(let r=32; r<=41; r+=3) {
        for(let c=29; c<=41; c+=3) {
            mapData[r][c] = 1;
        }
    }

    // Build borders between inside (0) and outside (2)
    let tempMap = mapData.map(row => [...row]);
    for(let r=0; r<ROWS; r++) {
        for(let c=0; c<COLS; c++) {
            if(tempMap[r][c] === 2) {
                let hasFloor = false;
                for(let dr=-1; dr<=1; dr++){
                    for(let dc=-1; dc<=1; dc++){
                        if(dr===0 && dc===0) continue;
                        if(r+dr>=0 && r+dr<ROWS && c+dc>=0 && c+dc<COLS && tempMap[r+dr][c+dc] === 0) {
                            hasFloor = true;
                        }
                    }
                }
                if(hasFloor) mapData[r][c] = 1; 
            }
        }
    }

    // Randomize escape exit corridor row (North or South path)
    escapeRow = Math.random() > 0.5 ? 21 : 27;

    // Clear exit corridor and escape door spot
    clearArea(escapeRow - 1, escapeRow + 1, 0, 1);
    mapData[escapeRow][2] = 0; // Doorway entry

    escapeDoorPos.x = (2 - COLS/2) * UNIT;
    escapeDoorPos.z = (escapeRow - ROWS/2) * UNIT + UNIT/2;
    escapeDoorPos.ang = Math.PI / 2;

    // Spawn obstacles/partitions
    for(let r=2; r<ROWS-2; r++){
        for(let c=2; c<COLS-2; c++){
            if(r < 12) continue; 
            if(c < 4 && r >= 20 && r <= 28) continue; 
            if(mapData[r][c] === 0 && Math.random() < 0.08) { 
                let wallNeighbors = [];
                if(mapData[r-1][c]===1) wallNeighbors.push({side:'top'});
                if(mapData[r+1][c]===1) wallNeighbors.push({side:'bottom'});
                if(mapData[r][c-1]===1) wallNeighbors.push({side:'left'});
                if(mapData[r][c+1]===1) wallNeighbors.push({side:'right'});

                if(wallNeighbors.length > 0) {
                    let neighbor = wallNeighbors[Math.floor(Math.random()*wallNeighbors.length)];
                    obstacles[r][c] = {
                        type: Math.random() > 0.4 ? 'partition' : 'thinWall',
                        side: neighbor.side
                    };
                }
            }
        }
    }
}

function buildGraphics(){
    if(iWalls){
        scene.remove(iWalls);
        if(iWalls.isGroup) {
            iWalls.traverse(child => { if(child.geometry) child.geometry.dispose(); });
        } else if(iWalls.geometry) {
            iWalls.geometry.dispose();
        }
        iWalls = null;
    }
    lamps.forEach(l=>scene.remove(l)); lamps=[];
    if(floorM){scene.remove(floorM);floorM=null;}
    if(ceilM){scene.remove(ceilM);ceilM=null;}
    if(floorGroup){scene.remove(floorGroup);floorGroup=null;}
    clearSurfaceDecals();

    let vCount = 0;
    let hCount = 0;
    
    for(let r=0; r<ROWS; r++){
        for(let c=0; c<COLS; c++){
            if(mapData[r][c] === 1) {
                if(c > 0 && mapData[r][c-1] === 0) vCount++;
                if(c < COLS-1 && mapData[r][c+1] === 0) vCount++;
                if(r > 0 && mapData[r-1][c] === 0) hCount++;
                if(r < ROWS-1 && mapData[r+1][c] === 0) hCount++;
            }
        }
    }

    const wallThick = 0.25; 
    const vGeo = new THREE.BoxGeometry(wallThick, WH, UNIT);
    const hGeo = new THREE.BoxGeometry(UNIT, WH, wallThick);
    
    const vMesh = new THREE.InstancedMesh(vGeo, wallMat, vCount);
    const hMesh = new THREE.InstancedMesh(hGeo, wallMat, hCount);
    
    const dum = new THREE.Object3D();
    let vIdx = 0;
    let hIdx = 0;
    
    for(let r=0; r<ROWS; r++){
        for(let c=0; c<COLS; c++){
            const wx = (c - COLS/2)*UNIT + UNIT/2;
            const wz = (r - ROWS/2)*UNIT + UNIT/2;
            
            if(mapData[r][c] === 1) {
                // Vertical walls (Z-Axis)
                if(c > 0 && mapData[r][c-1] === 0) {
                    const wallX = wx - UNIT/2;
                    dum.position.set(wallX, WH/2, wz);
                    dum.updateMatrix();
                    vMesh.setMatrixAt(vIdx++, dum.matrix);
                    staticColliders.push({ minX: wallX - wallThick/2, maxX: wallX + wallThick/2, minZ: wz - UNIT/2, maxZ: wz + UNIT/2 });
                }
                if(c < COLS-1 && mapData[r][c+1] === 0) {
                    const wallX = wx + UNIT/2;
                    dum.position.set(wallX, WH/2, wz);
                    dum.updateMatrix();
                    vMesh.setMatrixAt(vIdx++, dum.matrix);
                    staticColliders.push({ minX: wallX - wallThick/2, maxX: wallX + wallThick/2, minZ: wz - UNIT/2, maxZ: wz + UNIT/2 });
                }
                // Horizontal walls (X-Axis)
                if(r > 0 && mapData[r-1][c] === 0) {
                    const wallZ = wz - UNIT/2;
                    dum.position.set(wx, WH/2, wallZ);
                    dum.updateMatrix();
                    hMesh.setMatrixAt(hIdx++, dum.matrix);
                    staticColliders.push({ minX: wx - UNIT/2, maxX: wx + UNIT/2, minZ: wallZ - wallThick/2, maxZ: wallZ + wallThick/2 });
                }
                if(r < ROWS-1 && mapData[r+1][c] === 0) {
                    const wallZ = wz + UNIT/2;
                    dum.position.set(wx, WH/2, wallZ);
                    dum.updateMatrix();
                    hMesh.setMatrixAt(hIdx++, dum.matrix);
                    staticColliders.push({ minX: wx - UNIT/2, maxX: wx + UNIT/2, minZ: wallZ - wallThick/2, maxZ: wallZ + wallThick/2 });
                }
            } else if(mapData[r][c] === 0) {
                // Ceil lights (Rectangular glow meshes instead of simple points)
                if(Math.random() < 0.055){ 
                    const lg=new THREE.Group();
                    const fr=new THREE.Mesh(new THREE.BoxGeometry(4.5,.04,4.5),new THREE.MeshStandardMaterial({color:0x1a1a1a}));
                    const pn=new THREE.Mesh(new THREE.BoxGeometry(4.3,.05,4.3),new THREE.MeshBasicMaterial({color:0xfffcd4}));
                    pn.position.y=-.01; lg.add(fr,pn);
                    lg.position.set(wx,WH-.02,wz);
                    scene.add(lg); lamps.push(lg);
                    const pl=new THREE.PointLight(0xfff7c4,1.1, 22, 1.2);
                    pl.position.set(wx,WH-.3,wz); scene.add(pl); lamps.push(pl);
                }
                
                if(Math.random() < 0.1 && !reserved[r][c] && !obstacles[r][c]) {
                    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                    for(let [dr, dc] of dirs) {
                        if(r+dr>=0 && r+dr<ROWS && c+dc>=0 && c+dc<COLS && mapData[r+dr][c+dc]===1) {
                            let g = createGraffiti();
                            g.position.set(wx + dc*(UNIT/2 - 0.05), Math.max(1.5, WH/2 + (Math.random()-0.5)*2), wz + dr*(UNIT/2 - 0.05));
                            g.rotation.y = Math.atan2(-dc, -dr);
                            scene.add(g); surfaceDecals.push(g);
                            break;
                        }
                    }
                }
                
                if(obstacles[r][c]) {
                    let obs = obstacles[r][c];
                    let isHoriz = (obs.side === 'left' || obs.side === 'right');
                    let extLen = UNIT * 0.65; 
                    let extThick = obs.type === 'thinWall' ? 0.25 : 0.6; 
                    let ow = isHoriz ? extLen : extThick;
                    let oz = isHoriz ? extThick : extLen;
                    let oH = obs.type === 'partition' ? WH * 0.4 : WH;
                    
                    let ox = wx; let oZ = wz;

                    mesh.position.set(ox, oH/2, oZ);

    iWalls = new THREE.Group();
    if(vCount > 0) {

    ceilM.rotation.x=Math.PI/2; ceilM.position.y=WH; scene.add(ceilM);

}

function worldXZ(r,c){return{x:(c-COLS/2)*UNIT+UNIT/2,z:(r-ROWS/2)*UNIT+UNIT/2};}

function safeSpawn(avoid,minD,excludeReserved=false){
    for(let i=0; i<1000; i++){
        const r=Math.floor(Math.random()*(ROWS-2))+1,c=Math.floor(Math.random()*(COLS-2))+1;
        if(mapData[r][c]===0 && !obstacles[r][c] && (!excludeReserved || !reserved[r][c])){
            const p=worldXZ(r,c);
            if(avoid&&minD&&Math.sqrt((p.x-avoid.x)**2+(p.z-avoid.z)**2)<minD)continue;
            return{x:p.x,z:p.z,r,c};
        }
    }
    return{x:UNIT,z:UNIT,r:1,c:1};
}

function gridCollide(ox, oz, nx, nz, rad) {
    if(isFlying) return {x: nx, z: nz}; 

    if (isNaN(nx) || isNaN(nz)) return { x: ox, z: oz };
    if (player.position.y < -.05) return { x: nx, z: nz };

    let resultX = nx, resultZ = nz;
    const checkAxisCollision = (targetX, targetZ) => {
        for (let i=0; i<staticColliders.length; i++) {
            let box = staticColliders[i];
            if (targetX + rad > box.minX && targetX - rad < box.maxX && targetZ + rad > box.minZ && targetZ - rad < box.maxZ) {
                return true;
            }
        }
        return false;
    };
    if (checkAxisCollision(nx, oz)) resultX = ox; 
    if (checkAxisCollision(resultX, nz)) resultZ = oz; 
    
    // Boundary collision
    let finalPc = Math.floor((resultX - UNIT / 2 + (COLS * UNIT) / 2) / UNIT);
    let finalPr = Math.floor((resultZ - UNIT / 2 + (ROWS * UNIT) / 2) / UNIT);
    if(finalPr>=0 && finalPr<ROWS && finalPc>=0 && finalPc<COLS && mapData[finalPr][finalPc] === 2) {
        return { x: ox, z: oz };
    }

    return { x: resultX, z: resultZ };
}

function ugCollide(oldX, oldZ, newX, newZ, rad) {
    if(isFlying) return {x: newX, z: newZ}; 

    if (isNaN(newX) || isNaN(newZ)) return { x: oldX, z: oldZ };
    let resultX = newX, resultZ = newZ;
    const checkUgCollision = (tx, tz) => {
        const pc = Math.floor((oldX - ugOX + (UG_C * UG_U) / 2) / UG_U); const pr = Math.floor((oldZ - ugOZ + (UG_R * UG_U) / 2) / UG_U);
        for (let r = Math.max(0, pr - 1); r <= Math.min(UG_R - 1, pr + 1); r++) {
            for (let c = Math.max(0, pc - 1); c <= Math.min(UG_C - 1, pc + 1); c++) {
                if (ugMap[r][c] !== 1) continue;
                const wx = ugOX + (c - UG_C / 2) * UG_U + UG_U / 2, wz = ugOZ + (r - UG_R / 2) * UG_U + UG_U / 2; const half = UG_U / 2 + rad;
                if (tx > wx - half && tx < wx + half && tz > wz - half && tz < wz + half) return true;
            }
        }
        return false;
    };
    if (checkUgCollision(newX, oldZ)) resultX = oldX; if (checkUgCollision(resultX, newZ)) resultZ = oldZ; return { x: resultX, z: resultZ };
}

function handlePickUpOrDrop() {
    if(heldObject) {
        heldObject.thrown = false;

        document.getElementById('btn-mobile-throw').style.display = 'none';
        showToast("✋ Dropped furniture.");
        return;
    }

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(furnitures, true);
    if(intersects.length > 0) {
        let obj = intersects[0].object;
        while(obj.parent && !furnitures.includes(obj)) {
            obj = obj.parent;
        }
        if(furnitures.includes(obj) && intersects[0].distance < 8.0) {
            heldObject = obj;
            heldObject.thrown = false;
            if(platform === 'mobile') {
                document.getElementById('btn-mobile-throw').style.display = 'flex';
            }
            showToast("📦 Picked up furniture. (Click/💥: Throw, E/🚪: Drop)");
            return;
        }
    }

                const cz = pitBounds.minZ + Math.floor(lz/cellH)*cellH + pathW + holeH/2;
                player.position.x += (cx - player.position.x) * 0.05; player.position.z += (cz - player.position.z) * 0.05;
                tiltZ += (Math.random()-0.5)*0.15; velY -= 0.005; targetFov = 80; 
            }
        }
    }
    camera.fov += (targetFov - camera.fov) * 0.1;
    camera.updateProjectionMatrix();

    // Cinematic Handheld camera shake effect
    let shakeX = 0;
    let shakeY = 0;
    if(gameState === 'PLAYING' && !isFlying) {
        const shakeFreq = Date.now() * 0.006;
        shakeX = Math.sin(shakeFreq) * 0.0015 + (Math.random() - 0.5) * 0.0006;
        shakeY = Math.cos(shakeFreq * 1.5) * 0.0015 + (Math.random() - 0.5) * 0.0006;
    }

    player.rotation.y=sCamX; fpsRig.position.set(player.position.x,player.position.y+1.5,player.position.z); fpsRig.rotation.set(sCamY+tiltX+shakeY,sCamX+shakeX,tiltZ,'YXZ');
    const aw=moving&&!isFlying?Math.sin(rt*(sprinting?2.5:1.4))*.07:0; const ai=Math.sin(Date.now()*.001)*.01;
    lArm.position.z=-.3+aw+ai;lArm.position.y=-.22+Math.abs(aw)*.25; rArm.position.z=-.3-aw+ai;rArm.position.y=-.22+Math.abs(aw)*.25; flashMesh.position.z=-.35-aw+ai;flashMesh.position.y=-.20+Math.abs(aw)*.25;
    flash.position.set(.24,-.20,-.35);flashTgt.position.set(.24,-.20,-12);

    let closestD=999;
    if(!underground){
        entities.forEach(e=>{
            entityAI(e,player.position);
            const d=Math.sqrt((player.position.x-e.mesh.position.x)**2+(player.position.z-e.mesh.position.z)**2); if(d<closestD)closestD=d;
            const ws=e.state==='chase'?.048:.016; e.sprite.position.y = 3.0 + Math.abs(Math.sin(Date.now()*ws*1.5)) * 0.4;
        });
        const hu=document.getElementById('heartbeat-ui');
        
        if(closestD<15 && !isFlying){ 
            const pf=(15-closestD)/15,hbi=800-pf*550,now=Date.now();
            if(now-lastHB>hbi){heartbeat(.35+pf*.45);lastHB=now;hu.style.transform=`translateX(-50%) scale(${1.2+pf*.4})`;setTimeout(()=>hu.style.transform=`translateX(-50%) scale(${.9+pf*.15})`,120);}
        }else hu.style.transform='translateX(-50%) scale(0)';
        if(closestD<1.3 && !isFlying){triggerGameOver("Reality signature corrupted by entity interference.");return;}
    }

    // Update cinematic floating dust particles relative to camera
    if(dustParticles) {
        const pos = dustParticles.geometry.attributes.position.array;
        for(let i=0; i<pos.length; i+=3) {
            pos[i+1] -= 0.006; 
            pos[i] += Math.sin(rt + i) * 0.002;
            const dist = Math.sqrt((pos[i] - camera.position.x)**2 + (pos[i+2] - camera.position.z)**2);
            if(pos[i+1] < -20 || dist > 30) {
                pos[i] = camera.position.x + (Math.random() - 0.5) * 30;
                pos[i+1] = camera.position.y + (Math.random() - 0.5) * 15;
                pos[i+2] = camera.position.z + (Math.random() - 0.5) * 30;
            }
        }
        dustParticles.geometry.attributes.position.needsUpdate = true;
    }

    camera.position.set(player.position.x+bobX,player.position.y+1.5+bobY,player.position.z); camera.rotation.set(sCamY+tiltX+shakeY,sCamX+shakeX,tiltZ,'YXZ');
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix(); cctvCamera.aspect=innerWidth/innerHeight;cctvCamera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
